name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Test and static validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run complete test suite
        run: npm test

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Validate Worker JavaScript syntax
        run: node --check worker/index.js

      - name: Validate workflow YAML syntax
        run: |
          ruby -e "require 'yaml'; Dir['.github/workflows/*.{yml,yaml}'].sort.each { |file| YAML.load_file(file); puts \"ok #{file}\" }"

      - name: Check patch whitespace
        run: |
          git fetch origin main
          git diff --check origin/main...HEAD

      - name: Report validated commit
        run: echo "Validated commit $(git rev-parse HEAD)"
