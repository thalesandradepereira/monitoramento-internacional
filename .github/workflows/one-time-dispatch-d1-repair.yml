name: One-time D1 repair dispatcher

on:
  issue_comment:
    types: [created]

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: one-time-d1-repair-dispatcher
  cancel-in-progress: false

jobs:
  dispatch:
    if: >-
      github.repository == 'thalesandradepereira/monitoramento-internacional' &&
      github.actor == 'thalesandradepereira' &&
      github.event.issue.title == 'Autorização para reparo seguro do D1' &&
      github.event.comment.body == '/repair-approved-d1-set-20260718'
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Dispatch and monitor the reviewed administrative workflow
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const issue_number = context.issue.number
            const workflow_id = 'import-recipients-d1.yml'
            const startedAt = Date.now()
            const sleep = ms => new Promise(resolve => setTimeout(resolve, ms))

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id,
              ref: 'main',
              inputs: {
                dry_run: 'true',
                repair_approved_set: 'true'
              }
            })

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: '🔐 O reparo privado do conjunto de destinatários foi despachado. A execução será acompanhada até a validação final, sem publicar a lista.'
            })

            let run
            for (let attempt = 1; attempt <= 30; attempt += 1) {
              const response = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id,
                event: 'workflow_dispatch',
                branch: 'main',
                per_page: 10
              })
              run = response.data.workflow_runs.find(candidate => {
                const createdAt = Date.parse(candidate.created_at)
                return Number.isFinite(createdAt) && createdAt >= startedAt - 10000
              })
              if (run) break
              await sleep(3000)
            }

            if (!run) {
              throw new Error('Não foi possível localizar a execução administrativa despachada.')
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `▶️ Execução administrativa localizada: ${run.html_url}`
            })

            for (let attempt = 1; attempt <= 90; attempt += 1) {
              const response = await github.rest.actions.getWorkflowRun({
                owner,
                repo,
                run_id: run.id
              })
              run = response.data
              if (run.status === 'completed') break
              await sleep(5000)
            }

            if (run.status !== 'completed') {
              throw new Error(`A execução administrativa não terminou dentro do prazo: ${run.html_url}`)
            }

            const succeeded = run.conclusion === 'success'
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: succeeded
                ? `✅ Reparo concluído e validado. O D1 contém exatamente 4 destinatários ativos aprovados e nenhum endereço de teste ativo. Execução: ${run.html_url}`
                : `❌ O reparo não foi validado. Conclusão: ${run.conclusion || 'desconhecida'}. Execução: ${run.html_url}`
            })

            if (!succeeded) {
              throw new Error(`O workflow administrativo terminou com conclusão ${run.conclusion}.`)
            }
