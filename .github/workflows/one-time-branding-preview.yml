name: One-time bilingual branding preview

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: one-time-branding-preview
  cancel-in-progress: false

jobs:
  send-preview:
    if: contains(github.event.head_commit.message, '[send-brand-preview]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do modelo aprovado
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Aplicar identidade e gerar página de teste
        run: |
          node scripts/apply-branding-preview.mjs
          sed -i 's|<img src="logo.jpg"|<img src="https://thalesandradepereira.github.io/monitoramento-internacional/logo.jpg"|' docs/Teste-Global-Media-Monitoring.html

      - name: Executar testes
        run: npm test

      - name: Validar TypeScript
        run: npx tsc --noEmit

      - name: Confirmar texto final e privacidade do destinatário
        run: |
          grep -F 'Monitoramento Mídia Internacional | Global Media Monitoring' src/dashboard.ts
          grep -F 'Monitoramento Mídia Internacional | Global Media Monitoring' docs/Teste-Global-Media-Monitoring.html
          grep -F 'Global Media Monitoring' src/email.ts
          if grep -RFi --exclude-dir=.git --exclude='*.html' 'thalesandrade@yahoo.com' .; then
            echo 'O endereço de teste não pode ser gravado em texto aberto no repositório.' >&2
            exit 1
          fi

      - name: Versionar modelo e página validados
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/dashboard.ts src/email.ts src/config.ts .github/workflows/monitoramento.yml docs/Teste-Global-Media-Monitoring.html
          git commit -m 'feat: atualizar identidade para Global Media Monitoring [skip ci]'
          git push origin HEAD:main

      - name: Validar página de teste local
        run: |
          test -f docs/Teste-Global-Media-Monitoring.html
          grep -F 'Monitoramento Mídia Internacional | Global Media Monitoring' docs/Teste-Global-Media-Monitoring.html

      - name: Aguardar publicação no GitHub Pages
        env:
          PREVIEW_URL: https://thalesandradepereira.github.io/monitoramento-internacional/Teste-Global-Media-Monitoring.html
        run: |
          for tentativa in $(seq 1 30); do
            status=$(curl -L -sS -o /tmp/branding-preview.html -w '%{http_code}' "$PREVIEW_URL" || true)
            if [ "$status" = '200' ] && grep -Fq 'Monitoramento Mídia Internacional | Global Media Monitoring' /tmp/branding-preview.html; then
              echo 'Página de teste publicada e validada.'
              exit 0
            fi
            echo "Aguardando GitHub Pages: tentativa $tentativa/30, HTTP $status"
            sleep 10
          done
          echo 'A página de teste não ficou disponível no prazo esperado.' >&2
          exit 1

      - name: Enviar prévia somente ao destinatário autorizado
        env:
          RECIPIENTS_API_URL: https://monitoramento-internacional-unsub.thalesandrade.workers.dev/internal/recipients
          RECIPIENTS_API_TOKEN: ${{ secrets.RECIPIENTS_API_TOKEN }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: '465'
          SMTP_SECURE: 'true'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          PREVIEW_URL: https://thalesandradepereira.github.io/monitoramento-internacional/Teste-Global-Media-Monitoring.html
          TARGET_EMAIL_SHA256: c0d0bdcc897f0ddc2be38792731cb238deed7fef46f869f6f1b70fdfb63cc38e
        run: |
          node <<'NODE'
          const crypto = require('node:crypto')
          const nodemailer = require('nodemailer')

          async function main() {
            const response = await fetch(process.env.RECIPIENTS_API_URL, {
              headers: {
                Authorization: `Bearer ${process.env.RECIPIENTS_API_TOKEN}`,
                Accept: 'application/json',
              },
            })
            if (!response.ok) {
              throw new Error(`Falha ao consultar destinatários: HTTP ${response.status}`)
            }

            const payload = await response.json()
            const recipients = Array.isArray(payload) ? payload : payload?.recipients
            if (!Array.isArray(recipients)) {
              throw new Error('Resposta de destinatários inválida.')
            }

            const expectedHash = process.env.TARGET_EMAIL_SHA256
            const matches = recipients
              .filter(item => typeof item === 'string')
              .map(item => item.trim().toLowerCase())
              .filter(item => crypto.createHash('sha256').update(item).digest('hex') === expectedHash)

            if (matches.length !== 1) {
              throw new Error(`Destinatário autorizado não localizado de forma única; correspondências=${matches.length}.`)
            }

            const recipient = matches[0]
            console.log(`::add-mask::${recipient}`)

            const transporter = nodemailer.createTransport({
              host: process.env.SMTP_HOST,
              port: Number(process.env.SMTP_PORT),
              secure: process.env.SMTP_SECURE === 'true',
              auth: {
                user: process.env.SMTP_USER,
                pass: process.env.SMTP_PASS,
              },
            })

            const brand = 'Monitoramento Mídia Internacional | Global Media Monitoring'
            const html = `
              <div style="background:#0B0F19;padding:32px;font-family:Arial,Helvetica,sans-serif;color:#E2E8F0;">
                <div style="max-width:680px;margin:0 auto;border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:30px;background:#101624;">
                  <h1 style="font-size:25px;line-height:1.35;margin:0 0 18px;color:#fff;">Monitoramento Mídia <span style="color:#D4AF37;">Internacional</span> <span style="color:#fff;">| Global Media</span> <span style="color:#D4AF37;">Monitoring</span></h1>
                  <p style="color:#CBD5E1;line-height:1.65;margin:0 0 20px;">Esta é a página de teste solicitada para avaliação da nova identidade bilíngue.</p>
                  <p style="color:#CBD5E1;line-height:1.65;margin:0 0 24px;">This is the requested test page for reviewing the new bilingual identity.</p>
                  <a href="${process.env.PREVIEW_URL}" style="display:inline-block;background:#D4AF37;color:#0B0F19;text-decoration:none;font-weight:700;padding:12px 20px;border-radius:7px;">Abrir página teste / Open test page</a>
                  <p style="color:#94A3B8;font-size:13px;line-height:1.55;margin:24px 0 0;">O arquivo HTML completo com as notícias está anexado a este e-mail.</p>
                  <p style="color:#94A3B8;font-size:13px;line-height:1.55;margin:8px 0 0;">The complete HTML file containing the news is attached to this email.</p>
                </div>
              </div>`

            const info = await transporter.sendMail({
              from: `"Monitoramento Mídia Internacional" <${process.env.SMTP_USER}>`,
              to: recipient,
              subject: `[TESTE] ${brand}`,
              html,
              attachments: [{
                filename: 'Teste-Global-Media-Monitoring.html',
                path: 'docs/Teste-Global-Media-Monitoring.html',
                contentType: 'text/html; charset=utf-8',
              }],
            })

            if (!info.messageId) {
              throw new Error('O servidor SMTP não retornou identificador de mensagem.')
            }
            console.log('Prévia enviada com sucesso ao único destinatário autorizado.')
          }

          main().catch(error => {
            console.error(error instanceof Error ? error.message : error)
            process.exit(1)
          })
          NODE
