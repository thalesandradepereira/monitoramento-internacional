name: Temporary D1 Recipients Import

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Validate recipients.txt only; false performs the HTTPS import'
        required: true
        type: boolean
        default: true
      repair_approved_set:
        description: 'Restore the approved historical recipients and deactivate every other active record'
        required: true
        type: boolean
        default: false

concurrency:
  group: temporary-d1-recipients-import
  cancel-in-progress: false

jobs:
  import-recipients:
    if: ${{ !inputs.repair_approved_set }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMPORT_URL: https://monitoramento-internacional-unsub.thalesandrade.workers.dev/internal/recipients/import
      DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate recipients.txt locally
        run: |
          set +x
          node scripts/prepare-recipient-import.mjs --input recipients.txt

      - name: Stop after dry run validation
        if: ${{ inputs.dry_run }}
        run: |
          set +x
          echo "Dry run completed. No Worker request was sent and D1 was not changed."

      - name: Import recipients into D1
        if: ${{ !inputs.dry_run }}
        env:
          RECIPIENTS_API_TOKEN: ${{ secrets.RECIPIENTS_API_TOKEN }}
        run: |
          set +x
          set -euo pipefail
          umask 077
          payload_file="$(mktemp)"
          response_file="$(mktemp)"
          cleanup() {
            rm -f "$payload_file" "$response_file"
          }
          trap cleanup EXIT

          if [ -z "${RECIPIENTS_API_TOKEN:-}" ]; then
            echo "Required API token secret is not configured."
            exit 1
          fi

          node scripts/prepare-recipient-import.mjs --input recipients.txt --payload "$payload_file"

          http_status="$(curl --silent --show-error --output "$response_file" --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer ${RECIPIENTS_API_TOKEN}" \
            --header 'Content-Type: application/json' \
            --data-binary "@$payload_file" \
            "$IMPORT_URL")"

          node - "$http_status" "$response_file" <<'NODE'
          const [status, responsePath] = process.argv.slice(2)
          const { readFileSync } = require('node:fs')
          let body
          try {
            body = JSON.parse(readFileSync(responsePath, 'utf8'))
          } catch {
            console.error(`Import failed with HTTP ${status} and a non-JSON response.`)
            process.exit(1)
          }
          if (status !== '200') {
            console.error(`Import failed with HTTP ${status}; response keys: ${Object.keys(body).sort().join(',')}`)
            process.exit(1)
          }
          const counts = ['received', 'imported', 'reactivated', 'invalid']
          for (const key of counts) {
            if (!Number.isInteger(body[key])) {
              console.error(`Import response missing aggregate count: ${key}`)
              process.exit(1)
            }
          }
          console.log(`Import succeeded. Received: ${body.received}; Imported: ${body.imported}; Reactivated: ${body.reactivated}; Invalid: ${body.invalid}`)
          NODE

  repair-approved-set:
    if: ${{ inputs.repair_approved_set }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      RECIPIENTS_API_TOKEN: ${{ secrets.RECIPIENTS_API_TOKEN }}
      RECIPIENTS_API_URL: https://monitoramento-internacional-unsub.thalesandrade.workers.dev/internal/recipients
      APPROVED_SOURCE_COMMIT: 9da4a4325a88295a40c37a5bee75ee207c9ba92b
      EXPECTED_ACTIVE_RECIPIENTS: '4'
      WRANGLER_VERSION: '4.112.0'

    steps:
      - name: Checkout trusted main history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate required secrets
        run: |
          set +x
          set -euo pipefail
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID RECIPIENTS_API_TOKEN; do
            if [ -z "${!name:-}" ]; then
              echo "Required secret is missing: ${name}" >&2
              exit 1
            fi
          done

      - name: Prepare private D1 repair statements
        id: prepare
        run: |
          set +x
          set -euo pipefail
          umask 077
          workdir="$(mktemp -d)"
          echo "workdir=$workdir" >> "$GITHUB_OUTPUT"
          git show "${APPROVED_SOURCE_COMMIT}:recipients.txt" > "$workdir/source.txt"

          WORKDIR="$workdir" EXPECTED_COUNT="$EXPECTED_ACTIVE_RECIPIENTS" node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')
          const source = fs.readFileSync(path.join(process.env.WORKDIR, 'source.txt'), 'utf8')
          const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
          const recipients = [...new Set(source
            .split(/\r?\n/)
            .map(line => line.trim().toLowerCase())
            .filter(line => line && !line.startsWith('#')))].sort()
          const expectedCount = Number(process.env.EXPECTED_COUNT)

          if (recipients.length !== expectedCount || recipients.some(email => !emailRe.test(email))) {
            throw new Error(`Approved source validation failed; count=${recipients.length}.`)
          }
          for (const email of recipients) process.stdout.write(`::add-mask::${email}\n`)

          const quote = value => `'${value.replaceAll("'", "''")}'`
          const approvedValues = recipients.map(quote)
          const statements = recipients.map(email => `INSERT INTO recipients (email, status, consent_source, unsubscribed_at)\nVALUES (${quote(email)}, 'active', 'approved-history-recovery', NULL)\nON CONFLICT(email) DO UPDATE SET\n  status = 'active',\n  consent_source = COALESCE(recipients.consent_source, 'approved-history-recovery'),\n  unsubscribed_at = NULL;`)
          statements.push(`UPDATE recipients\nSET status = 'unsubscribed',\n    unsubscribed_at = strftime('%Y-%m-%dT%H:%M:%fZ', 'now')\nWHERE status = 'active'\n  AND email NOT IN (${approvedValues.join(', ')});`)

          fs.writeFileSync(path.join(process.env.WORKDIR, 'repair.sql'), statements.join('\n\n') + '\n', { mode: 0o600 })
          fs.writeFileSync(path.join(process.env.WORKDIR, 'expected.json'), JSON.stringify(recipients), { mode: 0o600 })
          NODE

      - name: Apply approved active set to remote D1
        run: |
          set +x
          set -euo pipefail
          workdir='${{ steps.prepare.outputs.workdir }}'
          cd worker
          if ! npx --yes wrangler@${WRANGLER_VERSION} d1 execute DB --remote --file "$workdir/repair.sql" > "$workdir/wrangler.log" 2>&1; then
            echo 'Remote D1 repair failed. Detailed output was withheld to protect recipient data.' >&2
            exit 1
          fi
          echo 'Remote D1 repair statements completed.'

      - name: Verify exact active set without exposing addresses
        run: |
          set +x
          set -euo pipefail
          workdir='${{ steps.prepare.outputs.workdir }}'
          WORKDIR="$workdir" EXPECTED_COUNT="$EXPECTED_ACTIVE_RECIPIENTS" node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')

          async function main() {
            const expected = JSON.parse(fs.readFileSync(path.join(process.env.WORKDIR, 'expected.json'), 'utf8'))
            const response = await fetch(process.env.RECIPIENTS_API_URL, {
              headers: {
                Authorization: `Bearer ${process.env.RECIPIENTS_API_TOKEN}`,
                Accept: 'application/json',
              },
            })
            if (!response.ok) throw new Error(`Private verification failed with HTTP ${response.status}.`)
            const payload = await response.json()
            if (!Array.isArray(payload?.recipients)) throw new Error('Private verification returned an invalid payload.')
            const actual = [...new Set(payload.recipients.map(value => String(value).trim().toLowerCase()))].sort()
            if (actual.length !== Number(process.env.EXPECTED_COUNT)) {
              throw new Error(`Active recipient count mismatch; actual=${actual.length}.`)
            }
            if (JSON.stringify(actual) !== JSON.stringify(expected)) {
              throw new Error('Active recipient identities differ from the approved set.')
            }
            if (actual.some(email => email.endsWith('.example.test') || email.endsWith('@example.com'))) {
              throw new Error('A reserved test-domain recipient remains active.')
            }
            console.log(`D1 repair verified; active recipients=${actual.length}; test recipients=0.`)
          }

          main().catch(error => {
            console.error(error instanceof Error ? error.message : error)
            process.exit(1)
          })
          NODE

      - name: Remove private temporary files
        if: always()
        run: |
          set +x
          workdir='${{ steps.prepare.outputs.workdir }}'
          if [ -n "$workdir" ] && [ -d "$workdir" ]; then
            rm -rf "$workdir"
          fi
