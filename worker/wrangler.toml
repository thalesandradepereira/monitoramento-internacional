name = "monitoramento-internacional-unsub"
main = "index.js"
compatibility_date = "2024-09-01"

[vars]
GH_REPO = "thalesandradepereira/monitoramento-internacional"
# Primeira fase da migração: preservar o comportamento público legado.
# Trocar para "d1" somente depois de criar o banco, aplicar migrations e validar a importação privada.
RECIPIENTS_STORAGE = "github"

# Binding D1 real declarado para a próxima etapa privada da migração.
# O comportamento público segue usando GitHub enquanto RECIPIENTS_STORAGE=github.

[[d1_databases]]
binding = "DB"
database_name = "monitoramento-internacional-recipients"
database_id = "f979bfbd-a68d-4fa6-b566-ac3150370737"
migrations_dir = "migrations"

# Secrets (configurar via `wrangler secret put`):
#   UNSUBSCRIBE_SECRET     — chave HMAC compartilhada com o gerador de e-mails
#   GH_PAT_UNSUB           — Personal Access Token do GitHub (contents:write), enquanto RECIPIENTS_STORAGE=github
#   RECIPIENTS_API_TOKEN   — token Bearer do endpoint administrativo interno de destinatários
