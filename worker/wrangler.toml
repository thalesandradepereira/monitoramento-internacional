name = "monitoramento-internacional-unsub"
main = "index.js"
compatibility_date = "2024-09-01"

[vars]
GH_REPO = "thalesandradepereira/monitoramento-internacional"
# Produção usa D1 para inscrições e descadastros no mesmo rollout do envio.
# recipients.txt permanece apenas como rollback temporário; não há fallback silencioso quando D1 está selecionado.
RECIPIENTS_STORAGE = "d1"

[secrets]
required = ["UNSUBSCRIBE_SECRET", "RECIPIENTS_API_TOKEN"]

# Binding D1 real usado pela fonte oficial de destinatários.

[[d1_databases]]
binding = "DB"
database_name = "monitoramento-internacional-recipients"
database_id = "f979bfbd-a68d-4fa6-b566-ac3150370737"
migrations_dir = "migrations"

# Secrets (configurar via `wrangler secret put`):
#   UNSUBSCRIBE_SECRET     — chave HMAC compartilhada com o gerador de e-mails
#   GH_PAT_UNSUB           — Personal Access Token do GitHub (contents:write), apenas para rollback temporário com RECIPIENTS_STORAGE=github
#   RECIPIENTS_API_TOKEN   — token Bearer do endpoint administrativo interno de destinatários
