# Exemplo para etapa futura da migração D1.
# Não use este arquivo sem substituir database_id pelo valor real retornado pelo Wrangler.
# Não adicione tokens, API keys, senhas, e-mails reais ou outros segredos aqui.

name = "monitoramento-internacional-unsub"
main = "index.js"
compatibility_date = "2024-09-01"

[vars]
GH_REPO = "thalesandradepereira/monitoramento-internacional"
RECIPIENTS_STORAGE = "d1"

[[d1_databases]]
binding = "DB"
database_name = "monitoramento-internacional-recipients"
database_id = "SUBSTITUA_PELO_DATABASE_ID_REAL"
migrations_dir = "migrations"
