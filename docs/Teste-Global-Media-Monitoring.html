<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoramento Mídia Internacional | Global Media Monitoring</title>
  <style>
    :root {
      --bg: #0B0F19;
      --panel: #101624;
      --text: #E2E8F0;
      --muted: #94A3B8;
      --accent: #D4AF37;
      --border: rgba(255, 255, 255, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .preview-header {
      min-height: 112px;
      padding: 22px 4%;
      display: flex;
      align-items: center;
      gap: 28px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, #080d17, #0d1422);
    }
    .preview-logo {
      width: 176px;
      max-width: 22vw;
      height: 74px;
      object-fit: cover;
      border-radius: 12px;
    }
    .preview-title {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.42rem;
      font-size: clamp(1.15rem, 2.8vw, 2.35rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.15;
    }
    .light, .separator { color: #fff; }
    .accent { color: var(--accent); }
    .preview-note {
      padding: 12px 4%;
      background: rgba(212, 175, 55, 0.08);
      border-bottom: 1px solid rgba(212, 175, 55, 0.22);
      color: var(--muted);
      font-size: 0.88rem;
    }
    .dashboard-frame {
      display: block;
      width: 100%;
      height: calc(100vh - 159px);
      border: 0;
      background: var(--bg);
    }
    .fallback {
      padding: 24px 4%;
      color: var(--muted);
    }
    .fallback a { color: var(--accent); }
    @media (max-width: 760px) {
      .preview-header { gap: 16px; padding: 16px 4%; }
      .preview-logo { width: 112px; height: 58px; }
      .dashboard-frame { height: calc(100vh - 142px); }
    }
  </style>
</head>
<body>
  <header class="preview-header">
    <img class="preview-logo" src="https://thalesandradepereira.github.io/monitoramento-internacional/logo.jpg" alt="TAP">
    <div class="preview-title" aria-label="Monitoramento Mídia Internacional | Global Media Monitoring">
      <span class="light">Monitoramento Mídia</span>
      <span class="accent">Internacional</span>
      <span class="separator">|</span>
      <span class="light">Global Media</span>
      <span class="accent">Monitoring</span>
    </div>
  </header>

  <div class="preview-note">
    Página de teste para avaliação da nova identidade visual. As notícias exibidas abaixo correspondem ao dashboard mais recente disponível.
  </div>

  <iframe
    id="news-dashboard"
    class="dashboard-frame"
    title="Notícias internacionais"
    src="https://thalesandradepereira.github.io/monitoramento-internacional/Dashboard-Monitoramento-18-07-2026.html"
    loading="eager">
  </iframe>

  <noscript>
    <div class="fallback">
      <a href="https://thalesandradepereira.github.io/monitoramento-internacional/Dashboard-Monitoramento-18-07-2026.html">Abrir o HTML com as notícias</a>
    </div>
  </noscript>

  <script>
    const frame = document.getElementById('news-dashboard');
    frame.addEventListener('load', () => {
      try {
        const embeddedHeader = frame.contentDocument && frame.contentDocument.querySelector('header');
        if (embeddedHeader) embeddedHeader.style.display = 'none';
      } catch (_) {
        // O conteúdo permanece acessível mesmo quando o navegador bloqueia a personalização do iframe.
      }
    });
  </script>
</body>
</html>
