<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - International Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0B0F19;
      --bg-panel: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #E2E8F0;
      --text-muted: #94A3B8;
      --accent: #D4AF37;
      --accent-hover: #FDE047;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.15), transparent 400px),
                        radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.05), transparent 400px);
    }
    header {
      padding: 1.5rem 5%;
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo-img {
      height: 48px; /* Altura ajustável do logo */
      width: auto;
      object-fit: contain;
      border-radius: 8px; /* Caso não seja transparente */
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .logo-text span {
      color: var(--accent);
    }
    .date-badge {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      color: var(--accent);
      font-weight: 600;
    }
    .container {
      padding: 2rem 5%;
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }
    .filters {
      flex: 0 0 300px;
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 6rem;
    }
    .filter-group {
      margin-bottom: 1.5rem;
    }
    .filter-group label {
      display: block;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
    }
    select option {
      background: var(--bg-main);
      color: var(--text-main);
    }
    .results {
      flex: 1;
    }
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .results-count {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .news-card {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .news-card:hover {
      transform: translateY(-4px);
      border-color: rgba(212, 175, 55, 0.5);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }
    .category {
      color: var(--accent);
    }
    .country {
      color: var(--text-muted);
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.4;
      margin: 0 0 1rem 0;
      color: #fff;
    }
    .card-summary {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-muted);
      flex: 1;
    }
    .card-summary ul {
      margin: 0;
      padding-left: 1.2rem;
    }
    .card-summary li {
      margin-bottom: 0.25rem;
    }
    .card-footer {
      margin-top: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--glass-border);
      padding-top: 1rem;
    }
    .read-more {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .read-more:hover {
      color: var(--accent-hover);
    }
    .source {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    /* Simple CSS reset/scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: var(--bg-panel); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .filters {
        flex: none;
        width: 100%;
        position: static;
        box-sizing: border-box;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-container">
    <img src="logo.jpg" alt="TAP Logo" class="logo-img" onerror="this.style.display='none'">
    <div class="logo-text">Monitoramento<span>Internacional</span></div>
  </div>
  <div class="date-badge">12/07/2026</div>
</header>

<div class="container">
  <aside class="filters">
    <div class="filter-group">
      <label for="search">Busca / Search</label>
      <input type="text" id="search" placeholder="Palavra-chave...">
    </div>
    
    <div class="filter-group">
      <label for="lang">Idioma / Language</label>
      <select id="lang">
        <option value="pt">Português (PT-BR)</option>
        <option value="en">English (US)</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="country">País / Country</label>
      <select id="country">
        <option value="all">Todos / All</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="category">Categoria / Category</label>
      <select id="category">
        <option value="all">Todas / All</option>
      </select>
    </div>
  </aside>

  <main class="results">
    <div class="results-header">
      <h2 style="margin: 0; font-size: 1.5rem; color: #fff;">Resultados</h2>
      <span class="results-count" id="count">0 notícias</span>
    </div>
    <div class="news-grid" id="grid">
      <!-- Injected by JS -->
    </div>
  </main>
</div>

ar a progressão da doença ou até mesmo preveni-la, marcando um novo capítulo na neurociência e na saúde pública.","link":"https://news.google.com/rss/articles/CBMixwFBVV95cUxPREdIVEQyaDB6ZDhQa08tXzNSdXJ1TlNzNnBlUEFKUTZVcDRsRjJKYmdyZXNTQzNrZHVKZmt3ZUJ2ZlI2NmRpWmN1LW1ra0dOdHg0djExbDRhRExqQ3NyOTlJQ3c3WEYtZnhKOGVIcU1IT2xaZWNkM1puaVB0eTRXam1tWjR5YXdqX1N2Z2EwTjlOcUMxV0NFM2tTd3NFaWhSclFVRS1hckdKaGQxTFFNRlRZbFFUNGJEVjNDLTdfbXZqQ1hzNTdr?oc=5","fonte":"Texas Public Radio | TPR","categoria":"CIÊNCIA MÉDICA","lang":"pt"},{"pais":"Estados Unidos","titulo":"Daqui a Vinte Anos, Você Não Apenas Assistirá Esportes — Você Entrará Neles","resumo":"Este artigo explora o futuro imersivo dos esportes, projetando um cenário em que a tecnologia transformará o consumo passivo em experiências ativas. Com o avanço da realidade virtual, aumentada e interfaces neurais, os espectadores poderão \"entrar\" nos jogos, sentindo-se parte da ação. Essa evolução promete redefinir o entretenimento esportivo, oferecendo níveis sem precedentes de engajamento e personalização, e criando novas oportunidades para a indústria e os fãs.","link":"https://news.google.com/rss/articles/CBMiakFVX3lxTE5rSHNuX2RleGgySzNWMXozOXNtVGZqNDZXcTc0YWVwWUREMjhUQUpCLWZFeXdrY3hmRy00clM1RUJJeENSbmpjbjltdE5oNHBKYjRRbjlVbXZYZ0lrSDNKN19aUjNxWXZLUWc?oc=5","fonte":"WSJ","categoria":"TECNOLOGIA FUTURO","lang":"pt"},{"pais":"Estados Unidos","titulo":"Micron Technology Inc. (MU) é um dos Principais Estoques de IA na Carteira da D. E. Shaw","resumo":"A Micron Technology (MU) está sendo destacada como uma das principais ações no setor de inteligência artificial, figurando proeminentemente na carteira de investimentos da D. E. Shaw. Isso reflete a crescente demanda por memória e componentes avançados que impulsionam as inovações em IA, posicionando a empresa como um player crucial nesse mercado em expansão. O interesse de grandes investidores sublinha a confiança no potencial de crescimento da Micron impulsionado pela corrida tecnológica da inteligência artificial.","link":"https://news.google.com/rss/articles/CBMimAFBVV95cUxPczlFUkpjTkUzZlhISEJVZFA0YzRoTjV1ekctekJYbXlIVzd4V3hjU1QxcjgzNjhHc280Wnk0bldwUENJWEdVbmxfcHFZQjlSejI5VTF2djA3Q0FkUEgzZ3UwQlEwNjAwR2c0X0ZnYjJjNTZhdGJ1S3o4R2MwUVQyWWh2bUN0Um1iWTY3YmxkZW8xWmxkLTA3aA?oc=5","fonte":"Yahoo Finance","categoria":"MERCADO TECNOLOGIA","lang":"pt"},{"pais":"Estados Unidos","titulo":"A Economia dos EUA Está Viciada em Gastos com IA. O Que Acontece Se o Ritmo Diminuir?","resumo":"A economia dos EUA demonstra uma forte dependência dos investimentos em inteligência artificial, levantando preocupações sobre o impacto de uma possível desaceleração. Um arrefecimento nos gastos com IA poderia reverberar em diversos setores, afetando o crescimento, o emprego e a inovação. A sustentabilidade desse \"vício\" é questionada, sugerindo a necessidade de estratégias para mitigar riscos econômicos e garantir uma transição suave caso o boom da IA perca fôlego.","link":"https://news.google.com/rss/articles/CBMisAFBVV95cUxQVTZyMVZWcnVxbXRBUmJYLUZiM2tfcHE5RkZZWVJsbHRmOGczc0ZHdFRSR3pxM2ZuUksyTDZtX0o1eU80bXRHYlBHbldXNVlFRGxFNXpXYTRDSDR5WTd4U2RDLVE1SzdwZnJOSXUweTdSWXpoM0plclRBRWRxNWFPcnF2X3dRSEVoUTZmTmN0a18ySFZmUU5CR1BSd2RPUmtfYUpPNEZTQUR0aHpOZ0JDRA?oc=5","fonte":"24/7 Wall St.","categoria":"ECONOMIA TECNOLOGIA","lang":"pt"},{"pais":"Estados Unidos","titulo":"Segurar o Espirro Pode Realmente Te Machucar","resumo":"Este artigo científico alerta para os perigos de suprimir um espirro, uma ação comum que pode ter consequências sérias para a saúde. A força gerada por um espirro contido pode causar lesões na garganta, tímpanos ou vasos sanguíneos. Especialistas recomendam permitir que o corpo realize o espirro naturalmente para evitar complicações, destacando a importância de entender os reflexos fisiológicos do corpo.","link":"https://news.google.com/rss/articles/CBMiaEFVX3lxTE5nX0VRTk9rdDJzMUJ3RzB0SFJHa1h2Wm5qSFNVYWhnZWdfY1BOSWl1RmloZDd6WGNUMEVFb2YxSGtlS2tDdGM1bEt5cGFiSGpCUEhsNlFFbUEtUTRlWTVWcHk1d1gtdnBI?oc=5","fonte":"Popular Science","categoria":"CIÊNCIA SAÚDE","lang":"pt"},{"pais":"Estados Unidos","titulo":"Por Que os Motoristas da Economia Compartilhada Estão Desengajando — E Como o Design da Plataforma Pode Reconquistá-los","resumo":"O setor da economia compartilhada enfrenta o desafio do desengajamento de seus motoristas, impulsionado por questões como remuneração, condições de trabalho e falta de suporte. Este estudo analisa como o design e a gestão das plataformas podem ser otimizados para reconquistar e reter esses trabalhadores. A implementação de algoritmos mais justos, maior transparência e incentivos personalizados são cruciais para a sustentabilidade e sucesso futuro desse modelo de negócio.","link":"https://news.google.com/rss/articles/CBMie0FVX3lxTFBEWGVXaHJsdm5lUmVUVUhVRURHSDdnVncwVkJlTGNkNHZPdnFSc042UDQ0VVFJenE1RkFVRG4zbXh5SHJZY0pOd2l0UW5acHFWUHN3TlE4Sjc1cldQcC1vLXNmbTJGb2VrQXQ2cWFyNWdsRDUzS1pPakYtaw?oc=5","fonte":"Phys.org","categoria":"TECNOLOGIA SOCIAL","lang":"pt"},{"pais":"Estados Unidos","titulo":"Financiamento Federal e Ciência Dobraram a Expectativa de Vida. Não Podemos Fazer Mais com Menos.","resumo":"O artigo argumenta que o investimento federal em ciência foi um pilar fundamental para o aumento drástico da expectativa de vida. Com pesquisas financiadas pelo governo, avanços cruciais em medicina e saúde pública foram possíveis. Alerta-se que a redução desses fundos comprometeria futuros progressos, enfatizando que é inviável esperar mais resultados com menos recursos. A manutenção e expansão do financiamento científico são vistas como essenciais para a prosperidade e bem-estar da nação.","link":"https://news.google.com/rss/articles/CBMiggFBVV95cUxOTFpuOHZJbEtjS2FHR2szRUlxSkphQ0huMzFRcS1UREdnVnBhaGRzWDZSOWxRaUpoU1ZuNjZGaWVqa0V1NG5ZQ3BOZTdRb1NjN1M4clhRajFGam9teGhLWl9XZ0FSMUlEakhodXV3TkJseXY3cndlSzF0am9lT1BCcDh30gGHAUFVX3lxTE9td0NqbnBDUVhrVmVsNEEwekoxcTFyMjVWcnl3R04wQUs0cVZTNXptaHVIdzM1eEozcG9ndkZLNjBYeXpoTXJFT3d0Szlaa09xdUNVc0U2OC1xN05yUjFoVWJuLVkySEhjSjAwajlyOE1Mb1JYM0NMejd6N3l1ejliR0VubFc4cw?oc=5","fonte":"The Hill","categoria":"POLÍTICA CIENTÍFICA","lang":"pt"},{"pais":"França","titulo":"Tecnologia. IA: “Teremos que nos sacudir todos!”, alerta o escritor de ficção científica Alain Damasio","resumo":"Alain Damasio, renomado autor de ficção científica, faz um alerta veemente sobre a necessidade urgente de uma reflexão coletiva e ação diante do avanço imparável da Inteligência Artificial. Ele enfatiza que o impacto da IA transcende a esfera tecnológica, exigindo que a sociedade se mobilize para compreender e moldar seu futuro. Damasio adverte contra a passividade, buscando garantir um desenvolvimento ético e consciente desta poderosa ferramenta.","link":"https://news.google.com/rss/articles/CBMiuAFBVV95cUxQM1BrSUE2MmlwMmFURjJZM1NodUdhOE51N0JjVV9IMkgxaVM4aFg3Z0ZmckQzUjNVMEprV1lOc2NmUnNmNGltR1JmVVgxelBxQVdUbV8wMmFmYlpyRTFMUDlLX2gyQmlRdlZYdkk1VzVma2JlUEN5Q0U5eXhNc1BPN0JBOHMtMHppMmlKUVJRWWtFaHVWQU43SVNBSEwtQUd4R2gwVjl4cGhfSEdsSGJZSkZuUldYVl9N?oc=5","fonte":"Le Dauphiné Libéré","categoria":"TECNOLOGIA, IA","lang":"pt"},{"pais":"França","titulo":"Viver sob o oceano não é mais ficção científica: o habitat Vanguard está operacional","resumo":"O projeto Habitat Vanguard marca um avanço significativo, transformando a ideia de morar debaixo d'água em uma realidade operacional. Este desenvolvimento futurista abre novas fronteiras para a pesquisa científica marinha e a exploração de ecossistemas oceânicos profundos. A iniciativa promete insights inéditos sobre a vida submarina e desafia os conceitos tradicionais de habitação humana, indicando um futuro de maior interação com os ambientes aquáticos.","link":"https://news.google.com/rss/articles/CBMigwFBVV95cUxQa3dQRHNZcEZmb1VmdWE2YU1aZ3c3RUE2bG5NS0lZQmV5Y0N5MWptbi0zUjRVdnlfbm9aRzFmME9yT1ozWkpQeDFQLXhxRGpvOTBlRm5qYXJ3MUxDMEUtVFJ0WFFCRjFKZkQ0NDVwazZIRG9aNTZnXzdQZHZCYWxsbFcyd9IBiAFBVV95cUxQRjJycUM5ejUzLWFUZTVRQURSU0VXMTNZaG03cVBmZ0N2QjRoVWozLU8xb XJlUkVMcnhRVGZPY0hnRlB3Y0Zrc05vTGZjRlVDLURRTE5DRkwtdS1zbVJCV3pvSTA0cWpRb09oWDZvWnhCTGlscmxxNDlfVGE0RFpOZDBKeUYzdWU0Ujdua2QxRmJDNWRZRkVibmZ4MEs1d25MNFkzZmN3R2I4RU1tNjQybFNxSG96VnhJMjBXY3hwNll1SVVQNDlFWXlfMVBMYlZ1eEhCM193QUN3TkZXQ3QxSU9uM3FTRWtHa0E4cWwyenNaLQ?oc=5","fonte":"La Voix du Nord","categoria":"EDUCAÇÃO, IA","lang":"pt"},{"pais":"França","titulo":"Informação e desinformação em saúde","resumo":"O artigo aborda a crescente complexidade do cenário da informação em saúde, destacando a batalha constante entre dados científicos confiáveis e a proliferação desenfreada da desinformação. Ele explora como a disseminação de notícias falsas e pseudociência pode impactar negativamente a saúde pública e a tomada de decisões individuais. A análise sublinha a importância crítica da educação científica e do desenvolvimento do pensamento crítico para discernir fontes fidedignas e proteger a saúde da população em tempos de excesso de informação.","link":"https://news.google.com/rss/articles/CBMia0FVX3lxTE81X1B4NHM4M3d6Y0NyNnE1YW1JaW1oTWkxdUpTTHp1VzFNSnBidGt2ZEkxcWlqN0VqcHRfQ3lsY3AtZ3BSSnFGU3dFempXNTBsd3pNemFhcGRTT1NZUk9zTkpMYi0wWlZ0bXF3?oc=5","fonte":"Afis Science","categoria":"CIÊNCIA, SAÚDE","lang":"pt"},{"pais":"França","titulo":"A confiança na ciência permanece alta no mundo, mas se fragmenta entre os eleitores de direita","resumo":"Globalmente, a confiança na ciência mantém-se em patamares elevados, indicando um reconhecimento geral de sua importância na sociedade. Contudo, um estudo revela uma preocupante erosão dessa confiança, que se fragmenta especificamente entre os eleitores de direita em diversos países. Essa divisão sugere uma crescente polarização ideológica em torno de temas científicos e impõe desafios significativos na comunicação de evidências. Tal fragmentação levanta questões cruciais sobre a capacidade da sociedade em lidar com grandes desafios contemporâneos, como as mudanças climáticas e a saúde pública, que exigem consenso baseado em dados científicos.", mia digital global","resumo":"A mina de quartzo em Spruce Pine, nos Estados Unidos, é revelada como um pilar essencial, porém muitas vezes invisível, da economia digital global. Extraindo quartzo de pureza excepcional, esta mina fornece a matéria-prima crucial para a fabricação de chips, semicondutores e painéis solares. Esses componentes são fundamentais para quase toda a tecnologia moderna, desde smartphones até data centers. O artigo destaca a profunda interconexão entre recursos naturais e o avanço tecnológico, mostrando como um local remoto impacta diretamente a infraestrutura digital mundial.","link":"https://news.google.com/rss/articles/CBMiywFBVV95cUxNaHRpejIxbkVWRGFKYjR6N0Q1M2oyVnpQYWxOSDd0blpvSXVkbGI4QlQ4LWc5QU9kWWRTNjNkaEx1amZfOEtnRzI3WGE2WTB4d3hHQlBfdGl4dmdsSUp3YTBvZXBEZ0ZfRGliWl8yREdjTkhEaGQ0MjZFM2VYQ2RqUnpKb1hQaE1wTXFxUllMZWIwRVZ4aUphU0hxUk0zblRLSVZsa2JuUVFvb1BtSTBVR19IOVczMzBjYWR3OWJ0V09Ebm16MlB3MlhMQQ?oc=5","fonte":"RFI","categoria":"TECNOLOGIA, RECURSOS","lang":"pt"},{"pais":"Inglaterra","titulo":"Por que pesquisadores colocaram mini mochilas em pombos","resumo":"Pesquisadores equiparam pombos com pequenas mochilas para um estudo inusitado, que busca entender melhor o comportamento e a navegação dessas aves em ambientes urbanos. O objetivo é coletar dados precisos sobre seus padrões de voo e uso do espaço, revelando insights sobre a ecologia urbana e o impacto humano na vida selvagem. Esta abordagem inovadora visa aprofundar o conhecimento científico sobre a biologia e adaptação dos pombos.","link":"https://news.google.com/rss/articles/CBMic0FVX3lxTE9GYUFiMlhZcmVUaGZhLXVoNHdjLW51cDNCc08zQ2ItcnUzczJEbFlLa1QxdklaRG9HT2EtU1NOa1Q4MVExcy1kRTdYYmVlejZ3TnlFSjJfT3ZYVnRRdzdQZFF4eFJUeXpKQXJmV2hUT0xVWVU?oc=5","fonte":"Popular Science","categoria":"CIÊNCIA","lang":"pt"},{"pais":"Inglaterra","titulo":"Proteína tau do Alzheimer tem um papel secreto surpreendente na memória","resumo":"Novas pesquisas revelam que a proteína tau, conhecida por seu envolvimento na doença de Alzheimer, desempenha um papel fundamental e anteriormente desconhecido na formação da memória. A descoberta sugere que, em vez de ser apenas uma vilã na neurodegeneração, a tau pode ter funções benéficas essenciais para o cérebro saudável. Entender esse duplo papel pode abrir caminhos para novas estratégias de tratamento e prevenção.","link":"https://news.google.com/rss/articles/CBMib0FVX3lxTE9qOXhsM203V2VwcTBijanl0ZzJLbHlKVHI3OHNrY0FfR0NIR1NfMGFjT19tV2wtM3VDQ3loT0hybFB4RGNydFJhQjNLU084aTRhT05NSTYwQWxmXzk5ZnhyVExVaHdWcTFOTGJZeWZFWQ?oc=5","fonte":"ScienceDaily","categoria":"SAÚDE","lang":"pt"},{"pais":"Inglaterra","titulo":"Japão tornou-se uma porta dos fundos para tecnologia de mísseis russa, revela investigação do NYT","resumo":"Uma investigação do New York Times aponta que o Japão se tornou uma rota inesperada para a Rússia adquirir tecnologia avançada de mísseis, apesar das sanções internacionais. Empresas japonesas teriam sido usadas inadvertidamente em redes de abastecimento que desviavam componentes para o complexo militar-industrial russo. Esta descoberta levanta sérias preocupações sobre a eficácia das sanções e a segurança da cadeia de suprimentos global.","link":"https://news.google.com/rss/articles/CBMixAFBVV95cUxPY0FlbnB2dlVNbHNQUmQ1S2xFQUhEbVZDSmdDZ29hY0RHQTdONGVkWEVRLXJFaGFqV21ibjNvNUFXb2hpbU13YXFqR2FUV0dvczA4SF9TMXVtZXRtb0l3a2NJaDlRekNrUHlDNGdGbzZNUFZtT25PSUh2RHhXSjVyY3B0dkQ5eG5rR2FuQUFoSFl5bUQyMElhS1FaNG10NjlKRlBKUlM5NkpVc2padkhRWFVQd21GbGRkTFhIUFFMSExOR1B0?oc=5","fonte":"UNITED24 Media","categoria":"GEOPOLÍTICA","lang":"pt"},{"pais":"Inglaterra","titulo":"Físicos recriam extração de energia de buracos negros em laboratório","resumo":"Físicos conseguiram replicar em laboratório o processo de extração de energia de buracos negros, um fenômeno teórico conhecido como 'processo de Penrose'. A experiência utilizou um análogo acústico de buraco negro, confirmando a possibilidade de retirar energia de objetos cósmicos extremos. Essa conquista representa um avanço significativo na astrofísica experimental e na compreensão de leis fundamentais do universo.","link":"https://news.google.com/rss/articles/CBMib0FVX3lxTE1wTTUzV2tLZTZXOC1jUW9sZlNqeVhXdGJ3aFhRc1JpMGNFRkpCTWJqVk9GWlltd0hERzktLVYyT0xWNzZ3TnlFSjJfT3ZYVnRRdzdQZFF4eFJUeXpKQXJmV2hUT0xVWVU?oc=5","fonte":"ScienceDaily","categoria":"FÍSICA","lang":"pt"},{"pais":"Inglaterra","titulo":"'Super' El Niño pode causar choque global nos preços dos alimentos até 2028, dizem analistas","resumo":"Analistas preveem que um fenômeno \"Super\" El Niño tem o potencial de desencadear um choque significativo nos preços globais dos alimentos, com impactos prolongados até 2028. As alterações climáticas resultantes, como secas e inundações extremas, afetariam drasticamente a produção agrícola em várias regiões. Esta projeção acende um alerta para a segurança alimentar e a estabilidade econômica mundial nos próximos anos.","link":"https://news.google.com/rss/articles/CBMixwFBVV95cUxQZnRpdDRHeF9XLVQ4NUZvWVplQjFvZ2pBWWJTMTV4STd4R2djTTdfcDJ5QVJfMGdxTHlGQjVBTklUTHVkcW5KcGFTYmpISGllNXZwTU5iRGk3LWpweHBMMkJKYmFXeW43T0tyNUVmYzVYSkNwbDZEUTVTSmtXYUJ0aURNcEhtUUFzblhTN1F0bzZMa25iZVFIWEJvT3JVQXg2SmM0NnI4aFhmLVZXQkw2NUVrajRVd0lrRGJBTXlldHFIT3Q5NGNz?oc=5","fonte":"The Guardian","categoria":"CLIMA","lang":"pt"},{"pais":"Inglaterra","titulo":"Resumo de Notícias de Tecnologia para Pequenas Empresas: Microsoft Faz Grande Reversão na IA","resumo":"Um recente resumo de notícias sobre tecnologia para pequenas empresas destaca uma importante mudança de estratégia da Microsoft em relação à Inteligência Artificial. A gigante da tecnologia estaria ajustando seu foco ou abordagens no desenvolvimento e implementação de IA, o que pode ter implicações significativas para o mercado e para as empresas que dependem de suas soluções. Esta reversão sugere uma reavaliação das prioridades e direções futuras da IA na indústria.","link":"https://news.google.com/rss/articles/CBMiywFBVV95cUxNU1JOeFJFR3lBUkMzdUplNHlMaG1ycz ra o sistema de saúde e infraestruturas. Este evento ressalta a crescente vulnerabilidade da Europa às mudanças climáticas e a urgência de políticas de adaptação e mitigação.","link":"https://news.google.com/rss/articles/CBMinAFBVV95cUxQa1FpMUh1RE1JU1lEX3lXM2ZSX3AwX0dwWmtXMDF5UVB5SlVrUk1ueS11S1VoUHFIZGhEc0F1Z2RxWmt3UmkzRE1Ya0k1V2dWYkRzd2NhUjVzVlBkNU9rSm9QMksteEszVDlYQ3l4OURRSTgzMXZRbFZNeTJ0ZzFNaUFBM1hpcjV3bkdrU3pDY3VVZXdIZkR0M19fbGE?oc=5","fonte":"SZ.de","categoria":"CLIMA","lang":"pt"},{"pais":"Alemanha","titulo":"A Grande Aposta do Homem Mais Rico da Alemanha: Criar Rival Europeia de Google e Amazon","resumo":"O homem mais rico da Alemanha está investindo massivamente para desenvolver uma alternativa europeia aos gigantes tecnológicos americanos Google e Amazon. O objetivo é construir uma plataforma digital soberana, focada em segurança de dados e privacidade, que possa competir no mercado global. Essa iniciativa representa um esforço ambicioso para fortalecer a posição tecnológica da Europa e reduzir sua dependência de empresas estrangeiras dominantes.","link":"https://news.google.com/rss/articles/CBMi2wFBVV95cUxMajl3bThpVDgtVXJOWnFlTXpiZTRrejVTeHV3eFBKYXdaVzVBdWoxM0JlUVZ4Vzd2SzBUVGRiakZsMC14a1hUNVBURkROX1NvdGl6ZldrVGVwR2szaUx1eWQ4VWwxai11STlfZzZ0MjNhdC1pOXczaThJZldoM19LQ2xRbVRoQlAybHlSNEczYllLMFlUYkJ3ZjlIQkM1VU9jNmlnVzlxblFKTUhkYmZmSXhha3BTX0RvWnJUek51LUlRQVFCZmpBYm9EX3hldnZKeF9TMFh5NUFZTknSAeoBQVVfeXFMT2lwRFdoVEd0SEhZZmpYWDVtWTVjOUdob1Bab3JqdDdGZUxYak04R0F6UTFaYzV4eEo4LWtWZHphVmhyYTNxdV9fMVctZ0FpSm43WVQ5X2h1amVrdkprekN2b3llSjBReVBpZC1KR09FNGZzaVBHbXlyMVkwUHNPMDhfYVJQazA5X3VmMm01UGJIVElVdVdqaGRrYVJjZFU5WmRTS2czbkV1Nm1zZGRaaE8xbnlGczBGRVFJQ1UyRXBqSEgwZ2F4UERmdURMME10cWFkTU1meEpETVB2NzhUNFJGem0tRTh0a1NB?oc=5","fonte":"G1","categoria":"TECNOLOGIA","lang":"pt"},{"pais":"Alemanha","titulo":"O Boom Automobilístico de Kim Jong-un: Escassez de Vagas de Estacionamento e a Segunda Concessionária da Coreia do Norte","resumo":"A Coreia do Norte está vivenciando um inesperado \"boom\" automobilístico sob a liderança de Kim Jong-un, resultando na abertura de uma segunda concessionária de carros no país. Esse aumento na posse de veículos, apesar das sanções internacionais, revela tendências econômicas e sociais peculiares. No entanto, o fenômeno também expõe desafios infraestruturais, como a crescente escassez de vagas de estacionamento nas cidades.","link":"https://news.google.com/rss/articles/CBMi1gFBVV95cUxNV1VWNURpaV9IUEhKbE9ScUVFYUVlNXRrSkJCRVVlQVVyV2VsMHpFRzhUTWJVb1liSlh2czNrTkVvd1dFdjBhQ3JwQmUtZkhNYko3bkwteElDNHR5MzctaC1oV1pRWUVtWkYwMm0tR3paRVUxaVFvYzhGREExQzVxNDVTYUk3Z0RkN1Y4M2VySDlJQmllbXA5ZFJoMm55Y0Y1cmJ3TWc2NTloM0dpTVJhRmJlSVZaclpuc1BBZ2h4SktsbUVTQmEzVnVwMXNnWFY0SDBiazRn?oc=5","fonte":"WirtschaftsWoche","categoria":"ECONOMIA","lang":"pt"},{"pais":"Alemanha","titulo":"Perigo Invisível: Novas Drogas Inundam as Prisões Alemãs","resumo":"Um novo perigo invisível, na forma de drogas sintéticas e de difícil detecção, está inundando as prisões da Alemanha. Essas substâncias representam um desafio crescente para a segurança e a saúde dos detentos e funcionários, complicando os esforços de reabilitação. As autoridades enfrentam dificuldades para identificar e conter o fluxo dessas drogas, que muitas vezes chegam em formas camufladas ou indetectáveis pelos métodos tradicionais.","link":"https://news.google.com/rss/articles/CBMixAFBVV95cUxOWUNUZGppM3Zhb1BEdlJ4bDRDTkVFVTlEOEJ0aGlsSHVrTnN0eDNWZUliX3Zzc1JXUTVYYWVxZlRibTgwTzlqTFh0Y25ucVQxcXZQLVI4NDJnUTVMaVljcGdia2VLNkJpdXhTZ2FEMDBobm5PWVBTVGhyUEwtTmNYZmc3S2Z1UWxTWFExRVoxb0VKTTh3QUZ5cXQyNEhLaGRfOTZXWjFFcEdGNmRjY000Nk9RQ21KRUtXUmFBXzZoa3VBZ3FX?oc=5","fonte":"BILD","categoria":"SOCIEDADE","lang":"pt"},{"pais":"Alemanha","titulo":"Woidke Exige Novas Zonas de Licitação de Eletricidade para a Alemanha","resumo":"O Ministro-Presidente de Brandemburgo, Dietmar Woidke, está pressionando por novas zonas de licitação de eletricidade na Alemanha para otimizar a distribuição e os custos de energia. A proposta visa ajustar o mercado de energia às realidades regionais, especialmente em áreas com alta produção de energia renovável. Essa mudança poderia ter um impacto significativo na estabilidade da rede, nos preços para consumidores e na transição energética do país.","link":"https://news.google.com/rss/articles/CBMirgFBVV95cUxQbEF5M3VSTW1ob0RpTzY3aW56V0QxeGszTW9zb0tKR0FhNjJkMGFfOE5lZkRtODVSQTF3ZmVfN01ta0Z2cGh6MzdHalJ6RWtkR2NmT1Y1RFAzbWhJZVBqdjZxa1A0UVdXZFhRZkRQMk5CemRrdXNJODJUN0JFV0N4WU05ZEdwQ1RLbThkcUZnRFotcEZXZ0ZkV2JtRGhMem5ZckdidmlWVXBQR3d3bFE?oc=5","fonte":"Alemanha","categoria":"ENERGIA","lang":"pt"},{"pais":"Alemanha","titulo":"VW – Planos de Economia e Fechamento de Fábricas: Conflito em Wolfsburg","resumo":"A Volkswagen está enfrentando um sério conflito em Wolfsburg devido aos seus planos de economia e possíveis fechamentos de fábricas. A administração busca cortar custos e otimizar a produção para manter a competitividade, especialmente na transição para veículos elétricos. Sindicatos e funcionários, por outro lado, expressam forte oposição, temendo demissões em massa e o impacto na economia local.","link":"https://news.google.com/rss/articles/CBMiqgFBVV95cUxNRkdDdnR4XzZ5RUJxRFoxbjdBeW9MOVJ1elBCTUJ3OG9sazB3dWdEMjdJTjJHdW1majdOSk01VGdSakQ3MUZjNHJyVHgzT3VrZTBET01ZTHB0YVpDMmlXaG44eEMwMGVfc3ZpV1FQYm96cU4ya2RuVzE3cEdUalN6SmVYNTdiNjhDbmtrUnVGemJEVFAtOS1wWmRvWGxwazVpTzZ0bGJ0dURTUQ?oc=5","fonte":"SZ.de","categoria":"INDÚSTRIA","lang":"pt"},{"pais":"Japão","titulo":"Potencial da IA para Transformar Completamente o Futuro dos Esportes","resumo":"A inteligência artificial (IA) está emergindo como um catalisador revolucionário no mundo dos esportes, prometendo transformar desde a análise de desempenho de atletas até a experiência dos fãs. Investidores estão atentos ao impacto profundo que a IA pode ter na otimização de estratégias, treinamento e gestão esportiva, indicando uma era de inovações sem precedentes. Essa integração tecnológica redefine os limites do que é possível, abrindo novas avenidas para o crescimento e a eficiência no setor.","link":"https://news.google.com/rss/articles/CBMisgFBVV95cUxQTTg2Y2k1OU9sdDVEUkVIa1RBdFBUOWItQWxTV2ZWMWdId2NqVXh1SmRDeGJ5SXJFd01VZlczaEJwcU0tSkJkUGluMk1pUjRYcVllVlFrekxYNnYyaHlfenZ1N1o5M256NkY4Ym9xYWVuaUJsakxRN1pOdHBfMUtBR3c2MmtsWWxvVVVpdkw2NHlmd3RNODNJandxRWxNM1E0MXpCbUxwRTNGMjBDa0dJcmFR?oc=5","fonte":"Moomoo","categoria":"TECNOLOGIA","lang":"pt"},{"pais":"Japão","titulo":"Liberando Procedimentos Burocráticos para Criar Espaço Criativo para Cientistas","resumo":"Este artigo aborda a importância de desburocratizar o ambiente de pesquisa para fomentar a inovação científica. Ao remover barreiras administrativas, busca-se criar um espaço onde cientistas possam se dedicar integralmente à criatividade e à descoberta. A iniciativa visa acelerar o progresso em diversas áreas do conhecimento, permitindo que mentes brilhantes se concentrem em soluções para desafios complexos sem as amarras de processos lentos.","link":"https://news.google.com/rss/articles/CBMiigFBVV95cUxNZHM2TVlHSEx1YWZab1gtX0gyN2o1T1hUM0hOd2E2SjJnSmo4dEtZVmo2Q20wdnM3WEVHUkFZenNXVUxWMThZNzczSFV1LU9faTZ2MFhLSWFUZ2JFdjRfQnhGUEtaNVRLNXJMakFUdEhxLXZwaTAxMWZlYjhnYnFnTl9MWGlNYURFUmc?oc=5","fonte":"Vietnam.vn","categoria":"CIÊNCIA","lang":"pt"},{"pais":"Japão","titulo":"China Recupera Foguete com \"Rede\", Demonstrando Viabilidade de Tecnologia de Reutilização Única","resumo":"A China obteve sucesso notável na recuperação de um foguete utilizando um sistema inovador de \"rede\", marcando um avanço significativo em suas ambições espaciais. Esta abordagem representa uma rota tecnológica distinta para a reutilização de veículos de lançamento, diferenciando-se de métodos tradicionais. O feito sublinha a capacidade chinesa de inovar e demonstra o potencial para reduzir custos e aumentar a frequência de missões espaciais, impulsionando sua posição no cenário global.","link":"https://news.google.com/rss/articles/CBMia0FVX3lxTE9wRGEtZGluUTM5Q3ZrRmxZZmw0Rl92Y0VzNlJmb25rYzNpejZkSDE0cHdjcU9iVzAwUGhxZFlLYmdHQzZhQUZGUjNHbkNuWjRsYkc4TjhSV0RvTnh6aGZsQ2RqUlFUeWpJTzRr?oc=5","fonte":"WIRED.jp","categoria":"TECNOLOGIA ESPACIAL","lang":"pt"},{"pais":"Japão","titulo":"Uso de Tecnologias Digitais, como IA, em Aulas de Basquete para Jovens em Nanao, Ishikawa","resumo":"A cidade de Nanao, Ishikawa, está implementando aulas de basquete para jovens que integram inteligência artificial e outras tecnologias digitais. Esta iniciativa visa aprimorar o treinamento e o desenvolvimento de habilidades dos atletas juniores, utilizando análises de dados e feedback inteligente. A aplicação da tecnologia no esporte juvenil representa uma tendência crescente, prometendo otimizar o desempenho e engajar a nova geração de maneira inovadora.","link":"https://news.google.com/rss/articles/CBMihgFBVV95cUxQTXh0RmtWTFQybnFNSGlmcllMWEJ6S2hmVnhZTU80emhUS0FsRWNjSHNIeVp5c0d3cTJKN01GU3lrdU80TjF0bXZFa2ZjY3pDQ3VYUEYwRWFkZlRSSVdtTGl6MEJpUlh6UEkzVjFqZw?oc=5","fonte":"日テレNEWS NNN","categoria":"EDUCAÇÃO TECNOLÓGICA","lang":"pt"},{"pais":"Japão","titulo":"A Ética da IA Não é Mais Apenas um Problema de Engenheiros: Quem Se Tornará um \"Outlier\"?","resumo":"Este artigo explora a crescente complexidade da ética em inteligência artificial, enfatizando que suas implicações transcendem o âmbito dos desenvolvedores. Com a IA cada vez mais integrada à sociedade, a discussão sobre quem pode ser marginalizado ou afetado negativamente por seus algoritmos torna-se crucial. A necessidade de uma abordagem multidisciplinar e social para a governança da IA é urgente, a fim de mitigar vieses e garantir um desenvolvimento equitativo.","link":"https://news.google.com/rss/articles/CBMiZ0FVX3lxTE4waDBWeHFzbkl1bHZYRXRxZEI1Y2NkSU1mNW9MY1h0cS1qTDdJTHFqdHNBa2FCbzRucG5JZVdXMEg3dHgweERSREFpc2Q0M1plRFFGQk93OXp5MTJDVHpyWEZFYWNHSDA?oc=5","fonte":"朝日新聞","categoria":"ÉTICA TECNOLÓGICA","lang":"pt"},{"pais":"Japão","titulo":"NativeCamp Lança Novo Material Didático sobre o Impacto da Cafeína no Desempenho Atlético, em Inglês","resumo":"A plataforma NativeCamp divulgou um novo material didático que combina o aprendizado de inglês com princípios da ciência do esporte. O curso foca nos efeitos da cafeína sobre o desempenho físico, oferecendo uma oportunidade única para estudantes e atletas. Esta iniciativa inovadora destaca a interseção entre educação, ciência e bem-estar, promovendo o conhecimento sobre o corpo humano e aprimorando habilidades linguísticas simultaneamente.","link":"https://news.google.com/rss/articles/CBMiaEFVX3lxTE50UDVobjZmeHc1VkZYdUpsaWlqOFdDR0N2M0JIb1pOT1lacGY2OEp4WDNoSm1BSGRvcXdFN3FReEp0R1dtanpYazk5ZkJhNlRXUFZCSVpRcWtYMG53OGpFczRtQ2hQdDVi?oc=5","fonte":"毎日新聞","categoria":"CIÊNCIA ESPORTIVA","lang":"pt"},{"pais":"Japão","titulo":"Anúncio do Especial de Férias de Verão 2026 - Consulta Científica para Crianças","resumo":"A NHK anunciou um especial de férias de verão para 2026, focado na \"Consulta Científica para Crianças\", um programa popular que incentiva a curiosidade e o aprendizado científico. A iniciativa oferece uma plataforma interativa onde crianças podem fazer perguntas a especialistas, explorando tópicos de ciência de forma acessível e divertida. O especial visa inspirar a próxima geração de cientistas e pensadores, promovendo o engajamento com o conhecimento.","link":"https://news.google.com/rss/articles/CBMiggFBVV95cUxPSGgxOGJYZ2JDNVJMdjJkUUJVUXNMbUJXMUNRajE4OUtVMkJoNFdnb2pBdlU3dWwyNTByem5nSFo4dWwxZ2tzTk44VERGU01UNHdFUkEyR1NJSDNGMUMxTk5zd19Za2JCZGJYNFhsMEdDTjBRVzktVnpLZUZJRU85RmFB?oc=5","fonte":"NHK","categoria":"EDUCAÇÃO CIENTÍFICA","lang":"pt"},{"pais":"Japão","titulo":"Análise: A Ameaça da Tecnologia Quântica aos Ativos Criptográficos, Contramedidas de Risco de Decodificação são Urgentes para a Indústria","resumo":"A ascensão da tecnologia quântica representa uma ameaça crescente para a segurança dos ativos criptográficos atuais, com o potencial de decodificar algoritmos amplamente utilizados. Este artigo da Reuters destaca a urgência para a indústria de criptomoedas desenvolver contramedidas robustas e adotar soluções de criptografia pós-quântica. A proteção contra ataques quânticos é crucial para garantir a integridade e a confiança no futuro das finanças digitais.","link":"https://news.google.com/rss/articles/CBMieEFVX3lxTFBLaHo5QXNoU0ZXNDh0bTlqU0JuMUdyU0pVTTRkMHJfQVFGRG50d0tlY2lUZFF5MU1ZSGJfSkRETkVTdlotQzRreWJ6djZUdwBiSTRBajJTanVtZlB0NWJjcllUeFZpaHp0TlpSY2NPZlFMMXFKZUp1cQ?oc=5","fonte":"Japão","categoria":"SEGURANÇA CIBERNÉTICA","lang":"pt"},{"pais":"China","titulo":"Um Novo Salto na Reutilização de Foguetes! Detalhes dos Avanços Tecnológicos Aeroespaciais por Trás do Long March 10B.","resumo":"Este artigo explora os significativos avanços tecnológicos que possibilitaram a reutilização do foguete Long March 10B da China. A capacidade de reutilizar foguetes representa uma quebra de paradigma na exploração espacial, prometendo reduzir drasticamente os custos de lançamento e acelerar a frequência de missões. Este desenvolvimento posiciona a China na vanguarda da tecnologia espacial global, com implicações profundas para futuras explorações lunares e missões tripuladas.","link":"https://news.google.com/rss/articles/CBMia0FVX3lxTFBpdVVueFZvQlZHS0lVelgxdE5vbm1MUEdBeEFhV3BsbFlEZGdmWTEtU2s4LXFtOHhTdlpBanlzWUtZLU43SE9jbG0xNHZ5bGNocGI5NzlvOU9rT0RkY1RWeFlBMC1MM2QzYXFR?oc=5","fonte":"中国网新闻中心","categoria":"TECNOLOGIA ESPACIAL","lang":"pt"},{"pais":"China","titulo":"Comitê de Promoção de Padrões de Tecnologia de Big Data: Relatório de Pesquisa sobre Plataformas de Dados Nativas de IA em 2026.","resumo":"O Comitê de Promoção de Padrões de Tecnologia de Big Data da China publicou um relatório detalhado sobre as plataformas de dados nativas de Inteligência Artificial para 2026. Este estudo delineia as tendências futuras e os requisitos de padronização para sistemas que integram IA diretamente na sua arquitetura de dados, visando otimizar o processamento e a análise em larga escala. A iniciativa sublinha o compromisso da China em liderar o desenvolvimento de infraestruturas de dados inteligentes e eficientes para a próxima geração de tecnologias de IA.","link":"https://news.google.com/rss/articles/CBMif0FVX3lxTE9JY0hVa0xmNEkyYWd2Z09iWHA3N0dQbGppNVI1Y3ZhRUF6RElwU1FpN2lRY0F6Q2oySEtyd1o1d0VyOWpzTC1sQVE5VnBtVWtXMl9ncjEwZmFWeHZBcmFzN1pwVGF4NXdCV21Hdzhhdmk0bUFCaWUwVm1VVTRUc1E?oc=5","fonte":"新浪网","categoria":"INTELIGÊNCIA ARTIFICIAL","lang":"pt"},{"pais":"China","titulo":"Estudioso Chinês Conquista Pela Primeira Vez o Prêmio Internacional de Ciências Básicas Mendeleev.","resumo":"Um notável estudioso chinês foi laureado com o prestigiado Prêmio Internacional de Ciências Básicas Mendeleev, marcando a primeira vez que um pesquisador da China recebe tal distinção. Este reconhecimento sublinha as contribuições significativas da China para a ciência fundamental, fortalecendo sua posição no cenário científico global. O prêmio celebra a excelência na pesquisa básica, que é crucial para o avanço do conhecimento e para futuras inovações tecnológicas.","link":"https://news.google.com/rss/articles/CBMiaEFVX3lxTFA2MVVBQnZrX1JsQ3lXY01SUjZDX3BfZjc5a3FlOXhjQmNRT2FPQTlHbG00Rm5QWXpGRGhYZHRnYzZuWVVWd2tYdDVTUGt1ck9fRU9YQnp2aHFUZE5oUldzUUdGWWxGdGFf?oc=5","fonte":"chinanews.com.cn","categoria":"CIÊNCIA BÁSICA","lang":"pt"},{"pais":"China","titulo":"Seminário APEC 'Tecnologia para o Bem' Realizado em Qianhai: 17 Economias Debatem 'Como Fazer a Tecnologia Beneficiar a Todos'.","resumo":"O seminário 'Tecnologia para o Bem' da APEC, realizado em Qianhai, reuniu representantes de 17 economias para discutir a inclusão e o impacto social da tecnologia. O foco foi como garantir que os avanços tecnológicos beneficiem toda a sociedade, abordando questões de equidade, acessibilidade e ética. Este evento ressalta a crescente preocupação global em alinhar a inovação tecnológica com o desenvolvimento social sustentável, um tópico em alta nas discussões sobre o futuro digital.","link":"https://news.google.com/rss/articles/CBMicEFVX3lxTE04ckgydXZ1Vzg0QWdUWF96bnI2My1QdnhkQ1ZYYnozN2gxTzNSWk14eDF2UkhjeTRpQkoxZXVFODN0WTRFY2tiZEExbzRIbmZ0bzN0SGJZUk9PcURSeW9VeW50aHY1bXo0azIxVUF1Ujk?oc=5","fonte":"央广网","categoria":"ÉTICA TECNOLÓGICA","lang":"pt"},{"pais":"China","titulo":"Equipe de Pan Jianwei Conquista 2 Prêmios Internacionais.","resumo":"A equipe do renomado cientista chinês Pan Jianwei, conhecido como o 'pai da física quântica' na China, foi agraciada com dois prestigiosos prêmios internacionais. Essas honrarias reconhecem suas contribuições seminais no campo da física quântica e comunicação quântica segura. Os prêmios solidificam a posição da China como líder global em pesquisa quântica, com o potencial de revolucionar tecnologias de computação, comunicação e segurança de dados.","link":"https://news.google.com/rss/articles/CBMiZEFVX3lxTE5VUV9QXzlxdlo1b3YxenVDbERhb2ZZSWRPTUEyNFp3UklMLUFaWDV3Wmhpek1HWjFWaWpoZXp4NGg4bENlZHQzWHBxZ0JRUDlaUnQxNWtoZ0h3TXdvUWUxVXI5NDM?oc=5","fonte":"科学网—新闻","categoria":"FÍSICA QUÂNTICA","lang":"pt"},{"pais":"China","titulo":"Desvendando um Novo Cenário de Mobilidade Tridimensional: Área de Exibição da Economia de Baixa Altitude de Changchun Estreia na Auto Expo.","resumo":"A cidade de Changchun apresentou na Auto Expo sua área dedicada à 'economia de baixa altitude', revelando um novo paradigma para a mobilidade e logística. Este conceito abrange o desenvolvimento e a aplicação de tecnologias como drones e veículos elétricos de decolagem e pouso vertical (eVTOLs) para transporte, entrega e outros serviços urbanos. A iniciativa sinaliza um foco crescente da China na exploração e monetização do espaço aéreo abaixo de 1.000 metros, prometendo revolucionar a forma como as pessoas e mercadorias se movem nas cidades.","link":"https://news.google.com/rss/articles/CBMiX0FVX3lxTE84R3gzWWVlSHIyR3doNU9VeVVkMzE4ZTFXWmd2LW5CLXlyVzQ4NW5ZSmhsdjJwS0VsSW16VGNGQ1lBdUE0ZWkxTWcwUzIzdXhUUE90aUs4R2NpemgzWWJv?oc=5","fonte":"news.cnjiwang.com","categoria":"MOBILIDADE AÉREA","lang":"pt"},{"pais":"China","titulo":"Integração Profunda da Tecnologia Interativa XR Explora Novas Pistas para a Transformação Diversificada de Cinemas.","resumo":"Este artigo aborda a fusão da tecnologia de Realidade Estendida (XR) com a experiência cinematográfica, visando diversificar e revitalizar o setor de exibição de filmes. Ao integrar elementos interativos de realidade virtual (VR) e aumentada (AR), os cinemas podem oferecer experiências imersivas que vão além da projeção tradicional. Essa inovação busca atrair novas audiências e criar formatos de entretenimento inovadores, marcando uma tendência significativa na interseção de tecnologia e cultura.","link":"https://news.google.com/rss/articles/CBMicEFVV3lxTE1pREVZbk1obGN0NVc3V3BMSVJaNkNyaHJ0VzJTbWl5YUg3aXdzVHdwVkMzcFBkdDJVUFR4aU92cmtBc19YZlJMVU5uT0ExR2RfcGs3VFp1WThSdmtvSUR6bFNaYmJNdGg3cnk3RjRCM2k?oc=5","fonte":"中国科技网","categoria":"ENTRETENIMENTO TECNOLÓGICO","lang":"pt"},{"pais":"China","titulo":"SU7 Ultra como Referência Tecnológica: Qual o Valor de Longo Prazo para a Marca Xiaomi?","resumo":"A chegada do SU7 Ultra, o veículo elétrico da Xiaomi, é analisada como um novo marco tecnológico para a empresa. O artigo discute como este lançamento posiciona o SU7 Ultra não apenas como um concorrente no mercado automotivo, mas como um divisor de águas que reforça a inovação da Xiaomi em diversos setores. Ele explora o impacto a longo prazo do carro na percepção da marca, expandindo seu ecossistema de produtos e consolidando sua imagem como líder em tecnologia.","link":"https://news.google.com/rss/articles/CBMidEFVX3lxTE5YaTFlVGdUMjdNSUZKRzVrSUxqV0NWTjFIZkg4MFhZdEJQVUV6UGZOc182MG9aS0FBcGQ3NUpIaTF2b0NkZ1lHbTZUdFkxSDJGZVEyVXZuamc3eWJsOTVucWRPWkFnX0tlaEJ1UGRXblJYOFIw?oc=5","fonte":"新浪汽车","categoria":"INOVAÇÃO AUTOMOTIVA","lang":"pt"},{"pais":"Índia","titulo":"Transferência de Tecnologia e Mentalidade de Produção Impulsionam Inovação","resumo":"O artigo destaca a importância crescente da transferência de tecnologia e da adoção de uma mentalidade focada na produção para catalisar a inovação na Índia. Essa abordagem é crucial para países em desenvolvimento, visando otimizar recursos e conhecimentos para criar soluções locais. Tais iniciativas são essenciais para fortalecer a economia indiana e sua competitividade global no cenário tecnológico.","link":"https://news.google.com/rss/articles/CBMinAFBVV95cUxOOGdRQXVNZXRKV2ppa0FLcmVJNnhna3lCaTd6NXRLcWhwVlBVd25fazUwdHV5WmxRZEI3UDZtVF9iMnNOcTNnNTdURXdyZk9SNmZEaEx4MzNkVEVzZDFsbldZeVktTkE2NHR4R2xtY3d6WFd0OHRnWklKbUM2MDJXRGxGNGJZQW1LdHkzUG1xZXQ5ZEtNaHJBcmRMQkY?oc=5","fonte":"Índia","categoria":"INOVAÇÃO","lang":"pt"},{"pais":"Índia","titulo":"Governo Indiano Cobra Agências de Ciência e Tecnologia a Utilizar 60% dos Fundos Até Dezembro, Com Apenas 2% Gastos","resumo":"O governo indiano manifesta preocupação com a baixa execução orçamentária de suas agências de ciência e tecnologia, que utilizaram apenas 2% dos fundos alocados. Uma diretriz foi emitida exigindo que 60% do orçamento seja gasto até dezembro, visando acelerar o desenvolvimento de projetos e pesquisas vitais. Essa medida enfatiza a necessidade de maior eficiência na gestão de recursos públicos para impulsionar o avanço científico e tecnológico do país.","link":"https://news.google.com/rss/articles/CBMi6wFBVV95cUxPQ3FTR3RYVWhLbzRTd3FmM3NTd3g4cHluRUpxYnRvZVpUUEJ0MDJXWjNQVFNHVnEzWkFKYkRpQUszQ25UODFrT0VNZ0RwY1VjUWRjb0NKQlFaUkFOZ1V0VkJDQWZycmdHb2xPOFBIWU9XSkJKVi0wZkc0bWpnT2xnZUdXV0ZNUU44WGlxNnc2djRkbFd6dV9EOXV6UHp0eUZJX29QaXZMdXdOQnJVQnZNc3RmdjcwUC1namM2bE5OUUtjZ2VJNW1uY3p3LW1Wc3hyNk1pUE9LbTVZN05FQnZHZjRuaGtFNnZDbVFn0gHwAUFVX3lxTE9RV0RwVDE2ekN0TXJXUlJPenJOMlpBVGZtLTlkU1BDVHBLaHpCMnE1bnhuX3B2V2REM0I5aGdSUVZhNVVGa1MtVm91bW9DbDB1SzlPdnJVc3dtemhqeEpranpISGVKQ2V6amFWZTNCMnNmWGdHWC1SWHlhcmllY0YzenMyeThhc3N4LTFiNWVwOFkyTFlyOXZwOFM2aHBfakNTZFRsY1k2cG1OeGtFVUwtOFY2d1dzOU9sWm1HMlFycl9hakExNmZiVkxkSHpRN1E4VVRGRk1Xa2swclpsbzlRVVNNVC1yRTVIZk42ZXpqYg?oc=5","fonte":"The Times of In ar, Surakshit Sagar'","resumo":"Diversos ministérios científicos indianos uniram forças para lançar a campanha nacional \"Swachh Sagar, Surakshit Sagar\" (Oceano Limpo, Oceano Seguro), focada na limpeza e preservação das regiões costeiras. A iniciativa visa conscientizar a população sobre a importância vital da saúde marinha e combater a poluição dos oceanos. Essa ação demonstra um compromisso governamental robusto com a sustentabilidade ambiental e a proteção dos ecossistemas costeiros da Índia.","link":"https://news.google.com/rss/articles/CBMi9gFBVV95cUxOZURfZmlQSTVTUGJuZS1qckxrQzNrb0ZzR3pUSl9PcUNYZmlqcVNSNnczWVYtMUl0MUMtdkZ2TEtmYlFtdmo0MVhrWFpiOHg5Um1qU3IyT0VJSVVqSUtBeUQ3VWFxZEFRVGx5c3plcmZudE90UEhYLXZTYjM4MHJ1dFRCODlRS3NuQW9ranltSUF0ZW50dmRZYTlIcktMTDJ5aXFWY0I4dVpZXzRmSHpIa0RsdV9USFhDTlRMM3JKSVNITENjeFN1RXdaNzVCa2p2WmFIcWF1Q1lORGduVmdHNF9hQWI4djhlcDAzOHAzOGJfejgtQnc?oc=5","fonte":"ANI News","categoria":"MEIO AMBIENTE","lang":"pt"},{"pais":"Índia","titulo":"Symbiosis Online MSc em Ciência de Dados 2026: Taxas e Carreiras","resumo":"A Symbiosis está apresentando seu programa de mestrado online em Ciência de Dados para o ano de 2026, com detalhes sobre as taxas e as promissoras perspectivas de carreira. O curso visa capacitar profissionais com habilidades avançadas em análise, modelagem e interpretação de dados, atendendo à crescente demanda do mercado. Esta iniciativa educacional é crucial para desenvolver especialistas e impulsionar a transformação digital na Índia.","link":"https://news.google.com/rss/articles/CBMigwFBVV95cUxNNjYwbVVJYS00RGdCUnJpXzBmaXF0VEZya09UZ3hobW1KTEh6dGRNaGkyNTN0ZUZVNlItV0VDb3JEV3V1bjBtQ2VBdW8zdl9hVVBfR1F1YnFRZE9pTFZSM3lTSW84R2Etb1pld2gxOEhFUDBpZkdVVEZrQVdZNUJBblBQNA?oc=5","fonte":"Jaro Education","categoria":"EDUCAÇÃO","lang":"pt"},{"pais":"Índia","titulo":"Tecnologia Vestível Revela Distúrbios Ocultos do Ritmo Cardíaco e Risco de AVC","resumo":"A tecnologia vestível, como smartwatches e outros monitores de saúde, tem se mostrado altamente eficaz na detecção precoce de distúrbios do ritmo cardíaco, que frequentemente são assintomáticos. Essa capacidade de monitoramento contínuo pode identificar condições como a fibrilação atrial, contribuindo significativamente para a redução do risco de acidentes vasculares cerebrais (AVC). Essa inovação representa um avanço crucial na medicina preventiva e na promoção do autocuidado.","link":"https://news.google.com/rss/articles/CBMilwFBVV95cUxPVUtfVy1CZm1sU3JGNzQ4V0lraXhSTnQ5MFFQanBlbU9ZMFY2ZmpST193Tjh5elppUGNKbjg3S21XdXFsaDBhNEVvTHUyTU5KXzd6eGljcFZiQWxIbmg0eU1sRXZUOS16bjZsQ2k3NldhaWg0R1NIZDg0VVotMFVOU0xOaEhHUVJWaHBlUF8zdE10V3Q0YzBn?oc=5","fonte":"healthcare-in-europe.com","categoria":"SAÚDE TECNOLOGIA","lang":"pt"},{"pais":"Índia","titulo":"KAIST Desenvolve Tecnologia de IA para Detectar Sinais Precoces de Doença Cerebrovascular em Casa","resumo":"Pesquisadores do KAIST desenvolveram uma tecnologia inovadora baseada em inteligência artificial, capaz de identificar precocemente sinais de doenças cerebrovasculares no ambiente doméstico. Essa ferramenta visa permitir o monitoramento contínuo da saúde e a detecção rápida de potenciais problemas, viabilizando intervenções médicas mais céleres. A solução promete transformar o diagnóstico e a prevenção de condições neurológicas graves, oferecendo maior autonomia aos pacientes.","link":"https://news.google.com/rss/articles/CBMiXEFVV3lxTE9OUXFFTGdkalJFTkZUOW5OQWQtanFpdDFQbEZ2bnd2d1NfZy1yb2J3UG82U1lRMWlIOHJ2empJTzFGNk0zZk5sbmJBOE1EQjMtYlB6V0llWWxXRk5F?oc=5","fonte":"EurekAlert!","categoria":"IA SAÚDE","lang":"pt"},{"pais":"Portugal","titulo":"O Antídoto da Adrenalina: Esportes Radicais Contra a Exaustão Digital","resumo":"Este artigo explora o crescente fenômeno da exaustão digital, um subproduto da constante conectividade e superexposição a telas. Propõe os esportes radicais como uma forma eficaz de combater esse esgotamento, oferecendo uma fuga para o mundo real, desafios físicos e um foco mental intenso que desvia a atenção das demandas digitais. A prática dessas atividades proporciona um \"reset\" psicológico, promovendo o bem-estar e a reconexão com o corpo e a natureza.","link":"https://news.google.com/rss/articles/CBMirgFBVV95cUxOYU1MYnA3V2lPR3NSaFZCYTR3UWlIMkpkUkNrcDU0ZHNsWGpfekNLX0hoNHltRlpqR3o2ejFEYU8xbjBoVFdmY1lCTmRxYkVVV2ZIbTZWQjZwSXRHV0V6SFJoV0lzeE9ETWJnNVYxWThuVjRjTzBiSjc1S21jbXZGeTFMN2p3b3VnNkpfQjN1NHlsS3l6eTlOOGtUQXMySDhrSDY0cm5LSWM4UDFaR3c?oc=5","fonte":"Correio da Manhã","categoria":"TENDÊNCIA, BEM-ESTAR","lang":"pt"},{"pais":"Portugal","titulo":"EUA Pesquisam Tecnologia para Bloquear Impressão 3D de Armas: Solução de Segurança ou Barreira Técnica?","resumo":"Os Estados Unidos estão explorando o desenvolvimento de tecnologias que poderiam prevenir a impressão 3D de armas de fogo, levantando importantes questões sobre segurança pública versus liberdade tecnológica. Essa iniciativa busca combater a proliferação de armas não rastreáveis, mas enfrenta desafios técnicos e debates legais complexos sobre a censura e o controle do uso de tecnologias inovadoras. A discussão aborda o delicado equilíbrio entre inovação e regulamentação.","link":"https://news.google.com/rss/articles/CBMiqgFBVV95cUxPVHZWMDM2WjZxdnVtOVFZMXdVajBJRExoY05QN00tMVJMLXVNUVpIME5kSW05aTdTRTJXRnFkLVlURHdTYVBJOV9TMEtCU3p1YURSRllZU1ZHellWNjVjLVFNRjItM2dRTzZ1NHlXMEVhX19keW5xX2MxMkZlRFJCMHVPMm5tVGFYY0hrLWhsaXFMS2tocWdmaWtVZlFpS0tDMWppclNTcFVRZw?oc=5","fonte":"Vietnam.vn","categoria":"TECNOLOGIA, SEGURANÇA","lang":"pt"},{"pais":"Portugal","titulo":"‘El Niño’ Encarece Produtos Agrícolas","resumo":"O fenômeno climático El Niño está impactando significativamente a produção agrícola global, resultando no aumento dos preços de diversos produtos essenciais. Condições climáticas extremas, como secas prolongadas e inundações inesperadas, afetam colheitas e cadeias de suprimentos em várias regiões do mundo. Essa instabilidade climática gera preocupações com a segurança alimentar e a inflação, exigindo estratégias de   const searchInput = document.getElementById('search');
  const langSelect = document.getElementById('lang');
  const countrySelect = document.getElementById('country');
  const categorySelect = document.getElementById('category');
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');

  // Utility de escape HTML simples para prevenir injections em propriedades sem tratamento
  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function populateSelects() {
    const lang = langSelect.value;
    const currentData = data.filter(d => d.lang === lang);

    const countries = [...new Set(currentData.map(d => d.pais))].filter(Boolean).sort();
    const categories = [...new Set(currentData.map(d => d.categoria))].filter(Boolean).sort();

    const currentCountry = countrySelect.value;
    const currentCategory = categorySelect.value;

    countrySelect.innerHTML = '<option value="all">Todos / All</option>';
    categorySelect.innerHTML = '<option value="all">Todas / All</option>';

    countries.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      countrySelect.appendChild(opt);
    });

    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      categorySelect.appendChild(opt);
    });

    if (currentCountry !== 'all' && countries.includes(currentCountry)) {
      countrySelect.value = currentCountry;
    }
    if (currentCategory !== 'all' && categories.includes(currentCategory)) {
      categorySelect.value = currentCategory;
    }
  }

  function render(items) {
    countEl.textContent = `${items.length} notícia${items.length !== 1 ? 's' : ''}`;
    
    grid.innerHTML = items.map(item => {
      const readMoreTxt = item.lang === 'pt' ? 'Ler mais' : 'Read more';
      
      const bulletList = (item.resumo || '').split('\n')
        .filter(Boolean)
        .map(line => `<li>${esc(line.replace(/^- /, ''))}</li>`)
        .join('');

      return `
        <div class="news-card">
          <div class="card-meta">
            <span class="category">${esc(item.categoria) || 'Geral'}</span>
            <span class="country">${esc(item.pais) || 'Global'}</span>
          </div>
          <h3 class="card-title">${esc(item.titulo)}</h3>
          <div class="card-summary">
            <ul>${bulletList}</ul>
          </div>
          <div class="card-footer">
            <a href="${esc(item.link)}" target="_blank" class="read-more">
              ${readMoreTxt} &rarr;
            </a>
            <span class="source">${esc(item.fonte)}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterData() {
    const query = searchInput.value.toLowerCase();
    const lang = langSelect.value;
    const country = countrySelect.value;
    const category = categorySelect.value;

    const filtered = data.filter(item => {
      const matchLang = item.lang === lang;
      const matchCountry = country === 'all' || item.pais === country;
      const matchCategory = category === 'all' || item.categoria === category;
      const matchSearch = query === '' 
        || (item.titulo || '').toLowerCase().includes(query)
        || (item.resumo || '').toLowerCase().includes(query)
        || (item.fonte || '').toLowerCase().includes(query);

      return matchLang && matchCountry && matchCategory && matchSearch;
    });

    render(filtered);
  }

  // Binds
  searchInput.addEventListener('input', filterData);
  langSelect.addEventListener('change', () => {
    populateSelects();
    filterData();
  });
  countrySelect.addEventListener('change', filterData);
  categorySelect.addEventListener('change', filterData);

  // Initialization
  populateSelects();
  filterData(); // trigger first render
</script>
</body>
</html>
