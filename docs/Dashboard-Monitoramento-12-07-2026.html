<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - International Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0B0F19;
      --bg-panel: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #E2E8F0;
      --text-muted: #94A3B8;
      --accent: #D4AF37;
      --accent-hover: #FDE047;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.15), transparent 400px),
                        radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.05), transparent 400px);
    }
    header {
      padding: 1.5rem 5%;
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo-img {
      height: 48px; /* Altura ajustável do logo */
      width: auto;
      object-fit: contain;
      border-radius: 8px; /* Caso não seja transparente */
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .logo-text span {
      color: var(--accent);
    }
    .date-badge {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      color: var(--accent);
      font-weight: 600;
    }
    .container {
      padding: 2rem 5%;
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }
    .filters {
      flex: 0 0 300px;
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 6rem;
    }
    .filter-group {
      margin-bottom: 1.5rem;
    }
    .filter-group label {
      display: block;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
    }
    select option {
      background: var(--bg-main);
      color: var(--text-main);
    }
    .results {
      flex: 1;
    }
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .results-count {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .news-card {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .news-card:hover {
      transform: translateY(-4px);
      border-color: rgba(212, 175, 55, 0.5);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }
    .category {
      color: var(--accent);
    }
    .country {
      color: var(--text-muted);
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.4;
      margin: 0 0 1rem 0;
      color: #fff;
    }
    .card-summary {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-muted);
      flex: 1;
    }
    .card-summary ul {
      margin: 0;
      padding-left: 1.2rem;
    }
    .card-summary li {
      margin-bottom: 0.25rem;
    }
    .card-footer {
      margin-top: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--glass-border);
      padding-top: 1rem;
    }
    .read-more {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .read-more:hover {
      color: var(--accent-hover);
    }
    .source {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    /* Simple CSS reset/scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: var(--bg-panel); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .filters {
        flex: none;
        width: 100%;
        position: static;
        box-sizing: border-box;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-container">
    <img src="logo.jpg" alt="TAP Logo" class="logo-img" onerror="this.style.display='none'">
    <div class="logo-text">Monitoramento<span>Internacional</span></div>
  </div>
  <div class="date-badge">12/07/2026</div>
</header>

<div class="container">
  <aside class="filters">
    <div class="filter-group">
      <label for="search">Busca / Search</label>
      <input type="text" id="search" placeholder="Palavra-chave...">
    </div>
    
    <div class="filter-group">
      <label for="lang">Idioma / Language</label>
      <select id="lang">
        <option value="pt">Português (PT-BR)</option>
        <option value="en">English (US)</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="country">País / Country</label>
      <select id="country">
        <option value="all">Todos / All</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="category">Categoria / Category</label>
      <select id="category">
        <option value="all">Todas / All</option>
      </select>
    </div>
  </aside>

  <main class="results">
    <div class="results-header">
      <h2 style="margin: 0; font-size: 1.5rem; color: #fff;">Resultados</h2>
      <span class="results-count" id="count">0 notícias</span>
    </div>
    <div class="news-grid" id="grid">
      <!-- Injected by JS -->
    </div>
  </main>
</div>

<script>

ia":"TECNOLOGIA AMBIENTAL","lang":"pt"},{"pais":"Brasil","titulo":"Todo mundo quer falar com o 'Cláudio', IA que virou febre e rivaliza com o ChatGPT","resumo":"O artigo destaca a ascensão de \"Cláudio\", uma nova inteligência artificial que rapidamente se tornou um fenômeno, despontando como um forte concorrente ao popular ChatGPT. Sua popularidade reflete a crescente demanda por soluções de IA conversacional e a contínua inovação no campo da inteligência artificial. \"Cláudio\" demonstra a evolução das capacidades de processamento de linguagem natural, prometendo impactar ainda mais a forma como interagimos com a tecnologia e buscamos informações.","link":"https://news.google.com/rss/articles/CBMi4wFBVV95cUxPZVdyc3p2cXZodUpvcVRGY1NSUnpSTUNfdUdGd2VJY2dfX2xXN2g0X2VjU2JEdkR0YnNnM05JNmhxd0ctcE9zcFVrMkk3SDlNZFZZdGRYSUxvbEdCR205bElBOFRQMW9pOTdjTVNpVHN5dTdKT2M1X21mcEhCMHRtT3dodXpKX2dKa0NnbmlVcnNpeUNYZzR1dHBRdnlfVGNWZmt1WEpsV3BlLVd4YkFwUi1JLVdtQVJzU0JFVmsxOEdTU21DcENDdm9hWDhUbEZIbTRZS2tIRHkyOENJa2szcjBPSdIB8gFBVVfeXFMT3BtSjB5b1JhRmlKbzEzWld6cTlRTl9wRFFuMUVpTmdyWkZkUzhTdlRjbXk5cnBfV2s0a2ZkR3Bkd3V0cE9xNmp2U1l0ak1lOW5tN2E1Z2owb0hJLXZ3dE9Lb0d0OERoY01NRzFSWjhoSkJndDNMRWxPRk9OSzQ5Mk9TVWlDRmJMa2ZjWTRpTzFFeW5UX2JlZlFQLTZXNHdreTg4ZDI4SmJkemtIZjQ3dGtPUVdSeDk2NXJEOHB2UHpCMlZWb0VVZ29RT0dwODVpdktybjRueU0tNTdCRUJvRmlSd2w1VUVjc050OElUQQ?oc=5","fonte":"O GLOBO","categoria":"INTELIGÊNCIA ARTIFICIAL","lang":"pt"},{"pais":"Brasil","titulo":"Brasileiros lançam 1º foguete com tecnologia de propulsão líquida","resumo":"Engenheiros brasileiros alcançaram um marco histórico ao lançar o primeiro foguete do país com tecnologia de propulsão líquida. Este feito representa um avanço significativo para o programa espacial brasileiro, demonstrando a capacidade nacional em desenvolver tecnologias aeroespaciais complexas e de ponta. A inovação abre portas para futuras missões espaciais e para o desenvolvimento de satélites, consolidando a posição do Brasil no cenário da exploração espacial.","link":"https://news.google.com/rss/articles/CBMifEFVX3lxTFBrQ0N1SnRxZ09qZUZpZnk1MmJfc3V5THhnWVEyaU1NbkhPc3RhRGlKcUQ0RVZBb2hEZEhNZ3g0MTNYMXBCdE1VVko3cTk4Tnl0ZjhiVkNZMlBIMERjU0RnLWJTbUoybTY0VzVlQjFvYmxMTDUta1ZzSFpiLWo?oc=5","fonte":"Metrópoles","categoria":"LANÇAMENTO ESPACIAL","lang":"pt"},{"pais":"Brasil","titulo":"Copa do Mundo 2026: Tecnologia da Lenovo impulsiona transmissões com IA aplicada à arbitragem","resumo":"A Copa do Mundo de 2026 promete inovar nas transmissões e na arbitragem com o uso de inteligência artificial da Lenovo. A tecnologia visa aprimorar a precisão das decisões em campo e enriquecer a experiência dos espectadores com análises avançadas. Essa integração da IA no futebol marca uma nova era para o esporte, combinando alto desempenho tecnológico com a emoção das partidas.","link":"https://news.google.com/rss/articles/CBMigwFBVV95cUxPZTVDbXhNcV92QTFmblpndGo1dTk5U2Z5dndpMmZQUGtlOVZwMThkLTRaSjlsalA3aWFkSWF4SVdrYXhMWEE0MHlZUng0UzJsc1lyMXJpOGhzYTNOMDdZN2ticHgtck1UNTBDbTRUN25iRXZuVC1RT0VxOTRCMVNkcnlsZw?oc=5","fonte":"Café com review","categoria":"TECNOLOGIA ESPORTIVA","lang":"pt"},{"pais":"Brasil","titulo":"El Niño pode atrasar plantio de grãos, reduzir safras e dificultar pecuária","resumo":"O fenômeno El Niño representa uma séria ameaça para a agricultura e pecuária brasileiras, com potencial para atrasar o plantio de grãos e reduzir significativamente as safras. As mudanças climáticas decorrentes do El Niño podem alterar regimes de chuva e temperatura, impactando diretamente a produtividade e a segurança alimentar. Agricultores e pecuaristas precisam se preparar para enfrentar desafios climáticos, buscando estratégias de adaptação para minimizar perdas e garantir a sustentabilidade do setor.","link":"https://news.google.com/rss/articles/CBMixAFBVV95cUxNWDdDVTRWTWNySjVSMl9xQllUMGhrQVo1RFBXVERGLWV2QTF4MExKMjM0MUl2bVA4eF8yblVqRTI2U1dHLWM1LXZXY21XRGMxdEpRUnZCbVEjal9wUGd3aVA2VXFlNndtVWdBX29xTHVVc09pcGJsem1CQkstN1NXNE1HSjkyeHdfX2UyamZpelFhRGFmbDNQZmVMZXFDdWFoMWpSN tá investindo US$ 16 milhões no desenvolvimento de microchips resistentes à radiação, uma tecnologia crucial para sistemas militares e espaciais. Essa iniciativa visa garantir a resiliência de equipamentos essenciais em ambientes hostis, protegendo-os de falhas induzidas por radiação. O investimento sublinha a importância estratégica de semicondutores avançados para a segurança nacional e a superioridade tecnológica.","link":"https://news.google.com/rss/articles/CBMivwFBVV95cUxNb3Z0UDRId0pGLTYxZkZ3VzZ0Nk01WUdJOTlZbS1OS1JhUGZuYlpEVTFySFhhN3hLR1JmMGg3T1BOc3JHcjVpVC1TcDZTZFgySDJyRHVxcUFHRC1NTWJfV3FmSjJ1dmtCUFZXLTlVUjAxNmFSZVZUdGxuelNpVC1uRy1ETk9kaTBWWmdEVjUwTzJIRC1EX2JPNUdSci1PTHRTSk9aZmZiUkNCSnFVazN4SXZsd29Rdm5LQmlUS0RFaw?oc=5","fonte":"Estados Unidos","categoria":"TECNOLOGIA DEFESA","lang":"pt"},{"pais":"Estados Unidos","titulo":"Por que motoristas da economia de compartilhamento estão se desligando — e como o design de plataforma pode reconquistá-los","resumo":"Este artigo explora o crescente desengajamento de motoristas em plataformas da economia de compartilhamento, analisando as razões por trás da insatisfação. Ele sugere que melhorias no design das plataformas podem ser a chave para reter e atrair trabalhadores. A discussão foca em aspectos como remuneração justa, flexibilidade e tratamento transparente como fatores críticos para o sucesso futuro do modelo.","link":"https://news.google.com/rss/articles/CBMie0FVX3lxTFBEWGVXaHJsdm5lUmVUVUhVRURHSDdnVncwVkJlTGNkNHZPdnFSc042UDQ0VVFJenE1RkFVRG4zbXh5SHJZY0pOd2l0UW5acHFWUHN3TlE4Sjc1cldQcC1vLXNmbTJGb2VrQXQ2cWFyNWdsRDUzS1pPakYtaw?oc=5","fonte":"Estados Unidos","categoria":"ECONOMIA TECNOLOGIA","lang":"pt"},{"pais":"Estados Unidos","titulo":"A Mente Humana Pode Não Ser Pária para a Vida Moderna","resumo":"O artigo investiga a crescente desconexão entre a capacidade evolutiva da mente humana e as exigências aceleradas da vida moderna. Aborda como o excesso de informações, a constante conectividade e a pressão por produtividade podem sobrecarregar nossa cognição e bem-estar. Levanta questões cruciais sobre a adaptação do cérebro a um mundo em rápida transformação e os desafios para a saúde mental.","link":"https://news.google.com/rss/articles/CBMimwFBVV95cUxPS0s0V0VvYkZyNl8wN1ZSOUNhRGJFeC1Hc1VKaGF1ZngyNENFR3FNSlBzWTZ0VFpmVk9zZHVkYmpWSXUtYjdtXzR2dUVnTHJyc2VCTFZMTFRtMHVKMEtDZVhkZk9xb2NmcmJ3Q0JaN3cxOEJpaVlwOTRsNTJtZmQ2UXdWbGVuNDA0b0ttaGx3dFg5YnVNVmxjZXN3QQ?oc=5","fonte":"ZME Science","categoria":"CIÊNCIA SAÚDE","lang":"pt"},{"pais":"Estados Unidos","titulo":"Controle de armas impresso em 3D: essa tecnologia para prevenir \"armas fantasmas\" nos EUA é realmente viável?","resumo":"Este artigo explora a viabilidade da tecnologia de impressão 3D no contexto do controle de armas nos EUA, especificamente para combater as \"armas fantasmas\". Debate se as soluções tecnológicas podem efetivamente regular a produção e posse de armas não rastreáveis. A discussão levanta questões complexas sobre inovação, segurança pública e legislação na era digital.","link":"https://news.google.com/rss/articles/CBMiogFBVV95cUxOc19FUmpXSFNUMloyUWY4TE1mTDVNZjNyMUtxRTBGbnZHUjNmeEp1RTRqYWFEck9jWVNWYzVDNHAxY3I4eVZiWi0yUEdfdTdRNmN5SThZYUpNRlB4aXo2UTJMQ0ZMdjQyVkFvN0h4UU12dzhQbV9CQlNYbVVNQTNoamRzVFV2a2kzQTFUWUZYNTE2LUxMdzdfb3ZhcDd0bGFjYmc?oc=5","fonte":"Portugal","categoria":"TECNOLOGIA POLÍTICA","lang":"pt"},{"pais":"Estados Unidos","titulo":"EUA lança novos ataques contra o Irã (Centcom)","resumo":"Os Estados Unidos realizaram novos ataques contra alvos no Irã, conforme confirmado pelo Centcom, em resposta a recentes escaladas de tensões na região. Esta ação militar sinaliza uma postura mais assertiva dos EUA no Oriente Médio, gerando preocupações sobre a estabilidade regional e o risco de um conflito mais amplo. O episódio destaca a complexidade das relações geopolíticas e as consequências de tais intervenções.","link":"https://news.google.com/rss/articles/CBMinwFBVV95cUxPRGhNS1dhZnhOMEdYcGllTUNZOUxjNkFpWEMzS1BubzN3NmQ obre o clitóris, destacando a importância de uma pesquisa mais aprofundada sobre a anatomia e fisiologia feminina. Por muito tempo, a ciência médica negligenciou este órgão, mas novas descobertas estão desafiando preconceitos e aprimorando a compreensão da saúde sexual e reprodutiva. A pauta sublinha como a ciência está expandindo fronteiras em áreas historicamente marginalizadas.","link":"https://news.google.com/rss/articles/CBMilAFBVV95cUxOQ09WM3REUGlCQjhVS3loS3lzM1B2MTBjWlY1X0VaWGxoOTY3NTBISGg3V2JjbDFLdWlmOTRuWDdrRWE5ZnFQUXg4dklFbU80QVZvckJUcndzZGdZTUlfYjdWb0tWamFqZlZFQ1U3amFwMVZTQXR3b0NnSmx1WUR4ak05NmhncjVnYW80bHFxZTZ1dF9xY0xR?oc=5","fonte":"RFI","categoria":"CIÊNCIA, SAÚDE","lang":"pt"},{"pais":"França","titulo":"130 € de economia nesta tablet Android 15 entregue com teclado e mouse.","resumo":"Uma oferta imperdível permite economizar 130 euros na compra de uma nova tablet equipada com o sistema operacional Android 15. Este pacote inclui, além do dispositivo, um teclado e um mouse, transformando a tablet em uma ferramenta versátil para produtividade e entretenimento. A oportunidade destaca a acessibilidade de tecnologias avançadas e periféricos, tornando o dispositivo uma opção atraente para consumidores.","link":"https://news.google.com/rss/articles/CBMirgFBVV95cUxQMHg2SnhsVDBsdlRXU3B1MGJRRWpteHVIWEZSQzlOUGN2Q3BPazN3RVNLay14UmJNN0VvV2ttTWlMNU9KQTg5QmQ1Z3VaNmxVZENpMUhwa2UzemwzYk9UYmcxTGFibDBrTkJJVm5tTkg2NmZsNzJwNUtLaTFjTE43WmM1ZmMxbzl5TUZWRi1YbGMxejBLeFBVMnlpU2RJcEhJcnk3WlVMeUttckhMNUE?oc=5","fonte":"CNET France","categoria":"TECNOLOGIA, CONSUMO","lang":"pt"},{"pais":"Inglaterra","titulo":"Inventor Omanita Pioneira no Aprendizado Inclusivo de Cores com Tecnologia Sensorial","resumo":"Um inventor de Omã desenvolveu uma tecnologia sensorial inovadora para ensinar cores de forma inclusiva, permitindo que pessoas com deficiência visual e outras condições percebam e compreendam as cores através de estímulos não-visuais. Esta inovação visa democratizar o aprendizado  Oxford","resumo":"Oxford está prestes a inaugurar um novo e moderno espaço de laboratório, projetado para abrigar e fomentar empresas emergentes nas áreas de ciências da vida e tecnologia. A iniciativa visa atrair talentos e investimentos, consolidando a região como um polo de inovação e pesquisa. Este ambiente colaborativo e equipado com infraestrutura de ponta será crucial para o desenvolvimento de soluções revolucionárias em biotecnologia, medicina e outras áreas tecnológicas.","link":"https://news.google.com/rss/articles/CBMioAFBVV95cUxOOUszYUgyMDhQR3lQQ2lGRHgxQnpHSHRTVmFLNlZSVDQtSHpVVTlmelN0Y2dPelVjSDdZdmNpMmhhTm1LXzN4RVJ1VkRUUkZkNGJEWFU5NnJuYWRQRHdTMHpMLXFUQlc0dVNoU2gxa2RBNFVXSk1oaGxzWnlOUEJDa3R5YUdXR2hZdTNVeTZBMFItVTJRdjRINW1Uc2stRldn?oc=5","fonte":"Inglaterra","categoria":"CIÊNCIA, DESENVOLVIMENTO","lang":"pt"},{"pais":"Inglaterra","titulo":"Plataformas Comunitárias de Esportes","resumo":"As plataformas comunitárias de esportes estão emergindo como uma tendência promissora, conectando entusiastas, atletas e profissionais de diversas modalidades. Esses espaços digitais facilitam o compartilhamento de experiências, o agendamento de atividades e o acesso a conteúdos especializados, criando ecossistemas vibrantes. A adoção dessas tecnologias está redefinindo a interação no mundo esportivo, promovendo maior engajamento e personalização da experiência para os usuários.","link":"https://news.google.com/rss/articles/CBMiYkFVX3lxTE43dFZJWFZfNWd2Y0RPbmNzZ3N1TjE3TFlNTFI4NHpBRGhSRldySEtuU05VOWhkQzl1MkY5NmRVc0lTQ2s5Y0s4c0JsSy1tVE5oX0FxTEMzRGpRbm94NVFoaGdR0gFiQVVfeXFMTjd0VklYVl81Z3ZjRE9uY3NnB1OMTdMWU1MUjg0ekFEaFJGV3JIS25TTlU5aGRDOXUyRjk2ZFVzSVNDazljSzhzQmxLLW1UTmhfQXFMQzNEalFub3g1UWhoZ1E?oc=5","fonte":"Inglaterra","categoria":"TENDÊNCIA, DIGITAL","lang":"pt"},{"pais":"Inglaterra","titulo":"Fifa Afirma que Tecnologia Não Detectou Toque da Bola em Cabo da Câmera no Gol da Inglaterra Contra Noruega","resumo":"A FIFA emitiu um comunicado oficial esclarecendo que a tecnologia osmos\", esses sistemas são cruciais para a segurança estratégica e a proteção de ativos espaciais contra ameaças. A iniciativa reforça o papel da Espanha na defesa e segurança internacional, destacando sua capacidade tecnológica em um campo de crescente importância geopolítica.","link":"https://news.google.com/rss/articles/CBMixgFBVV95cUxNeGZGeG5BaER1ZW56RzRmNko3dWJsM3pWTS01OXUtSDI4Z1ZsYnBEUDhXLUZiUF9CUHFncTZA","fonte":"Cadena SER","categoria":"TECNOLOGIA DEFESA","lang":"pt"},{"pais":"Espanha","titulo":"Avanço da ciência espanhola: o CSIC cria sistema que prevê 'secas de vento' e antecipa a...","resumo":"O Conselho Superior de Pesquisas Científicas (CSIC) da Espanha desenvolveu um sistema inovador capaz de prever \"secas de vento\", períodos de baixa intensidade eólica que afetam a geração de energia renovável. Essa tecnologia de ponta, utilizando modelos avançados e possivelmente inteligência artificial, é crucial para otimizar o planejamento energético e garantir a estabilidade da rede elétrica. Este avanço representa um passo significativo para a resiliência energética do país diante das mudanças climáticas.","link":"https://news.google.com/rss/articles/CBMi7AFBVV95cUxNekJKV2hZRzk5RFhkSGMtbTRYYktQWldUSDNMcUNIY3hyYktXem1fSVdlWnotdVhmUUxLc0M5NE9OY1FvZnVLZW11V2JMa2l6VDVuRUx5Z3Q5bkMtUUVzWTJWSTIyV1R2VVhoRzRsb2lxLVhHSWVhLXhJeWNUVm53OHZ6WS1tQTc2cFh2X3pZLS1tazl2NDE5aUZpenVBOHh6dS01NXBPZWFLb3dmRU5vZzhPMElYakJ3WXJYR2U4a1lraWdIME5ud2Q3Q2Z4Wll4SVBodmh1M0lmV1YzaFdFVmZmSEk2bGlpbVFDbNIB7AFBVV95cUxNekJKV2hZRzk5RFhkSGMtbTRYYktQWldUSDNMcUNIY3hyYktXem1fSVdlWnotdVhmUUxLc0M5NE9OY1FvZnVLZW11V2JMa2l6VDVuRUx5Z3Q5bkMtUUVzWTJWSTIyV1R2VVhoRzRsb2lxLVhHSWVhLXhJeWNUVm53OHZ6WS1tQTc2cFh2X3pZLS1tazl2NDE5aUZpenVBOHh6dS01NXBPZWFLb3dmRU5vZzhPMElYakJ3WXJYR2U4a1lraWdIME5ud2Q3Q2Z4Wll4SVBodmh1M0lmV1YzaFdFVmZmSEk2bGlpbVFDbA?oc=5","fonte":"OkDiario","categoria":"ENERGIA CLIMA","lang":"pt"},{"pais":"Espanha","titulo":"Tecnologia israelense que poderá curar a surdez permanente","resumo":"Uma inovadora tec fbGE?oc=5","fonte":"SZ.de","categoria":"CIÊNCIA, AMBIENTE","lang":"pt"},{"pais":"Alemanha","titulo":"Apple Processa Open AI por Roubo de Dados na Área de Hardware","resumo":"A Apple teria iniciado um processo judicial contra a Open AI, alegando roubo de dados relacionados ao setor de hardware. Este desenvolvimento marca um ponto de tensão crescente entre gigantes da tecnologia no campo da inteligência artificial e propriedade intelectual. As implicações legais podem redefinir os limites do uso de dados para treinamento de modelos de IA e a competitividade no desenvolvimento de novas tecnologias. O caso destaca a complexidade e os riscos inerentes à corrida tecnológica atual.","link":"https://news.google.com/rss/articles/CBMimgFBVV95cUxPbWtzTTQyWnp3eTlUa2VYTy1Ca0YyTVEyY0x2TGh6Zlk3NWg2S3BOLUI0QUtyb0FHNklMWkhmTWtLbUlaWHpTNUdxcGpMemhvcnNORVhxcXRNdm9ITERSdTFzLWVyc3VsSHk4NEs3YkNpdXU4YkktZ0xMWEIyb2w3Nm1oMjVBVV9KSzE2T2hOa0V6dFJHdXUyU2RB?oc=5","fonte":"SZ.de","categoria":"TECNOLOGIA, JURÍDICO","lang":"pt"},{"pais":"Alemanha","titulo":"“Na Meia-Idade, os Caminhos São Definidos”","resumo":"Este artigo científico explora a importância crítica da meia-idade como um período decisivo para a trajetória de vida, tanto em aspectos pessoais quanto profissionais. A pesquisa sugere que as decisões e hábitos desenvolvidos nesta fase podem ter impactos duradouros na saúde, bem-estar e sucesso futuro. Aborda a complexidade das mudanças cognitivas e sociais, enfatizando como a adaptabilidade e o planejamento estratégico são cruciais para um envelhecimento saudável e produtivo.","link":"https://news.google.com/rss/articles/CBMimwFBVV95cUxNZWgySDZZcEhsMkM0ZWRoel9reUJTQmIzRUUycGx0NVltM0ljTEFuTHdGTzNfSjlQU2owVjRrenJKdWR4TjNmb29DczY0WUVxWHpzYjBsRjFVTWZ3ZFR2RjRZM25GZENmRVZnV3dLQUxTcmVVekczTTNiS0VjcDY0MWdldUdGQk5Vc1dTZVB5blNXUGNmMGI3cmF5VQ?oc=5","fonte":"Spektrum der Wissenschaft","categoria":"CIÊNCIA, SAÚDE","lang":"pt"},{"pais":"Alemanha","titulo":"DIW: Uma Política Neutra em Relação à Tecnologia Prejudica a Indústria Alemã","resumo":"O Instituto Alemão de Pesquisa Econômica (DIW) alerta que a política de neutralidade tecnológica da Alemanha está impactando negativamente sua indústria. O estudo argumenta que a falta de direcionamento específico em tecnologias-chave impede o país de capitalizar plenamente inovações e competir globalmente. Para o DIW, é essencial que o governo adote uma abordagem mais proativa, investindo e incentivando setores estratégicos para garantir a liderança tecnológica e econômica da Alemanha no futuro.","link":"https://news.google.com/rss/articles/CBMingFBVV95cUxOVmRsbHUtckU0UDVHSWVPeVV1YV9TSUpCZGlOZmVqb0duX09IOGN6WFB4NlJuQlRSbGhHX0gyS3BGbUpmZWdyQktSakZZLURXVHpZQ1hkZzlVZnltRDNKaWcwZG80QWhaVXItX0JjYTIuTEJ5WjlQekV5TlJUV2p2UER1Tk8tTVM5dFFMMXhTVFVrLXZBTXg1N3hDTkxmQQ?oc=5","fonte":"Portugal","categoria":"POLÍTICA, TECNOLOGIA","lang":"pt"},{"pais":"Alemanha","titulo":"CEO da Alpitronic: “Incerteza é Veneno para a Economia”","resumo":"O CEO da Alpitronic, uma empresa líder em tecnologia de carregamento para veículos elétricos, expressa preocupação com a incerteza econômica atual, descrevendo-a como prejudicial para os negócios. Ele destaca como a falta de estabilidade regulatória e de mercado dificulta o planejamento de investimentos e a inovação no setor automotivo elétrico. A declaração ressalta a necessidade de políticas claras e um ambiente previsível para impulsionar o desenvolvimento e a expansão de tecnologias verdes na Alemanha.","link":"https://news.google.com/rss/articles/CBMiigFBVV95cUxNT0dYQ1E0Qy1ndFpjNFExbFFuTURvb0REaXhlVVZJQ3lfMURBeVpKUk4wMjJSbVlNY1RodUwybDBzSjlOS1I5Y3djTnA2MVJWU052ZGh3Q3c3b1RPMVdQd1lhbDhJbENOSGNoUlJlcHhGX1hsaFlpMG5oTEN5bWlIbXkyR2RNbXE5dlE?oc=5","fonte":"Elektroauto-News","categoria":"ECONOMIA, TECNOLOGIA","lang":"pt"},{"pais":"Alemanha","titulo":"Frank Thelen Alerta: “Firewall” Prejudica a Alemanha","resumo":"O renomado investidor e empresário de tecnologia, Frank Thelen, emite um alerta sobre os perigos de uma \"Brandmauer\" (termo que pode significar \"firewall\" ou \"muro de contenção\") para a Alemanha. Ele sugere que certas abordagens ou políticas podem isolar o país de inovações globais ou impedir o crescimento econômico e tecnológico. A crítica sublinha a necessidade de abertura, colaboração e um ambiente propício para que a Alemanha mantenha sua relevância no cenário tecnológico e competitivo mundial.","link":"https://news.google.com/rss/articles/CBMipAFBVV95cUxOT3hhYjRXMTNfQldWMHQtVUsyd3hWa1RReDkxWFNhb2I5UHByVzZMV0NjNnV0TWY5RGxzX1NVM1c4dkhpXzlIdlJjd0FtZmI1WTY2clJKVDNFZGlhX3NORTVEdzl4eV9DamlhT05DQ0xzMVd2dXpITmVoVHVKY2F2SXZlUzNyZllUcU9MODg3OWlFX2pKd3RUZTY5RzZZV0hka0RKaw?oc=5","fonte":"BILD","categoria":"TECNOLOGIA, POLÍTICA","lang":"pt"},{"pais":"Japão","titulo":"Uso de tecnologias digitais como IA em aulas de basquete para jovens na cidade de Nanao, Ishikawa","resumo":"O artigo destaca a aplicação de inteligência artificial e outras tecnologias digitais em aulas de basquete para jovens na cidade de Nanao, Ishikawa. Essa inovação busca aprimorar o treinamento e o desenvolvimento de atletas juniores. A iniciativa demonstra a integração prática de tecnologias avançadas em campos não tradicionais, impulsionando a modernização do esporte e a educação física juvenil. Revela um esforço para otimizar o desempenho e o engajamento através de ferramentas digitais.","link":"https://news.google.com/rss/articles/CBMifkFVX3lxTE8tWjlZWkF0bjJWWGxKSVJydWV4MWN4MTFQdmFpakhkdG0ycDc1MTg1NDZGd3NZSUJOQXhhUC1UdHpwZFBLRXBNR0VTemVSMVpUc19DTmxmeFlFVm5YRGhVM2VLWlEzYzJHZjB1VHJGSU5wc2I3NEdXNjg1RDJIUQ?oc=5","fonte":"Japão","categoria":"TECNOLOGIA, ESPORTE","lang":"pt"},{"pais":"Japão","titulo":"A ética da IA não é mais um problema apenas para engenheiros: Quem se tornará um 'elemento atípico' na era da IA?","resumo":"Este artigo aborda a crescente complexidade da ética da inteligência artificial, argumentando que a responsabilidade não se limita apenas aos engenheiros, mas se estende a toda a sociedade. Ele questiona quem será impactado e potencialmente marginalizado pelas decisões da IA, levantando a necessidade de um debate mais amplo. A discussão ressalta a urgência de estabelecer diretrizes éticas claras e inclusivas para navegar na era da IA. É um tópico crucial para o desenvolvimento tecnológico sustentável.","link":"https://news.google.com/rss/articles/CBMihwFBVV95cUxOUFBQUnZ1ajBFRVJtaHYyV1oxenhZeHJ2UGxYbng1THZNWDBGb0Ntc0t0ejJvMjNoQnVCRXVWVVVvekhRN3JYQTh2WlROVUFFWG5Eai16UjZZWjF1UENkNXhXZmlEWERaTUsyZHhLdHN0ZWNaRmZKX25fR2VmVkM4d3NEQXotQWM?oc=5","fonte":"Japão","categoria":"ÉTICA, TECNOLOGIA","lang":"pt"},{"pais":"Japão","titulo":"NativeCamp lança novo material didático em inglês sobre os efeitos da cafeína no desempenho atlético, unindo conversação e ciência do esporte","resumo":"A plataforma NativeCamp lançou um inovador material educacional que integra o aprendizado da língua inglesa com princípios da ciência do esporte. O curso explora os efeitos da cafeína no desempenho atlético, oferecendo aos usuários uma abordagem bilíngue e prática para temas de saúde e bem-estar. Esta iniciativa pioneira ilustra a fusão entre educação, tecnologia e ciência. Visa democratizar o conhecimento especializado e o aprimoramento da saúde.","link":"https://news.google.com/rss/articles/CBMiaEFVX3lxTE50UDVobjZmeHc1VkZYdUpsaWlqOFdDR0N2M0JIb1pOT1lacGY2OEp4WDNoSm1BSGRvcXdFN3FReEp0R1dtanpYazk5ZkJhNlRXUFZCSVpRcWtYMG53OGpFczRtQ2hQdDVi?oc=5","fonte":"Japão","categoria":"EDUCAÇÃO, CIÊNCIA","lang":"pt"},{"pais":"Japão","titulo":"Anúncio do Especial de Férias de Verão 2026 - Consulta Científica Infantil","resumo":"A emissora NHK anunciou um programa especial de férias de verão para 2026, intitulado 'Consulta Científica Infantil'. Esta iniciativa visa despertar o interesse pela ciência entre as crianças, oferecendo uma plataforma interativa para que os jovens façam perguntas e explorem diversos temas científicos. O projeto busca estimular a curiosidade e o pensamento crítico desde cedo. É uma importante ação para a popularização do conhecimento científico no Japão.","link":"https://news.google.com/rss/articles/CBMiggFBVV95cUxPSGhxOGJYZ2JDNVJMdjJkUUJVUXNMbUJXMUNRajE0ODlLM0JxeGg0R2tvakF6VTd1bDI1NHJ6bmdIWjh1MW9na3NOOFZERlNNVDR3ZVJBMkdTSjNGMUMxTk5zd19aa2JCZGJYNFhsMEdDTjBRVzktVnpLZUZJRU85RmFB?oc=5","fonte":"NHK","categoria":"CIÊNCIA, EDUCAÇÃO","lang":"pt"},{"pais":"Japão","titulo":"Aprofundamento da colaboração entre grandes operadoras de telefonia móvel e bancos online: Intensificação da concorrência por planos preferenciais para atrair usuários para seus ecossistemas econômicos","resumo":"Grandes operadoras de telefonia móvel no Japão estão aprofundando suas colaborações com bancos digitais, visando criar ecossistemas econômicos próprios. Esta estratégia foca em oferecer planos de serviços e benefícios exclusivos para atrair e fidelizar clientes, incentivando a utilização conjunta de serviços de telecomunicações e financeiros. A crescente integração sinaliza uma intensa competição no mercado digital. Ela redefine o cenário dos serviços financeiros e de comunicação no país.","link":"https://news.google.com/rss/articles/CBMiQkFVX3lxTFBBT0x6UU9HOWdhM1BCUXQydW1IV01Fei14LUM1STJ3NXF6R2NhandsSHdRNlZURGo0U1ZzbVhtaGNYdw?oc=5","fonte":"ニュースイッチ by 日刊工業新聞社","categoria":"MERCADO, TECNOLOGIA","lang":"pt"},{"pais":"China","titulo":"StarNetoada: Negócio de Comunicação por Satélite da Empresa Não Tem Relação com Avanço na Tecnologia de Recuperação Marítima do Foguete Longa Marcha 10B","resumo":"A empresa StarNetoada esclareceu publicamente que suas operações de comunicação via satélite não possuem qualquer ligação comercial com o recente avanço tecnológico na recuperação marítima do foguete transportador Longa Marcha 10B.\nEsta declaração visa desmentir possíveis especulações do mercado, delineando claramente os escopos de atuação da empresa.\nReforça a independência das inovações no setor aeroespacial chinês.","link":"https://news.google.com/rss/articles/CBMiYEFVX3lxTE1mU2pydzNocWx0eDl1cHFZdS1FMkJkd2R4THBoYlRpUW1pSU84WFVuNWltNUoxRGR5dmtzbTkzd3ZrZHRzUlNYazljYjNhbTlsZjFYZk5SNWdQU1hlYjZCcQ?oc=5","fonte":"China","categoria":"ESPAÇO","lang":"pt"},{"pais":"China","titulo":"\"Perspectiva\" Sobre a Onda de Aumento de Preços dos Semicondutores de Potência","resumo":"O mercado de semicondutores de potência está enfrentando uma significativa alta de preços, impulsionada por diversos fatores macroeconômicos e de demanda.\nEste artigo oferece uma análise aprofundada das causas e consequências dessa tendência.\nA valorização desses componentes essenciais impacta diretamente setores como automotivo, energia e eletrônicos, sinalizando desafios e oportunidades para a indústria global.","link":"https://news.google.com/rss/articles/CBMiV0FVX3lxTE5hNDkxcUVGeUFUdnp5WmFaRHZXY2NHVVIzbkpWX0ZNcFRfV0IzNFZEZ0ZYSFFEb2h0TkUzeFBLUV9IcTZGM3JTdVYwNGQzTEp3UDhRRXNTdw?oc=5","fonte":"China","categoria":"MERCADO TECNOLOGIA","lang":"pt"},{"pais":"China","titulo":"DNA Antigo Desvenda Mistério de Assassinato da Família Médici","resumo":"Pesquisadores utilizaram técnicas avançadas de análise de DNA antigo para investigar um mistério de assassinato que envolvia a poderosa família Médici, da Renascença italiana.\nO estudo genético de restos mortais antigos forneceu evidências cruciais para esclarecer a causa da morte de membros da família.\nEsta aplicação forense da ciência do DNA não apenas resolve um enigma histórico, mas também demonstra o potencial da arqueogenética em revelar segredos do passado.","link":"https://news.google.com/rss/articles/CBMiZEFVX3lxTE1OUjJZUGZROFFvWno5OXE1c1k4SVNwczVDS1dVRFhRMmlLMkl4MHI0aTJ4emYxeEJ6MWl2eXVDcFZCRHp0X0lMMFo","fonte":"China","categoria":"CIÊNCIA FORENSE","lang":"pt"},{"pais":"China","titulo":"Integração Profunda da Tecnologia Interativa XR Explora Novas Pistas para a Transformação Diversificada de Cinemas","resumo":"Cinemas buscam inovar e se transformar através da integração profunda da tecnologia de Realidade Estendida (XR), que abrange Realidade Virtual, Aumentada e Mista.\nEssa iniciativa visa criar experiências imersivas e diversificadas, indo além do tradicional formato de exibição de filmes.\nA exploração de novas pistas de transformação pode revitalizar a indústria cinematográfica e atrair um público mais amplo.","link":"https://news.google.com/rss/articles/CBMicEFVX3lxTE1pREVZbk1obGN0NVc3V3BMSVJaNkNyaHJ0VzJTbWl5YUg3aXdzVHdwVkMzcFBkdDJVUFR4aU92cmtBc19YZlJMVU5uT0ExR2RfcGs3VFp1WThSdmtvSUR6bFNaYmJNdGg3cnk3RjRCM2k?oc=5","fonte":"China","categoria":"TECNOLOGIA ENTRETENIMENTO","lang":"pt"},{"pais":"China","titulo":"Instituto de Prevenção e Controle de Doenças Infecciosas Realiza Treinamento em Técnicas de Isolamento, Cultivo e Identificação de Bactérias de Difícil Cultivo","resumo":"O Instituto de Prevenção e Controle de Doenças Infecciosas organizou um curso de treinamento focado em técnicas avançadas para isolar, cultivar e identificar bactérias que são notoriamente difíceis de crescer em laboratório.\nEsta capacitação é crucial para aprimorar a capacidade de diagnóstico e pesquisa em microbiologia, especialmente em patógenos emergentes ou pouco compreendidos.\nO programa visa fortalecer a resposta a futuras ameaças de doenças infecciosas.","link":"https://news.google.com/rss/articles/CBMicEFVX3lxTE5qcm9iWDNYbkoxaGVzWE1NTDJ1VjFxZTBPR3dJcnlKZ2ZpaHZfbENfekpuYUlQVXFrQzN3b2htR0FYUmRNbjZWU2ZwdjRlYXNQdDA1Ynd0ZjJCUlZDM3h4ejhjNTI0TXo5NmVJMVZNSE0?oc=5","fonte":"chinacdc.cn","categoria":"SAÚDE BIOTECNOLOGIA","lang":"pt"},{"pais":"China","titulo":"Sony Expo Lança \"Jornada Maravilhosa de Entretenimento\" no BilibiliWorld Pelo Terceiro Ano, Expandindo Limites de Entretenimento Imersivo na China","resumo":"A Sony apresentou sua \"Jornada Maravilhosa de Entretenimento\" na BilibiliWorld pelo terceiro ano consecutivo, demonstrando a sinergia de suas diversas unidades de negócios na China.\nAtravés de IPs variados e inovações tecnológicas, a empresa busca expandir os limites do entretenimento imersivo.\nEste evento destaca o compromisso da Sony com o mercado chinês e sua liderança na criação de experiências digitais envolventes.","link":"https://news.google.com/rss/articles/CBMimwFBVV95cUxPOEhKczAweG9tdDlySkR3Y1V4aFE2NS1yX21ZajQteWNaMVl3VnhJY1Y4UGV2V2ZOa0ZLVlE2Vk9VZVVfazVTWU9XQmRHQ1owRElqaUhNWlB2WHVTUW1uREt4dGdtcmZoS0pnMkZaY3J3aXN6SDBTN3JyT3RNeUE1MFFLdGNMYXdUcElTNVJYenVTZ1d1UUZ4Y3pXbw?oc=5","fonte":"sony.com.cn","categoria":"TECNOLOGIA ENTRETENIMENTO","lang":"pt"},{"pais":"China","titulo":"Galeria Benoy Vence Concurso para o Centro de Inovação Científica Yuqiao em Xangai","resumo":"A Galeria Benoy foi a vencedora de um prestigiado concurso de design para o novo Centro de Inovação Científica Yuqiao, localizado em Xangai.\nEste projeto arquitetônico ambicioso visa criar um polo de excelência para pesquisa e desenvolvimento tecnológico na região.\nA construção de tal centro reforça o compromisso da China com o avanço científico e a inovação, servindo como um catalisador para talentos e empresas de alta tecnologia.","link":"https://news.google.com/rss/articles/CBMi8wJBVV95cUxQdEQyNTNGd2dqNXY2M3ZrZG1LazR6ZjZVU0gwMDBocXVzdU52V2RMYld3R3Nob3JJcHVoYllMX2JjVm1MVmtMblBJNUZxMDBMNVJ0eDBYWU5fS2k5d1RJLTJqLVF5WDd5NWtGZXVtcFBHS0M1cnBaSmFMR0RDOXVHZDlTNElid3VVLUxhVy1xM2pMZTVNbWUtQ1NLbXR3LXVuMTBncGtTaWo0R1FBY19fSFg0UE9WR25zenJUOG1jbTFTOEdqMWNOTFFpMy1TQmRTX3NPUlU1cjlhX0o3UklsMUZpS2tKQTdLYWJsaEI0RVpuOVNYZzk3dGh4bE5JQkpDUnowenhFam9tMFlBZUxycGphMkJVd0NhRG1sXzVTd0twU01wYTlZTW1oU3NVb2U2RjIxR19GYkxTM0QwSlJlUnJoZmNXci1FREhRRFRQMklicnRMVm5HSmZkZDRDVDJGWHRuRFd4U29MZFE5SUtVd2lsUQ?oc=5","fonte":"ArchDaily","categoria":"INOVAÇÃO ARQUITETURA","lang":"pt"},{"pais":"China","titulo":"China Lança Foguete Reutilizável e se Aproxima da SpaceX de Elon Musk","resumo":"A China realizou com sucesso o lançamento de um foguete transportador reutilizável, marcando um avanço significativo em seu programa espacial e na corrida pela exploração comercial do espaço.\nEsta conquista coloca o país em uma ia. O caso destaca a intensa rivalidade e a importância da proteção de informações confidenciais no ambiente corporativo de alta tecnologia.","link":"https://news.google.com/rss/articles/CBMilwFBVV95cUxNQ1VQNHB2TEx3YWJpWHhRVFFQaVJqSDlqMDFTZTVLblJjZnJCVnlCWkwtZkgxZzBsaWZYQ3hyd3Z0eXhRSFdvWUdCWk5qNVRQR1dMTG15YWNJWi0xZDVWUi03NFFodGxoYlNQd1NqUEtYWlFnNW9BRWlNdUZQOTduMVN4N1RYOXhFcFlWQVVIRDMydUxEczJz?oc=5","fonte":"Vietnam.vn","categoria":"TECNOLOGIA & LEGAL","lang":"pt"},{"pais":"Portugal","titulo":"Impressão 3D e o Combate às Armas Fantasmas: Uma Solução Tecnológica","resumo":"Uma nova tecnologia de impressão 3D está sendo desenvolvida com o objetivo de bloquear a produção de \"armas fantasmas\", que são armas não rastreáveis fabricadas por impressoras 3D. Essa inovação oferece uma abordagem técnica promissora para combater a proliferação de armamentos ilegais. A iniciativa visa fortalecer a segurança pública, dificultando o acesso a armas de fogo produzidas clandestinamente.","link":"https://news.google.com/rss/articles/CBMiqgFBVV95cUxNekxwRS11RVRVWDJ4SGZFRFpTdG9zNENXYmtsQWprS0d2VlZ3RHE3NFNJWXpvU1ZKamdMVVlaanJSOE5LUXVKTS1uZUVMUnY5U0Jpckl5T3NsbnpSRjhuYjVIZ3hiOFlwOUc0b1VUa3djRTBFMnVXZ1VwTHpqdWFHWXlkbnBMMGtnRlVJSmdSR1NETW9DZnVmTjBKM3pPZllCQ2V5d0pHNVB3QQ?oc=5","fonte":"Vietnam.vn","categoria":"TECNOLOGIA & SEGURANÇA","lang":"pt"},{"pais":"Portugal","titulo":"China Lança Foguete Reutilizável e Reduz Distância para SpaceX de Elon Musk","resumo":"A China deu um passo significativo em sua corrida espacial ao lançar com sucesso um foguete reutilizável, uma tecnologia que antes era dominada principalmente pela SpaceX de Elon Musk. Este avanço demonstra a crescente capacidade e ambição da nação asiática no setor espacial. O feito intensifica a competição global e promete revolucionar o custo e a frequência das missões espaciais nos próximos anos.","link":"https://news.google.com/rss/articles/CBMi3gFBVV95cUxNYjlnd2ZseTI2M015NlVJbktaZ3QzTEU5dEFFdnp3NzJ4MENlaUh3czV5RUhkNDNMd1FjZXR1cFU   const searchInput = document.getElementById('search');
  const langSelect = document.getElementById('lang');
  const countrySelect = document.getElementById('country');
  const categorySelect = document.getElementById('category');
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');

  // Utility de escape HTML simples para prevenir injections em propriedades sem tratamento
  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function populateSelects() {
    const countries = [...new Set(data.map(d => d.pais))].filter(Boolean).sort();
    const categories = [...new Set(data.map(d => d.categoria))].filter(Boolean).sort();

    countries.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      countrySelect.appendChild(opt);
    });

    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      categorySelect.appendChild(opt);
    });
  }

  function render(items) {
    countEl.textContent = `${items.length} notícia${items.length !== 1 ? 's' : ''}`;
    
    grid.innerHTML = items.map(item => {
      const readMoreTxt = item.lang === 'pt' ? 'Ler mais' : 'Read more';
      
      const bulletList = (item.resumo || '').split('\n')
        .filter(Boolean)
        .map(line => `<li>${esc(line.replace(/^- /, ''))}</li>`)
        .join('');

      return `
        <div class="news-card">
          <div class="card-meta">
            <span class="category">${esc(item.categoria) || 'Geral'}</span>
            <span class="country">${esc(item.pais) || 'Global'}</span>
          </div>
          <h3 class="card-title">${esc(item.titulo)}</h3>
          <div class="card-summary">
            <ul>${bulletList}</ul>
          </div>
          <div class="card-footer">
            <a href="${esc(item.link)}" target="_blank" class="read-more">
              ${readMoreTxt} &rarr;
            </a>
            <span class="source">${esc(item.fonte)}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterData() {
    const query = searchInput.value.toLowerCase();
    const lang = langSelect.value;
    const country = countrySelect.value;
    const category = categorySelect.value;

    const filtered = data.filter(item => {
      const matchLang = item.lang === lang;
      const matchCountry = country === 'all' || item.pais === country;
      const matchCategory = category === 'all' || item.categoria === category;
      const matchSearch = query === '' 
        || (item.titulo || '').toLowerCase().includes(query)
        || (item.resumo || '').toLowerCase().includes(query)
        || (item.fonte || '').toLowerCase().includes(query);

      return matchLang && matchCountry && matchCategory && matchSearch;
    });

    render(filtered);
  }

  // Binds
  searchInput.addEventListener('input', filterData);
  langSelect.addEventListener('change', filterData);
  countrySelect.addEventListener('change', filterData);
  categorySelect.addEventListener('change', filterData);

  // Initialization
  populateSelects();
  filterData(); // trigger first render
</script>
