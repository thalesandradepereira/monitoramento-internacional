:"teikyo-u.ac.jp","pais":"Japan","titulo":"Fukuoka Department of Medical Technology professor receives incentive award at the 48th Academic Conference of the Japanese Society for Respiratory Care","resumo":"Professor Rinnai was awarded by the Japanese Society for Respiratory Care for his innovative study presented at the organization's 48th annual conference. The recognition highlights the researcher's academic rigor and contributions to the advancement of respiratory treatments in Japan. This achievement elevates the institution's prestige and fosters new discoveries in medical technology.","link":"https://www.teikyo-u.ac.jp/topics/2026/0717","categoria":"SCIENCE","lang":"en"},{"fonte":"jst.go.jp","pais":"Japan","titulo":"Public Symposium 'AI for Science 2026'","resumo":"The 'AI for Science 2026' event brings together experts to discuss the convergence of artificial intelligence and traditional scientific methods. The symposium focuses on how deep learning algorithms are accelerating laboratory discoveries and complex data analyses. This is a key opportunity for academics and technologists to explore the future of automation in scientific research.","link":"https://www.jst.go.jp/crds/sympo/20260917/index.html","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"shobserver.com","pais":"China","titulo":"Shanghai launches 'Intern-Duan砚', unlocking new scientific research capabilities with AGI","resumo":"Shanghai has introduced the 'Intern-Duan砚' model, a milestone in scientific meta-cognition for AGI. The innovation aims to transform complex research workflows by enabling enhanced scientific reasoning capabilities. This breakthrough positions the city at the forefront of the integration between artificial intelligence and academic discovery.","link":"https://www.shobserver.com/news/detail?id=1145959","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"中国网","pais":"China","titulo":"Launch of the 'dual-drive' focused Rock 2.0 scientific foundation model","resumo":"The Rock 2.0   const searchInput = document.getElementById('search');
  const langSelect = document.getElementById('lang');
  const countrySelect = document.getElementById('country');
  const categorySelect = document.getElementById('category');
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');
  const clearBtn = document.getElementById('clear-filters');

  // Utility de escape HTML simples para prevenir injections em propriedades sem tratamento
  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function populateSelects() {
    const lang = langSelect.value;
    const currentData = data.filter(d => d.lang === lang);

    const countries = [...new Set(currentData.map(d => d.pais))].filter(Boolean).sort();
    const categories = [...new Set(currentData.map(d => d.categoria))].filter(Boolean).sort();

    const currentCountry = countrySelect.value;
    const currentCategory = categorySelect.value;

    countrySelect.innerHTML = '<option value="all">Todos / All</option>';
    categorySelect.innerHTML = '<option value="all">Todas / All</option>';

    countries.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      countrySelect.appendChild(opt);
    });

    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      categorySelect.appendChild(opt);
    });

    if (currentCountry !== 'all' && countries.includes(currentCountry)) {
      countrySelect.value = currentCountry;
    }
    if (currentCategory !== 'all' && categories.includes(currentCategory)) {
      categorySelect.value = currentCategory;
    }
  }

  function render(items) {
    countEl.textContent = `${items.length} notícia${items.length !== 1 ? 's' : ''}`;
    
    grid.innerHTML = items.map(item => {
      const readMoreTxt = item.lang === 'pt' ? 'Ler mais' : 'Read more';
      
      const bulletList = (item.resumo || '').split('\n')
        .filter(Boolean)
        .map(line => `<li>${esc(line.replace(/^- /, ''))}</li>`)
        .join('');

      return `
        <div class="news-card">
          <div class="card-meta">
            <span class="category">${esc(item.categoria) || 'Geral'}</span>
            <span class="country">${esc(item.pais) || 'Global'}</span>
          </div>
          <h3 class="card-title">${esc(item.titulo)}</h3>
          <div class="card-summary">
            <ul>${bulletList}</ul>
          </div>
          <div class="card-footer">
            <a href="${esc(item.link)}" target="_blank" class="read-more">
              ${readMoreTxt} &rarr;
            </a>
            <span class="source">${esc(item.fonte)}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterData() {
    const query = searchInput.value.toLowerCase();
    const lang = langSelect.value;
    const country = countrySelect.value;
    const category = categorySelect.value;

    const filtered = data.filter(item => {
      const matchLang = item.lang === lang;
      const matchCountry = country === 'all' || item.pais === country;
      const matchCategory = category === 'all' || item.categoria === category;
      const matchSearch = query === '' 
        || (item.titulo || '').toLowerCase().includes(query)
        || (item.resumo || '').toLowerCase().includes(query)
        || (item.fonte || '').toLowerCase().includes(query);

      return matchLang && matchCountry && matchCategory && matchSearch;
    });

    render(filtered);
  }

  // Binds
  searchInput.addEventListener('input', filterData);
  langSelect.addEventListener('change', () => {
    populateSelects();
    filterData();
  });
  countrySelect.addEventListener('change', filterData);
  categorySelect.addEventListener('change', filterData);
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    countrySelect.value = 'all';
    categorySelect.value = 'all';
    filterData();
  });

  // Initialization
  populateSelects();
  filterData(); // trigger first render
</script>
