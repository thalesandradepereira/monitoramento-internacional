<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - International Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0B0F19;
      --bg-panel: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #E2E8F0;
      --text-muted: #94A3B8;
      --accent: #D4AF37;
      --accent-hover: #FDE047;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.15), transparent 400px),
                        radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.05), transparent 400px);
    }
    header {
      padding: 1.5rem 5%;
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo-img {
      height: 48px; /* Altura ajustável do logo */
      width: auto;
      object-fit: contain;
      border-radius: 8px; /* Caso não seja transparente */
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .logo-text span {
      color: var(--accent);
    }
    .date-badge {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      color: var(--accent);
      font-weight: 600;
    }
    .container {
      padding: 2rem 5%;
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }
    .filters {
      flex: 0 0 300px;
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 6rem;
    }
    .filter-group {
      margin-bottom: 1.5rem;
    }
    .filter-group label {
      display: block;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
    }
    select option {
      background: var(--bg-main);
      color: var(--text-main);
    }
    .results {
      flex: 1;
    }
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .results-count {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .news-card {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .news-card:hover {
      transform: translateY(-4px);
      border-color: rgba(212, 175, 55, 0.5);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }
    .category {
      color: var(--accent);
    }
    .country {
      color: var(--text-muted);
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.4;
      margin: 0 0 1rem 0;
      color: #fff;
    }
    .card-summary {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-muted);
      flex: 1;
    }
    .card-summary ul {
      margin: 0;
      padding-left: 1.2rem;
    }
    .card-summary li {
      margin-bottom: 0.25rem;
    }
    .card-footer {
      margin-top: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--glass-border);
      padding-top: 1rem;
    }
    .read-more {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .read-more:hover {
      color: var(--accent-hover);
    }
    .source {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .btn-clear {
      width: 100%;
      padding: 0.75rem 1rem;
      margin-top: 0.5rem;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-clear:hover {
      background: var(--accent);
      color: var(--bg-main);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }
    /* Simple CSS reset/scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: var(--bg-panel); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .filters {
        flex: none;
        width: 100%;
        position: static;
        box-sizing: border-box;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-container">
    <img src="logo.jpg" alt="TAP Logo" class="logo-img" onerror="this.style.display='none'">
    <div class="logo-text">Monitoramento<span>Internacional</span></div>
  </div>
  <div class="date-badge">17/07/2026</div>
</header>

<div class="container">
  <aside class="filters">
    <div class="filter-group">
      <label for="search">Busca / Search</label>
      <input type="text" id="search" placeholder="Palavra-chave...">
    </div>
    
    <div class="filter-group">
      <label for="lang">Idioma / Language</label>
      <select id="lang">
        <option value="pt">Português (PT-BR)</option>
        <option value="en">English (US)</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="country">País / Country</label>
      <select id="country">
        <option value="all">Todos / All</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="category">Categoria / Category</label>
      <select id="category">
        <option value="all">Todas / All</option>
      </select>
    </div>
    
    <button id="clear-filters" class="btn-clear">Limpar / Clear</button>
  </aside>

  <main class="results">
    <div class="results-header">
      <h2 style="margin: 0; font-size: 1.5rem; color: #fff;">Resultados</h2>
      <span class="results-count" id="count">0 notícias</span>
    </div>
    <div class="news-grid" id="grid">
      <!-- Injected by JS -->
    </div>
  </main>
</div>

<script>
  // Injeta os dados originais no frontend
  const data = [{"fonte":"G1","pais":"Brasil","titulo":"BC lança sistema que pode baratear juros em mercado trilionário de antecipação de vendas a prazo para empresas","resumo":"O Banco Central introduziu um novo sistema financeiro visando aumentar a eficiência no mercado de antecipação de recebíveis. A iniciativa promete reduzir significativamente as taxas de juros para empresas que dependem de vendas a prazo. Com essa inovação, espera-se uma maior liquidez e competitividade no setor, impactando positivamente o fluxo de caixa de diversos negócios brasileiros.","link":"https://g1.globo.com/economia/noticia/2026/07/17/bc-lanca-sistema-que-pode-baratear-juros-em-mercado-trilionario-de-antecipacao-de-vendas-a-prazo-para-empresas.ghtml","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"G1","pais":"Brasil","titulo":"Em Rio Grande, CIEX tem tecnologia pioneira para prevenção de desastres climáticos","resumo":"A cidade de Rio Grande implementou uma tecnologia de ponta desenvolvida pelo CIEX para monitoramento e prevenção de desastres naturais. O sistema utiliza análise avançada de dados para prever eventos climáticos extremos com maior precisão e rapidez. Esta solução pioneira é vista como um modelo essencial para aumentar a resiliência das cidades brasileiras frente às mudanças climáticas globais.","link":"https://g1.globo.com/rs/rio-grande-do-sul/videos-jornal-do-almoco-rs-bage-pelotas-e-rio-grande/video/em-rio-grande-ciex-tem-tecnologia-pioneira-para-prevencao-de-desastres-climaticos-14786370.ghtml","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"G1","pais":"Brasil","titulo":"Dona do ChatGPT lança teclado de R$ 1.000 para controlar agentes de IA; veja como ele funciona","resumo":"A OpenAI, criadora do ChatGPT, anunciou um novo dispositivo físico voltado especificamente para a interação com agentes de inteligência artificial. O teclado, avaliado em R$ 1.000, promete revolucionar a forma como usuários comandam fluxos de trabalho automatizados. O lançamento destaca a crescente integração entre hardware especializado e ecossistemas de software baseados em IA generativa.","link":"https://g1.globo.com/tecnologia/noticia/2026/07/17/dona-do-chatgpt-lanca-teclado-de-r-1000-para-controlar-agentes-de-ia-veja-como-ele-funciona.ghtml","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"G1","pais":"Brasil","titulo":"Mercado estratégico e tecnologia: por que grupo dos Emirados Árabes Unidos avança sobre a indústria de defesa brasileira","resumo":"Um grupo dos Emirados Árabes Unidos intensificou investimentos no setor de defesa do Brasil, atraído pela expertise tecnológica nacional. A parceria visa integrar capacidades produtivas e inovação tecnológica entre as duas nações. Este movimento estratégico fortalece a base industrial de defesa brasileira e reflete o aumento da cooperação internacional em segurança e tecnologia de ponta.","link":"https://g1.globo.com/sp/vale-do-paraiba-regiao/noticia/2026/07/17/mercado-estrategico-e-tecnologia-por-que-grupo-dos-emirados-arabes-unidos-avanca-sobre-a-industria-de-defesa-brasileira.ghtml","categoria":"DEFESA","lang":"pt"},{"fonte":"O GLOBO","pais":"Brasil","titulo":"Após crise com Michelle, Flávio Bolsonaro anuncia plano de governo voltado às mulheres com plataforma digital e IA própria","resumo":"O político Flávio Bolsonaro lançou uma nova proposta governamental focada no público feminino, baseada em uma plataforma digital exclusiva. O projeto promete utilizar inteligência artificial para personalizar o atendimento e o acesso a políticas públicas. A medida busca modernizar o diálogo entre o governo e as mulheres através de ferramentas tecnológicas e inovação digital.","link":"https://oglobo.globo.com/politica/noticia/2026/07/16/apos-crise-com-michelle-flavio-bolsonaro-anuncia-plano-de-governo-voltado-as-mulheres-com-plataforma-digital-e-ia-propria.ghtml","categoria":"POLÍTICA","lang":"pt"},{"fonte":"G1","pais":"Brasil","titulo":"PIX: Galípolo defende meio de pagamento alvo de contestação dos EUA; 'gratuito', 'seguro' e 'instantâneo'","resumo":"Gabriel Galípolo, diretor do Banco Central, reafirmou a importância do Pix diante de contestações internacionais, incluindo críticas recentes dos EUA. Ele destacou os pilares de gratuidade, segurança e instantaneidade que tornaram o sistema um sucesso absoluto no país. A declaração reforça o posicionamento brasileiro em defesa da soberania tecnológica e da eficiência do seu ecossistema de pagamentos digitais.","link":"https://g1.globo.com/economia/noticia/2026/07/16/pix-galipolo-defende-meio-de-pagamento-seguro-e-instantaneo.ghtml","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Prefeitura de São José dos Campos","pais":"Brasil","titulo":"Akaer passa a integrar grupo global de tecnologia e defesa","resumo":"A empresa brasileira Akaer consolidou sua posição no mercado internacional ao integrar um importante grupo global voltado à tecnologia e defesa. Esta movimentação amplia o acesso da companhia a novos mercados e cadeias de suprimentos de alta complexidade tecnológica. O passo reflete a expansão das capacidades da engenharia nacional no cenário de inovação e segurança global.","link":"https://www.sjc.sp.gov.br/noticias/2026/julho/16/akaer-passa-a-integrar-grupo-global-de-tecnologia-e-defesa/","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"PCGuia","pais":"Brasil","titulo":"Asus lança novos monitores ROG Swift OLED com tecnologia Tandem RGB e modo duplo","resumo":"A Asus atualizou sua linha de monitores gamers de alta performance com a introdução da tecnologia Tandem RGB. Estes novos dispositivos prometem entregar brilho superior e precisão de cores, elevando o padrão para experiências visuais em computadores. O lançamento destaca a evolução contínua dos hardwares de exibição voltados ao mercado de alta tecnologia e entretenimento digital.","link":"https://www.pcguia.pt/2026/07/asus-lanca-novos-monitores-rog-swift-oled-com-tecnologia-tandem-rgb-e-modo-duplo/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Farm Progress","pais":"Estados Unidos","titulo":"Nova tecnologia nuclear pode aliviar a crise hídrica no Ocidente","resumo":"Pesquisadores estão desenvolvendo tecnologias nucleares avançadas com potencial para transformar a dessalinização de água. Essa inovação promete fornecer uma fonte de energia limpa e eficiente para resolver a escassez de recursos hídricos em regiões críticas, impactando diretamente a sustentabilidade e a infraestrutura a longo prazo.","link":"https://www.farmprogress.com/technology/advanced-nuclear-technology-could-ease-western-water-crisis","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Reuters","pais":"Estados Unidos","titulo":"Equipe da Coreia do Sul e EUA revela tecnologia robótica que veste o usuário","resumo":"Cientistas dos Estados Unidos e da Coreia do Sul apresentaram um sistema robótico inovador capaz de vestir humanos automaticamente. Essa tecnologia assistiva possui um potencial revolucionário para auxiliar idosos e pessoas com mobilidade reduzida em tarefas cotidianas, aumentando significativamente a autonomia e a qualidade de vida dos usuários.","link":"https://www.reuters.com/world/asia-pacific/south-korea-us-team-unveils-robotic-technology-that-dresses-wearer-2026-07-17/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Retail Technology Innovation Hub","pais":"Estados Unidos","titulo":"Inovação tecnológica do varejo: shu uemura lança espelho com IA 3D em loja conceito","resumo":"A marca shu uemura introduziu um espelho inteligente equipado com IA 3D em sua principal loja, transformando a experiência de compra do consumidor. A tecnologia permite testes virtuais precisos e personalizados, marcando um novo patamar na integração entre ferramentas digitais avançadas e o setor de varejo de beleza nos EUA.","link":"https://retailtechinnovationhub.com/home/2026/7/16/retail-technology-innovation-of-the-week-shu-uemura-launches-ai-and-3d-powered-mirror-at-flagship-store","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Retail Technology Innovation Hub","pais":"Estados Unidos","titulo":"Kuehne+Nagel implementa plataforma tecnológica Blue Yonder em sua rede logística global","resumo":"A gigante da logística Kuehne+Nagel adotou a plataforma Blue Yonder para otimizar sua cadeia de suprimentos global através da tecnologia. A implementação visa melhorar a eficiência operacional, a visibilidade de dados e a resposta da rede a gargalos logísticos, fortalecendo a resiliência do setor em um mercado altamente dinâmico.","link":"https://retailtechinnovationhub.com/home/2026/7/16/kuehne-and-nagel-deploys-blue-yonder-technology-platform-across-companys-global-logistics-network","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Jornal de Negócios","pais":"Estados Unidos","titulo":"Pentágono investe 8,7 bilhões em novos projetos militares","resumo":"O Departamento de Defesa dos EUA anunciou um investimento massivo de 8,7 bilhões de dólares destinados a projetos militares de última geração. O aporte focará no desenvolvimento de capacidades estratégicas, incluindo inovações tecnológicas e sistemas de defesa, mantendo a supremacia americana em um cenário geopolítico cada vez mais digitalizado.","link":"https://www.jornaldenegocios.pt/economia/amp/pentagono-investe-8-7-mil-milhoes-em-novos-projetos-militares","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"NASA (.gov)","pais":"Estados Unidos","titulo":"Tripulação expandida trabalha em ciência, adaptação à microgravidade e próxima partida da equipe","resumo":"A tripulação da Estação Espacial Internacional está focada em experimentos científicos cruciais, estudando os efeitos da microgravidade no corpo humano. As descobertas são fundamentais para futuras missões de exploração espacial de longa duração e para o avanço do conhecimento humano sobre o comportamento biológico fora da Terra.","link":"https://www.nasa.gov/blogs/spacestation/2026/07/16/expanded-crew-works-science-microgravity-adaptation-and-next-crew-departure/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"TradingView","pais":"Estados Unidos","titulo":"Lançamento do Google Gemini é adiado por não atingir objetivos internos","resumo":"Relatórios indicam que o Google adiou o lançamento do seu aguardado modelo de inteligência artificial Gemini devido a falhas técnicas. O incidente reflete a crescente pressão sobre as empresas de tecnologia em relação à segurança e qualidade da IA, enquanto o setor busca superar desafios complexos para garantir resultados precisos.","link":"https://es.tradingview.com/news/reuters.com,2026:newsml_L8N43I1ZM:0/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"EurekAlert!","pais":"Estados Unidos","titulo":"Primeira atmosfera detectada em um mundo rochoso na zona habitável","resumo":"Astrônomos confirmaram a detecção inédita de uma atmosfera em um planeta rochoso situado na zona habitável de sua estrela. Esta descoberta científica é um marco na busca por vida fora do sistema solar, permitindo que pesquisadores analisem a composição atmosférica e determinem se tais mundos podem sustentar condições ideais.","link":"https://www.eurekalert.org/news-releases/1135901","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"L'Usine Nouvelle","pais":"França","titulo":"«Produzir ótica na França nos permite manter o controle e a confidencialidade da tecnologia»: Engo levanta mais de 5 milhões de euros para industrializar seus óculos conectados para atletas","resumo":"A startup francesa Engo garantiu um aporte de 5 milhões de euros para escalar a produção de seus óculos inteligentes voltados ao esporte. Ao optar pela fabricação local, a empresa busca assegurar maior controle tecnológico e sigilo industrial, fortalecendo a soberania produtiva da França no setor de dispositivos vestíveis de alto desempenho.","link":"https://www.usinenouvelle.com/eco-social/economie/start-up/produire-loptique-en-france-nous-permet-de-conserver-le-controle-et-la-confidentialite-de-la-technologie-engo-leve-plus-de-5-millions-deuros-pour-industrialiser-ses-lunettes-connectees-pour-sportifs.77C6JBKPBNAJTL3B2DZLHA6BUE.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"New Electronics","pais":"França","titulo":"FocalPoint e STMicroelectronics assinam acordo para aprimorar a tecnologia de posicionamento de veículos","resumo":"A FocalPoint e a STMicroelectronics formaram uma parceria estratégica para integrar tecnologias avançadas de processamento de sinais de GNSS em veículos. O objetivo é reduzir drasticamente erros de localização por satélite, aumentando significativamente a precisão necessária para o avanço dos sistemas de direção autônoma e segurança no tráfego urbano.","link":"https://www.newelectronics.co.uk/content/news/focalpoint-and-stmicroelectronics-sign-deal-to-enhance-vehicle-positioning-technology","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"lediplomate.media","pais":"França","titulo":"DECRYPTAGE – O hélio, a nova fronteira silenciosa da guerra econômica","resumo":"O hélio tornou-se um recurso estratégico crucial para a indústria de tecnologia e semicondutores, desencadeando uma nova dinâmica de disputa econômica global. Devido à sua escassez e importância em processos de refrigeração industrial e computação avançada, nações estão reavaliando suas cadeias de suprimentos para evitar dependências críticas que ameacem o progresso científico.","link":"https://lediplomate.media/decryptage-helium-nouveau-front-silencieux-guerre-economique/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"euractiv.com","pais":"França","titulo":"BeXyl fortalece a resposta baseada em ciência da Europa à Xylella fastidiosa","resumo":"O projeto europeu BeXyl consolida esforços científicos para combater a bactéria Xylella fastidiosa, que ameaça plantações vitais em todo o continente. Através de pesquisas integradas e monitoramento avançado, a iniciativa busca mitigar os impactos devastadores na agricultura e desenvolver estratégias sustentáveis para conter a disseminação da praga em território europeu.","link":"https://www.euractiv.com/opinion/bexyl-strengthens-europes-science-based-response-to-xylella-fastidiosa/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Retail Technology Innovation Hub","pais":"Inglaterra","titulo":"Tesco aposta em robôs e La-Z-Boy expande uso de 3D: as maiores notícias de tecnologia no varejo da semana","resumo":"O setor varejista britânico intensifica a integração tecnológica com o aumento da automação robótica no Tesco e a adoção de tecnologias 3D na La-Z-Boy. Essas inovações visam otimizar a eficiência operacional e aprimorar a experiência de compra do consumidor. O movimento reflete uma tendência crescente de digitalização para enfrentar os desafios logísticos modernos.","link":"https://retailtechinnovationhub.com/home/2026/7/16/tesco-doubles-down-on-robots-and-la-z-boy-expands-3d-use-this-weeks-biggest-retail-technology-stories","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"The Guardian","pais":"Inglaterra","titulo":"Implante cerebral ajuda homem paralisado a comer e beber sozinho","resumo":"Um avanço médico inovador realizado no Reino Unido utilizou um implante cerebral para restaurar a autonomia de um paciente paralisado. Através de interfaces cérebro-computador, foi possível controlar membros robóticos para tarefas cotidianas, como alimentar-se. Este marco científico representa uma esperança significativa para o tratamento de lesões medulares e a melhoria da qualidade de vida.","link":"https://www.theguardian.com/science/2026/jul/16/neural-bypass-brain-implant-paralysed-man-feed-himself-drink-from-cup","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Computer Hoy","pais":"Espanha","titulo":"Especialista em tecnologia transforma o Windows 11: \"Esta ferramenta gratuita serve para terminar o que a Microsoft deixou incompleto\"","resumo":"Um especialista em tecnologia desenvolveu uma ferramenta gratuita que visa otimizar e corrigir limitações nativas do Windows 11. A solução promete elevar a experiência do usuário, oferecendo ajustes finos que a Microsoft não implementou em suas atualizações oficiais. A novidade ganhou destaque entre entusiastas que buscam maior controle sobre o sistema operacional.","link":"https://computerhoy.20minutos.es/software/un-experto-tecnologia-cambia-por-completo-windows-11-esta-herramienta-gratuita-sirve-para-terminar-que-microsoft-dejo-incompleto_7015390_0.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"El Español","pais":"Espanha","titulo":"Esta é a tecnologia de Elon Musk que será instalada nas naves da NASA para comunicação com a Terra","resumo":"A tecnologia desenvolvida pela SpaceX de Elon Musk será integrada às futuras missões da NASA para garantir a comunicação com a Terra. Este avanço representa um passo crucial para manter a conectividade estável em missões espaciais de longa distância. A colaboração reforça a dependência tecnológica das agências espaciais em relação ao setor privado.","link":"https://www.elespanol.com/omicrono/tecnologia/20260717/tecnologia-elon-musk-instalara-naves-nasa-comunicarse-tierra/1003744324671_0.html","categoria":"CIÊNCIA ESPACIAL","lang":"pt"},{"fonte":"Artículo 14","pais":"Espanha","titulo":"Demis Hassabis alerta que a IA mais perigosa pode chegar em 18 meses","resumo":"Demis Hassabis, líder na vanguarda da inteligência artificial, emitiu um alerta sobre a velocidade do desenvolvimento de sistemas autônomos. Segundo o especialista, modelos com capacidades significativamente mais perigosas podem surgir no mercado dentro de apenas um ano e meio. A declaração reacende o debate global sobre segurança, regulação e controle ético da IA.","link":"https://www.articulo14.es/economia/demis-hassabis-alerta-de-que-la-ia-mas-peligrosa-puede-llegar-en-18-meses-20260717.html","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"Xataka","pais":"Espanha","titulo":"O mar de Benidorm aqueceu três graus em apenas cinco anos: o dado assusta, mas a ciência tem uma explicação","resumo":"O rápido aumento da temperatura das águas em Benidorm tem gerado preocupação ambiental e científica na Espanha. Pesquisadores explicam que este fenômeno climático local é resultado de mudanças nas correntes e padrões térmicos regionais recentes. O estudo serve como um alerta urgente sobre o impacto real das mudanças climáticas na infraestrutura turística e ecossistemas.","link":"https://www.xataka.com/ecologia-y-naturaleza/mar-benidorm-se-ha-calentado-tres-grados-solo-cinco-anos-dato-asusta-ciencia-tiene-explicacion","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"El Nacional.cat","pais":"Espanha","titulo":"Não é ficção científica: a NASA começa a preparar tecnologias para viver na Lua e em Marte","resumo":"A NASA iniciou oficialmente o desenvolvimento de tecnologias essenciais para estabelecer colônias humanas fora da Terra. Os planos abrangem desde sistemas de suporte à vida até infraestrutura de habitação adaptada para o solo lunar e marciano. O projeto marca uma nova era de exploração espacial focada na permanência sustentável no cosmos.","link":"https://www.elnacional.cat/es/tecnologia/no-es-ciencia-ficcion-nasa-empieza-preparar-tecnologias-vivir-en-luna-marte_1669553_102.html","categoria":"CIÊNCIA ESPACIAL","lang":"pt"},{"fonte":"Híbridos y Eléctricos","pais":"Espanha","titulo":"Com inovadora tecnologia australiana, 110.000 italianos recebem energia renovável gratuita de parque fotovoltaico em Múrcia","resumo":"Um projeto transnacional utiliza tecnologia fotovoltaica avançada instalada na Espanha para fornecer energia limpa à Itália. Esta iniciativa exemplifica como a inovação no setor de energias renováveis pode superar fronteiras geográficas para beneficiar milhares de cidadãos. O modelo destaca a eficiência da exportação energética através de redes inteligentes e sustentáveis.","link":"https://www.hibridosyelectricos.com/coches/con-innovadora-tecnologia-australiana-110000-italianos-reciben-electricidad-renovable-gratuita-parque-fotovoltaico-situado-en-murcia_87912_102.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Cinco Días","pais":"Espanha","titulo":"A revanche dos gigantes da IA: os centros de dados atraem analistas após as quedas do setor de chips","resumo":"Após um período de instabilidade no mercado de semicondutores, o foco dos investidores migrou para a infraestrutura de centros de dados de IA. Analistas apontam que a demanda massiva por poder computacional garante o crescimento contínuo desses ativos tecnológicos. A tendência indica uma recuperação estratégica focada em escalar a capacidade física da inteligência artificial.","link":"https://cincodias.elpais.com/mercados-financieros/2026-07-17/la-revancha-de-los-gigantes-de-la-ia-los-centros-de-datos-atraen-a-los-analistas-tras-las-caidas-del-chip.html","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"El Debate","pais":"Espanha","titulo":"Talaia, o supercomputador chamado a mudar a economia das Ilhas Baleares, capaz de trabalhar como 1.700 computadores ao mesmo tempo","resumo":"O novo supercomputador Talaia promete revolucionar o processamento de dados na região das Ilhas Baleares. Com capacidade computacional equivalente a 1.700 máquinas convencionais, a tecnologia será aplicada para impulsionar a inovação econômica local. O projeto representa um marco significativo na digitalização e análise complexa de informações em escala regional.","link":"https://www.eldebate.com/espana/baleares/20260717/talaia-supercomputador-llamado-cambiar-economia-balear-capaz-trabajar-como-1700-ordenadores-vez_440398.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Informationsdienst Wissenschaft","pais":"Alemanha","titulo":"Para uma melhor saúde bucal: Professor Marc Schneider recebe o Prêmio Phoenix de Ciência em Tecnologia Farmacêutica","resumo":"O professor Marc Schneider foi premiado por suas inovações na tecnologia farmacêutica voltada à saúde bucal. O reconhecimento destaca avanços científicos que prometem aprimorar tratamentos e a eficácia de produtos odontológicos. Esta conquista reforça a liderança alemã na pesquisa de novos métodos terapêuticos de alto impacto.","link":"https://idw-online.de/en/news874685","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Spektrum der Wissenschaft","pais":"Alemanha","titulo":"A energia nuclear está voltando com as mini usinas?","resumo":"O debate sobre a viabilidade das pequenas centrais nucleares ganha força na Alemanha como uma solução energética alternativa. Essas tecnologias prometem oferecer maior flexibilidade e segurança em comparação aos modelos tradicionais de grande escala. O tema levanta questões cruciais sobre a transição energética e o futuro do fornecimento de eletricidade no país.","link":"https://www.spektrum.de/podcast/mini-atomkraftwerke-kommt-die-kernenergie-zurueck/2335026","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"STERN.de","pais":"Alemanha","titulo":"Presidente chinês Xi apela à cooperação internacional em tecnologia de IA","resumo":"Em um movimento estratégico, o líder chinês Xi Jinping defende uma maior colaboração global no desenvolvimento da inteligência artificial. A proposta reflete as preocupações geopolíticas sobre a corrida tecnológica e a necessidade de padrões éticos comuns. A posição impacta diretamente a política externa da Alemanha frente aos gigantes da tecnologia.","link":"https://www.stern.de/news/chinas-praesident-xi-ruft-zu-kooperation-zwischen-staaten-bei-ki-technologie-auf-37978038.html","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"Bild der Wissenschaft","pais":"Alemanha","titulo":"Um novo olhar sobre os primórdios do universo","resumo":"Pesquisadores revelaram novas descobertas baseadas em observações astronômicas avançadas que oferecem pistas sobre a formação do cosmos. Estes dados desafiam teorias existentes e permitem uma compreensão mais profunda das condições físicas logo após o Big Bang. O estudo marca um avanço significativo na astrofísica moderna e no entendimento das nossas origens.","link":"https://wissenschaft.de/artikel/neuer-blick-in-die-urzeit-des-universums","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"kpmg.com","pais":"Alemanha","titulo":"IA generativa na economia alemã 2026 - Relatório do setor bancário","resumo":"Um novo relatório projeta a integração acelerada da inteligência artificial generativa no sistema bancário alemão até 2026. A análise aponta para mudanças estruturais na automação de processos e na experiência do cliente dentro das instituições financeiras. O documento serve como um guia estratégico para empresas que buscam se adaptar à crescente transformação digital.","link":"https://kpmg.com/de/de/themen/digital-transformation/kuenstliche-intelligenz/studie-generative-ki-in-der-deutschen-wirtschaft-2026/branchenreport-banking.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"北海道新聞デジタル","pais":"Japão","titulo":"Tecnologia de ponta de Taiwan é promovida em Tóquio com foco em IA e veículos elétricos","resumo":"Taiwan realizou um evento de destaque em Tóquio para apresentar suas inovações mais avançadas em inteligência artificial e mobilidade elétrica. A iniciativa visa fortalecer parcerias estratégicas com empresas japonesas. O movimento sublinha o papel central das tecnologias taiwanesas no ecossistema global de inovação tecnológica atual.","link":"https://www.hokkaido-np.co.jp/article/1339031/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"AERA DIGITAL","pais":"Japão","titulo":"Parceria entre Shibaura Institute of Technology e Suzuki usa IA para eliminar pontos cegos em carros autônomos","resumo":"Estudantes da Shibaura Institute of Technology colaboram com a Suzuki no desenvolvimento de sensores compactos inteligentes. A tecnologia utiliza inteligência artificial para mapear áreas que motoristas e sensores tradicionais não conseguem enxergar. Este projeto demonstra um avanço prático na segurança viária através da integração entre universidade e indústria.","link":"https://dot.asahi.com/articles/-/287313","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"innavi net","pais":"Japão","titulo":"Fujitsu inicia implementação de IA Física utilizando tecnologias da NVIDIA","resumo":"A Fujitsu anunciou o início de um projeto para implementar 'IA Física' na sociedade, aproveitando as capacidades de processamento da NVIDIA. A tecnologia visa integrar modelos virtuais ao mundo real para otimizar processos industriais e urbanos. O esforço marca um passo importante para a computação aplicada a problemas físicos complexos.","link":"https://www.innervision.co.jp/report/usual/20260804","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"newscast.jp","pais":"Japão","titulo":"Mercado global de impressão 4D: Previsões de crescimento entre 2026 e 2032","resumo":"Relatório recente detalha as perspectivas para o mercado de impressão 4D, analisando materiais, técnicas de estímulo e aplicações industriais. A tecnologia, que permite que objetos impressos alterem suas propriedades ou formas ao longo do tempo, deve ganhar tração significativa na próxima década. O estudo mapeia o impacto econômico e técnico dessa inovação disruptiva.","link":"https://newscast.jp/smart/news/3220930","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"PR TIMES","pais":"Japão","titulo":"Ciência do comportamento: Pesquisa utiliza economia comportamental para promover hábitos de saúde","resumo":"Um novo estudo conjunto busca decifrar por que indivíduos encontram dificuldades para adotar hábitos saudáveis, utilizando os chamados '23 Healthcare Drivers'. Através da ciência comportamental, o projeto desenvolve estratégias práticas para estimular mudanças positivas na rotina. A pesquisa oferece uma base científica para intervenções voltadas ao bem-estar e à saúde pública.","link":"https://prtimes.jp/main/html/rd/p/000000085.000089360.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"アットプレス","pais":"Japão","titulo":"Projeções globais para o mercado de testes e inspeções não destrutivas até 2032","resumo":"O mercado global de inspeções não destrutivas (NDT) está em fase de expansão tecnológica, com maior automação e novos métodos de análise. O relatório prevê transformações setoriais baseadas em inovação para garantir a integridade estrutural e de materiais. A adoção de novas tecnologias de sensor e dados impulsionará a eficiência e a segurança industrial.","link":"https://www.atpress.ne.jp/news/1940551","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"EE Times Japan","pais":"Japão","titulo":"Lam Research abre novo escritório em Yokkaichi para impulsionar inovação na tecnologia NAND","resumo":"A Lam Research consolidou suas operações em Yokkaichi ao unificar duas unidades em um novo escritório de tecnologia. O foco central é o suporte ao avanço das memórias NAND, essenciais para o armazenamento de dados moderno. O investimento reforça o compromisso da empresa com o ecossistema japonês de semicondutores.","link":"https://eetimes.itmedia.co.jp/ee/articles/2607/17/news037.html","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"jst.go.jp","pais":"Japão","titulo":"Simpósio público de 'IA para a Ciência' em 2026 destaca o futuro da pesquisa","resumo":"O simpósio 'AI for Science 2026' reúne especialistas para discutir a convergência entre inteligência artificial e descobertas científicas. O evento explora como a automação de dados e a IA generativa estão acelerando o desenvolvimento de novos materiais e teorias. A conferência é um marco para a comunidade acadêmica e tecnológica global.","link":"https://www.jst.go.jp/crds/sympo/20260917/index.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Devdiscourse","pais":"China","titulo":"Pequim lidera a revolução global de IA: A visão ousada de Xi Jinping","resumo":"O governo de Pequim consolidou uma estratégia agressiva para dominar o setor de inteligência artificial mundial. Sob a liderança de Xi Jinping, o país está investindo pesado em infraestrutura e governança digital para garantir soberania tecnológica. Essa visão impacta o equilíbrio geopolítico e o ritmo de inovação das empresas globais.","link":"https://www.devdiscourse.com/article/technology/3951772-beijing-leads-global-ai-revolution-xi-jinpings-bold-vision","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"观点网","pais":"China","titulo":"Lançamento do Panshi: Modelo de Fundação Científica 2.0","resumo":"A recente apresentação do Panshi 2.0 marca um avanço significativo no desenvolvimento de modelos de linguagem voltados especificamente para a ciência. A nova versão promete maior precisão na análise de dados complexos, auxiliando pesquisadores a resolverem problemas laboratoriais complexos. Esta evolução reflete a crescente competitividade chinesa em modelos de fundação.","link":"https://www.guandian.cn/article/20260717/574260.html","categoria":"IA","lang":"pt"},{"fonte":"科学网—新闻","pais":"China","titulo":"Divulgada a lista de vencedores do prêmio de ciência impulsionada por IA de 2026","resumo":"O prêmio de 2026 reconheceu os avanços mais notáveis em pesquisas científicas aceleradas por algoritmos inteligentes. A premiação destaca como a integração entre IA e métodos científicos tradicionais está encurtando o tempo de descoberta em áreas críticas. O evento reforça o compromisso da China com a liderança tecnológica científica global.","link":"https://news.sciencenet.cn/htmlnews/2026/7/568349.shtm","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"ダイヤモンド・オンライン","pais":"China","titulo":"Economia de dois níveis da China: Sucesso no setor de alta tecnologia e estagnação doméstica","resumo":"O cenário econômico chinês apresenta um contraste marcante entre o crescimento exponencial da tecnologia de ponta e a fragilidade do consumo interno. Enquanto o setor de alta tecnologia atrai investimentos maciços e inovação, o mercado doméstico enfrenta desafios significativos. Essa dicotomia exige atenção sobre a sustentabilidade a longo prazo do modelo econômico atual.","link":"https://diamond.jp/articles/-/395068","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Tagesspiegel","pais":"China","titulo":"Tecnologia: O líder da China, Xi Jinping, exige controle e abertura na IA","resumo":"Xi Jinping enfatizou a necessidade de equilibrar a regulação rigorosa com a promoção de um ambiente de inovação aberta em inteligência artificial. A diretriz busca mitigar riscos éticos e de segurança enquanto mantém o ritmo acelerado de pesquisa. A abordagem define as diretrizes regulatórias para as empresas de tecnologia no país.","link":"https://www.tagesspiegel.de/wirtschaft/technologie-chinas-staatschef-xi-fordert-kontrolle-und-offenheit-bei-ki-15848243.html","categoria":"POLÍTICA","lang":"pt"},{"fonte":"上观新闻","pais":"China","titulo":"Impulsionando a maré da IA: Competições de IA e poder computacional atingem o ápice","resumo":"A competição 'Shenzhi Cup' destacou inovações em inteligência artificial e capacidade de processamento de dados. O evento reuniu talentos focados em elevar o desempenho de hardware e softwares complexos para aplicações industriais. A iniciativa visa fortalecer a infraestrutura de computação necessária para sustentar a próxima fase tecnológica chinesa.","link":"https://www.jfdaily.com/news/detail?id=1145812","categoria":"EVENTO","lang":"pt"},{"fonte":"北航新闻网","pais":"China","titulo":"Resultados da Faculdade de Ciência e Engenharia de Circuitos Integrados da Beihang publicados na 'Science Bulletin'","resumo":"A prestigiada revista Science Bulletin publicou avanços significativos desenvolvidos pela Universidade Beihang na área de circuitos integrados. As novas descobertas prometem otimizar a eficiência de componentes eletrônicos fundamentais para o setor de semicondutores. O estudo reforça a relevância das universidades chinesas na pesquisa de base da engenharia mundial.","link":"http://news.buaa.edu.cn/info/1005/69491.htm","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"ArchDaily","pais":"China","titulo":"Schmidt Hammer Lassen projeta incubadora de tecnologia em Xangai","resumo":"O escritório de arquitetura Schmidt Hammer Lassen foi selecionado para projetar um novo polo de inovação em Xangai focado em startups tecnológicas. O projeto visa criar um ecossistema colaborativo que une design moderno, sustentabilidade e infraestrutura digital de ponta. A iniciativa demonstra o foco da cidade em atrair talentos e empresas inovadoras.","link":"https://www.archdaily.com.br/pt/880119/schmidt-hammer-lassen-projeta-incubadora-de-empresas-de-tecnologia-em-xangai/59c1041ab22e38903e000041-schmidt-hammer-lassen-breaks-ground-on-glass-box-headquarters-of-creative-incubator-in-china-image","categoria":"ARQUITETURA","lang":"pt"},{"fonte":"Lapaas Voice","pais":"Índia","titulo":"Grupo Tata aposta em tecnologia de chips madura para entrada na fabricação de semicondutores","resumo":"O Grupo Tata está estrategicamente focando em tecnologias de semicondutores já consolidadas para viabilizar sua entrada no mercado de fabricação de chips. A decisão visa reduzir riscos operacionais e acelerar a capacidade de produção nacional na Índia. O movimento marca um passo decisivo para fortalecer a autonomia tecnológica e industrial do país no setor global de eletrônicos.","link":"https://voice.lapaas.com/tata-group-bets-on-mature-chip-technology-for-semiconductor-manufacturing-entry/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Devdiscourse","pais":"Índia","titulo":"O salto da Índia para a tecnologia ferroviária movida a hidrogênio","resumo":"A Índia está avançando significativamente na implementação de trens movidos a hidrogênio para modernizar seu sistema ferroviário. Esta tecnologia visa substituir combustíveis fósseis, alinhando-se aos objetivos nacionais de sustentabilidade e redução da pegada de carbono. O projeto promete revolucionar o transporte de passageiros através de soluções de engenharia verde e eficiente.","link":"https://www.devdiscourse.com/article/business/3951764-indias-leap-into-hydrogen-powered-rail-technology","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"India Today","pais":"Índia","titulo":"Como funciona o primeiro trem de hidrogênio da Índia? A ciência por trás do motor verde","resumo":"A introdução da tecnologia de hidrogênio nas ferrovias indianas representa um marco científico para o país. O motor utiliza a reação eletroquímica do hidrogênio para gerar energia limpa, emitindo apenas vapor de água como subproduto. Essa inovação detalha o compromisso técnico com a transição energética e a sustentabilidade no setor de infraestrutura pesada.","link":"https://www.indiatoday.in/science/story/how-does-indias-first-hydrogen-train-work-the-science-behind-the-green-engine-2949722-2026-07-17","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Exchange4Media","pais":"Índia","titulo":"Como criadores regionais estão remodelando a economia de influenciadores da Índia","resumo":"O cenário digital indiano está passando por uma transformação com a ascensão de criadores de conteúdo regionais que alcançam públicos fora das grandes metrópoles. Este fenômeno está mudando as estratégias de marketing e impulsionando uma economia diversificada baseada em nichos culturais. O impacto reflete a crescente penetração da internet e a força das linguagens locais no engajamento moderno.","link":"https://www.exchange4media.com/influence-zone-news/how-regional-creators-are-reshaping-indias-influencer-economy-156428.html","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"Business Standard","pais":"Índia","titulo":"Tata Electronics lançará a primeira fábrica de chips da Índia usando tecnologia de legado","resumo":"A Tata Electronics anunciou o lançamento da sua primeira unidade fabril de semicondutores, focando inicialmente em tecnologias de fabricação maduras. A estratégia permite à empresa estabelecer uma infraestrutura de produção robusta antes de migrar para projetos de chips mais complexos. Este é um esforço fundamental para transformar a Índia em um hub global de manufatura tecnológica.","link":"https://www.business-standard.com/companies/news/tata-electronics-to-launch-india-s-first-chip-fab-using-older-technology-126071700161_1.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Indian Council Of Agricultural Research","pais":"Índia","titulo":"ICAR celebra 98º aniversário e reafirma compromisso com a transformação agrícola liderada pela ciência","resumo":"O Conselho Indiano de Pesquisa Agrícola (ICAR) celebrou quase um século de dedicação ao desenvolvimento rural e tecnológico. A instituição destacou a importância de integrar avanços científicos, como biotecnologia e análise de dados, para otimizar a produtividade no campo. O foco permanece na segurança alimentar nacional através da inovação persistente em práticas agrícolas.","link":"https://icar.org.in/en/icar-celebrates-98th-foundation-day-reaffirms-commitment-science-led-agricultural-transformation","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"The Hindu","pais":"Índia","titulo":"‘Uma Nação, Um Tempo’: Inaugurada demonstração de rede baseada em tecnologia White Rabbit","resumo":"Uma nova rede baseada no protocolo de sincronização White Rabbit foi inaugurada, prometendo precisão de tempo em nível de sub-nanosegundos para a infraestrutura nacional. Essa tecnologia é crucial para setores que exigem coordenação absoluta, como telecomunicações, redes elétricas inteligentes e sistemas financeiros. O lançamento demonstra a capacidade tecnológica da Índia em adotar padrões de conectividade de ponta.","link":"https://www.thehindu.com/news/national/karnataka/one-nation-one-time-white-rabbit-technology-based-network-demonstration-inaugurated/article71231217.ece","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"NDTV","pais":"Índia","titulo":"'Muitos vêm e vão': Ministro da Ciência minimiza pedidos de demissão na ISRO","resumo":"O Ministro da Ciência da Índia comentou sobre a rotatividade de funcionários na Organização de Pesquisa Espacial Indiana (ISRO), desdramatizando as recentes saídas. Ele enfatizou que o fluxo de talentos é natural e não afeta os projetos ambiciosos e o progresso espacial contínuo do país. A declaração busca transmitir estabilidade institucional diante dos desafios operacionais da exploração espacial.","link":"https://www.ndtv.com/india-news/nuclear-plant-concerns-isro-staff-policy-science-minister-jitendra-singh-answers-queries-11779591","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Correio da Manhã","pais":"Portugal","titulo":"Netflix revela ter usado IA em 300 produções este ano","resumo":"A Netflix confirmou a integração de inteligência artificial em centenas de produções ao longo deste ano. A tecnologia tem sido utilizada para otimizar fluxos de trabalho e aprimorar efeitos visuais. A estratégia marca uma mudança significativa na indústria do entretenimento global.","link":"https://www.cmjornal.pt/tecnologia/detalhe/netflix-revela-ter-usado-ia-em-300-producoes-este-ano","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Dinheiro Vivo","pais":"Portugal","titulo":"Guterres alerta contra controle da IA por “um punhado de países ou empresas”","resumo":"O secretário-geral da ONU, António Guterres, manifestou preocupação com a centralização do poder tecnológico global. Ele defende uma governança mais inclusiva para evitar desigualdades sociais e econômicas profundas. O alerta destaca os riscos geopolíticos impostos pelo rápido avanço da inteligência artificial.","link":"http://dinheirovivo.dn.pt/economia/guterres-alerta-contra-controlo-da-ia-por-um-punhado-de-pases-ou-empresas","categoria":"CIÊNCIA POLÍTICA","lang":"pt"},{"fonte":"techbit.pt","pais":"Portugal","titulo":"Samsung revela a Flex Titanium: nova tecnologia para telas dobráveis","resumo":"A Samsung apresentou a inovadora tecnologia Flex Titanium, focada na próxima geração de dispositivos móveis dobráveis. O material promete maior durabilidade e resistência contra desgastes físicos do uso cotidiano. Esta evolução reforça a liderança da empresa no mercado de telas flexíveis.","link":"https://techbit.pt/samsung-flex-titanium-nova-tecnologia-ecras-dobraveis/","categoria":"LANÇAMENTO","lang":"pt"},{"fonte":"Jornal Económico","pais":"Portugal","titulo":"Retorno do investimento em IA acelera nas empresas com adoção crescente e IA agêntica, diz estudo","resumo":"Um estudo recente aponta que as empresas estão alcançando resultados financeiros mais rápidos com a implementação de IA agêntica. A transição de ferramentas simples para sistemas autônomos tem impulsionado a eficiência operacional. O relatório destaca como a estratégia corporativa está mudando diante da automação inteligente.","link":"https://jornaleconomico.sapo.pt/noticias/retorno-do-investimento-em-ia-acelera-nas-empresas-com-adocao-crescente-e-ia-agentica-diz-estudo/","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Expresso","pais":"Portugal","titulo":"Como a IA pode servir à mesa comida sob medida: “Podemos fazer alimentos dirigidos a grupos específicos de pessoas”","resumo":"Pesquisadores exploram a utilização de inteligência artificial para criar dietas personalizadas baseadas em necessidades nutricionais específicas. A tecnologia permite otimizar a produção de alimentos para diferentes grupos demográficos, melhorando a saúde pública. Esta aplicação representa uma mudança no paradigma da nutrição moderna.","link":"https://expresso.pt/sociedade/ciencia/2026-07-16-como-a-ia-pode-servir-a-mesa-comida-a-medida-podemos-fazer-alimentos-dirigidos-a-grupos-especificos-de-pessoas-55758d09","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Jornal Económico","pais":"Portugal","titulo":"Tecnologia portuguesa Dotmoovs cria plataforma de detecção de talentos desportivos com IA e blockchain","resumo":"A startup portuguesa Dotmoovs desenvolveu uma plataforma inovadora que utiliza inteligência artificial e blockchain para identificar novos talentos no desporto. O sistema analisa movimentos dos atletas remotamente, democratizando o acesso a oportunidades profissionais. A solução coloca Portugal no radar da inovação tecnológica aplicada ao esporte.","link":"https://jornaleconomico.sapo.pt/noticias/tecnologia-portuguesa-dotmoovs-cria-plataforma-de-detecao-de-talentos-desportivos-com-ia-e-blockchain/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"SÁBADO","pais":"Portugal","titulo":"Vacina experimental para prevenir câncer do pâncreas com resultados positivos","resumo":"Estudos recentes trazem esperança com uma vacina experimental capaz de prevenir o câncer de pâncreas em pacientes de alto risco. Os resultados clínicos demonstram eficácia na resposta do sistema imunitário contra células tumorais específicas. Esta descoberta pode salvar milhares de vidas futuramente se comprovada a longo prazo.","link":"https://www.sabado.pt/ciencia---saude/detalhe/vacina-experimental-para-prevenir-cancro-do-pancreas-com-resultados-positivos","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Meteored Portugal","pais":"Portugal","titulo":"Trás-os-Montes usa tecnologia pioneira para travar o avanço dos fogos rurais","resumo":"A região de Trás-os-Montes implementou um sistema tecnológico avançado para monitorizar e combater incêndios rurais com maior rapidez. A solução integra sensores e processamento de dados em tempo real para otimizar a resposta das equipas no terreno. Este projeto é vital para a preservação ambiental da região.","link":"https://www.tempo.pt/noticias/actualidade/tras-os-montes-usa-tecnologia-pioneira-para-travar-o-avanco-dos-fogos-rurais.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"G1","pais":"Brazil","titulo":"Central Bank launches system to lower interest rates in the multi-trillion dollar receivables market for businesses","resumo":"The Central Bank has introduced a new financial system aimed at increasing efficiency in the receivables discounting market. The initiative promises to significantly reduce interest rates for companies that rely on credit sales. This innovation is expected to boost liquidity and competitiveness in the sector, positively impacting the cash flow of many Brazilian businesses.","link":"https://g1.globo.com/economia/noticia/2026/07/17/bc-lanca-sistema-que-pode-baratear-juros-em-mercado-trilionario-de-antecipacao-de-vendas-a-prazo-para-empresas.ghtml","categoria":"BUSINESS","lang":"en"},{"fonte":"G1","pais":"Brazil","titulo":"In Rio Grande, CIEX features pioneering technology for climate disaster prevention","resumo":"The city of Rio Grande has implemented cutting-edge technology developed by CIEX for the monitoring and prevention of natural disasters. The system uses advanced data analysis to predict extreme weather events with greater precision and speed. This pioneering solution is seen as an essential model for increasing the resilience of Brazilian cities against global climate change.","link":"https://g1.globo.com/rs/rio-grande-do-sul/videos-jornal-do-almoco-rs-bage-pelotas-e-rio-grande/video/em-rio-grande-ciex-tem-tecnologia-pioneira-para-prevencao-de-desastres-climaticos-14786370.ghtml","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"G1","pais":"Brazil","titulo":"ChatGPT owner launches $1,000 keyboard to control AI agents; here is how it works","resumo":"OpenAI, the creator of ChatGPT, has announced a new physical device specifically designed for interacting with artificial intelligence agents. The keyboard, priced at R$ 1,000, promises to revolutionize how users manage automated workflows. The launch highlights the growing integration between specialized hardware and generative AI-based software ecosystems.","link":"https://g1.globo.com/tecnologia/noticia/2026/07/17/dona-do-chatgpt-lanca-teclado-de-r-1000-para-controlar-agentes-de-ia-veja-como-ele-funciona.ghtml","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"G1","pais":"Brazil","titulo":"Strategic market and technology: why a UAE group is moving into the Brazilian defense industry","resumo":"A group from the United Arab Emirates has stepped up investments in Brazil's defense sector, attracted by national technological expertise. The partnership aims to integrate production capabilities and technological innovation between the two nations. This strategic move strengthens the Brazilian defense industrial base and reflects increased international cooperation in security and high-end technology.","link":"https://g1.globo.com/sp/vale-do-paraiba-regiao/noticia/2026/07/17/mercado-estrategico-e-tecnologia-por-que-grupo-dos-emirados-arabes-unidos-avanca-sobre-a-industria-de-defesa-brasileira.ghtml","categoria":"DEFENSE","lang":"en"},{"fonte":"O GLOBO","pais":"Brazil","titulo":"Following crisis with Michelle, Flávio Bolsonaro announces government plan for women with digital platform and proprietary AI","resumo":"Politician Flávio Bolsonaro has launched a new government proposal focused on women, based on an exclusive digital platform. The project promises to use artificial intelligence to personalize service and access to public policies. The measure seeks to modernize the dialogue between the government and women through technological tools and digital innovation.","link":"https://oglobo.globo.com/politica/noticia/2026/07/16/apos-crise-com-michelle-flavio-bolsonaro-anuncia-plano-de-governo-voltado-as-mulheres-com-plataforma-digital-e-ia-propria.ghtml","categoria":"POLITICS","lang":"en"},{"fonte":"G1","pais":"Brazil","titulo":"PIX: Galípolo defends payment method targeted by US criticism; 'free', 'secure' and 'instant'","resumo":"Gabriel Galípolo, a director at the Central Bank, reaffirmed the importance of Pix in the face of international questioning, including recent criticisms from the US. He highlighted the pillars of being free, secure, and instant, which have made the system an absolute success in the country. The statement reinforces Brazil's position in defense of its technological sovereignty and the efficiency of its digital payment ecosystem.","link":"https://g1.globo.com/economia/noticia/2026/07/16/pix-galipolo-defende-meio-de-pagamento-seguro-e-instantaneo.ghtml","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Prefeitura de São José dos Campos","pais":"Brazil","titulo":"Akaer joins global technology and defense group","resumo":"Brazilian company Akaer has solidified its position in the international market by joining a major global group focused on technology and defense. This move expands the company's access to new markets and highly complex technology supply chains. The step reflects the expansion of national engineering capabilities in the global innovation and security landscape.","link":"https://www.sjc.sp.gov.br/noticias/2026/julho/16/akaer-passa-a-integrar-grupo-global-de-tecnologia-e-defesa/","categoria":"BUSINESS","lang":"en"},{"fonte":"PCGuia","pais":"Brazil","titulo":"Asus launches new ROG Swift OLED monitors with Tandem RGB and dual-mode technology","resumo":"Asus has updated its line of high-performance gaming monitors with the introduction of Tandem RGB technology. These new devices promise to deliver superior brightness and color accuracy, raising the standard for visual experiences on computers. The launch highlights the continuous evolution of display hardware aimed at the high-tech and digital entertainment market.","link":"https://www.pcguia.pt/2026/07/asus-lanca-novos-monitores-rog-swift-oled-com-tecnologia-tandem-rgb-e-modo-duplo/","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Farm Progress","pais":"United States","titulo":"New nuclear technology could ease the water crisis in the West","resumo":"Researchers are developing advanced nuclear technologies with the potential to transform water desalination. This innovation promises to provide a clean and efficient energy source to solve water scarcity in critical regions, directly impacting long-term sustainability and infrastructure.","link":"https://www.farmprogress.com/technology/advanced-nuclear-technology-could-ease-western-water-crisis","categoria":"SCIENCE","lang":"en"},{"fonte":"Reuters","pais":"United States","titulo":"South Korea and US team unveil robotic technology that dresses the wearer","resumo":"Scientists from the United States and South Korea have unveiled an innovative robotic system capable of automatically dressing humans. This assistive technology has revolutionary potential to help the elderly and people with reduced mobility with daily tasks, significantly increasing user autonomy and quality of life.","link":"https://www.reuters.com/world/asia-pacific/south-korea-us-team-unveils-robotic-technology-that-dresses-wearer-2026-07-17/","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Retail Technology Innovation Hub","pais":"United States","titulo":"Retail technology innovation: shu uemura launches 3D AI mirror at flagship store","resumo":"The brand shu uemura has introduced an intelligent mirror equipped with 3D AI in its flagship store, transforming the consumer shopping experience. The technology allows for precise, personalized virtual try-ons, marking a new benchmark in the integration of advanced digital tools and the US beauty retail sector.","link":"https://retailtechinnovationhub.com/home/2026/7/16/retail-technology-innovation-of-the-week-shu-uemura-launches-ai-and-3d-powered-mirror-at-flagship-store","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Retail Technology Innovation Hub","pais":"United States","titulo":"Kuehne+Nagel deploys Blue Yonder technology platform across global logistics network","resumo":"Logistics giant Kuehne+Nagel has adopted the Blue Yonder platform to optimize its global supply chain through technology. The implementation aims to improve operational efficiency, data visibility, and network responsiveness to logistical bottlenecks, strengthening the sector's resilience in a highly dynamic market.","link":"https://retailtechinnovationhub.com/home/2026/7/16/kuehne-and-nagel-deploys-blue-yonder-technology-platform-across-companys-global-logistics-network","categoria":"BUSINESS","lang":"en"},{"fonte":"Jornal de Negócios","pais":"United States","titulo":"Pentagon invests 8.7 billion in new military projects","resumo":"The US Department of Defense has announced a massive 8.7 billion dollar investment in next-generation military projects. The funding will focus on developing strategic capabilities, including technological innovations and defense systems, to maintain American supremacy in an increasingly digitized geopolitical landscape.","link":"https://www.jornaldenegocios.pt/economia/amp/pentagono-investe-8-7-mil-milhoes-em-novos-projetos-militares","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"NASA (.gov)","pais":"United States","titulo":"Expanded crew works on science, microgravity adaptation, and next crew departure","resumo":"The International Space Station crew is focused on crucial scientific experiments, studying the effects of microgravity on the human body. The findings are fundamental for future long-duration space exploration missions and for advancing human understanding of biological behavior outside of Earth.","link":"https://www.nasa.gov/blogs/spacestation/2026/07/16/expanded-crew-works-science-microgravity-adaptation-and-next-crew-departure/","categoria":"SCIENCE","lang":"en"},{"fonte":"TradingView","pais":"United States","titulo":"Google Gemini launch delayed for missing internal targets","resumo":"Reports indicate that Google has delayed the launch of its highly anticipated Gemini artificial intelligence model due to technical failures. The incident reflects the growing pressure on tech companies regarding AI safety and quality, as the sector works to overcome complex challenges to ensure accurate results.","link":"https://es.tradingview.com/news/reuters.com,2026:newsml_L8N43I1ZM:0/","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"EurekAlert!","pais":"United States","titulo":"First atmosphere detected on a rocky world in the habitable zone","resumo":"Astronomers have confirmed the first-ever detection of an atmosphere on a rocky planet located in its star's habitable zone. This scientific discovery is a milestone in the search for life beyond the solar system, allowing researchers to analyze atmospheric composition and determine if such worlds can support ideal conditions.","link":"https://www.eurekalert.org/news-releases/1135901","categoria":"SCIENCE","lang":"en"},{"fonte":"L'Usine Nouvelle","pais":"France","titulo":"\"Producing optics in France allows us to maintain control and technological encieux-guerre-economique/","categoria":"SCIENCE","lang":"en"},{"fonte":"euractiv.com","pais":"France","titulo":"BeXyl strengthens Europe's science-based response to Xylella fastidiosa","resumo":"The European BeXyl project consolidates scientific efforts to combat the Xylella fastidiosa bacterium, which threatens vital crops across the continent. Through integrated research and advanced monitoring, the initiative seeks to mitigate devastating agricultural impacts and develop sustainable strategies to contain the plague's spread within European territory.","link":"https://www.euractiv.com/opinion/bexyl-strengthens-europes-science-based-response-to-xylella-fastidiosa/","categoria":"SCIENCE","lang":"en"},{"fonte":"Retail Technology Innovation Hub","pais":"England","titulo":"Tesco bets on robots and La-Z-Boy expands 3D use: the week's biggest retail technology stories","resumo":"The British retail sector is intensifying technological integration with the increase of robotic automation at Tesco and the adoption of 3D technologies at La-Z-Boy. These innovations aim to optimize operational efficiency and enhance the consumer shopping experience. The movement reflects a growing trend of digitalization to tackle modern logistical challenges.","link":"https://retailtechinnovationhub.com/home/2026/7/16/tesco-doubles-down-on-robots-and-la-z-boy-expands-3d-use-this-weeks-biggest-retail-technology-stories","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"The Guardian","pais":"England","titulo":"Brain implant helps paralyzed man eat and drink on his own","resumo":"A groundbreaking medical advance in the UK has utilized a brain implant to restore autonomy to a paralyzed patient. Through brain-computer interfaces, the patient was able to control robotic limbs for daily tasks such as eating. This scientific milestone represents significant hope for the treatment of spinal cord injuries and the improvement of quality of life.","link":"https://www.theguardian.com/science/2026/jul/16/neural-bypass-brain-implant-paralysed-man-feed-himself-drink-from-cup","categoria":"SCIENCE","lang":"en"},{"fonte":"Computer Hoy","pais":"Spain","titulo":"Tech expert transforms Windows 11: \"This free tool serves to finish what Microsoft left incomplete\"","resumo":"A tech expert has developed a free tool aimed at optimizing and fixing native limitations of Windows 11. The solution promises to elevate the user experience, offering fine-tuning adjustments that Microsoft has not implemented in its official updates. The novelty has gained traction among enthusiasts seeking greater control over the operating system.","link":"https://computerhoy.20minutos.es/software/un-experto-tecnologia-cambia-por-completo-windows-11-esta-herramienta-gratuita-sirve-para-terminar-que-microsoft-dejo-incompleto_7015390_0.html","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"El Español","pais":"Spain","titulo":"This is Elon Musk's technology that will be installed on NASA spacecraft for communication with Earth","resumo":"Technology developed by Elon Musk's SpaceX will be integrated into future NASA missions to ensure communication with Earth. This advancement represents a crucial step in maintaining stable connectivity for long-distance space missions. The collaboration reinforces the space agencies' technological dependence on the private sector.","link":"https://www.elespanol.com/omicrono/tecnologia/20260717/tecnologia-elon-musk-instalara-naves-nasa-comunicarse-tierra/1003744324671_0.html","categoria":"SPACE SCIENCE","lang":"en"},{"fonte":"Artículo 14","pais":"Spain","titulo":"Demis Hassabis warns that the most dangerous AI could arrive in 18 months","resumo":"Demis Hassabis, a leader at the forefront of artificial intelligence, has issued a warning about the pace of autonomous system development. According to the expert, models with significantly more dangerous capabilities could emerge on the market within just a year and a half. The statement reignites the global debate on security, regulation, and ethical control of AI.","link":"https://www.articulo14.es/economia/demis-hassabis-alerta-de-que-la-ia-mas-peligrosa-puede-llegar-en-18-meses-20260717.html","categoria":"TRENDING TOPICS","lang":"en"},{"fonte":"Xataka","pais":"Spain","titulo":"The sea off Benidorm has warmed three degrees in just five years: the data is scary, but science has an explanation","resumo":"The rapid rise in water temperatures in Benidorm has generated environmental and scientific concern in Spain. Researchers explain that this local climatic phenomenon is a result of recent changes in regional currents and thermal patterns. The study serves as an urgent alert about the real impact of climate change on tourist infrastructure and ecosystems.","link":"https://www.xataka.com/ecologia-y-naturaleza/mar-benidorm-se-ha-calentado-tres-grados-solo-cinco-anos-dato-asusta-ciencia-tiene-explicacion","categoria":"SCIENCE","lang":"en"},{"fonte":"El Nacional.cat","pais":"Spain","titulo":"It's not science fiction: NASA begins preparing technologies to live on the Moon and Mars","resumo":"NASA has officially begun developing technologies essential for establishing human colonies beyond Earth. Plans range from life-support systems to housing infrastructure adapted for lunar and Martian soil. The project marks a new era of space exploration focused on sustainable permanence in the cosmos.","link":"https://www.elnacional.cat/es/tecnologia/no-es-ciencia-ficcion-nasa-empieza-preparar-tecnologias-vivir-en-luna-marte_1669553_102.html","categoria":"SPACE SCIENCE","lang":"en"},{"fonte":"Híbridos y Eléctricos","pais":"Spain","titulo":"With innovative Australian technology, 110,000 Italians receive free renewable energy from a photovoltaic park in Murcia","resumo":"A transnational project utilizes advanced photovoltaic technology installed in Spain to provide clean energy to Italy. This initiative exemplifies how innovation in the renewable energy sector can cross geographical borders to benefit thousands of citizens. The model highlights the efficiency of energy export through smart and sustainable grids.","link":"https://www.hibridosyelectricos.com/coches/con-innovadora-tecnologia-australiana-110000-italianos-reciben-electricidad-renovable-gratuita-parque-fotovoltaico-situado-en-murcia_87912_102.html","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Cinco Días","pais":"Spain","titulo":"The revenge of the AI giants: data centers attract analysts after the chip sector crashes","resumo":"After a period of instability in the semiconductor market, investors' focus has shifted to AI data center infrastructure. Analysts point out that the massive demand for computational power ensures the continued growth of these tech assets. The trend indicates a strategic recovery focused on scaling the physical capacity of artificial intelligence.","link":"https://cincodias.elpais.com/mercados-financieros/2026-07-17/la-revancha-de-los-gigantes-de-la-ia-los-centros-de-datos-atraen-a-los-analistas-tras-las-caidas-del-chip.html","categoria":"BUSINESS","lang":"en"},{"fonte":"El Debate","pais":"Spain","titulo":"Talaia, the supercomputer destined to change the Balearic Islands' economy, capable of working like 1,700 computers at once","resumo":"The new supercomputer Talaia promises to revolutionize data processing in the Balearic Islands region. With computational capacity equivalent to 1,700 conventional machines, the technology will be applied to boost local economic innovation. The project represents a significant milestone in digitalization and complex information analysis on a regional scale.","link":"https://www.eldebate.com/espana/baleares/20260717/talaia-supercomputador-llamado-cambiar-economia-balear-capaz-trabajar-como-1700-ordenadores-vez_440398.html","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Informationsdienst Wissenschaft","pais":"Germany","titulo":"For Better Oral Health: Professor Marc Schneider Receives the Phoenix Science Award in Pharmaceutical Technology","resumo":
