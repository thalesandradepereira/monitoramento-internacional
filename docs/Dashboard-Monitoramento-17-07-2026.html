rket is in a phase of technological expansion, with increased automation and new analysis methods. The report predicts sector-wide transformations based on innovation to ensure structural and material integrity. The adoption of new sensor and data technologies will boost industrial efficiency and safety.","link":"https://www.atpress.ne.jp/news/1940551","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"EE Times Japan","pais":"Japan","titulo":"Lam Research Opens New Office in Yokkaichi to Boost NAND Technology Innovation","resumo":"Lam Research has consolidated its Yokkaichi operations by unifying two units into a new technology office. The central focus is supporting the advancement of NAND memory, which is essential for modern data storage. The investment reinforces the company's commitment to the Japanese semiconductor ecosystem.","link":"https://eetimes.itmedia.co.jp/ee/articles/2607/17/news037.html","categoria":"BUSINESS","lang":"en"},{"fonte":"jst.go.jp","pais":"Japan","titulo":"2026 'AI for Science' Public Symposium Highlights the Future of Research","resumo":"The 'AI for Science 2026' symposium brings together experts to discuss the convergence of artificial intelligence and scientific discovery. The event explores how data automation and generative AI are accelerating the development of new materials and theories. The conference is a milestone for the global academic and technological community.","link":"https://www.jst.go.jp/crds/sympo/20260917/index.html","categoria":"SCIENCE","lang":"en"},{"fonte":"Devdiscourse","pais":"China","titulo":"Beijing Leads the Global AI Revolution: Xi Jinping's Bold Vision","resumo":"The Beijing government has consolidated an aggressive strategy to dominate the global artificial intelligence sector. Under the leadership of Xi Jinping, the country is investing heavily in infrastructure and digital governance to ensure technological sovereignty. This vision impacts the geopolitical balance and the pace of innovation for global companies.","link":"https://www.devdiscourse.com/article/technology/3951772-beijing-leads-global-ai-revolution-xi-jinpings-bold-vision","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"观点网","pais":"China","titulo":"Launch of Panshi: Scientific Foundation Model 2.0","resumo":"The recent unveiling of Panshi 2.0 marks a significant advance in the development of language models specifically aimed at science. The new version promises greater precision in analyzing complex data, assisting researchers in solving complex laboratory problems. This evolution reflects growing Chinese competitiveness in foundation models.","link":"https://www.guandian.cn/article/20260717/574260.html","categoria":"AI","lang":"en"},{"fonte":"科学网—新闻","pais":"China","titulo":"2026 AI-Driven Science Award Winners Announced","resumo":"The 2026 awards recognized the most notable breakthroughs in scientific research accelerated by intelligent algorithms. The ceremony highlights how the integration of AI and traditional scientific methods is shortening discovery timelines in critical fields. The event reinforces China's commitment to global leadership in scientific technology.","link":"https://news.sciencenet.cn/htmlnews/2026/7/568349.shtm","categoria":"SCIENCE","lang":"en"},{"fonte":"ダイヤモンド・オンライン","pais":"China","titulo":"China's Two-Tiered Economy: High-Tech Success and Domestic Stagnation","resumo":"The Chinese economic landscape presents a stark contrast between the exponential growth of high-end technology and the fragility of internal consumption. While the high-tech sector attracts massive investment and innovation, the domestic market faces significant challenges. This dichotomy raises questions about the long-term sustainability of the current economic model.","link":"https://diamond.jp/articles/-/395068","categoria":"BUSINESS","lang":"en"},{"fonte":"Tagesspiegel","pais":"China","titulo":"Technology: Chinese Leader Xi Jinping Demands Both Control and Openness in AI","resumo":"Xi Jinping has emphasized the need to balance strict regulation with the promotion of an open innovation environment for artificial intelligence. The directive seeks to mitigate ethical and security risks while maintaining a rapid pace of research. This approach establishes the regulatory framework for the country's technology companies.","link":"https://www.tagesspiegel.de/wirtschaft/technologie-chinas-staatschef-xi-fordert-kontrolle-und-offenheit-bei-ki-15848243.html","categoria":"POLITICS","lang":"en"},{"fonte":"上观新闻","pais":"China","titulo":"Riding the AI Wave: AI Competitions and Computing Power Reach New Heights","resumo":"The 'Shenzhi Cup' competition highlighted innovations in artificial intelligence and data processing capability. The event brought together talent focused on boosting the performance of hardware and complex software for industrial applications. The initiative aims to strengthen the computing infrastructure needed to sustain China's next technological phase.","link":"https://www.jfdaily.com/news/detail?id=1145812","categoria":"EVENT","lang":"en"},{"fonte":"北航新闻网","pais":"China","titulo":"Beihang University's School of Integrated Circuits Engineering Publishes Results in 'Science Bulletin'","resumo":"The prestigious journal Science Bulletin has published significant breakthroughs developed by Beihang University in the field of integrated circuits. These new findings promise to optimize the efficiency of key electronic components vital to the semiconductor sector. The study highlights the growing relevance of Chinese universities in fundamental global engineering research.","link":"http://news.buaa.edu.cn/info/1005/69491.htm","categoria":"SCIENCE","lang":"en"},{"fonte":"ArchDaily","pais":"China","titulo":"Schmidt Hammer Lassen Designs Tech Incubator in Shanghai","resumo":"Architecture firm Schmidt Hammer Lassen has been selected to design a new innovation hub in Shanghai focused on tech startups. The project aims to create a collaborative ecosystem that combines modern design, sustainability, and cutting-edge digital infrastructure. The initiative demonstrates the city's focus on attracting talent and innovative enterprises.","link":"https://www.archdaily.com.br/pt/880119/schmidt-hammer-lassen-projeta-incubadora-de-empresas-de-tecnologia-em-xangai/59c1041ab22e38903e000041-schmidt-hammer-lassen-breaks-ground-on-glass-box-headquarters-of-creative-incubator-in-china-image","categoria":"ARCHITECTURE","lang":"en"},{"fonte":"Lapaas Voice","pais":"India","titulo":"Tata Group Bets on Mature Chip Technology for Semiconductor Manufacturing Entry","resumo":"The Tata Group is strategically focusing on established semiconductor technologies to facilitate its entry into the chip manufacturing market. This decision aims to reduce operational risks and accelerate national production capacity in India. The move marks a decisive step toward strengthening the country's technological and industrial autonomy in the global electronics sector.","link":"https://voice.lapaas.com/tata-group-bets-on-mature-chip-technology-for-semiconductor-manufacturing-entry/","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Devdiscourse","pais":"India","titulo":"India's Leap into Hydrogen-Powered Rail Technology","resumo":"India is making significant progress in the implementation of hydrogen-powered trains to modernize its railway system. This technology aims to replace fossil fuels, aligning with national goals for sustainability and carbon footprint reduction. The project promises to revolutionize passenger transport through efficient, green engineering solutions.","link":"https://www.devdiscourse.com/article/business/3951764-indias-leap-into-hydrogen-powered-rail-technology","categoria":"SCIENCE","lang":"en"},{"fonte":"India Today","pais":"India","titulo":"How Does India's First Hydrogen Train Work? The Science Behind the Green Engine","resumo":"The introduction of hydrogen technology to Indian railways represents a scientific milestone for the country. The engine ut   const searchInput = document.getElementById('search');
  const langSelect = document.getElementById('lang');
  const countrySelect = document.getElementById('country');
  const categorySelect = document.getElementById('category');
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');
  const clearBtn = document.getElementById('clear-filters');

  // Utility de escape HTML simples para prevenir injections em propriedades sem tratamento
  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function populateSelects() {
    const lang = langSelect.value;
    const currentData = data.filter(d => d.lang === lang);

    const countries = [...new Set(currentData.map(d => d.pais))].filter(Boolean).sort();
    const categories = [...new Set(currentData.map(d => d.categoria))].filter(Boolean).sort();

    const currentCountry = countrySelect.value;
    const currentCategory = categorySelect.value;

    countrySelect.innerHTML = '<option value="all">Todos / All</option>';
    categorySelect.innerHTML = '<option value="all">Todas / All</option>';

    countries.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      countrySelect.appendChild(opt);
    });

    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      categorySelect.appendChild(opt);
    });

    if (currentCountry !== 'all' && countries.includes(currentCountry)) {
      countrySelect.value = currentCountry;
    }
    if (currentCategory !== 'all' && categories.includes(currentCategory)) {
      categorySelect.value = currentCategory;
    }
  }

  function render(items) {
    countEl.textContent = `${items.length} notícia${items.length !== 1 ? 's' : ''}`;
    
    grid.innerHTML = items.map(item => {
      const readMoreTxt = item.lang === 'pt' ? 'Ler mais' : 'Read more';
      
      const bulletList = (item.resumo || '').split('\n')
        .filter(Boolean)
        .map(line => `<li>${esc(line.replace(/^- /, ''))}</li>`)
        .join('');

      return `
        <div class="news-card">
          <div class="card-meta">
            <span class="category">${esc(item.categoria) || 'Geral'}</span>
            <span class="country">${esc(item.pais) || 'Global'}</span>
          </div>
          <h3 class="card-title">${esc(item.titulo)}</h3>
          <div class="card-summary">
            <ul>${bulletList}</ul>
          </div>
          <div class="card-footer">
            <a href="${esc(item.link)}" target="_blank" class="read-more">
              ${readMoreTxt} &rarr;
            </a>
            <span class="source">${esc(item.fonte)}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterData() {
    const query = searchInput.value.toLowerCase();
    const lang = langSelect.value;
    const country = countrySelect.value;
    const category = categorySelect.value;

    const filtered = data.filter(item => {
      const matchLang = item.lang === lang;
      const matchCountry = country === 'all' || item.pais === country;
      const matchCategory = category === 'all' || item.categoria === category;
      const matchSearch = query === '' 
        || (item.titulo || '').toLowerCase().includes(query)
        || (item.resumo || '').toLowerCase().includes(query)
        || (item.fonte || '').toLowerCase().includes(query);

      return matchLang && matchCountry && matchCategory && matchSearch;
    });

    render(filtered);
  }

  // Binds
  searchInput.addEventListener('input', filterData);
  langSelect.addEventListener('change', () => {
    populateSelects();
    filterData();
  });
  countrySelect.addEventListener('change', filterData);
  categorySelect.addEventListener('change', filterData);
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    countrySelect.value = 'all';
    categorySelect.value = 'all';
    filterData();
  });

  // Initialization
  populateSelects();
  filterData(); // trigger first render
</script>
