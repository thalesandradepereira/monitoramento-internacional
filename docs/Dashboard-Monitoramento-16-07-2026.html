<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - International Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0B0F19;
      --bg-panel: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #E2E8F0;
      --text-muted: #94A3B8;
      --accent: #D4AF37;
      --accent-hover: #FDE047;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.15), transparent 400px),
                        radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.05), transparent 400px);
    }
    header {
      padding: 1.5rem 5%;
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo-img {
      height: 48px; /* Altura ajustável do logo */
      width: auto;
      object-fit: contain;
      border-radius: 8px; /* Caso não seja transparente */
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .logo-text span {
      color: var(--accent);
    }
    .date-badge {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      color: var(--accent);
      font-weight: 600;
    }
    .container {
      padding: 2rem 5%;
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }
    .filters {
      flex: 0 0 300px;
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 6rem;
    }
    .filter-group {
      margin-bottom: 1.5rem;
    }
    .filter-group label {
      display: block;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
    }
    select option {
      background: var(--bg-main);
      color: var(--text-main);
    }
    .results {
      flex: 1;
    }
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .results-count {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .news-card {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .news-card:hover {
      transform: translateY(-4px);
      border-color: rgba(212, 175, 55, 0.5);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }
    .category {
      color: var(--accent);
    }
    .country {
      color: var(--text-muted);
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.4;
      margin: 0 0 1rem 0;
      color: #fff;
    }
    .card-summary {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-muted);
      flex: 1;
    }
    .card-summary ul {
      margin: 0;
      padding-left: 1.2rem;
    }
    .card-summary li {
      margin-bottom: 0.25rem;
    }
    .card-footer {
      margin-top: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--glass-border);
      padding-top: 1rem;
    }
    .read-more {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .read-more:hover {
      color: var(--accent-hover);
    }
    .source {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .btn-clear {
      width: 100%;
      padding: 0.75rem 1rem;
      margin-top: 0.5rem;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-clear:hover {
      background: var(--accent);
      color: var(--bg-main);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }
    /* Simple CSS reset/scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: var(--bg-panel); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .filters {
        flex: none;
        width: 100%;
        position: static;
        box-sizing: border-box;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-container">
    <img src="logo.jpg" alt="TAP Logo" class="logo-img" onerror="this.style.display='none'">
    <div class="logo-text">Monitoramento<span>Internacional</span></div>
  </div>
  <div class="date-badge">16/07/2026</div>
</header>

<div class="container">
  <aside class="filters">
    <div class="filter-group">
      <label for="search">Busca / Search</label>
      <input type="text" id="search" placeholder="Palavra-chave...">
    </div>
    
    <div class="filter-group">
      <label for="lang">Idioma / Language</label>
      <select id="lang">
        <option value="pt">Português (PT-BR)</option>
        <option value="en">English (US)</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="country">País / Country</label>
      <select id="country">
        <option value="all">Todos / All</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="category">Categoria / Category</label>
      <select id="category">
        <option value="all">Todas / All</option>
      </select>
    </div>
    
    <button id="clear-filters" class="btn-clear">Limpar / Clear</button>
  </aside>

  <main class="results">
    <div class="results-header">
      <h2 style="margin: 0; font-size: 1.5rem; color: #fff;">Resultados</h2>
      <span class="results-count" id="count">0 notícias</span>
    </div>
    <div class="news-grid" id="grid">
      <!-- Injected by JS -->
    </div>
  </main>
</div>

<script>
  // Injeta os dados originais no frontend
  const data = [{"fonte":"Folha de S.Paulo","pais":"Brasil","titulo":"SpaceX tentará lançar megafoguete Starship nesta quinta (16)","resumo":"A SpaceX prepara uma nova tentativa de lançamento do Starship, o maior e mais potente foguete já construído pela humanidade. O evento atrai a atenção mundial por ser um marco crucial para futuras missões lunares e a exploração de Marte. O sucesso da operação promete revolucionar o custo e a logística de transporte espacial.","link":"https://www1.folha.uol.com.br/ciencia/2026/07/spacex-tentara-lancar-megafoguete-starship-nesta-quinta-16.shtml","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"O TEMPO","pais":"Brasil","titulo":"Governo federal institui o Programa Brasil Semicondutores e amplia incentivos para tecnologia","resumo":"O Governo Federal lançou o Programa Brasil Semicondutores, focando em fortalecer a soberania tecnológica do país na fabricação de chips. A iniciativa busca atrair investimentos e ampliar a infraestrutura necessária para a indústria nacional de eletrônicos. Espera-se que a medida diminua a dependência externa de componentes críticos.","link":"https://www.otempo.com.br/politica/2026/7/16/governo-federal-institui-o-programa-brasil-semicondutores-e-amplia-incentivos-para-tecnologia","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"O GLOBO","pais":"Brasil","titulo":"Adeus ao vinco? Samsung aposta em nova tecnologia e muda o formato dos celulares dobráveis","resumo":"A Samsung está desenvolvendo uma nova tecnologia de tela para eliminar o vinco visível nos smartphones dobráveis, elevando o padrão estético e funcional dos dispositivos. Essa inovação visa melhorar a durabilidade do display e oferecer uma experiência de visualização contínua aos usuários. O avanço reforça a liderança da marca no mercado de aparelhos inovadores.","link":"https://oglobo.globo.com/economia/tecnologia/noticia/2026/07/16/adeus-ao-vinco-samsung-aposta-em-nova-tecnologia-e-muda-o-formato-dos-celulares-dobraveis.ghtml","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"G1","pais":"Brasil","titulo":"Tecnologia criada no RS amplia chances de transplantes de coração e aumenta distância que pode ser percorrida em segurança","resumo":"Pesquisadores do Rio Grande do Sul desenvolveram uma tecnologia inovadora que otimiza a preservação de corações para transplantes. O sistema permite um transporte seguro por distâncias maiores, aumentando significativamente as chances de sobrevivência dos pacientes. Este avanço científico representa um salto importante para a medicina de alta complexidade no Brasil.","link":"https://g1.globo.com/rs/rio-grande-do-sul/noticia/2026/07/16/tecnologia-criada-no-rs-amplia-chances-de-transplantes-de-coracao-e-aumenta-distancia-que-pode-ser-percorrida-em-seguranca.ghtml","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"www.gov.br","pais":"Brasil","titulo":"A Terra terá uma segunda lua? A ciência explica — Ministério da Ciência, Tecnologia e Inovação","resumo":"O Ministério da Ciência, Tecnologia e Inovação esclareceu o fenômeno astronômico que está sendo chamado de 'segunda lua' da Terra. Trata-se de um asteroide que entrará temporariamente na órbita terrestre, capturado pela gravidade do planeta. O evento é uma excelente oportunidade para estudos astronômicos sobre corpos celestes próximos.","link":"https://www.gov.br/mcti/pt-br/acompanhe-o-mcti/noticias/noticias-julho-outubro-2026/a-terra-tera-uma-segunda-lua-a-ciencia-explica","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Valor Investe","pais":"Brasil","titulo":"ETF de tecnologia listado na bolsa brasileira subiu 70% no ano. Vale investir?","resumo":"Um ETF de tecnologia disponível na B3 registrou uma valorização expressiva de 70% no ano, despertando o interesse de investidores brasileiros. O fundo permite exposição direta a gigantes globais do setor, acompanhando o desempenho dos mercados internacionais de inovação. Especialistas analisam se a tendência de crescimento se manterá sustentável a longo prazo.","link":"https://valorinveste.globo.com/produtos/investimento-no-exterior/noticia/2026/07/16/etf-de-tecnologia-listado-na-bolsa-brasileira-subiu-70percent-no-ano-vale-investir.ghtml","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"O GLOBO","pais":"Brasil","titulo":"'Queremos que o Pix compita com as empresas americanas na mesma base', diz secretário de Comércio dos EUA","resumo":"O sucesso global do sistema de pagamentos instantâneos brasileiro, o Pix, entrou no radar das autoridades econômicas dos Estados Unidos. O secretário de Comércio dos EUA destacou o interesse em modelos que promovam maior competitividade frente às gigantes financeiras tradicionais. O modelo brasileiro é visto como uma referência de inovação em serviços bancários digitais.","link":"https://oglobo.globo.com/google/amp/economia/noticia/2026/07/16/queremos-que-o-pix-compita-com-as-empresas-americanas-na-mesma-base-diz-secretario-de-comercio-dos-eua.ghtml","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"O GLOBO","pais":"Brasil","titulo":"Novo robô consegue voar e nadar como um papagaio-do-mar para monitoramento de ecossistemas marinhos","resumo":"Cientistas criaram um robô autônomo inspirado no papagaio-do-mar, capaz de transitar entre o voo e o mergulho em ambientes aquáticos. A tecnologia foi projetada para realizar monitoramento ambiental em ecossistemas marinhos de difícil acesso. A inovação promete revolucionar a coleta de dados biológicos em oceanos profundos.","link":"https://oglobo.globo.com/mundo/clima-e-ciencia/noticia/2026/07/16/novo-robo-consegue-voar-e-nadar-como-um-papagaio-do-mar-para-monitoramento-de-ecossistemas-marinhos.ghtml","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"G1","pais":"Estados Unidos","titulo":"Trump ataca veto a data centers em Nova York e diz que China ganhará a corrida da IA","resumo":"O ex-presidente Donald Trump criticou as restrições impostas a novos centros de dados em Nova York. Ele argumenta que tais impedimentos prejudicam a competitividade americana no setor. Segundo Trump, o atraso na infraestrutura de IA favorece diretamente a China na disputa pela liderança tecnológica global.","link":"https://g1.globo.com/tecnologia/noticia/2026/07/15/trump-ataca-veto-a-data-centers-em-nova-york-e-diz-que-china-ganhara-a-corrida-da-ia.ghtml","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"SpaceNews","pais":"Estados Unidos","titulo":"Força Espacial dos EUA concede US$ 69 milhões para tecnologia de treinamento com IA","resumo":"A Força Espacial dos Estados Unidos fechou um contrato de US$ 69 milhões com a empresa Slingshot. O investimento visa implementar plataformas de treinamento baseadas em inteligência artificial para o pessoal militar. A iniciativa busca acelerar a prontidão operacional através de sistemas avançados de simulação.","link":"https://spacenews.com/space-force-awards-slingshot-69-million-for-ai-enabled-training-technology/","categoria":"DEFESA","lang":"pt"},{"fonte":"Purdue University","pais":"Estados Unidos","titulo":"Consórcio apoiado pela Purdue vence competição de Inovação Regional da National Science Foundation","resumo":"Um consórcio de inovação respaldado pela Universidade Purdue foi declarado vencedor em um importante concurso da National Science Foundation. O projeto foca no fortalecimento do ecossistema tecnológico regional americano através de novas parcerias estratégicas. A conquista promete impulsionar o desenvolvimento científico e industrial em larga escala.","link":"https://www.purdue.edu/newsroom/2026/Q3/purdue-backed-consortium-wins-national-science-foundations-regional-innovation-engines-competition","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"NASA Science (.gov)","pais":"Estados Unidos","titulo":"Comissionamento de espaçonave segue no prazo para missão de impulsionar o observatório Swift da NASA","resumo":"A NASA confirmou que os preparativos para a missão de atualização do observatório espacial Swift estão ocorrendo conforme o cronograma. A tecnologia visa melhorar significativamente a capacidade de detecção de eventos cósmicos de alta energia. O sucesso do comissionamento é fundamental para manter a liderança americana na observação do universo.","link":"https://science.nasa.gov/blogs/swift/2026/07/15/spacecraft-commissioning-on-track-for-mission-to-boost-nasas-swift/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Darden Report Online","pais":"Estados Unidos","titulo":"Professor da UVA Darden ajuda a organizar declaração nacional sobre IA e a economia","resumo":"Um acadêmico da Universidade da Virgínia liderou a criação de um documento estratégico sobre o impacto da inteligência artificial na economia. O texto analisa desafios de mercado, produtividade e regulamentação tecnológica nos Estados Unidos. A iniciativa busca orientar decisores políticos sobre os riscos e oportunidades da nova era digital.","link":"https://news.darden.virginia.edu/2026/07/15/darden-professor-ai-economy-statement/","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Yahoo Finance","pais":"Estados Unidos","titulo":"Como investidores reagem à adoção de removedor de semicondutores da LG Chem pela Amkor Technology","resumo":"A Amkor Technology anunciou a integração de químicos mais eficientes da LG Chem em seu processo de fabricação de semicondutores. A novidade atraiu atenção imediata do mercado financeiro devido ao ganho esperado na produtividade industrial. Investidores monitoram de perto como esse ajuste técnico impactará as margens de lucro da empresa.","link":"https://finance.yahoo.com/markets/stocks/articles/investors-reacting-amkor-technology-amkr-071052253.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Chevron","pais":"Estados Unidos","titulo":"Como a ciência dos aditivos de combustível acompanha o ritmo dos motores modernos","resumo":"Pesquisadores estão desenvolvendo novos aditivos químicos projetados especificamente para a complexa engenharia dos motores modernos. O foco da tecnologia é reduzir drasticamente a emissão de poluentes enquanto se mantém a alta performance dos veículos. Essa evolução científica é essencial para conciliar eficiência energética e conformidade com normas ambientais.","link":"https://www.chevron.com/newsroom/2026/q3/how-fuel-additive-science-keeps-pace-with-modern-engines","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Revista Oeste","pais":"Estados Unidos","titulo":"EUA citam censura a empresas de tecnologia como justificativa para tarifaço","resumo":"O governo dos Estados Unidos anunciou a imposição de novas tarifas baseando-se em alegações de censura contra empresas de tecnologia americanas. A medida tensiona as relações comerciais globais ao retaliar práticas restritivas de mercados estrangeiros. Analistas veem a ação como uma estratégia protecionista para salvaguardar o ecossistema tecnológico nacional.","link":"https://revistaoeste.com/politica/eua-citam-censura-a-empresas-de-tecnologia-como-justificativa-para-tarifaco/","categoria":"GEOPOLÍTICA","lang":"pt"},{"fonte":"Le Figaro","pais":"França","titulo":"«Reforçar a competitividade da Europa em IA é, antes de tudo, uma questão de coragem política»","resumo":"O debate sobre o desenvolvimento de Inteligência Artificial na Europa destaca a necessidade urgente de superar barreiras regulatórias e investimentos. Especialistas argumentam que a soberania tecnológica do continente depende de decisões políticas ousadas que favoreçam a inovação. O foco central é manter a competitividade global frente aos gigantes do setor.","link":"https://www.lefigaro.fr/vox/politique/renforcer-la-competitivite-de-l-europe-en-matiere-d-ia-est-avant-tout-une-question-de-courage-politique-20260716","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"tom.travel","pais":"França","titulo":"Navan: \"Estamos demonstrando que a tecnologia proporciona um serviço melhor\" – Travolution França","resumo":"A empresa Navan reafirma seu compromisso com a digitalização do setor de viagens e gestão de despesas corporativas. Através da implementação de ferramentas avançadas, a plataforma busca otimizar a experiência do usuário e aumentar a eficiência operacional. O foco reside na prova de valor que a automação traz ao mercado francês.","link":"https://www.tom.travel/2026/07/16/navan-nous-sommes-en-train-de-demontrer-que-la-technologie-apporte-un-meilleur-service/","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"ladepeche.fr","pais":"França","titulo":"\"Nosso objetivo não é vender o aparelho milagroso, mas integrá-lo inteligentemente a um percurso\": em Agen, uma nova casa de cuidados alia tecnologia e tradição","resumo":"Uma inovadora instalação de cuidados de saúde em Agen demonstra como a tecnologia pode complementar, e não substituir, o atendimento humano humanizado. O projeto prioriza a integração harmônica de ferramentas digitais no dia a dia dos pacientes. A iniciativa serve como modelo de modernização assistencial para a região.","link":"https://www.ladepeche.fr/2026/07/16/notre-but-ce-nest-pas-de-vendre-lappareil-miracle-mais-de-lintegrer-intelligemment-a-un-parcours-a-agen-une-nouvelle-maison-de-soins-allie-technologie-13469231.php","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Paris Normandie","pais":"França","titulo":"Projeto eólico «Fécamp Grand Large». Visibilidade, economia, conexão: primeiras respostas apresentadas","resumo":"O projeto eólico offshore de Fécamp avança com novas divulgações sobre seus impactos econômicos e desafios logísticos. A iniciativa busca consolidar a infraestrutura de energia renovável na França, alinhando-se às metas de descarbonização do país. As respostas trazem clareza sobre a viabilidade técnica e a integração à rede elétrica nacional.","link":"https://www.paris-normandie.fr/id732971/article/2026-07-16/projet-eolien-fecamp-grand-large-visibilite-economie-raccordement-des-debuts-de","categoria":"SUSTENTABILIDADE","lang":"pt"},{"fonte":"La Gazette France","pais":"França","titulo":"Oise: NeoCem levanta 17 milhões de euros e implanta sua tecnologia de baixo carbono","resumo":"A startup NeoCem obteve um aporte significativo de 17 milhões de euros para escalar sua tecnologia voltada à construção civil sustentável. O foco principal é a redução drástica da emissão de carbono em materiais de cimento, impactando diretamente o setor industrial francês. O investimento impulsiona a transição ecológica na infraestrutura local.","link":"https://www.lagazettefrance.fr/article/oise-neocem-leve-17-millions-d-euros-et-deploie-sa-technologie-bas-carbone-pour-la-fabrication-du-ciment","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"ECO","pais":"França","titulo":"Seis empresas europeias vão testar tecnologia de defesa no OPEX","resumo":"Seis empresas do setor de defesa foram selecionadas para testar suas inovações durante operações externas da França. O objetivo é validar tecnologias de ponta em cenários reais para aprimorar as capacidades estratégicas do país. Esta iniciativa reforça a cooperação europeia no desenvolvimento de equipamentos de segurança de última geração.","link":"https://eco.sapo.pt/2026/07/15/seis-empresas-europeias-vao-testar-tecnologia-de-defesa-no-opex/","categoria":"DEFESA","lang":"pt"},{"fonte":"Colchester Gazette","pais":"Inglaterra","titulo":"Pesquisadores da Universidade de Essex demonstram tecnologia agrícola na Diddly Squat Farm","resumo":"Pesquisadores da Universidade de Essex apresentaram avanços em tecnologias aplicadas ao campo durante uma demonstração na famosa Diddly Squat Farm. O projeto visa integrar soluções inteligentes para aumentar a eficiência na agricultura local e sustentabilidade operacional. Esta colaboração destaca o papel da academia no desenvolvimento de inovações práticas para o setor agrário britânico.","link":"https://www.gazette-news.co.uk/news/26281584.university-essex-demonstrates-farming-technology/","categoria":"TECNOLOGIA AGRÍCOLA","lang":"pt"},{"fonte":"TECHNOLOGY RESELLER","pais":"Inglaterra","titulo":"Datadog expande capacidades de hospedagem de dados no Reino Unido via AWS Europe","resumo":"A Datadog anunciou a expansão de sua infraestrutura de hospedagem de dados voltada ao mercado britânico, utilizando os servidores da AWS na Europa. A medida visa atender à crescente demanda por monitoramento de nuvem com baixa latência e conformidade regulatória local. O investimento fortalece a estratégia de serviços em nuvem para empresas que operam no Reino Unido.","link":"https://technologyreseller.uk/datadog-expands-uk-data-hosting-capabilities-on-aws-europe/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Aviation International News","pais":"Inglaterra","titulo":"Geopolítica impulsiona mudança tecnológica para defesa na GKN Aerospace","resumo":"A GKN Aerospace está reorientando seu foco tecnológico em resposta às crescentes tensões geopolíticas globais, priorizando inovações no setor de defesa. A estratégia visa adaptar suas capacidades de engenharia para atender às exigências de segurança nacional e militar mais modernas. Esta mudança reflete uma tendência industrial de buscar maior soberania e resiliência tecnológica.","link":"https://www.ainonline.com/aviation-news/aerospace/2026-06-01/geopolitics-drives-technology-shift-defense-gkn","categoria":"NEGÓCIOS DEFESA","lang":"pt"},{"fonte":"Business Weekly","pais":"Inglaterra","titulo":"Oxford Technology investe capital na BeyondFence para interação segura entre humanos e robôs","resumo":"A Oxford Technology injetou capital na startup BeyondFence para desenvolver sistemas focados em segurança na colaboração entre humanos e robôs. Com o aumento da automação industrial, a solução busca mitigar riscos ocupacionais por meio de tecnologias avançadas de sensores. O aporte financeiro acelerará a implementação de ambientes de trabalho mais integrados e protegidos.","link":"https://www.businessweekly.co.uk/posts/oxford-technology-injects-capital-into-beyondfence-for-safe-human-robot-interaction","categoria":"ROBÓTICA","lang":"pt"},{"fonte":"aafarmer.co.uk","pais":"Inglaterra","titulo":"Tecnologia de RNA tem como alvo o controle de CSFB","resumo":"Avanços em tecnologia de RNA estão sendo aplicados para criar métodos de controle contra o besouro-da-pulga-da-couve (CSFB), um desafio significativo para a agricultura. Essa abordagem biotecnológica oferece uma alternativa mais precisa e sustentável aos pesticidas convencionais atualmente em uso. O desenvolvimento representa um marco importante para a proteção de cultivos agrícolas no Reino Unido.","link":"https://www.aafarmer.co.uk/ag-tech/rna-technology-targets-csfb-control.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"The Engineer","pais":"Inglaterra","titulo":"SMG garante £6 milhões para escalar MEMS para defesa e espaço","resumo":"A empresa SMG assegurou um investimento de £6 milhões com o objetivo de escalar sua produção de Sistemas Microeletromecânicos (MEMS). O foco principal da expansão é fornecer tecnologia de ponta para os setores aeroespacial e de defesa. Esse financiamento permitirá que a empresa aumente sua capacidade manufatureira e competitividade tecnológica no mercado global.","link":"https://www.theengineer.co.uk/content/news/silicon-microgravity-raises-6m-for-next-gen-mems-technology","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"The Energy Year","pais":"Inglaterra","titulo":"Verdane adquire portfólio de tecnologia da BP","resumo":"A empresa de investimentos Verdane concretizou a aquisição do portfólio tecnológico pertencente à gigante de energia BP. A operação visa alavancar novas patentes e inovações em energia para impulsionar a transição tecnológica do setor. A transação marca uma mudança estratégica na gestão de ativos intelectuais entre grandes players do mercado britânico.","link":"https://theenergyyear.com/news/verdane-acquires-bp-technology-portfolio/","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"University of Exeter News","pais":"Inglaterra","titulo":"“Guardrails” de IA da UE não conseguem absorver mudanças rápidas na tecnologia, alerta estudo","resumo":"Um novo estudo aponta que as diretrizes e salvaguardas de Inteligência Artificial implementadas pela União Europeia carecem de flexibilidade para acompanhar a velocidade do desenvolvimento tecnológico. Especialistas alertam que a regulamentação rígida pode se tornar obsoleta antes de sua plena aplicação. O debate levanta questões cruciais sobre o equilíbrio entre inovação desenfreada e governança segura no Reino Unido e Europa.","link":"https://news.exeter.ac.uk/faculty-of-humanities-arts-and-social-sciences/eus-ai-guardrails-cannot-absorb-rapid-changes-in-technology-study-warns/","categoria":"IA","lang":"pt"},{"fonte":"Servimedia","pais":"Espanha","titulo":"Serveo e Hospital 12 de Outubro impulsionam tecnologia de ponta para fabricar máscaras personalizadas para prematuros em 24 horas","resumo":"O Hospital 12 de Outubro, em colaboração com a Serveo, implementou um sistema avançado de fabricação ágil para criar máscaras de ventilação não invasiva customizadas. A iniciativa permite que bebês prematuros recebam equipamentos adaptados em até um dia, melhorando drasticamente a eficácia do tratamento respiratório. Este avanço tecnológico destaca a aplicação prática da engenharia aplicada à saúde neonatal.","link":"https://www.servimedia.es/noticias/serveo-hospital-12-octubre-impulsan-una-tecnologia-avanzada-para-fabricar-24-horas-mascarillas-personalizadas-para-ventilacion-no-invasiva-pacientes-prematuros/1413089023","categoria":"TECNOLOGIA MÉDICA","lang":"pt"},{"fonte":"consalud.es","pais":"Espanha","titulo":"Guerra de patentes: Sanofi desafia Pfizer e Moderna pela tecnologia chave de suas vacinas de mRNA","resumo":"A gigante farmacêutica Sanofi iniciou uma disputa legal estratégica contra Pfizer e Moderna, questionando a propriedade intelectual fundamental das vacinas de mRNA. O litígio coloca em jogo a tecnologia que permitiu o desenvolvimento acelerado dos imunizantes contra a Covid-19. O desfecho desta batalha jurídica pode impactar significativamente o mercado global de biotecnologia e os lucros futuros das empresas envolvidas.","link":"https://www.consalud.es/salud35/internacional/guerra-de-patentes-sanofi-desafia-a-pfizer-y-moderna-por-la-tecnologia-clave-de-sus-vacunas-de-arnm.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Levante-EMV","pais":"Espanha","titulo":"Uma fórmula matemática encontrada em um muro maia reescreve a história da ciência pré-hispânica","resumo":"A descoberta de uma complexa fórmula matemática gravada em uma estrutura maia desafia o entendimento atual sobre o nível de sofisticação científica das civilizações antigas. Pesquisadores indicam que os conhecimentos matemáticos pré-hispânicos eram muito mais avançados do que se acreditava anteriormente. A revelação força historiadores a reconsiderar a evolução técnica e a capacidade de cálculo dessa sociedade.","link":"https://www.levante-emv.com/tendencias21/2026/07/16/formula-matematica-hallada-muro-maya-132502671.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"El Confidencial","pais":"Espanha","titulo":"Nem loucura, nem ficção científica: o CSIC confirma que se apaixonar por uma IA é quase igual a se apaixonar por um humano","resumo":"Estudos do CSIC revelam que as respostas neurobiológicas e emocionais ao desenvolver sentimentos por uma Inteligência Artificial são surpreendentemente semelhantes às reações humanas convencionais. A pesquisa explora como a interação contínua com avatares digitais estimula zonas de recompensa no cérebro. O tema abre um debate ético e social profundo sobre o futuro dos relacionamentos digitais na sociedade moderna.","link":"https://www.elconfidencial.com/tecnologia/2026-07-16/csic-enamorarse-ia-casi-igual-humano-1qrt_4389871/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"COPE","pais":"Espanha","titulo":"José Ángel Cuadrado, especialista em tecnologia: \"A VPN protege, mas não nos torna invisíveis nem transforma uma rede perigosa em segura\"","resumo":"O especialista José Ángel Cuadrado esclarece mitos comuns sobre a segurança cibernética e o uso de redes privadas virtuais (VPNs). Embora ferramentas sejam essenciais para a privacidade básica, ele alerta que elas não garantem imunidade total contra ataques de hackers sofisticados. A entrevista enfatiza a necessidade de práticas de higiene digital rigorosas além das camadas de proteção convencionais.","link":"https://www.cope.es/programas/herrera-en-cope/audios/jose-angel-cuadrado-experto-tecnologia-vpn-protege-hay-alguien-pretende-hackearte-no-vuelve-invisibles-transforma-red-peligrosa-segura-20260716_3404979.html","categoria":"SEGURANÇA DIGITAL","lang":"pt"},{"fonte":"VIA Empresa","pais":"Espanha","titulo":"Medtech Health Projects: o binômio logística-tecnologia que molda os hospitais do futuro","resumo":"A integração entre processos logísticos eficientes e tecnologias de ponta está redesenhando o funcionamento dos hospitais modernos. Projetos Medtech focam em otimizar fluxos de trabalho internos para reduzir erros e melhorar a experiência do paciente. Essa transformação digital é considerada fundamental para a sustentabilidade e a qualidade dos serviços de saúde na Espanha nos próximos anos.","link":"https://www.viaempresa.cat/es/empresa/medtech-health-projects-binomio-logistica-tecnologia-detras-camas-hospitalarias-manana_2237978_102.html","categoria":"TECNOLOGIA MÉDICA","lang":"pt"},{"fonte":"ABC","pais":"Espanha","titulo":"Málaga assume o desafio de atrair centros de dados que impulsionam a economia digital","resumo":"Málaga está se posicionando como um hub estratégico para a instalação de data centers, visando fortalecer a infraestrutura necessária para a economia digital europeia. A cidade busca atrair investimentos tecnológicos de grande escala, aproveitando seu ecossistema favorável à inovação. O projeto visa consolidar a região como um ponto nevrálgico para o processamento de nuvem e inteligência artificial no sul da Europa.","link":"https://www.abc.es/sevilla/economia/malaga-asume-reto-atraer-centros-datos-impulsan-20260716072033-nts.html","categoria":"ECONOMIA DIGITAL","lang":"pt"},{"fonte":"El Mundo","pais":"Espanha","titulo":"O novo desafio da Espanha sem cerca em Gibraltar: tecnologia para proteger a fronteira externa de Schengen","resumo":"A remoção das barreiras físicas na fronteira de Gibraltar impõe o uso de sistemas tecnológicos de vigilância de ponta para manter a segurança do espaço Schengen. O governo espanhol estuda a implementação de controle por sensores e biometria para monitorar o fluxo migratório e comercial de forma invisível, porém rigorosa. O projeto testa o limite entre a integração transfronteiriça e a soberania de segurança tecnológica.","link":"https://www.elmundo.es/espana/2026/07/15/6a57c9c5e85ece0d4f8b4591.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"HZwei","pais":"Alemanha","titulo":"Tecnologia: Novo processo de hidrocraqueamento visa tornar a produção de E-SAF mais eficiente","resumo":"Pesquisadores alemães desenvolveram um novo método de hidrocraqueamento que promete revolucionar a eficiência na fabricação de combustíveis de aviação sustentáveis (E-SAF). A tecnologia busca reduzir os custos energéticos e otimizar o rendimento, sendo um passo crucial para a descarbonização do setor aéreo. Essa inovação deve acelerar a transição energética europeia ao tornar os combustíveis sintéticos uma alternativa mais viável comercialmente.","link":"https://www.hzwei.info/technologie/technologie-neues-hydrocracking-verfahren-soll-e-saf-produktion-effizienter-machen","categoria":"TECNOLOGIA SUSTENTÁVEL","lang":"pt"},{"fonte":"Chemie.de","pais":"Alemanha","titulo":"Caminho eficiente para a produção de combustível neutro em carbono","resumo":"Estudos recentes apresentam uma nova rota técnica para a produção em larga escala de combustíveis neutros em emissões de CO2. O processo foca na otimização de catalisadores e na integração de energias renováveis para maximizar a eficiência térmica do sistema. Este avanço é fundamental para que a Alemanha alcance suas metas climáticas, oferecendo uma solução prática para indústrias que dependem de combustíveis líquidos.","link":"https://www.chemie.de/news/1189276/effizienter-weg-zur-klimaneutralen-kraftstoffproduktion.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"springerprofessional.de","pais":"Alemanha","titulo":"Veículo Utilitário Esportivo: VW anuncia ID. Cross como novo 'modelo de sucesso'","resumo":"A Volkswagen oficializou o lançamento do ID. Cross, um novo SUV elétrico posicionado estrategicamente para se tornar um pilar de vendas da marca. O veículo combina design moderno com a arquitetura modular elétrica da montadora, visando atender à alta demanda do mercado europeu. Com este modelo, a empresa reforça seu compromisso em democratizar a mobilidade elétrica e fortalecer sua liderança tecnológica.","link":"https://www.springerprofessional.de/sport-utility-vehicle/elektrofahrzeuge/vw-kuendigt-id-cross-als-neues-erfolgsmodell-an/52970822","categoria":"LANÇAMENTO","lang":"pt"},{"fonte":"InsideEVs.de","pais":"Alemanha","titulo":"Oficial: Range Rover Sport Electric tem lançamento previsto para 2026","resumo":"A Jaguar Land Rover confirmou que o esperado Range Rover Sport Electric chegará ao mercado em 2026, marcando uma nova fase de eletrificação da marca. O modelo promete unir o desempenho off-road característico da linha com um trem de força totalmente elétrico de alta eficiência. O anúncio reflete a tendência global das montadoras de luxo em acelerar a transição para plataformas zero emissão.","link":"https://insideevs.de/news/801807/range-rover-sport-electric-2026/","categoria":"AUTOMOTIVO","lang":"pt"},{"fonte":"Table.Briefings","pais":"Alemanha","titulo":"Saxônia: As demandas de Kretschmer ao governo federal para o desenvolvimento tecnológico","resumo":"O primeiro-ministro da Saxônia, Michael Kretschmer, apresentou exigências ao governo federal para impulsionar a infraestrutura tecnológica na região. O foco reside na necessidade de investimentos robustos em semicondutores e energia renovável para garantir a competitividade industrial alemã. As demandas destacam a urgência de uma política centralizada que suporte polos regionais de inovação e pesquisa avançada.","link":"https://table.media/research/thema-des-tages/sachsen-was-kretschmer-von-der-bundesregierung-fuer-den-technologie-hochlauf-fordert","categoria":"POLÍTICA TECNOLÓGICA","lang":"pt"},{"fonte":"ArchDaily","pais":"Alemanha","titulo":"Galeria do Centro de Tecnologia Trumpf Schramberg","resumo":"A arquitetura e funcionalidade do novo Centro de Tecnologia da Trumpf em Schramberg refletem o alto padrão da engenharia laser alemã. O espaço foi projetado para abrigar inovações em manufatura aditiva e processamento industrial de alta precisão. A infraestrutura moderna é um exemplo de como o design industrial pode integrar eficiência operacional com espaços de colaboração científica de ponta.","link":"https://www.archdaily.com/pt/1024908/centro-de-tecnologia-trumpf-schramberg-barkow-leibinger/676040e16fb4f00189fc5c83-trumpf-schramberg-tech-center-barkow-leibinger-photo","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Yahoo!ニュース","pais":"Japão","titulo":"Colaboração em IA Física: Quatro empresas, incluindo a Fujitsu, utilizam tecnologia da Nvidia","resumo":"Quatro empresas japonesas formaram uma parceria estratégica com a Nvidia para impulsionar a chamada 'IA Física'. O CEO da Nvidia destacou que esta iniciativa marca o início de uma nova era na automação industrial. A colaboração foca em integrar inteligência avançada ao mundo real por meio da robótica.","link":"https://news.yahoo.co.jp/articles/1db47044e40891bcb03ed1555ab79490bccf1ab3","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"metro.tokyo.lg.jp","pais":"Japão","titulo":"Início do desenvolvimento e demonstração de tecnologia avançada para aproveitar o calor residual de data centers","resumo":"Foi lançado um novo projeto focado no aproveitamento energético do calor gerado por data centers, um desafio crescente com o avanço da computação. A tecnologia visa reciclar esse desperdício térmico para outras finalidades, promovendo maior eficiência energética. Esta iniciativa é um passo importante para a sustentabilidade da infraestrutura digital japonesa.","link":"https://www.metro.tokyo.lg.jp/information/press/2026/07/2026071607","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"PR TIMES","pais":"Japão","titulo":"Tecnologia de IA e robótica da Preferred Robotics é integrada ao novo aspirador de pó da Amano","resumo":"A Amano lançou seu novo aspirador de pó robótico, 'RAPiiTT', equipado com as avançadas tecnologias de IA e robótica da Preferred Robotics. Essa integração permite que o dispositivo navegue com maior precisão e eficiência em ambientes comerciais. O movimento reflete a tendência de automação inteligente em equipamentos de limpeza profissional.","link":"https://prtimes.jp/main/html/rd/p/000000064.000115855.html","categoria":"LANÇAMENTO","lang":"pt"},{"fonte":"Kyoto Fusioneering","pais":"Japão","titulo":"NGK e Kyoto Fusioneering colaboram em tecnologia de sal fundido FLiBe para plantas de fusão nuclear","resumo":"A NGK Insulators e a startup Kyoto Fusioneering firmaram parceria para desenvolver componentes de sal fundido FLiBe. Este material é essencial para o resfriamento e produção de combustível em reatores de fusão nuclear de nova geração. A colaboração visa acelerar o desenvolvimento de energia limpa e tecnologicamente avançada no Japão.","link":"https://kyotofusioneering.com/news/2026/07/16/4084","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"ritsumei.ac.jp","pais":"Japão","titulo":"Universidade Ritsumeikan apresenta tecnologia para detectar sinais falsos de GPS","resumo":"Pesquisadores da Universidade Ritsumeikan revelaram uma inovação capaz de identificar tentativas de manipulação ou falsificação de sinais de GPS. A tecnologia visa aumentar a segurança de sistemas de navegação autônoma e infraestruturas críticas. O projeto foi um destaque recente em uma feira universitária de tecnologia.","link":"https://www.ritsumei.ac.jp/news/detail/?id=4540","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Axelspace","pais":"Japão","titulo":"A tecnologia por trás do satélite de observação terrestre de próxima geração GRUS-3","resumo":"O novo satélite GRUS-3 utiliza sistemas avançados de controle de atitude para realizar observações terrestres de alta precisão. Esta tecnologia é fundamental para garantir a estabilidade e a qualidade das imagens capturadas do espaço. O desenvolvimento reafirma a liderança do Japão no setor de pequenos satélites e monitoramento ambiental.","link":"https://www.axelspace.com/ja/news/grus-3_interview_5/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"gunma-u.ac.jp","pais":"Japão","titulo":"Projeto selecionado para desenvolver tecnologia de dragagem e valorização de sedimentos em barragens","resumo":"O Ministério da Terra, Infraestrutura e Transporte aprovou um projeto focado no gerenciamento de sedimentos em barragens. A tecnologia visa transformar detritos acumulados em recursos de alto valor agregado, otimizando a manutenção hídrica. A iniciativa integra práticas de economia circular com a engenharia civil de larga escala.","link":"https://www.gunma-u.ac.jp/information/252396","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"日本経済新聞","pais":"Japão","titulo":"NVIDIA apoia a Woven City da Toyota com tecnologia voltada para IA Física","resumo":"A NVIDIA está fornecendo suporte tecnológico especializado para a 'Woven City' da Toyota, um laboratório vivo para tecnologias futuras. O foco principal é a implementação de IA Física para otimizar a mobilidade e os serviços dentro desta cidade inteligente. Esta colaboração reforça a integração entre grandes nomes da tecnologia global e o desenvolvimento urbano.","link":"https://www.nikkei.com/article/DGXZQOUC154MR0V10C26A7000000/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"新浪新闻_手机新浪网","pais":"China","titulo":"Decodificando a economia de alta tecnologia: a fibra óptica como veia mestra da computação em IA","resumo":"A China consolida sua liderança global na infraestrutura de fibra óptica, essencial para sustentar a massiva demanda por poder computacional em Inteligência Artificial. O avanço tecnológico impulsiona a eficiência das redes digitais, garantindo que o país permaneça na vanguarda da corrida tecnológica mundial.","link":"https://news.sina.com.cn/gov/2026-07-16/doc-inihyupy7687458.shtml","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"nsfc.gov.cn","pais":"China","titulo":"Fórum Shuangqing: AI for Science (AI4S) como direção estratégica para a inovação global","resumo":"O 448º Fórum Shuangqing debateu a integração da Inteligência Artificial com a ciência, destacando o AI4S como um pilar fundamental para o ecossistema de inovação chinês. A conferência estabeleceu caminhos para a implementação prática dessas tecnologias, visando acelerar descobertas científicas complexas.","link":"https://www.nsfc.gov.cn/p1/3381/2821/138976.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"新京报","pais":"China","titulo":"Força total no conselho STAR: 12 empresas premiadas com o Prêmio Nacional de Progresso Científico","resumo":"Empresas listadas no mercado STAR Market demonstraram sua robustez tecnológica ao receberem 12 distinções no Prêmio Nacional de Progresso Científico e Tecnológico deste ano. O feito reforça o papel estratégico dessas companhias no desenvolvimento de capacidades técnicas de ponta na China.","link":"https://www.bjnews.com.cn/detail/1784185728129470.html","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"chinanews.com.cn","pais":"China","titulo":"Publicadas 508 normas nacionais abrangendo alta tecnologia e qualidade de vida","resumo":"O governo chinês oficializou 508 novos padrões nacionais focados em otimizar setores de alta tecnologia e melhorar a vida cotidiana dos cidadãos. Essas diretrizes visam padronizar processos industriais, promover a segurança digital e elevar a qualidade dos serviços públicos e privados oferecidos no país.","link":"https://www.chinanews.com.cn/cj/2026/07-16/10660496.shtml","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"黑龙江日报","pais":"China","titulo":"Prêmio Nacional de Ciência e Tecnologia 2025: Yang Desen e a jornada de quatro décadas em tecnologias críticas","resumo":"O acadêmico Yang Desen foi reconhecido pelo Prêmio Nacional de Ciência e Tecnologia, celebrando quarenta anos de dedicação ao desenvolvimento de equipamentos pesados e tecnologias estratégicas. Sua trajetória exemplifica o compromisso chinês com a inovação de longo prazo e a soberania tecnológica.","link":"https://wap.hljnews.cn/template/100/6920762923123712.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"同济大学新闻网","pais":"China","titulo":"Equipe acadêmica desenvolve tecnologia scDeChIC-seq para superar desafios em detecção de fatores de transcrição","resumo":"Pesquisadores chineses criaram a inovadora tecnologia scDeChIC-seq, superando obstáculos críticos na análise de ligação de fatores de transcrição em células únicas. Publicado na revista Cell Research, o avanço promete revolucionar os estudos de regulação genética e medicina de precisão.","link":"https://news.tongji.edu.cn/info/1003/95188.htm","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Plataforma Media","pais":"China","titulo":"Inteligência artificial ganha peso na economia chinesa: expansão avança da indústria ao cotidiano","resumo":"A Inteligência Artificial está se tornando o motor central da economia chinesa, transcendendo o uso industrial para se integrar ao dia a dia da população. O crescimento do setor reflete a aposta estratégica do governo em transformar o país em uma potência global de IA aplicada.","link":"https://www.plataformamedia.com/2026/07/16/inteligencia-artificial-ganha-peso-na-economia-chinesa-expansao-avanca-da-industria-para-o-quotidiano/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"新京报","pais":"China","titulo":"MG brilha no Reino Unido: a globalização da SAIC migra das vendas para a liderança tecnológica","resumo":"A montadora SAIC Motors está redefinindo sua presença global com a marca MG, evoluindo de uma estratégia centrada apenas no volume de vendas para uma liderança baseada em inovação técnica. O sucesso da marca no mercado britânico ilustra a ascensão da indústria automotiva chinesa como potência tecnológica.","link":"https://www.bjnews.com.cn/detail/1784113719129001.html","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Shiksha","pais":"Índia","titulo":"MAHE firma parceria com a Dhruva Space para codesenvolver centro de tecnologia espacial","resumo":"A MAHE se uniu à Dhruva Space com o objetivo de estabelecer um novo centro dedicado ao desenvolvimento de tecnologias espaciais. Esta colaboração visa fomentar a inovação acadêmica e industrial, capacitando estudantes e pesquisadores para enfrentar desafios complexos no setor aeroespacial. A iniciativa fortalece a posição da Índia no cenário global de exploração e engenharia espacial.","link":"https://www.shiksha.com/news/engineering-mahe-partners-with-dhruva-space-to-co-develop-space-technology-centre-blogId-236073","categoria":"CIÊNCIA ESPACIAL","lang":"pt"},{"fonte":"The Indian Express","pais":"Índia","titulo":"Nvidia revela módulos Jetson Thor T3000 e T2000 para acelerar a robótica","resumo":"A Nvidia anunciou o lançamento dos módulos Jetson Thor T3000 e T2000, projetados especificamente para impulsionar a próxima geração de robótica autônoma. Com capacidades computacionais avançadas, esses novos hardwares permitem que máquinas realizem tarefas complexas com maior eficiência e precisão. A inovação promete acelerar a integração de robôs inteligentes em diversos setores industriais e comerciais.","link":"https://indianexpress.com/article/technology/artificial-intelligence/nvidia-jetson-thor-t3000-t2000-modules-robotics-10789193/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"orissadiary.com","pais":"Índia","titulo":"Infraestrutura de fronteira será indispensável na futura guerra impulsionada pela tecnologia","resumo":"Durante a Conclave de Infraestrutura Estratégica da BRO, o ministro da Defesa enfatizou a importância crítica da infraestrutura de fronteira para a segurança nacional. O debate destacou como o avanço tecnológico na guerra moderna exige bases físicas resilientes e tecnologicamente equipadas. A estratégia foca na prontidão operacional em um ambiente geopolítico cada vez mais digitalizado.","link":"https://orissadiary.com/border-infrastructure-to-remain-indispensable-in-future-technology-driven-warfare-raksha-mantri-at-bro-strategic-infrastructure-conclave/","categoria":"DEFESA TECNOLÓGICA","lang":"pt"},{"fonte":"BioSpectrum India","pais":"Índia","titulo":"Instituto de Ciência Translacional e Tecnologia sedia o 3º encontro industrial 'SYNCHN 2026'","resumo":"O Instituto de Ciência Translacional e Tecnologia realizou o evento 'SYNCHN 2026', focado em estreitar laços entre o mundo acadêmico e a indústria. O encontro buscou transformar descobertas laboratoriais em soluções práticas e comercializáveis, acelerando o ciclo de inovação. A iniciativa é fundamental para conectar o setor científico às demandas do mercado indiano de saúde e tecnologia.","link":"https://www.biospectrumindia.com/news/16/28133/translational-health-science-and-technology-institute-hosts-3rd-industry-meet-synchn-2026.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"India Education Diary","pais":"Índia","titulo":"Ministério de Energia divulga rascunho das normas de Eficiência Energética Corporativa (CAFE – III) para consulta","resumo":"O Ministério de Energia da Índia iniciou a consulta pública sobre as novas normas CAFE-III, visando aprimorar a eficiência energética no setor automotivo e industrial. O rascunho estabelece metas rigorosas para a redução do consumo de combustíveis, incentivando a adoção de tecnologias sustentáveis. A medida é um passo estratégico para alinhar o país às metas globais de descarbonização.","link":"https://indiaeducationdiary.in/ministry-of-power-circulates-the-draft-corporate-average-fuel-economy-2027-norms-cafe-iii-for-stakeholder-consultation/","categoria":"TECNOLOGIA SUSTENTÁVEL","lang":"pt"},{"fonte":"Indian Council Of Agricultural Research","pais":"Índia","titulo":"ICAR realiza o 1º Conclave de Portfólio de Tecnologia para Responsabilidade Social Corporativa (CSR) 2026","resumo":"O ICAR organizou um evento inédito para conectar inovações agrícolas a investimentos de Responsabilidade Social Corporativa. O conclave apresentou um portfólio tecnológico voltado a resolver problemas rurais e aumentar a produtividade do campo através da ciência. O objetivo é engajar o setor privado no financiamento de soluções que promovam o desenvolvimento sustentável das comunidades rurais.","link":"https://icar.org.in/en/icar-hosts-1st-ever-icar-technology-portfolio-corporate-social-responsibility-csr-conclave-2026","categoria":"AGRITECH","lang":"pt"},{"fonte":"DD India","pais":"Índia","titulo":"Índia e União Europeia aprofundam parceria estratégica em tecnologia e comércio","resumo":"Durante a terceira reunião do Conselho de Comércio e Tecnologia, Índia e União Europeia reafirmaram o compromisso de cooperação em setores críticos. O diálogo focou em padrões de tecnologia digital, cadeias de suprimentos resilientes e transição para energias limpas. Esta parceria visa fortalecer a resiliência econômica e a troca de conhecimentos técnicos entre as regiões.","link":"https://ddindia.co.in/2026/07/india-european-union-deepen-strategic-technology-and-trade-partnership-at-third-india-eu-trade-and-technology-council-meeting/","categoria":"TECNOLOGIA NEGÓCIOS","lang":"pt"},{"fonte":"The Times of India","pais":"Índia","titulo":"Nova tecnologia ajuda o EPFO a processar pedidos mais rapidamente","resumo":"A implementação de uma nova infraestrutura tecnológica permitiu ao EPFO otimizar drasticamente a velocidade de processamento de solicitações de benefícios. Através da automatização de fluxos de dados, o sistema reduziu significativamente o tempo de espera para milhões de trabalhadores indianos. Este avanço demonstra o impacto positivo da digitalização na melhoria dos serviços públicos governamentais.","link":"https://timesofindia.indiatimes.com/business/india-business/new-technology-helps-epfo-clear-claims-faster/articleshow/132427315.cms","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"SAPO","pais":"Portugal","titulo":"Lyntia conclui a modernização da sua rede troncal IP com tecnologia da Nokia","resumo":"A Lyntia finalizou a atualização crítica da sua infraestrutura de rede IP utilizando soluções avançadas da Nokia. Este projeto visa aumentar a escalabilidade, eficiência e largura de banda para suportar a crescente demanda de conectividade digital em toda a sua rede troncal.","link":"https://sapo.pt/artigo/lyntia-conclui-a-modernizacao-da-sua-rede-troncal-ip-com-tecnologia-da-nokia-6a587fae935537d500f1d362","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"HealthNews","pais":"Portugal","titulo":"WASOG 2026: Hospital de São João transmite criobiópsia inédita com tecnologia CBCT","resumo":"Durante o congresso WASOG 2026, o Hospital de São João realizou uma demonstração ao vivo de uma criobiópsia pulmonar inovadora. O procedimento utilizou tecnologia CBCT de alta precisão, permitindo uma visualização tridimensional em tempo real que eleva o padrão de diagnóstico médico complexo.","link":"https://healthnews.pt/2026/07/16/wasog-2026-hospital-de-sao-joao-transmite-criobiopsia-inedita-com-tecnologia-cbct/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Expresso","pais":"Portugal","titulo":"Materiais avançados: a matéria de que se faz o futuro","resumo":"O desenvolvimento de novos materiais está a transformar setores vitais da economia e da engenharia moderna. Ao manipular propriedades em escalas nanométricas, cientistas e engenheiros estão a criar componentes mais resistentes e sustentáveis que fundamentam as inovações tecnológicas das próximas décadas.","link":"https://expresso.pt/opiniao/2026-07-16-materiais-avancados-a-materia-de-que-se-faz-o-futuro-e209add4","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Médio Tejo","pais":"Portugal","titulo":"ULS Médio Tejo testa tecnologia inovadora e não invasiva no tratamento da dor lombar crónica","resumo":"A Unidade Local de Saúde do Médio Tejo iniciou ensaios com uma tecnologia pioneira e não invasiva para pacientes com dor lombar crónica. Esta abordagem visa reduzir a dependência de fármacos, oferecendo uma alternativa terapêutica eficaz que melhora significativamente a qualidade de vida dos utentes.","link":"https://mediotejo.net/uls-medio-tejo-testa-tecnologia-inovadora-e-nao-invasiva-no-tratamento-da-dor-lombar-cronica/","categoria":"SAÚDE TECNOLÓGICA","lang":"pt"},{"fonte":"SIC Notícias","pais":"Portugal","titulo":"Renault Megane E-Tech Electric renovado promete maior autonomia e tecnologia Google integrada","resumo":"O novo Renault Megane E-Tech Electric chega ao mercado com otimizações significativas na sua autonomia e eficiência energética. O destaque fica por conta da integração nativa dos serviços Google, que proporciona uma experiência de infoentretenimento muito mais fluida e conectada para os condutores.","link":"https://sicnoticias.pt/programas/volante/2026-07-15-video-renault-megane-e-tech-electric-renovado-promete-maior-autonomia-e-tecnologia-google-integrada-1acf221e","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"Folha de S.Paulo","pais":"Brazil","titulo":"SpaceX to attempt launch of Starship mega-rocket this Thursday (16)","resumo":"SpaceX is preparing for a new launch attempt of Starship, the largest and most powerful rocket ever built. The event is capturing global attention as it marks a crucial milestone for future lunar missions and the exploration of Mars. Success would revolutionize the cost and logistics of space transport.","link":"https://www1.folha.uol.com.br/ciencia/2026/07/spacex-tentara-lancar-megafoguete-starship-nesta-quinta-16.shtml","categoria":"SCIENCE","lang":"en"},{"fonte":"O TEMPO","pais":"Brazil","titulo":"Federal government establishes Brazil Semiconductor Program and expands technology incentives","resumo":"The federal government has launched the Brazil Semiconductor Program, focused on strengthening the country's technological sovereignty in chip manufacturing. The initiative seeks to attract investment and expand the necessary infrastructure for the domestic electronics industry, aiming to reduce dependence on foreign critical components.","link":"https://www.otempo.com.br/politica/2026/7/16/governo-federal-institui-o-programa-brasil-semicondutores-e-amplia-incentivos-para-tecnologia","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"O GLOBO","pais":"Brazil","titulo":"Goodbye to the crease? Samsung bets on new technology to change foldable phone format","resumo":"Samsung is developing new screen technology to eliminate the visible crease in foldable smartphones, raising the aesthetic and functional standards of these devices. The innovation aims to improve display durability and offer a seamless viewing experience, reinforcing the brand's leadership in the market.","link":"https://oglobo.globo.com/economia/tecnologia/noticia/2026/07/16/adeus-ao-vinco-samsung-aposta-em-nova-tecnologia-e-muda-o-formato-dos-celulares-dobraveis.ghtml","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"G1","pais":"Brazil","titulo":"Technology created in Rio Grande do Sul improves heart transplant outcomes and transport distance","resumo":"Researchers in Rio Grande do Sul have developed innovative technology that optimizes the preservation of hearts for transplants. The system allows for safe transport over greater distances, significantly increasing patient survival rates. This scientific advancement is a major step forward for complex medicine in Brazil.","link":"https://g1.globo.com/rs/rio-grande-do-sul/noticia/2026/07/16/tecnologia-criada-no-rs-amplia-chances-de-transplantes-de-coracao-e-aumenta-distancia-que-pode-ser-percorrida-em-seguranca.ghtml","categoria":"SCIENCE","lang":"en"},{"fonte":"www.gov.br","pais":"Brazil","titulo":"Will Earth have a second moon? Science explains — Ministry of Science, Technology and Innovation","resumo":"The Ministry of Science, Technology and Innovation has clarified the astronomical phenomenon being called Earth's 'second moon.' It is an asteroid that will temporarily enter Earth's orbit, captured by the planet's gravity. The event provides a prime opportunity for astronomical study of near-Earth objects.","link":"https://www.gov.br/mcti/pt-br/acompanhe-o-mcti/noticias/noticias-julho-outubro-2026/a-terra-tera-uma-segunda-lua-a-ciencia-explica","categoria":"SCIENCE","lang":"en"},{"fonte":"Valor Investe","pais":"Brazil","titulo":"Technology ETF listed on Brazilian stock exchange up 70% this year. Is it worth investing?","resumo":"A technology ETF available on the B3 exchange has recorded an impressive 70% increase this year, sparking interest among Brazilian investors. The fund offers direct exposure to global sector giants, tracking international innovation market performance. Experts are analyzing whether this growth trend remains sustainable long-term.","link":"https://valorinveste.globo.com/produtos/investimento-no-exterior/noticia/2026/07/16/etf-de-tecnologia-listado-na-bolsa-brasileira-subiu-70percent-no-ano-vale-investir.ghtml","categoria":"BUSINESS","lang":"en"},{"fonte":"O GLOBO","pais":"Brazil","titulo":"'We want Pix to compete with American companies on a level playing field,' says US Commerce Secretary","resumo":"The global success of the Brazilian instant payment system, Pix, has caught the attention of US economic authorities. The US Commerce Secretary highlighted an interest in models that promote greater competitiveness against traditional financial giants. The Brazilian model is viewed as a benchmark for innovation in digital banking services.","link":"https://oglobo.globo.com/google/amp/economia/noticia/2026/07/16/queremos-que-o-pix-compita-com-as-empresas-americanas-na-mesma-base-diz-secretario-de-comercio-dos-eua.ghtml","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"O GLOBO","pais":"Brazil","titulo":"New robot can fly and swim like a puffin to monitor marine ecosystems","resumo":"Scientists have created an autonomous robot inspired by the puffin, capable of transitioning between flight and diving in aquatic environments. The technology is designed to perform environmental monitoring in hard-to-reach marine ecosystems. The innovation promises to revolutionize the collection of biological data in deep oceans.","link":"https://oglobo.globo.com/mundo/clima-e-ciencia/noticia/2026/07/16/novo-robo-consegue-voar-e-nadar-como-um-papagaio-do-mar-para-monitoramento-de-ecossistemas-marinhos.ghtml","categoria":"SCIENCE","lang":"en"},{"fonte":"G1","pais":"United States","titulo":"Trump attacks New York data center veto, warns China will win the AI race","resumo":"Former President Donald Trump criticized restrictions placed on new data centers in New York. He argues that such impediments hurt American competitiveness in the sector. According to Trump, delays in AI infrastructure directly favor China in the race for global technological leadership.","link":"https://g1.globo.com/tecnologia/noticia/2026/07/15/trump-ataca-veto-a-data-centers-em-nova-york-e-diz-que-china-ganhara-a-corrida-da-ia.ghtml","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"SpaceNews","pais":"United States","titulo":"US Space Force awards $69 million for AI-enabled training technology","resumo":"The US Space Force has secured a $69 million contract with the company Slingshot. The investment aims to implement AI-based training platforms for military personnel. The initiative seeks to accelerate operational readiness through advanced simulation systems.","link":"https://spacenews.com/space-force-awards-slingshot-69-million-for-ai-enabled-training-technology/","categoria":"DEFENSE","lang":"en"},{"fonte":"Purdue University","pais":"United States","titulo":"Purdue-backed consortium wins National Science Foundation Regional Innovation competition","resumo":"An innovation consortium backed by Purdue University has been declared a winner in a major National Science Foundation competition. The project focuses on strengthening the American regional technology ecosystem through new strategic partnerships. The achievement promises to boost scientific and industrial development on a large scale.","link":"https://www.purdue.edu/newsroom/2026/Q3/purdue-backed-consortium-wins-national-science-foundations-regional-innovation-engines-competition","categoria":"SCIENCE","lang":"en"},{"fonte":"NASA Science (.gov)","pais":"United States","titulo":"Spacecraft commissioning on track for mission to boost NASA's Swift observatory","resumo":"NASA has confirmed that preparations for the mission to upgrade the Swift space observatory are proceeding on schedule. The technology aims to significantly improve the ability to detect high-energy cosmic events. Successful commissioning is critical to maintaining American leadership in observing the universe.","link":"https://science.nasa.gov/blogs/swift/2026/07/15/spacecraft-commissioning-on-track-for-mission-to-boost-nasas-swift/","categoria":"SCIENCE","lang":"en"},{"fonte":"Darden Report Online","pais":"United States","titulo":"UVA Darden professor helps organize national statement on AI and the economy","resumo":"A University of Virginia academic led the creation of a strategic document regarding the impact of artificial intelligence on the economy. The text analyzes market challenges, productivity, and technological regulation in the United States. The initiative seeks to guide policymakers on the risks and opportunities of the new digital era.","link":"https://news.darden.virginia.edu/2026/07/15/darden-professor-ai-economy-statement/","categoria":"BUSINESS","lang":"en"},{"fonte":"Yahoo Finance","pais":"United States","titulo":"How investors are reacting to Amkor Technology's adoption of LG Chem's semiconductor remover","resumo":"Amkor Technology has announced the integration of more efficient chemicals from LG Chem into its semiconductor manufacturing process. The news attracted immediate interest from the financial market due to the expected gains in industrial productivity. Investors are monitoring closely how this technical adjustment will impact company profit margins.","link":"https://finance.yahoo.com/markets/stocks/articles/investors-reacting-amkor-technology-amkr-071052253.html","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Chevron","pais":"United States","titulo":"How fuel additive science keeps pace with modern engines","resumo":"Researchers are developing new chemical additives specifically designed for the complex engineering of modern engines. The focus of the technology is to drastically reduce pollutant emissions while maintaining high vehicle performance. This scientific evolution is essential to reconcile energy efficiency with environmental compliance standards.","link":"https://www.chevron.com/newsroom/2026/q3/how-fuel-additive-science-keeps-pace-with-modern-engines","categoria":"SCIENCE","lang":"en"},{"fonte":"Revista Oeste","pais":"United States","titulo":"US cites censorship of tech companies as justification for heavy tariffs","resumo":"The United States government announced the imposition of new tariffs based on claims of censorship against American technology companies. The measure strains global trade relations by retaliating against restrictive practices in foreign markets. Analysts view the move as a protectionist strategy to safeguard the domestic technology ecosystem.","link":"https://revistaoeste.com/politica/eua-citam-censura-a-empresas-de-tecnologia-como-justificativa-para-tarifaco/","categoria":"GEOPOLITICS","lang":"en"},{"fonte":"Le Figaro","pais":"France","titulo":"\"Strengthening Europe's AI competitiveness is, above all, a matter of political courage\"","resumo":"The debate over Artificial Intelligence development in Europe highlights the urgent need to overcome regulatory and investment barriers. Experts argue that the continent's technological sovereignty depends on bold political decisions that foster innovation. The central focus is maintaining global competitiveness against industry giants.","link":"https://www.lefigaro.fr/vox/politique/renforcer-la-competitivite-de-l-europe-en-matiere-d-ia-est-avant-tout-une-question-de-courage-politique-20260716","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"tom.travel","pais":"France","titulo":"Navan: \"We are demonstrating that technology provides a better service\" – Travolution France","resumo":"Navan reaffirms its commitment to the digitalization of the travel and corporate expense management sector. Through the implementation of advanced tools, the platform seeks to optimize the user experience and increase operational efficiency. The focus lies on proving the value that automation brings to the French market.","link":"https://www.tom.travel/2026/07/16/navan-nous-sommes-en-train-de-demontrer-que-la-technologie-apporte-un-meilleur-service/","categoria":"BUSINESS","lang":"en"},{"fonte":"ladepeche.fr","pais":"France","titulo":"\"Our goal is not to sell a miracle device, but to intelligently integrate it into a care pathway\": in Agen, a new care home combines technology and tradition","resumo":"An innovative healthcare facility in Agen demonstrates how technology can complement, rather than replace, human-centered care. The project prioritizes the harmonious integration of digital tools into patients' daily lives. The initiative serves as a model for modernizing care in the region.","link":"https://www.ladepeche.fr/2026/07/16/notre-but-ce-nest-pas-de-vendre-lappareil-miracle-mais-de-lintegrer-intelligemment-a-un-parcours-a-agen-une-nouvelle-maison-de-soins-allie-technologie-13469231.php","categoria":"SCIENCE","lang":"en"},{"fonte":"Paris Normandie","pais":"France","titulo":"\"Fécamp Grand Large\" wind project: Visibility, economics, connection: first responses presented","resumo":"The Fécamp offshore wind project moves forward with new disclosures regarding its economic impacts and logistical challenges. The initiative seeks to consolidate renewable energy infrastructure in France, aligning with the country's decarbonization goals. The responses provide clarity on technical viability and integration with the national power grid.","link":"https://www.paris-normandie.fr/id732971/article/2026-07-16/projet-eolien-fecamp-grand-large-visibilite-economie-raccordement-des-debuts-de","categoria":"SUSTAINABILITY","lang":"en"},{"fonte":"La Gazette France","pais":"France","titulo":"Oise: NeoCem raises 17 million euros and deploys its low-carbon technology","resumo":"Startup NeoCem has secured a significant 17 million euro investment to scale its technology aimed at sustainable construction. The main focus is the drastic reduction of carbon emissions in cement materials, directly impacting the French industrial sector. The investment accelerates the ecological transition in local infrastructure.","link":"https://www.lagazettefrance.fr/article/oise-neocem-leve-17-millions-d-euros-et-deploie-sa-technologie-bas-carbone-pour-la-fabrication-du-ciment","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"ECO","pais":"France","titulo":"Six European companies to test defense technology during overseas operations","resumo":"Six companies in the defense sector have been selected to test their innovations during France's overseas military operations. The goal is to validate cutting-edge technologies in real-world scenarios to enhance the country's strategic capabilities. This initiative reinforces European cooperation in the development of next-generation security equipment.","link":"https://eco.sapo.pt/2026/07/15/seis-empresas-europeias-vao-testar-tecnologia-de-defesa-no-opex/","categoria":"DEFENSE","lang":"en"},{"fonte":"Colchester Gazette","pais":"England","titulo":"University of Essex researchers demonstrate farming technology at Diddly Squat Farm","resumo":"Researchers from the University of Essex showcased advancements in technologies applied to the field during a demonstration at the famous Diddly Squat Farm. The project aims to integrate smart solutions to increase local agricultural efficiency and operational sustainability. This collaboration highlights the role of academia in developing practical innovations for the British agricultural sector.","link":"https://www.gazette-news.co.uk/news/26281584.university-essex-demonstrates-farming-technology/","categoria":"AGRICULTURAL TECHNOLOGY","lang":"en"},{"fonte":"TECHNOLOGY RESELLER","pais":"England","titulo":"Datadog expands UK data hosting capabilities via AWS Europe","resumo":"Datadog has announced the expansion of its data hosting infrastructure for the British market, using AWS servers in Europe. The move aims to meet growing demand for low-latency cloud monitoring and local regulatory compliance. The investment strengthens the cloud services strategy for companies operating in the UK.","link":"https://technologyreseller.uk/datadog-expands-uk-data-hosting-capabilities-on-aws-europe/","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Aviation International News","pais":"England","titulo":"Geopolitics drives technology shift for defense at GKN Aerospace","resumo":"GKN Aerospace is reorienting its technological focus in response to rising global geopolitical tensions, prioritizing innovations in the defense sector. The strategy aims to adapt its engineering capabilities to meet modern national security and military requirements. This shift reflects an industrial trend of seeking greater technological sovereignty and resilience.","link":"https://www.ainonline.com/aviation-news/aerospace/2026-06-01/geopolitics-drives-technology-shift-defense-gkn","categoria":"DEFENSE BUSINESS","lang":"en"},{"fonte":"Business Weekly","pais":"England","titulo":"Oxford Technology invests capital in BeyondFence for safe human-robot interaction","resumo":"Oxford Technology has injected capital into startup BeyondFence to develop systems focused on safety in human-robot collaboration. With the increase in industrial automation, the solution seeks to mitigate occupational risks through advanced sensor technologies. The investment will accelerate the implementation of more integrated and protected work environments.","link":"https://www.businessweekly.co.uk/posts/oxford-technology-injects-capital-into-beyondfence-for-safe-human-robot-interaction","categoria":"ROBOTICS","lang":"en"},{"fonte":"aafarmer.co.uk","pais":"England","titulo":"RNA technology targets CSFB control","resumo":"Advancements in RNA technology are being applied to create control methods for the Cabbage Stem Flea Beetle (CSFB), a significant challenge for agriculture. This biotechnological approach offers a more precise and sustainable alternative to the conventional pesticides currently in use. The development represents an important milestone for crop protection in the United Kingdom.","link":"https://www.aafarmer.co.uk/ag-tech/rna-technology-targets-csfb-control.html","categoria":"SCIENCE","lang":"en"},{"fonte":"The Engineer","pais":"England","titulo":"SMG secures £6 million to scale MEMS for defense and space","resumo":"SMG has secured a £6 million investment with the goal of scaling its production of Micro-Electro-Mechanical Systems (MEMS). The primary focus of the expansion is to provide cutting-edge technology to the aerospace and defense sectors. This funding will allow the company to increase its manufacturing capacity and technological competitiveness in the global market.","link":"https://www.theengineer.co.uk/content/news/silicon-microgravity-raises-6m-for-next-gen-mems-technology","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"The Energy Year","pais":"England","titulo":"Verdane acquires BP's technology portfolio","resumo":"Investment firm Verdane has completed the acquisition of the technology portfolio belonging to energy giant BP. The operation aims to leverage new patents and energy innovations to boost the sector's technological transition. The transaction marks a strategic shift in intellectual asset management among major players in the British market.","link":"https://theenergyyear.com/news/verdane-acquires-bp-technology-portfolio/","categoria":"BUSINESS","lang":"en"},{"fonte":"University of Exeter News","pais":"England","titulo":"EU AI 'guardrails' cannot absorb rapid changes in technology, study warns","resumo":"A new study indicates that the Artificial Intelligence guidelines and safeguards implemented by the European Union lack the flexibility to keep pace with the speed of technological development. Experts warn that rigid regulation may become obsolete before its full implementation. The debate raises critical questions about the balance between unbridled innovation and secure governance in the UK and Europe.","link":"https://news.exeter.ac.uk/faculty-of-humanities-arts-and-social-sciences/eus-ai-guardrails-cannot-absorb-rapid-changes-in-technology-study-warns/","categoria":"AI","lang":"en"},{"fonte":"Servimedia","pais":"Spain","titulo":"Serveo and 12 de Octubre Hospital advance cutting-edge technology to manufacture custom masks for premature infants within 24 hours","resumo":"12 de Octubre Hospital, in collaboration with Serveo, has implemented an advanced agile manufacturing system to create custom non-invasive ventilation masks. The initiative allows premature infants to receive adapted equipment within one day, drastically improving the efficacy of respiratory treatment. This technological breakthrough highlights the practical application of engineering in neonatal healthcare.","link":"https://www.servimedia.es/noticias/serveo-hospital-12-octubre-impulsan-una-tecnologia-avanzada-para-fabricar-24-horas-mascarillas-personalizadas-para-ventilacion-no-invasiva-pacientes-prematuros/1413089023","categoria":"MEDICAL TECHNOLOGY","lang":"en"},{"fonte":"consalud.es","pais":"Spain","titulo":"Patent war: Sanofi challenges Pfizer and Moderna over the key technology behind their mRNA vaccines","resumo":"Pharmaceutical giant Sanofi has initiated a strategic legal dispute a
