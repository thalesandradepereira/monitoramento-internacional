gainst Pfizer and Moderna, questioning the fundamental intellectual property of mRNA vaccines. The litigation involves the technology that enabled the accelerated development of Covid-19 immunizations. The outcome of this legal battle could significantly impact the global biotechnology market and the future profits of the companies involved.","link":"https://www.consalud.es/salud35/internacional/guerra-de-patentes-sanofi-desafia-a-pfizer-y-moderna-por-la-tecnologia-clave-de-sus-vacunas-de-arnm.html","categoria":"SCIENCE","lang":"en"},{"fonte":"Levante-EMV","pais":"Spain","titulo":"A mathematical formula found on a Mayan wall rewrites the history of pre-Hispanic science","resumo":"The discovery of a complex mathematical formula carved into a Mayan structure challenges the current understanding of the level of scientific sophistication of ancient civilizations. Researchers indicate that pre-Hispanic mathematical knowledge was far more advanced than previously believed. This revelation forces historians to reconsider the technical evolution and calculating capacity of this society.","link":"https://www.levante-emv.com/tendencias21/2026/07/16/formula-matematica-hallada-muro-maya-132502671.html","categoria":"SCIENCE","lang":"en"},{"fonte":"El Confidencial","pais":"Spain","titulo":"Neither madness nor science fiction: the CSIC confirms that falling in love with an AI is almost the same as falling for a human","resumo":"Studies from the CSIC reveal that the neurobiological and emotional responses when developing feelings for an Artificial Intelligence are surprisingly similar to conventional human reactions. The research explores how continuous interaction with digital avatars stimulates reward zones in the brain. The topic opens a deep ethical and social debate about the future of digital relationships in modern society.","link":"https://www.elconfidencial.com/tecnologia/2026-07-16/csic-enamorarse-ia-casi-igual-humano-1qrt_4389871/","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"COPE","pais":"Spain","titulo":"José Ángel Cuadrado, technology expert: 'A VPN protects, but it doesn't make us invisible nor does it turn a dangerous network into a secure one'","resumo":"Expert José Ángel Cuadrado clears up common myths regarding cybersecurity and the use of Virtual Private Networks (VPNs). While these tools are essential for basic privacy, he warns that they do not guarantee total immunity against sophisticated hacker attacks. The interview emphasizes the need for rigorous digital hygiene practices beyond conventional protective layers.","link":"https://www.cope.es/programas/herrera-en-cope/audios/jose-angel-cuadrado-experto-tecnologia-vpn-protege-hay-alguien-pretende-hackearte-no-vuelve-invisibles-transforma-red-peligrosa-segura-20260716_3404979.html","categoria":"DIGITAL SECURITY","lang":"en"},{"fonte":"VIA Empresa","pais":"Spain","titulo":"Medtech Health Projects: the logistics-technology binomial shaping the hospitals of the future","resumo":"The integration of efficient logistics processes and cutting-edge technology is redesigning how modern hospitals function. Medtech projects focus on optimizing internal workflows to reduce errors and improve the patient experience. This digital transformation is considered essential for the sustainability and quality of healthcare services in Spain in the coming years.","link":"https://www.viaempresa.cat/es/empresa/medtech-health-projects-binomio-logistica-tecnologia-detras-camas-hospitalarias-manana_2237978_102.html","categoria":"MEDICAL TECHNOLOGY","lang":"en"},{"fonte":"ABC","pais":"Spain","titulo":"Málaga takes on the challenge of attracting data centers that drive the digital economy","resumo":"Málaga is positioning itself as a strategic hub for the installation of data centers, aiming to strengthen the necessary infrastructure for the European digital economy. The city seeks to attract large-scale technological investments by leveraging its innovation-friendly ecosystem. The project aims to consolidate the region as a central hub for cloud processing and artificial intelligence in Southern Europe.","link":"https://www.abc.es/sevilla/economia/malaga-asume-reto-atraer-centros-datos-impulsan-20260716072033-nts.html","categoria":"DIGITAL ECONOMY","lang":"en"},{"fonte":"El Mundo","pais":"Spain","titulo":"Spain's new challenge without a fence in Gibraltar: technology to protect the external Schengen border","resumo":"The removal of physical barriers at the Gibraltar border necessitates the use of high-end technological surveillance systems to maintain the security of the Schengen area. The Spanish government is studying the implementation of sensor and biometric controls to monitor migratory and commercial flows in an invisible yet rigorous manner. The project tests the boundaries between cross-border integration and technological security sovereignty.","link":"https://www.elmundo.es/espana/2026/07/15/6a57c9c5e85ece0d4f8b4591.html","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"HZwei","pais":"Germany","titulo":"Technology: New hydrocracking process aims to make E-SAF production more efficient","resumo":"German researchers have developed a new hydrocracking method that promises to revolutionize efficiency in the manufacture of sustainable aviation fuels (E-SAF). The technology seeks to reduce energy costs and optimize yields, marking a crucial step for the decarbonization of the aviation sector. This innovation is expected to accelerate the European energy transition by making synthetic fuels a more commercially viable alternative.","link":"https://www.hzwei.info/technologie/technologie-neues-hydrocracking-verfahren-soll-e-saf-produktion-effizienter-machen","categoria":"SUSTAINABLE TECHNOLOGY","lang":"en"},{"fonte":"Chemie.de","pais":"Germany","titulo":"Efficient pathway for carbon-neutral fuel production","resumo":"Recent studies present a new technical route for the large-scale production of CO2-neutral fuels. The process focuses on optimizing catalysts and integrating renewable energy to maximize the system's thermal efficiency. This breakthrough is fundamental for Germany to reach its climate goals, offering a practical solution for industries that rely on liquid fuels.","link":"https://www.chemie.de/news/1189276/effizienter-weg-zur-klimaneutralen-kraftstoffproduktion.html","categoria":"SCIENCE","lang":"en"},{"fonte":"springerprofessional.de","pais":"Germany","titulo":"Sport Utility Vehicle: VW announces the ID. Cross as a new 'success model'","resumo":"Volkswagen has officially announced the launch of the ID. Cross, a new electric SUV strategically positioned to become a sales pillar for the brand. The vehicle combines modern design with the automaker's modular electric architecture, aiming to meet high demand in the European market. With this model, the company reinforces its commitment to democratizing electric mobility and strengthening its technological leadership.","link":"https://www.springerprofessional.de/sport-utility-vehicle/elektrofahrzeuge/vw-kuendigt-id-cross-als-neues-erfolgsmodell-an/52970822","categoria":"PRODUCT LAUNCH","lang":"en"},{"fonte":"InsideEVs.de","pais":"Germany","titulo":"Official: Range Rover Sport Electric scheduled for 2026 release","resumo":"Jaguar Land Rover has confirmed that the anticipated Range Rover Sport Electric will hit the market in 2026, marking a new phase in the brand's electrification. The model promises to combine the line's characteristic off-road performance with a highly efficient, fully electric powertrain. The announcement reflects the global trend among luxury automakers to accelerate the transition to zero-emission platforms.","link":"https://insideevs.de/news/801807/range-rover-sport-electric-2026/","categoria":"AUTOMOTIVE","lang":"en"},{"fonte":"Table.Briefings","pais":"Germany","titulo":"Saxony: Kretschmer's demands to the federal government for technological development","resumo":"The Prime Minister of Saxony, Michael Kretschmer, has presented demands to the federal government to boost technological infrastructure in the region. The focus lies on the need for robust investments in semiconductors and renewable energy to ensure German industrial competitiveness. These demands highlight the urgency of a centralized policy that supports regional hubs of innovation and advanced research.","link":"https://table.media/research/thema-des-tages/sachsen-was-kretschmer-von-der-bundesregierung-fuer-den-technologie-hochlauf-fordert","categoria":"TECHNOLOGY POLICY","lang":"en"},{"fonte":"ArchDaily","pais":"Germany","titulo":"Trumpf Schramberg Technology Center gallery","resumo":"The architecture and functionality of the new Trumpf Technology Center in Schramberg reflect the high standard of German laser engineering. The space was designed to house innovations in additive manufacturing and high-precision industrial processing. The modern infrastructure is an example of how industrial design can integrate operational efficiency with state-of-the-art scientific collaboration spaces.","link":"https://www.archdaily.com/pt/1024908/centro-de-tecnologia-trumpf-schramberg-barkow-leibinger/676040e16fb4f00189fc5c83-trumpf-schramberg-tech-center-barkow-leibinger-photo","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Yahoo!ニュース","pais":"Japan","titulo":"Physical AI collaboration: Four companies, including Fujitsu, utilize Nvidia technology","resumo":"Four Japanese companies have formed a strategic partnership with Nvidia to boost so-called 'Physical AI.' The CEO of Nvidia highlighted that this initiative marks the beginning of a new era in industrial automation. The collaboration focuses on integrating advanced intelligence into the real world through robotics.","link":"https://news.yahoo.co.jp/articles/1db47044e40891bcb03ed1555ab79490bccf1ab3","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"metro.tokyo.lg.jp","pais":"Japan","titulo":"Development and demonstration of advanced technology to harness waste heat from data centers","resumo":"A new project has been launched focusing on energy recovery from heat generated by data centers, a growing challenge alongside the rise of computing. The technology aims to recycle this thermal waste for other purposes, promoting greater energy efficiency. This initiative is an important step for the sustainability of Japan's digital infrastructure.","link":"https://www.metro.tokyo.lg.jp/information/press/2026/07/2026071607","categoria":"SCIENCE","lang":"en"},{"fonte":"PR TIMES","pais":"Japan","titulo":"Preferred Robotics' AI and robotics technology integrated into Amano's new vacuum cleaner","resumo":"Amano has launched its new 'RAPiiTT' robotic vacuum cleaner, equipped with advanced AI and robotics technologies from Preferred Robotics. This integration allows the device to navigate with greater precision and efficiency in commercial environments. The move reflects the trend toward intelligent automation in professional cleaning equipment.","link":"https://prtimes.jp/main/html/rd/p/000000064.000115855.html","categoria":"LAUNCH","lang":"en"},{"fonte":"Kyoto Fusioneering","pais":"Japan","titulo":"NGK and Kyoto Fusioneering collaborate on FLiBe molten salt technology for nuclear fusion plants","resumo":"NGK Insulators and the startup Kyoto Fusioneering have formed a partnership to develop FLiBe molten salt components. This material is essential for cooling and fuel production in next-generation nuclear fusion reactors. The collaboration aims to accelerate the development of clean, high-tech energy in Japan.","link":"https://kyotofusioneering.com/news/2026/07/16/4084","categoria":"SCIENCE","lang":"en"},{"fonte":"ritsumei.ac.jp","pais":"Japan","titulo":"Ritsumeikan University unveils technology to detect fake GPS signals","resumo":"Researchers at Ritsumeikan University have revealed an innovation capable of identifying attempts to manipulate or spoof GPS signals. The technology aims to increase the security of autonomous navigation systems and critical infrastructure. The project was a recent highlight at a university technology fair.","link":"https://www.ritsumei.ac.jp/news/detail/?id=4540","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Axelspace","pais":"Japan","titulo":"The technology behind the next-generation Earth observation satellite GRUS-3","resumo":"The new GRUS-3 satellite utilizes advanced attitude control systems to perform high-precision Earth observations. This technology is fundamental to ensuring the stability and quality of images captured from space. The development reaffirms Japan's leadership in the small satellite and environmental monitoring sectors.","link":"https://www.axelspace.com/ja/news/grus-3_interview_5/","categoria":"SCIENCE","lang":"en"},{"fonte":"gunma-u.ac.jp","pais":"Japan","titulo":"Project selected to develop technology for dredging and valorizing dam sediments","resumo":"The Ministry of Land, Infrastructure, Transport and Tourism has approved a project focused on sediment management in dams. The technology aims to transform accumulated debris into high-value-added resources, optimizing water maintenance. The initiative integrates circular economy practices with large-scale civil engineering.","link":"https://www.gunma-u.ac.jp/information/252396","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"日本経済新聞","pais":"Japan","titulo":"NVIDIA supports Toyota's Woven City with technology focused on Physical AI","resumo":"NVIDIA is providing specialized technical support for Toyota's 'Woven City,' a living laboratory for future technologies. The primary focus is the implementation of Physical AI to optimize mobility and services within this smart city. This collaboration reinforces the integration between global tech giants and urban development.","link":"https://www.nikkei.com/article/DGXZQOUC154MR0V10C26A7000000/","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"新浪新闻_手机新浪网","pais":"China","titulo":"Decoding the high-tech economy: fiber optics as the backbone of AI computing","resumo":"China is consolidating its global leadership in fiber optic infrastructure, which is essential for sustaining the massive demand for AI computational power. This technological advancement drives digital network efficiency, ensuring the country remains at the forefront of the global tech race.","link":"https://news.sina.com.cn/gov/2026-07-16/doc-inihyupy7687458.shtml","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"nsfc.gov.cn","pais":"China","titulo":"Shuangqing Forum: AI for Science (AI4S) as a strategic direction for global innovation","resumo":"The 448th Shuangqing Forum debated the integration of Artificial Intelligence with science, highlighting AI4S as a fundamental pillar for the Chinese innovation ecosystem. The conference established pathways for the practical implementation of these technologies, aimed at accelerating complex scientific discoveries.","link":"https://www.nsfc.gov.cn/p1/3381/2821/138976.html","categoria":"SCIENCE","lang":"en"},{"fonte":"新京报","pais":"China","titulo":"Full steam ahead on the STAR Market: 12 companies awarded the National Scientific Progress Award","resumo":"Companies listed on the STAR Market demonstrated their technological robustness by receiving 12 distinctions in this year's National Scientific and Technological Progress Awards. The achievement reinforces the strategic role of these companies in developing cutting-edge technical capabilities in China.","link":"https://www.bjnews.com.cn/detail/1784185728129470.html","categoria":"BUSINESS","lang":"en"},{"fonte":"chinanews.com.cn","pais":"China","titulo":"508 national standards published covering high technology and quality of life","resumo":"The Chinese government has formalized 508 new national standards focused on optimizing high-tech sectors and improving the daily lives of citizens. These guidelines aim to standardize industrial processes, promote digital security, and raise the quality of public and private services offered in the country.","link":"https://www.chinanews.com.cn/cj/2026/07-16/10 resence with the MG brand, evolving from a strategy focused solely on sales volume to leadership based on technical innovation. The brand's success in the British market illustrates the rise of the Chinese automotive industry as a technological powerhouse.","link":"https://www.bjnews.com.cn/detail/1784113719129001.html","categoria":"BUSINESS","lang":"en"},{"fonte":"Shiksha","pais":"India","titulo":"MAHE partners with Dhruva Space to co-develop space technology center","resumo":"MAHE has teamed up with Dhruva Space to establish a new center dedicated to developing space technologies. This collaboration aims to foster academic and industrial innovation, empowering students and researchers to tackle complex challenges in the aerospace sector. The initiative strengthens India's position in the global landscape of space exploration and engineering.","link":"https://www.shiksha.com/news/engineering-mahe-partners-with-dhruva-space-to-co-develop-space-technology-centre-blogId-236073","categoria":"SPACE SCIENCE","lang":"en"},{"fonte":"The Indian Express","pais":"India","titulo":"Nvidia unveils Jetson Thor T3000 and T2000 modules to accelerate robotics","resumo":"Nvidia has announced the launch of the Jetson Thor T3000 and T2000 modules, designed specifically to power the next generation of autonomous robotics. With advanced computational capabilities, these new hardware components allow machines to perform complex tasks with greater efficiency and precision. This innovation promises to accelerate the integration of intelligent robots across various industrial and commercial sectors.","link":"https://indianexpress.com/article/technology/artificial-intelligence/nvidia-jetson-thor-t3000-t2000-modules-robotics-10789193/","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"orissadiary.com","pais":"India","titulo":"Border infrastructure to remain indispensable in future technology-driven warfare","resumo":"During the BRO Strategic Infrastructure Conclave, the Defense Minister emphasized the critical importance of border infrastructure for national security. The debate highlighted how technological advances in modern warfare require resilient and technologically equipped physical bases. The strategy focuses on operational readiness in an increasingly digitized geopolitical environment.","link":"https://orissadiary.com/border-infrastructure-to-remain-indispensable-in-future-technology-driven-warfare-raksha-mantri-at-bro-strategic-infrastructure-conclave/","categoria":"DEFENSE TECHNOLOGY","lang":"en"},{"fonte":"BioSpectrum India","pais":"India","titulo":"Translational Health Science and Technology Institute hosts 3rd industry meet 'SYNCHN 2026'","resumo":"The Translational Health Science and Technology Institute held the 'SYNCHN 2026' event, focused on strengthening ties between academia and industry. The meeting sought to translate lab discoveries into practical, commercializable solutions, accelerating the innovation cycle. The initiative is fundamental to connecting the scientific sector with the demands of the Indian healthcare and technology market.","link":"https://www.biospectrumindia.com/news/16/28133/translational-health-science-and-technology-institute-hosts-3rd-industry-meet-synchn-2026.html","categoria":"SCIENCE","lang":"en"},{"fonte":"India Education Diary","pais":"India","titulo":"Ministry of Power releases draft of Corporate Average Fuel Economy (CAFE – III) norms for consultation","resumo":"The Indian Ministry of Power has initiated public consultation on the new CAFE-III norms, aiming to improve energy efficiency in the automotive and industrial sectors. The draft sets rigorous goals for reducing fuel consumption, encouraging the adoption of sustainable technologies. The measure is a strategic step to align the country with global decarbonization goals.","link":"https://indiaeducationdiary.in/ministry-of-power-circulates-the-draft-corporate-average-fuel-economy-2027-norms-cafe-iii-for-stakeholder-consultation/","categoria":"SUSTAIN iness/india-business/new-technology-helps-epfo-clear-claims-faster/articleshow/132427315.cms","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"SAPO","pais":"Portugal","titulo":"Lyntia completes modernization of its IP backbone network with Nokia technology","resumo":"Lyntia has finalized a critical upgrade of its IP network infrastructure using advanced Nokia solutions. This project aims to increase scalability, efficiency, and bandwidth to support the growing demand for digital connectivity across its backbone network.","link":"https://sapo.pt/artigo/lyntia-conclui-a-modernizacao-da-sua-rede-troncal-ip-com-tecnologia-da-nokia-6a587fae935537d500f1d362","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"HealthNews","pais":"Portugal","titulo":"WASOG 2026: Hospital de São João broadcasts unprecedented cryobiopsy using CBCT technology","resumo":"During the WASOG 2026 congress, the Hospital de São João conducted a live demonstration of an innovative pulmonary cryobiopsy. The procedure used high-precision CBCT technology, allowing for real-time three-dimensional visualization that raises the standard for complex medical diagnostics.","link":"https://healthnews.pt/2026/07/16/wasog-2026-hospital-de-sao-joao-transmite-criobiopsia-inedita-com-tecnologia-cbct/","categoria":"SCIENCE","lang":"en"},{"fonte":"Expresso","pais":"Portugal","titulo":"Advanced materials: the stuff the future is made of","resumo":"The development of new materials is transforming vital sectors of the economy and modern engineering. By manipulating properties at the nanoscale, scientists and engineers are creating more resistant and sustainable components that underpin the technological innovations of the coming decades.","link":"https://expresso.pt/opiniao/2026-07-16-materiais-avancados-a-materia-de-que-se-faz-o-futuro-e209add4","categoria":"SCIENCE","lang":"en"},{"fonte":"Médio Tejo","pais":"Portugal","titulo":"ULS Médio Tejo tests innovative, non-invasive technology for treating chronic lower back pain","resumo":"The Local Health Unit of Médio Tejo has begun trials with a pioneering, non-invasive technology for patients with chronic lower back pain. This approach aims to reduce reliance on pharmaceuticals, offering an effective therapeutic alternative that significantly improves patients' quality of life.","link":"https://mediotejo.net/uls-medio-tejo-testa-tecnologia-inovadora-e-nao-invasiva-no-tratamento-da-dor-lombar-cronica/","categoria":"HEALTH TECHNOLOGY","lang":"en"},{"fonte":"SIC Notícias","pais":"Portugal","titulo":"Updated Renault Megane E-Tech Electric promises greater range and integrated Google technology","resumo":"The new Renault Megane E-Tech Electric hits the market with significant optimizations to its range and energy efficiency. A highlight is the native integration of Google services, which provides a much smoother and more connected infotainment experience for drivers.","link":"https://sicnoticias.pt/programas/volante/2026-07-15-video-renault-megane-e-tech-electric-renovado-promete-maior-autonomia-e-tecnologia-google-integrada-1acf221e","categoria":"TRENDING TOPICS","lang":"en"}];

  const searchInput = document.getElementById('search');
  const langSelect = document.getElementById('lang');
  const countrySelect = document.getElementById('country');
  const categorySelect = document.getElementById('category');
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');
  const clearBtn = document.getElementById('clear-filters');

  // Utility de escape HTML simples para prevenir injections em propriedades sem tratamento
  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function populateSelects() {
    const lang = langSelect.value;
    const currentData = data.filter(d => d.lang === lang);

    const countries = [...new Set(currentData.map(d => d.pais))].filter(Boolean).sort();
    const categories = [...new Set(currentData.map(d => d.categoria))].filter(Boolean).sort();

    const currentCountry = countrySelect.value;
    const currentCategory = categorySelect.value;

    countrySelect.innerHTML = '<option value="all">Todos / All</option>';
    categorySelect.innerHTML = '<option value="all">Todas / All</option>';

    countries.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      countrySelect.appendChild(opt);
    });

    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      categorySelect.appendChild(opt);
    });

    if (currentCountry !== 'all' && countries.includes(currentCountry)) {
      countrySelect.value = currentCountry;
    }
    if (currentCategory !== 'all' && categories.includes(currentCategory)) {
      categorySelect.value = currentCategory;
    }
  }

  function render(items) {
    countEl.textContent = `${items.length} notícia${items.length !== 1 ? 's' : ''}`;
    
    grid.innerHTML = items.map(item => {
      const readMoreTxt = item.lang === 'pt' ? 'Ler mais' : 'Read more';
      
      const bulletList = (item.resumo || '').split('\n')
        .filter(Boolean)
        .map(line => `<li>${esc(line.replace(/^- /, ''))}</li>`)
        .join('');

      return `
        <div class="news-card">
          <div class="card-meta">
            <span class="category">${esc(item.categoria) || 'Geral'}</span>
            <span class="country">${esc(item.pais) || 'Global'}</span>
          </div>
          <h3 class="card-title">${esc(item.titulo)}</h3>
          <div class="card-summary">
            <ul>${bulletList}</ul>
          </div>
          <div class="card-footer">
            <a href="${esc(item.link)}" target="_blank" class="read-more">
              ${readMoreTxt} &rarr;
            </a>
            <span class="source">${esc(item.fonte)}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterData() {
    const query = searchInput.value.toLowerCase();
    const lang = langSelect.value;
    const country = countrySelect.value;
    const category = categorySelect.value;

    const filtered = data.filter(item => {
      const matchLang = item.lang === lang;
      const matchCountry = country === 'all' || item.pais === country;
      const matchCategory = category === 'all' || item.categoria === category;
      const matchSearch = query === '' 
        || (item.titulo || '').toLowerCase().includes(query)
        || (item.resumo || '').toLowerCase().includes(query)
        || (item.fonte || '').toLowerCase().includes(query);

      return matchLang && matchCountry && matchCategory && matchSearch;
    });

    render(filtered);
  }

  // Binds
  searchInput.addEventListener('input', filterData);
  langSelect.addEventListener('change', () => {
    populateSelects();
    filterData();
  });
  countrySelect.addEventListener('change', filterData);
  categorySelect.addEventListener('change', filterData);
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    countrySelect.value = 'all';
    categorySelect.value = 'all';
    filterData();
  });

  // Initialization
  populateSelects();
  filterData(); // trigger first render
</script>
</body>
</html>
