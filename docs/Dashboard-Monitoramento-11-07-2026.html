<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - International Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0B0F19;
      --bg-panel: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #E2E8F0;
      --text-muted: #94A3B8;
      --accent: #D4AF37;
      --accent-hover: #FDE047;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.15), transparent 400px),
                        radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.05), transparent 400px);
    }
    header {
      padding: 1.5rem 5%;
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo-img {
      height: 48px; /* Altura ajustável do logo */
      width: auto;
      object-fit: contain;
      border-radius: 8px; /* Caso não seja transparente */
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .logo-text span {
      color: var(--accent);
    }
    .date-badge {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      color: var(--accent);
      font-weight: 600;
    }
    .container {
      padding: 2rem 5%;
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }
    .filters {
      flex: 0 0 300px;
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 6rem;
    }
    .filter-group {
      margin-bottom: 1.5rem;
    }
    .filter-group label {
      display: block;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
    }
    select option {
      background: var(--bg-main);
      color: var(--text-main);
    }
    .results {
      flex: 1;
    }
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .results-count {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .news-card {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .news-card:hover {
      transform: translateY(-4px);
      border-color: rgba(212, 175, 55, 0.5);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }
    .category {
      color: var(--accent);
    }
    .country {
      color: var(--text-muted);
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.4;
      margin: 0 0 1rem 0;
      color: #fff;
    }
    .card-summary {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-muted);
      flex: 1;
    }
    .card-summary ul {
      margin: 0;
      padding-left: 1.2rem;
    }
    .card-summary li {
      margin-bottom: 0.25rem;
    }
    .card-footer {
      margin-top: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--glass-border);
      padding-top: 1rem;
    }
    .read-more {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .read-more:hover {
      color: var(--accent-hover);
    }
    .source {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    /* Simple CSS reset/scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: var(--bg-panel); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .filters {
        flex: none;
        width: 100%;
        position: static;
        box-sizing: border-box;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-container">
    <img src="logo.jpg" alt="TAP Logo" class="logo-img" onerror="this.style.display='none'">
    <div class="logo-text">Monitoramento<span>Internacional</span></div>
  </div>
  <div class="date-badge">11/07/2026</div>
</header>

<div class="container">
  <aside class="filters">
    <div class="filter-group">
      <label for="search">Busca / Search</label>
      <input type="text" id="search" placeholder="Palavra-chave...">
    </div>
    
    <div class="filter-group">
      <label for="lang">Idioma / Language</label>
      <select id="lang">
        <option value="pt">Português (PT-BR)</option>
        <option value="en">English (US)</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="country">País / Country</label>
      <select id="country">
        <option value="all">Todos / All</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="category">Categoria / Category</label>
      <select id="category">
        <option value="all">Todas / All</option>
      </select>
    </div>
  </aside>

  <main class="results">
    <div class="results-header">
      <h2 style="margin: 0; font-size: 1.5rem; color: #fff;">Resultados</h2>
      <span class="results-count" id="count">0 notícias</span>
    </div>
    <div class="news-grid" id="grid">
      <!-- Injected by JS -->
    </div>
  </main>
</div>

o eficiente dos recursos hídricos.","link":"https://news.google.com/rss/articles/CBMiZkFVX3lxTFBRcnNsS0Y2Y0ZzN2diVTFyUFByeVlMRjBEbFpwYkk1UXl0aTZtWU9ESUFzY2NnaXpLel95d1hYZ1JvX0dlWF92RGpMLTEwSGJKMF83RTMyNnJXZEdBMUVGeXQwN3dqZw?oc=5","fonte":"Phys.org","categoria":"CIÊNCIA, AMBIENTE","lang":"pt"},{"pais":"Estados Unidos","titulo":"Como a tecnologia pode conectar os pontos entre problema e solução","resumo":"A Greenhouse Grower explora o papel transformador da tecnologia na identificação e resolução de problemas complexos em diversas indústrias, com foco no setor agrícola. O artigo ilustra como ferramentas digitais, inteligência artificial e análise de dados podem mapear desafios e propor soluções inovadoras. Essa perspectiva enfatiza a capacidade da tecnologia de otimizar processos, aumentar a eficiência e fomentar a inovação em cenários práticos.","link":"https://news.google.com/rss/articles/CBMirgFBVV95cUxPVno0QjBEYy1hTDg4NjBFMmpJeXZRd3Ntc3J4MVM2bktKMjV2ZFUwLXNjNE5 ConjuYW_d2VmFPQ2RlYmZGa3dZQUNyaE9DbmhIV0U5azR1bXVxNkt4bV9NT25TZ1RmM1lDMHNJdnRYQm1idU1LR0d5dUNiZHFVTXdnNjR4WnF5bHhUaTNXNjlPUlRKbU9RSE92a2ZnY3lQQmxQc1NIVGRwb2ZlTkcxdWfSAbMBQVVfeXFMTTNwZkx0YnpGUmNPVVV4UTJlUEtVUk5ZeThvVzBPdS0yVjVwZ191VVgxX3JCTElrME54ZzhXR0k2RU9iVDNkTTd0Nzk1eDlHM1VNN1FfajhINzdhOWNPM01rS3FQU3AwVWVlVDV5QkJZX3dsTGl4cDZ1S25HM1YtcEhxdU85Mk5FNVlPd3BEY0RqYk1MYVRWYVpBNm4wZ1p6RWFWYktydkRlNFBrNTFSRWkxVVk?oc=5","fonte":"Greenhouse Grower","categoria":"TECNOLOGIA, INOVAÇÃO","lang":"pt"},{"pais":"Estados Unidos","titulo":"Insights da Semana: Ações fora do núcleo de tecnologia ganham espaço nos EUA","resumo":"A CNN Brasil analisa uma mudança de cenário no mercado de ações dos EUA, onde empresas de setores tradicionais estão ganhando destaque, além das gigantes de tecnologia. Essa tendência sugere uma diversificação nos portfólios de investidores, buscando oportunidades em segmentos menos expostos às flutuações voláteis do setor tecnológico. A movimentação indica uma possível reavaliação do valor de mercado e a busca por maior estabilidade econômica, refletindo um amadurecimento do mercado.","link":"https://news.google.com/rss/articles/CBMiswFBVV95cUxNV1czdXRvOVBOSU90M1ZRMU5KelRWWFNGSVRPZVVpVm02ZHRKVWpLel9mUENwU19BRDZZcF9VNF9DUm94c0E0ZHZKV3VseDh1clJYVUtsb0drZExWUW5LcVFLdXRJZHFVWVRGX191LTQ4b0NkRmZXdjZEeUJQYk9jTzlDSlJxSDk1cGZwWTRDZkxsYVd3M2VfdTZFYV9wUzRGeEFYWWd1YkN2RWlQV050NUlNNA?oc=5","fonte":"CNN Brasil","categoria":"MERCADO, ECONOMIA","lang":"pt"},{"pais":"Estados Unidos","titulo":"Jogo College Football 27 recebe grandes atualizações após revolta dos fãs","resumo":"O jogo College Football 27, muito aguardado, está recebendo atualizações significativas em resposta à forte insatisfação da comunidade de fãs. A decisão dos desenvolvedores em atender às críticas e implementar melhorias reflete a crescente influência dos consumidores na indústria de videogames. Este caso destaca a importância do feedback da comunidade e a agilidade das empresas em ajustar seus produtos para garantir a lealdade e satisfação dos jogadores.","link":"https://news.google.com/rss/articles/CBMi0AFBVV95cUxNdWRnbmExR2xkRThibmtxUXo5Y2Z3a1NLS0dRTGtGUktBMy10QkYxLVVSNmtfd0t3T19oQ01OdnNpWHc3VmdDcWRZZWFDVGttNW56UThpUS1FbDgxRWJ2TFRaeTlFOS1qdXRvZGxBUTZxb2FNTHdENWhZZW5OX0tPQ1paajJKRWZKVDVVY3FQX3JfUExEZC1EMDNLMGxVSGo5amVFNDk0bzFPLUNGRVVHTFRRNjd6dmo2VVcwa0xjcmZmRWFQdUdPWENnVzdUai02?oc=5","fonte":"USA Today","categoria":"JOGOS, TENDÊNCIA","lang":"pt"},{"pais":"Estados Unidos","titulo":"Diante da política de Trump, pesquisadores americanos deixam os EUA para a França","resumo":"A BFM relata que diversos pesquisadores americanos têm se mudado para a França em resposta às políticas implementadas durante o governo Trump, as quais impactaram o financiamento e a liberdade acadêmica nos EUA. Essa \"fuga de cérebros\" ilustra as consequências diretas de decisões políticas na comunidade científica e na pesquisa. O movimento destaca a busca por ambientes mais favoráveis à ciência e à inovação em outros países.","link":"htt icles/CBMigAJBVV95cUxQWFBRQ282cTRnUmhhanRYenB5b3NNN3E3SjNYajRNcUE2MWxLSWQ1T19hWHNkQUZWZmttQkQzZE1YdmJ0WGhFSFFDR0cwWVVFcFRlX2otRnQ5X29Vc240VXlzUVEPeEJsLVlVcW1ycDRJMTZsTlBMQVB2UEp0dlRSSlJxQmQ2S0FFdmhoV29Zdm93RW04NUk2cG5wcUtKSm02emJQWnRPTlluTmtXaWthTjdLOWdBenBRMXhrUTR4a2RPSGVxN3NSNVBkaEtiNjN1VUpIZmNCYTY0a00tMTVXd2dDbFoxVUhFdDRwcTlEcV80UkFCUXQ3T1NfMk9LMmhR?oc=5","fonte":"Outre-mer La 1ère","categoria":"ESPAÇO, ECONOMIA","lang":"pt"},{"pais":"França","titulo":"A ciência finalmente identificou o \"interruptor\" que reativa o câncer de mama após anos de remissão.","resumo":"Pesquisadores fizeram uma descoberta inovadora ao identificar um mecanismo molecular que age como um \"interruptor\" para reativar células de câncer de mama dormentes, mesmo após longos períodos de remissão. Esta revelação é crucial para entender as metástases tardias e a recidiva da doença. O achado abre novas perspectivas para o desenvolvimento de terapias preventivas e tratamentos mais eficazes.","link":"https://news.google.com/rss/articles/CBMixgFBVV95cUxPUE1iY09QNVI1SWtwNWlSUU05TllMNHZlU3dOZUZzbXdQUjNfRE5fWlZQSUxSblctT0hVM1FTWWNzT1hXbl84WGNQNHplaUhUbFNrREJUampkRnR1UFpfa095bzBKdzFzY1NEYi1jYVdCdHVtX0YxTHE4akp6SFJzMmZSUWowZnk0dkxoeVNqQXVaMGFvcUx2THl2SnB4a251aGFSenBWUEtrZC1nOHYyOE9WOFpzeTJBeE5sVHJBeWNqcXBmQ0E?oc=5","fonte":"Sciencepost","categoria":"CIÊNCIA, SAÚDE","lang":"pt"},{"pais":"França","titulo":"Uma lei de Nova Jersey proibiria a tecnologia de robotáxis com câmeras da Tesla.","resumo":"Uma proposta de lei em Nova Jersey busca proibir a operação de robotáxis que utilizam apenas câmeras, como os da Tesla, exigindo a inclusão de outras tecnologias como radares ou LiDAR. A medida levanta debates sobre segurança, regulamentação de veículos autônomos e o futuro da inteligência artificial na mobilidade urbana. A decisão pode ter implicações significativas para a estratégia da Tesla e o avanço da tecnologia autônoma.","link":"https://news.google.com/rss/articles/CBMikgFBVV95cUxOdEVXN09KUkM0cFB6Sl9MTTV o":"Sorvetes, bebidas, hotéis climatizados: como a onda de calor impulsionou a economia francesa.","resumo":"A recente onda de calor na França gerou um impacto econômico paradoxal, impulsionando a demanda por produtos e serviços específicos. Setores como a venda de sorvetes e bebidas, além da ocupação de hotéis com ar-condicionado, registraram aumento significativo. Este fenômeno ressalta a capacidade de adaptação do mercado e a influência de eventos climáticos extremos no consumo e na economia.","link":"https://news.google.com/rss/articles/CBMiqwFBVV95cUxOb1ZrV2VMWl8zemJkaTl6SUNVQTFnQ1hoN3RFTFBtSzVtUlJ6ZmMyVm1GVE83MXFUZlIxZVFqNURFRTJYN0NvM3RFVF9CcTQ5Njh2SVhmOVZ2eDJSNjVhZzdYQlctSnlPei01TUljU1VTak5BdXRDVzY3Yk1vRzRpT1BMcEZXNHpaLWFVYllDTVZxdXhRYTVvOVFUcU9IdFZ0cWF4cWxXV0JpUTg?oc=5","fonte":"Yahoo Finance France","categoria":"TENDÊNCIAS, ECONOMIA","lang":"pt"},{"pais":"França","titulo":"\"Não podemos parar a economia de um país que está em dificuldades só porque faz 40°C\", insiste Caroline Pilastre.","resumo":"Em meio a ondas de calor extremas na França, Caroline Pilastre defende que a economia do país não pode ser paralisada devido às altas temperaturas. A declaração ressalta o dilema entre a saúde pública e a produtividade econômica em face das mudanças climáticas. O debate evidencia os desafios de adaptação e a necessidade de políticas que conciliem bem-estar social e resiliência econômica.","link":"https://news.google.com/rss/articles/CBMiugFBVV95cUxObHBjT1ZncjVlOV9ycWpDQnFzNml4NkpxWWFxeXZ6akxFTFRqX0dvOE1NeVltcmdZY1lKam9GejN2RTJqaFBYNUF2T0tmdjcyOXVueXJQNnR6cmdKNktsaC14RzBaRjVLai1qcGtCT2Y5YzkyR0lWTlNobkRwaDZRQ204WTRzRjVyYnVrbXYxQUszbGc1dnNXMWllV2RteUtmZG8taHM3eU5venJpcW11b3FmaFVyOXpQN2fSAb8BQVVfeXFMT25sOWt6bXRfR0dlSTVhMTdMcm1vclV6NVRzNjNodjVlM0Z6eUdza1htS0c5RU5Xd01jS24yMW1QWEVCWFZkV29pVmlaZG43dzh2cVRtUTc5XzZjR3E0QXFlLWJyeXN5NENUVHRaZUVJSFFLTjNzZHE4WjZYLWhXQ2o4REplXzlUb3RndUxoMlB4Xy1DazZna3V2Yk94YjFHcF9Qd3JCeXJYOXUxTkRoMUpsSFpGYVR4bzRMUWFZeEk?oc=5","fonte":"CNews","categoria":"CLIMA, ECONOMIA","lang":"pt"},{"pais":"Inglaterra","titulo":"Tecnologia de 'vida espelhada' preocupa cientistas do Relógio do Juízo Final. Entenda o porquê.","resumo":"Cientistas do Boletim dos Cientistas Atômicos expressam preocupação com a tecnologia de \"vida espelhada\", ou simulações digitais que replicam aspectos da vida real, temendo seu potencial para desestabilizar a sociedade e exacerbar riscos existenciais. A proximidade da humanidade do \"Juízo Final\", simbolizada pelo Relógio do Juízo Final, é intensificada por avanços tecnológicos sem regulamentação ética, levantando questões sobre controle e manipulação. Eles alertam para a necessidade urgente de debate e diretrizes para evitar cenários catastróficos.","link":"https://news.google.com/rss/articles/CBMirwFBVV95cUxPOVNVTEJoVklGZ3hrWVp5OTVCT3BzNUpNT20yNVFjN2tTa2ppckR6YTAyMWNIT1VhZE9sUXJsRnpWTXZTWW8ybXZ0ZUdpQVF4SGF2YUhkRnRLT1JBSk1GeERKdmFwcXJhRm9INDdBUFNZX01zZXRTcVBocXlPWnhFdHBXQkNQWjhmTHhuREFaU2s1WHEtNmlpTXZDMVh6dC13OFZjTk52NmxwQTEtVmNv?oc=5","fonte":"ABC News & Headlines – Australian Broadcasting Corporation","categoria":"TECNOLOGIA","lang":"pt"},{"pais":"Inglaterra","titulo":"A ciência por trás dos jogadores que usam máscaras na Copa do Mundo","resumo":"Muitos jogadores na Copa do Mundo utilizam máscaras protetoras, geralmente para se recuperar de lesões faciais como fraturas no nariz ou maçãs do rosto. Essas máscaras são feitas sob medida com materiais leves e resistentes, como fibra de carbono, para proteger a área lesionada sem atrapalhar a visão ou o desempenho atlético. O design personalizado e a ciência dos materiais são cruciais para garantir segurança e conforto, permitindo que os atletas continuem competindo em alto nível.","link":"https://news.google.com/rss/articles/CBMilwFBVV95cUxPTVFfOHpkMTVaSnF5cERlelMyVlpUeXVfTEx1bVlTeGtoRlVPME12MjMwclByXzBPaVNJTHFIM2k2M2tkTWtyWjRkVzlIM04wWlJBa0pmMFZHaWI4bWJzUDViWEt4cXE3aDl3WXRVaHlEdS1BYzR0eDJ0RF9RY2Y0TnhVcVRRcWpYcXFKLWllc2hJZVVRWXZJ?oc=5","fonte":"The Independent","categoria":"CIÊNCIA ESPORTE","lang":"pt"},{"pais":"Inglaterra","titulo":"Kalfresh faz parceria com líder global em tecnologia de bioenergia","resumo":"A empresa Kalfresh estabeleceu uma parceria estratégica com um líder global em tecnologia de bioenergia, visando otimizar a gestão de resíduos agrícolas e a produção de energia sustentável. Esta colaboração permitirá a implementação de soluções inovadoras para converter biomassa em fontes de energia renovável, reduzindo o impacto ambiental e promovendo a economia circular. A iniciativa representa um avanço significativo no setor agrícola e energético, impulsionando a sustentabilidade e a eficiência operacional.","link":"https://news.google.com/rss/articles/CBMipgFBVV95cUxQMUNPOVljdnJyYjBzdlFxcTNSTHpjcGY3aG5pdEJNcmdBY3I3U0pGb0VkTUNMcjZBWVJBWmZVdUE5LVY0TW9oRXdjcmpCcTM0anNreDVpRWpSUlpqQUl3RUZiZThjUzY5N0VRUzdHLVJqbUZySWM5anVvYTR5aXNLTTdIMzJlVmxvV1ZUa0lBNEpwVDJJNjBwTGdheFJHZGZMQnVZNEZn?oc=5","fonte":"Machinery Market","categoria":"BIOENERGIA","lang":"pt"},{"pais":"Inglaterra","titulo":"A camisa está voltando para casa: JD Sports e Uber Eats lançam entrega rápida de camisas de futebol","resumo":"A JD Sports e o Uber Eats uniram forças para lançar um serviço inovador de entrega rápida de camisas de futebol, respondendo à crescente demanda dos fãs por produtos licenciados. A parceria utiliza a vasta rede de logística do Uber Eats para garantir que os torcedores recebam suas camisas em tempo recorde, especialmente durante eventos esportivos importantes. Esta iniciativa representa uma evolução no e-commerce esportivo, combinando conveniência e agilidade para a experiência do consumidor.","link":"https://news.google.com/rss/articles/CBMiqgFBVV95cUxNYlVIQ0dKcmJmaGEyYV93M2hJS2cxdThkRkFhbXB0aUEwZFdEWGxTSVVEaHlyQUc0R1drT01MUXRfeXlwWjFJTEJZajY4Z3FHSzQwLTlDNzBibmU0Tm41M1pEQUlEcExiUkFhUGFDbzhwTXJpclJQWWRJOHQwamMwUUdSR0paM1JxQUxoWE9OckNiUHM1aXRTdmpEaFJDdWF6UHYyUGZjUFFndw?oc=5","fonte":"Retail Times","categoria":"VAREJO TECNOLOGIA","lang":"pt"},{"pais":"Inglaterra","titulo":"magniX expande tecnologia de energia aeroespacial para soluções energéticas","resumo":"A magniX, conhecida por sua liderança em propulsão elétrica para aeronaves, está diversificando suas operações ao expandir sua tecnologia de energia aeroespacial para o setor de soluções energéticas mais amplas. Esta mudança estratégica visa aplicar a expertise da empresa em eletrificação e sistemas de energia de alta performance a outras indústrias, como a geração e armazenamento de energia. A iniciativa demonstra o potencial de tecnologias avançadas de aviação para impulsionar a transição energética e desenvolver aplicações sustentáveis em diversos mercados.","link":"https://news.google.com/rss/articles/CBMieEFVX3lxTFBIZGpXYmlFSzhfMFVLeGhoOFFJdVlwYndXMG1odkhuQ3AybUcyOWtnb0JnZ0tJTlA4NW5fRmpRZU5ycVdKWW5CaFB5dXYwbjd5VWlxMDJtWHVrNXlEd1BZX3p6ekRKSURlNXpFYmUzNEFUSVk2X01KUA?oc=5","fonte":"ADS Advance","categoria":"ENERGIA TECNOLOGIA","lang":"pt"},{"pais":"Inglaterra","titulo":"Seis maneiras de fazer as crianças comerem vegetais, segundo a ciência","resumo":"Pesquisas científicas revelam estratégias eficazes para incentivar as crianças a consumirem mais vegetais, abordando desafios comuns na alimentação infantil. O artigo da BBC destaca métodos baseados em evidências, como a exposição repetida, o envolvimento das crianças no preparo das refeições e a apresentação criativa dos alimentos. Essas abordagens visam transformar a percepção das crianças sobre vegetais, promovendo hábitos alimentares mais saudáveis desde cedo e impactando positivamente seu desenvolvimento.","link":"https://news.google.com/rss/articles/CBMiXEFVX3lxTE5STVVndjR4WXN2aTFyZGMzYUU5cExxYzFNWDRqYXFScU54TlFzVzhXZm02Z2FlU2RMSTNIbjNZVWZfR3ZSdDgxUThGOXB6TjJlZkJiRWxnbmM3MHhL0gFiQVVfeXFMTmhLb3hHdFR1R2tvSXJaeWxVTWdwUXd1STVtRm5CanhwUlpUUFdyaU83SXROZHpPSmtNUmpYWmYtem12YU5KakEwajlwb001QVdBaEpESS0wUWNrQmdQT2tmV0E?oc=5","fonte":"BBC","categoria":"CIÊNCIA SAÚDE","lang":"pt"},{"pais":"Inglaterra","titulo":"Notícias da ciência desta semana: Tempo surge em mini-universo, cientistas engrossam gelo do Ártico e uma das sepulturas mais antigas de pessoa negra livre nos EUA é encontrada","resumo":"Esta semana, a ciência nos trouxe descobertas notáveis, incluindo a emergência do conceito de tempo dentro de um \"mini-universo\" em estudos teóricos. Simultaneamente, pesquisadores estão explorando métodos para engrossar o gelo do Ártico, uma possível solução contra as mudanças climáticas, e arqueólogos nos EUA identificaram uma das mais antigas sepulturas de uma pessoa negra livre. Essas notícias abrangem física, meio ambiente e história, demonstrando a diversidade e o impacto contínuo da pesquisa científica.","link":"https://news.google.com/rss/articles/CBMirAJBVV95cUxObWpUZE9Bd19xbktlTHlZSTBFYkZ6VktXb1ppRUx4ZGItcFI3WTVSVUtvWTNkTzRiVEtHWjFSTzVOQ256TVpLOFBJcEtNeHF0YUcxeHFpYkpHSWVBTWlKQUZ2cVJGWFE0MDdBMXozWW5SYkVkZ0FYLXNHZkVLenpoeW1QSG1PVU9Ma3JtVjNlNnpPUC1rRWJJdnF5dlVEYWZGWU9ZMmhxU0FaMmZ4TnF6LUFqaFlYOUxpSVhMUWRXQXEwWTJnOEFZSlVDaVFoSzdpbUpFOUcwNnNfQnVaeU02LXBMQWdibFo2VDBQZVEzYTR0MGdsaWRxbzdBNEtnb2tnZ2NMVWhFeHRBWnhkc3pfNTFkcnlsY3RnLXlyazR3TDJMUVROdlR2aXNBSEE?oc=5","fonte":"Live Science","categoria":"MÚLTIPLA CIÊNCIA","lang":"pt"},{"pais":"Inglaterra","titulo":"A ciência de aprimorar o vinho Bordeaux","resumo":"A indústria vinícola de Bordeaux está aplicando princípios científicos avançados para otimizar a qualidade e a sustentabilidade de seus vinhos. Desde a compreensão do terroir e a genética das uvas até técnicas de vinificação inovadoras e adaptação às mudanças climáticas, a ciência desempenha um papel crucial. Este foco científico visa não apenas preservar a reputação dos vinhos Bordeaux, mas também garantir sua excelência e resiliência em um cenário global em constante evolução.","link":"https://news.google.com/rss/articles/CBMicEFVX3lxTE1JZ3ZIdS1sMlU1VmVUbW02Q3pvdWNHOW1xVHl5Q1JCdzhETTA2SDZ5Mk9FOFlzSkZZOVJLcHYxZVR5aXVHdGNsLUYyekpCYnduSVBfUDcyV ca.","resumo":"Um ano após incidentes com ursos-pardos em Fukushima, Hokkaido, a necessidade de análise científica aprofundada para compreender e mitigar conflitos entre humanos e vida selvagem tornou-se premente. A observação detalhada do comportamento dos animais e dos fatores ambientais é crucial para desenvolver estratégias eficazes de coexistência e segurança. Este enfoque visa proteger tanto a população quanto a fauna local, baseando-se em dados para decisões mais informadas.","link":"https://news.google.com/rss/articles/CBMiX0FVX3lxTE5pZk9CQ2JzZDJnakg3d1V3N1h4WkNuZ2N6NVV5OXVHaHJFSC11UHZodnBjeXVfS1VBYko1dDnuejQ3ZG83WDdiZ0FmX3dFQ1czS3BEbERDVVBDWFNOTVlj?oc=5","fonte":"NHKニュース","categoria":"CIÊNCIA, AMBIENTE","lang":"pt"},{"pais":"Japão","titulo":"Editorial: Observação do Asteroide pela Hayabusa2 é o Resultado de Desafios Tecnológicos Contínuos.","resumo":"O jornal Daily Shimbun celebra a missão Hayabusa2 como um triunfo da engenharia e da exploração espacial japonesa. A sonda, após superar inúmeros desafios, tem fornecido dados cruciais sobre asteroides, contribuindo significativamente para a compreensão da formação do sistema solar e da origem da vida. Este editorial destaca a persistência e a inovação tecnológica necessárias para alcançar feitos tão notáveis na ciência espacial.","link":"https://news.google.com/rss/articles/CBMiaEFVX3lxTE9RaF9Sdlg0Mk5PQnhaQS1KUUNxM0V1T0JCdmhKZVhEanJSZ2F5OHRrbHFQNkhhazNFTnlEWk9qbDdnNlNxbktiU0c3Vk1nbVV0WGFLcy1jSlF3OGJfYVdiaFduSU5LY3Vy?oc=5","fonte":"毎日新聞","categoria":"ESPAÇO, TECNOLOGIA","lang":"pt"},{"pais":"China","titulo":"AMD Lança Tecnologia de Codificação de Posição PEPS, Reduzindo Parâmetros de Compressão de Texturas Neurais em 25%","resumo":"A AMD apresentou sua inovadora tecnologia de codificação de posição PEPS, um avanço significativo que otimiza a compressão de texturas neurais. Esta novidade promete uma redução de 25% nos parâmetros de compressão, resultando em maior eficiência e melhor desempenho gráfico em aplicações. A implementação do PEPS deverá impactar positivamente o desenvolvimento de jogos e aplicações de inteligência artificial, impulsionando a próxima geração de gráficos e processamento visual.\n","link":"https://news.google.com/rss/articles/CBMiY0FVX3lxTE1pOGZWTkpNOFJpVmprMUJhdlpqdWM4TnhlNFpudEloTWVMUzF2TkRXeFVlSWlieVFPYWFXR2MyWGVVRzQ1SGFrZWtTYlFzcEZwOXRkd201bjhwcTBzSEUzZ3JHRQ?oc=5","fonte":"东方财富","categoria":"TECNOLOGIA","lang":"pt"},{"pais":"China","titulo":"Tecnologia de IA Autodesenvolvida pela NetEase em Colaboração com a Universidade de Zhejiang Ganha Prêmio Nacional de Progresso Científico","resumo":"A NetEase, em parceria com a Universidade de Zhejiang, foi premiada com o prestigioso Prêmio Nacional de Progresso Científico por sua tecnologia de inteligência artificial autodesenvolvida. Este reconhecimento destaca a inovação e o impacto da colaboração entre a indústria e a academia chinesa no campo da IA. A distinção valida os avanços em pesquisa e aplicação, consolidando a China como um polo de desenvolvimento em tecnologias de ponta.\n","link":"https://news.google.com/rss/articles/CBMicEFVX3lxTE5kaTRmSmJqTlJyMldXbXJVXzExZFZJWUcxcWt5ZUpMdGpoYVZwSkZLY2hTdFZSaXVoUDl0MnNzd2xvUXpGUW5CS2hvZUdCTjRIdDFhRVlyWUZGazk5Z3I3dlZDYlF4UEV4YXpxY3ByUFE?oc=5","fonte":"中国科技网","categoria":"CIÊNCIA & TECNOLOGIA","lang":"pt"},{"pais":"China","titulo":"Docentes e Alunos da Escola de Ciência e Tecnologia da Informação Ganham Prêmio de Artigo Destaque na Principal Conferência de Processamento de Linguagem Natural, ACL 2026","resumo":"A Escola de Ciência e Tecnologia da Informação celebrou a conquista de um prêmio de artigo de destaque na ACL 2026, uma das conferências mais importantes sobre Processamento de Linguagem Natural (PLN). Este reconhecimento internacional sublinha a excelência da pesquisa realizada por seus docentes e alunos no campo da inteligência artificial. O trabalho premiado representa um avanço significativo para a compreensão e aplicação de tecnologias de linguagem, fortalecendo a posição da China na vanguarda da IA global.\n","link":"https://news.google.com/rss/articles/CBMiV0FVX3lxTE9UQTNVaXpNcTdUaC16R0R4eUZPekVESXVJdVgzTFhZYUtWWkZWQURmWmdhWHZtTHRIVHBhS2JuanRVbTFZUzYxRTZLMzF4aTZFaUVxNkJ2aw?oc=5","fonte":"中国科大新闻网","categoria":"CIÊNCIA & IA","lang":"pt"},{"pais":"China","titulo":"Pela Primeira Vez em Quase 40 Anos, o Primeiro Prêmio Nacional de Ciências Naturais é Concedido a Três Projetos","resumo":"Em um evento histórico, o Primeiro Prêmio Nacional de Ciências Naturais da China foi atribuído a três projetos, algo inédito em quase quatro décadas. Este marco reflete o reconhecimento de avanços científicos excepcionais e de alto impacto no país, sublinhando a força da pesquisa fundamental chinesa. A premiação coletiva demonstra o compromisso do país em impulsionar a inovação e o progresso em diversas áreas do conhecimento, consolidando sua posição científica global.\n","link":"https://news.google.com/rss/articles/CBMipwFBVV95cUxQQ0wycXU5X3BFMWlQTGlHUEh0NzVKcnpYaHBJMlp1UFlzVXoxRjRvS3ZGNmZrUW9mcHJEWjQ1RXdNT2h6Tl9IeWYtUG5LTm45aURJeU9pX0lhVU15cEltQkZWMWRFTkNDV3JONEtULVE0TUlFbnBIeGdMZXJqRGg2WlBYeXVMcUJNb2Y3R2dudmgtRHpBTV91Q0I2am45VGxIVQ?oc=5","fonte":"新浪财经","categoria":"CIÊNCIA","lang":"pt"},{"pais":"China","titulo":"\"Tecnologias Chave de Engenharia da Ferrovia China-Laos\" Recebem o Segundo Prêmio Nacional de Progresso Científico e Tecnológico","resumo":"As tecnologias de engenharia essenciais desenvolvidas para a Ferrovia China-Laos foram agraciadas com o Segundo Prêmio Nacional de Progresso Científico e Tecnológico. Este reconhecimento celebra as inovações em infraestrutura e engenharia que permitiram a construção deste complexo projeto transfronteiriço. A premiação destaca a capacidade técnica da China em grandes obras de engenharia, com impacto direto na conectividade regional e no desenvolvimento de projetos de infraestrutura da iniciativa Cinturão e Rota.\n","link":"https://news.google.com/rss/articles/CBMifEFVV3lxTE9QOU9IdldlS2hmNXFia0pHbWVfbnViZmtmcTBjR19aa1UzeWxaVl91YWtmc2otWXJUMThRUnBZdGdsM2s4aHF0M0g2VEVjTHNVaTJERlFuQWxES05qUnQ3TVlsRElNYzM4aVBueGFZMGxkc3RBcXVveE5Od3c?oc=5","fonte":"China Daily","categoria":"ENGENHARIA & TECNOLOGIA","lang":"pt"},{"pais":"China","titulo":"Expo Internacional de Economia de Baixa Altitude de 2026 Será Realizada em 22 de Julho no Centro Nacional de Exposições e Convenções de Xangai","resumo":"Xangai sediará a Expo Internacional de Economia de Baixa Altitude de 2026 em 22 de julho, um evento crucial para o setor de tecnologias aéreas de curta distância. A exposição visa impulsionar inovações em drones, veículos aéreos urbanos (UAM) e mobilidade aérea avançada, reunindo as principais empresas e pesquisadores do setor. Este encontro reflete o crescente investimento da China em um mercado promissor que combina tecnologia e aplicações comerciais, como logística e transporte de passageiros, e representa uma tendência emergente global.\n","link":"https://news.google.com/rss/articles/CBMiiAFBVV95cUxPSlpFVmk2Q0xBUnN6TUIwNGpsOXlsT2w1YzUyVXFsZm9rVlNuLWxoRldFR2J3N043czI0bVU2V09DSXV2TjFtdlVKN2tRYThVRmhCU1RFTmU4NVBFUVNzSm9lc1dRclNPdFhFZ1lzeDA0MFI4Z2EtTmtCNHlILwhoVXZ3ak85MUlm?oc=5","fonte":"China","categoria":"TENDÊNCIA & TECNOLOGIA","lang":"pt"},{"pais":"China","titulo":"Modelos 2026 Yangwang U7/U8/U8L Lançados Simultaneamente com Tecnologia de Carregamento Rápido","resumo":"Os novos modelos 2026 da série Yangwang – U7, U8 e U8L – foram lançados simultaneamente, destacando-se pela incorporação de avançada tecnologia de carregamento rápido. Este lançamento posiciona a marca na vanguarda da inovação em veículos elétricos, prometendo maior conveniência e eficiência para os usuários. A adoção de carregamento ultrarrápido é um passo crucial para a aceitação e popularização de carros elétricos no mercado, reduzindo significativamente a ansiedade de autonomia e impulsionando a eletrificação do transporte.\n","link":"https://news.google.com/rss/articles/CBMickFVX3lxTE9QbFh  em Inteligência Artificial. Este fenômeno reflete uma mudança significativa nas preferências dos estudantes, que buscam alinhar suas carreiras com as demandas emergentes do mercado de trabalho global. A ascensão da IA no currículo educacional demonstra a importância crescente da tecnologia e da inovação no ensino superior indiano, preparando uma nova geração de profissionais para o futuro digital.","link":"https://news.google.com/rss/articles/CBMizgFBVV95cUxNTF9wX1FrNDF6Z3k3REJGeXBFaHZDOF8zbHBFdk5kWjZjZlZJLWtGdWhKX3BMdjhZQ29zdFZPQ0JnTkh5SzRBeE15OWVaS2NodHdib2VvZVRrRFVtYVY0MHZvbHlCQklTb1V2aEx6bjhXMXJGeHJ6bEc5QTZyanBZYkhsb05acGNpYnE4UkJlYkQ5UFhKQ0U5ZHRIVGpUclBuNW5RRUhrYmpScnFFTFhzMUV5WVpiV0xVdFllYzZpREx3ZnlFdlVndU5tOTdZUQ?oc=5","fonte":"Kerala Kaumudi","categoria":"EDUCAÇÃO, IA","lang":"pt"},{"pais":"Índia","titulo":"Físicos Contrastam Sensores Quânticos Para Ciência de Materiais","resumo":"Pesquisadores em física estão explorando e comparando diferentes abordagens de sensores quânticos para avançar a ciência de materiais. Esta pesquisa é crucial para desenvolver novas tecnologias com propriedades materiais aprimoradas, que podem levar a inovações em eletrônicos, energia e medicina. O contraste entre os sensores quânticos visa otimizar sua eficácia e precisão na caracterização e manipulação de materiais em níveis fundamentais, abrindo portas para descobertas sem precedentes.","link":"https://news.google.com/rss/articles/CBMie0FVX3lxTE03Wm9MaVRWOW40UVNIN2FYYWZZdU9UZTR6ODRRTzhjeGtBWHBCZzNsbW9sN0I5WXpqSjdzN202eEUyTXRUcnNfMXQxeXYxMExCQm9OVDhrTTc4SDJEYkhxMDRScGtkTEh2UjRYR3pDUHdMVWxFaGxBY3E3OA?oc=5","fonte":"Quantum Zeitgeist","categoria":"CIÊNCIA QUÂNTICA","lang":"pt"},{"pais":"Índia","titulo":"Hackathon Global de EI da L&T Technology Services Impulsiona a Próxima Onda de Soluções de Engenharia Nativas de IA","resumo":"A L&T Technology Services (LTTS) realizou seu Hackathon Global de Engenharia de Inovação (EI), focado em alavancar a Inteligência Artificial para desenvolver a próxima geração de soluções de engenharia. O evento reuniu talentos para criar inovações que transformarão diversos setores, desde manufatura até saúde. Este hackathon sublinha o compromisso da LTTS em fomentar o ecossistema de IA e acelerar a adoção de tecnologias disruptivas na engenharia, impulsionando a competitividade e a eficiência global.","link":"https://news.google.com/rss/articles/CBMimgFBVV95cUxQbVEwVVFpMEV2MFFGSVJhT1FDcVZXa05tbFVod1UzVVRqNVlfcjE5QzVCU2JDRU9yU1FHRDdpNzhlcWdMa0wtckZXX1pLbk8tZENPYklfNjdraUJ3QjVCTm91RXN4OVZpTmkxUThuMFlKWW9TXzlSTUVXSl9pa0paLU9UaVV2c3M2eEgtaDhQNGpOS2ZROW5scE9n?oc=5","fonte":"Yahoo Finance","categoria":"IA, INOVAÇÃO","lang":"pt"},{"pais":"Índia","titulo":"Honor Magic 9 Estaria Testando Tecnologia de Tela Traseira com IA","resumo":"O próximo smartphone Honor Magic 9 estaria em fase de testes com uma inovadora tecnologia de tela traseira integrada com Inteligência Artificial. Esta característica sugere novas possibilidades de interação do usuário, personalização e funcionalidades inteligentes, diferenciando-se no mercado competitivo de smartphones. O desenvolvimento aponta para uma tendência crescente de incorporar IA em todos os aspectos do hardware e software dos dispositivos móveis, visando uma experiência mais intuitiva e rica para o consumidor.","link":"https://news.google.com/rss/articles/CBMikwFBVV95cUxOUG5sQXl6c3dZYkp4TFcwV2F3WWpUOVhKb1V0b1lTbnJIS0tGTlNpVWluYWpZMm5RU1ZWM3cwVWxKVW9GSXdQenBWZXQtalc3VXJ6MllpaFRaSTlQTFg3M0dGdlc2TG5fNFQ2em9QRHVLc2tMY1F3THI2dldST3NlZkp1eFZ2NVcxNWJjVGhSQnBSS1HSAZgBQVVfeXFMT0FneVlRZkN0SUN0NjU3U3ZNSTh2Tjk5dWFNZE1VMWU4anI4SU5rV1dLNV8zdnh3dDZFOGg5WVFqNGoyTkh3ai1IRTBQNHlLRVNvRC1NeFRoaklFdTVUV0U4SjAtcldIR19KTDIwRlMyV2w2LV84Ulh5TGtXSm5xd0tURlJjYlFSd0QxLW0taEJfNW1BUE1EdkQ?oc=5","fonte":"Huawei Central","categoria":"TECNOLOGIA, IA","lang":"pt"},{"pais":"Índia","titulo":"Nesta Semana na Ciência: Alívio para Dores no Joelho, um Recorde em Supercondutores e Mais!","resumo":"Esta edição semanal de notícias científicas destaca avanços promissores, incluindo novas abordagens para o alívio de dores no joelho, que podem revolucionar tratamentos ortopédicos. Além disso, a comunidade científica celebra um novo recorde impressionante na área de supercondutores, com implicações para tecnologias de energia e transporte. A compilação abrange uma variedade de descobertas importantes, oferecendo um panorama das últimas inovações e pesquisas que moldam nosso entendimento do mundo e impulsionam o progresso tecnológico.","link":"https://news.google.com/rss/articles/CBMioAFBVV95cUxPcDhlaUJZUHBmaXJWQnBPUXJrMXk0cFNkVklQQkxiVjdLQnkxOThoakdZM0dnblRGRHV6TkxnV3hxek04aFF4VXNnSGo3Mml6d09kSkFpeHdDQVNsYmtZRzJpcnRkTXlGTFZwbXloSFdkZUc5aUhUaXFsT1lrcWVfV2VyQUtpeUZUZmhmVXpaY1E4cWw3clhDWnhsTjVtQ2d5?oc=5","fonte":"ScienceAlert","categoria":"CIÊNCIA, DESCOBERTAS","lang":"pt"},{"pais":"Índia","titulo":"BYD Apresenta Tecnologia de Carregamento em Viagem de 15.000 km de Roma a Hong Kong","resumo":"A montadora chinesa BYD demonstrou a robustez e eficiência de sua tecnologia de carregamento em uma épica jornada de 15.000 quilômetros, de Roma a Hong Kong. A iniciativa não apenas testou os limites dos veículos elétricos em longas distâncias, mas também destacou a confiabilidade e a infraestrutura de carregamento da empresa. Esta façanha reforça a liderança da BYD no mercado de EVs e sinaliza o avanço na autonomia e na praticidade de veículos elétricos para viagens intercontinentais, superando barreiras de ansiedade de alcance.","link":"https://news.google.com/rss/articles/CBMixwFBVV95cUxPMW02RURndVVxaWJPcFQ4UTlRU3NwQjROZ3FwUkl5U0RKWHNFMkRhME84c0NRLTZlZ1Z2QkNNRGxTZk9CbnNpUnZ4WVdBMVdwREx2bVFjRWpoN0hFZHhZUktZNXFWVFJWTXdXeHhJTTZyNFZKeUNVamx5T0dVUDVqelUyTGs2TnB3TDVSbXhNWGpKLV9BckdCWlNkSjg4eUNPUnFWTy1ISDYzSmVnZmZQeXgwUGpvM09xamNtZ01RRjV5NVdXUHQw0gHHAUFVX3lxTE5HbFJKS1VWR055dGk0S1dBYVNNQjJoR1YtdUlGRHFkNnhvVG1FeGkxUjkxTWUxaEZBYlJ6SElYT2pVTElISkdEYzFEclhMUWhVaEhhczNpdWhkc0M1bm9nOWFfc2MxTnpCQlZxNThVNVBNYjN4NWQyWjZI   const searchInput = document.getElementById('search');
  const langSelect = document.getElementById('lang');
  const countrySelect = document.getElementById('country');
  const categorySelect = document.getElementById('category');
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');

  // Utility de escape HTML simples para prevenir injections em propriedades sem tratamento
  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function populateSelects() {
    const countries = [...new Set(data.map(d => d.pais))].filter(Boolean).sort();
    const categories = [...new Set(data.map(d => d.categoria))].filter(Boolean).sort();

    countries.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      countrySelect.appendChild(opt);
    });

    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      categorySelect.appendChild(opt);
    });
  }

  function render(items) {
    countEl.textContent = `${items.length} notícia${items.length !== 1 ? 's' : ''}`;
    
    grid.innerHTML = items.map(item => {
      const readMoreTxt = item.lang === 'pt' ? 'Ler mais' : 'Read more';
      
      const bulletList = (item.resumo || '').split('\n')
        .filter(Boolean)
        .map(line => `<li>${esc(line.replace(/^- /, ''))}</li>`)
        .join('');

      return `
        <div class="news-card">
          <div class="card-meta">
            <span class="category">${esc(item.categoria) || 'Geral'}</span>
            <span class="country">${esc(item.pais) || 'Global'}</span>
          </div>
          <h3 class="card-title">${esc(item.titulo)}</h3>
          <div class="card-summary">
            <ul>${bulletList}</ul>
          </div>
          <div class="card-footer">
            <a href="${esc(item.link)}" target="_blank" class="read-more">
              ${readMoreTxt} &rarr;
            </a>
            <span class="source">${esc(item.fonte)}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterData() {
    const query = searchInput.value.toLowerCase();
    const lang = langSelect.value;
    const country = countrySelect.value;
    const category = categorySelect.value;

    const filtered = data.filter(item => {
      const matchLang = item.lang === lang;
      const matchCountry = country === 'all' || item.pais === country;
      const matchCategory = category === 'all' || item.categoria === category;
      const matchSearch = query === '' 
        || (item.titulo || '').toLowerCase().includes(query)
        || (item.resumo || '').toLowerCase().includes(query)
        || (item.fonte || '').toLowerCase().includes(query);

      return matchLang && matchCountry && matchCategory && matchSearch;
    });

    render(filtered);
  }

  // Binds
  searchInput.addEventListener('input', filterData);
  langSelect.addEventListener('change', filterData);
  countrySelect.addEventListener('change', filterData);
  categorySelect.addEventListener('change', filterData);

  // Initialization
  populateSelects();
  filterData(); // trigger first render
</script>
</body>
