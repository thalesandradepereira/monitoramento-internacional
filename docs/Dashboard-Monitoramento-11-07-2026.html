<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - International Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0B0F19;
      --bg-panel: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #E2E8F0;
      --text-muted: #94A3B8;
      --accent: #D4AF37;
      --accent-hover: #FDE047;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.15), transparent 400px),
                        radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.05), transparent 400px);
    }
    header {
      padding: 1.5rem 5%;
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo-img {
      height: 48px; /* Altura ajustável do logo */
      width: auto;
      object-fit: contain;
      border-radius: 8px; /* Caso não seja transparente */
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .logo-text span {
      color: var(--accent);
    }
    .date-badge {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      color: var(--accent);
      font-weight: 600;
    }
    .container {
      padding: 2rem 5%;
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }
    .filters {
      flex: 0 0 300px;
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 6rem;
    }
    .filter-group {
      margin-bottom: 1.5rem;
    }
    .filter-group label {
      display: block;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
    }
    select option {
      background: var(--bg-main);
      color: var(--text-main);
    }
    .results {
      flex: 1;
    }
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .results-count {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .news-card {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .news-card:hover {
      transform: translateY(-4px);
      border-color: rgba(212, 175, 55, 0.5);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }
    .category {
      color: var(--accent);
    }
    .country {
      color: var(--text-muted);
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.4;
      margin: 0 0 1rem 0;
      color: #fff;
    }
    .card-summary {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-muted);
      flex: 1;
    }
    .card-summary ul {
      margin: 0;
      padding-left: 1.2rem;
    }
    .card-summary li {
      margin-bottom: 0.25rem;
    }
    .card-footer {
      margin-top: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--glass-border);
      padding-top: 1rem;
    }
    .read-more {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .read-more:hover {
      color: var(--accent-hover);
    }
    .source {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .btn-clear {
      width: 100%;
      padding: 0.75rem 1rem;
      margin-top: 0.5rem;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-clear:hover {
      background: var(--accent);
      color: var(--bg-main);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }
    /* Simple CSS reset/scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: var(--bg-panel); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .filters {
        flex: none;
        width: 100%;
        position: static;
        box-sizing: border-box;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-container">
    <img src="logo.jpg" alt="TAP Logo" class="logo-img" onerror="this.style.display='none'">
    <div class="logo-text">Monitoramento<span>Internacional</span></div>
  </div>
  <div class="date-badge">11/07/2026</div>
</header>

<div class="container">
  <aside class="filters">
    <div class="filter-group">
      <label for="search">Busca / Search</label>
      <input type="text" id="search" placeholder="Palavra-chave...">
    </div>
    
    <div class="filter-group">
      <label for="lang">Idioma / Language</label>
      <select id="lang">
        <option value="pt">Português (PT-BR)</option>
        <option value="en">English (US)</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="country">País / Country</label>
      <select id="country">
        <option value="all">Todos / All</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="category">Categoria / Category</label>
      <select id="category">
        <option value="all">Todas / All</option>
      </select>
    </div>
    
    <button id="clear-filters" class="btn-clear">Limpar / Clear</button>
  </aside>

  <main class="results">
    <div class="results-header">
      <h2 style="margin: 0; font-size: 1.5rem; color: #fff;">Resultados</h2>
      <span class="results-count" id="count">0 notícias</span>
    </div>
    <div class="news-grid" id="grid">
      <!-- Injected by JS -->
    </div>
  </main>
</div>

m/rss/articles/CBMi6wFBVV95cUxOTEpOZVpVclJkaG1qS2xhTlRmUTJIdUQzMWd0NFJwVnF4aW16em1CbU1rSUdzMVNGRzdHTUFEaE5lSGRMY3J4SFF5enZYUlpTZVZjbVNqUmdUMjZqZ2VkS05rcGZ6NFN2ZXRQa0pUZTFtWElDRXBqMnNtS294S3Q4WlJ3V1NZZzJnMTNhUU1sWUVOLUF3MXNLS0pLQnFSbGtYN0FvQTB1TVBVaXNEMlYtRGpzQklqZTNtak96SERZalYzZndQYUNzSXh2dzNqUklrRDQtZjFXc1VWWXVjOW5iYmFrb3d0UE0zNS1v?oc=5","fonte":"RFI","categoria":"MEIO AMBIENTE","lang":"pt"},{"pais":"França","titulo":"«Não se pode parar a economia de um país em dificuldade por causa de 40°C», insiste Caroline Pilastre","resumo":"Em meio a ondas de calor intensas que afetam a França, Caroline Pilastre defende a continuidade das atividades econômicas. Ela argumenta que a fragilidade econômica do país impede paralisações, apesar dos desafios impostos pelas altas temperaturas e seus riscos. O debate reflete a difícil conciliação entre a saúde pública, a produtividade e a adaptação às mudanças climáticas. A declaração levanta questões cruciais sobre a resiliência social e econômica diante de eventos climáticos extremos.","link":"https://news.google.com/rss/articles/CBMiugFBVV95cUxObHBjT1ZncjVlOV9ycWpDQnFzNml4NkpxWWFxeXZ6akxFTFRqX0dvOE1NeVltcmdZY1lKam9GejN2RTJqaFBYNUF2T0tmdjcyOXVueXJQNnR6cmdKNktsaC14RzBaRjVLai1qcGtCT2Y5YzkyR0lWTlNobkRwaDZRQ204WTRzRjVyYnVrbXYxQUszbGc1dnNXMWllV2RteUtmZG8taHM3eU5venJpcW11b3FmaFVyOXpQN2fSAb8BQVVfeXFMT25sOWt6bXRfR0dlSTVhMTdMcm1vclV6NVRzNjNodjVlM0Z6eUdza1htS0c5RU5Xd01jS24yMW1QWEVCWFZkV29pVmlaZG43dzh2cVRtUTc5XzZjR3E0QXFlLWJyeXN5NENUVHRaZUVJSFFLTjNzZHE4WjZYLWhXQ2o4REplXzlUb3RndUxoMlB4Xy1DazZna3V2Yk94YjFHcF9Qd3JCeXJYOXUxTkRoMUpsSFpGYVR4bzRMUWFZeEk?oc=5","fonte":"França","categoria":"CLIMA ECONOMIA","lang":"pt"},{"pais":"França","titulo":"A Ciência Identifica o 'Interruptor' que Reativa o Câncer de Mama Após Anos de Remissão","resumo":"Pesquisadores fizeram uma descoberta crucial na luta contra o câncer de mama, identificando um mecanismo genético, ou 'interruptor', que pode reativar células cancerígenas adormecidas. Este avanço explica por que alguns cânceres de mama retornam após longos períodos de remissão, oferecendo novas esperanças para tratamentos mais eficazes e personalizados. A identificação desse gatilho abre caminho para o desenvolvimento de terapias que visem prevenir a recorrência da doença. É um passo significativo para a medicina de precisão e para a qualidade de vida de pacientes.","link":"https://news.google.com/rss/articles/CBMixgFBVV95cUxPUE1iY09QNVI1SWtwNWlSUU05TllMNHZlU3dOZUZzbXdQUjNfRE5fWlZQSUxSblctT0hVM1FTWWNzT1hXbl84WGNQNHplaUhUbFNrREJUampkRnR1UFpfa095bzBKdw1zY1NEYi1jYVdCdHVtX0YxTHE4akp6SFJzMmZSUWowZnk0dmxoeVNqQXVaMGFvcUx2THl2SnB4a251aGFSenBWUEtrZC1nOHYyOE9WOFpzeTJBeE5sVHJBeWNqcXBmQ0E?oc=5","fonte":"França","categoria":"CIÊNCIA SAÚDE","lang":"pt"},{"pais":"França","titulo":"Videogames. «Os Jogadores Estão Cansados»: Estrelas do E-sport Lamentam a Evolução dos Jogos de Futebol PES e FIFA","resumo":"Celebridades do cenário e-sport expressam crescente descontentamento com a direção atual dos populares jogos de futebol PES e FIFA. Eles criticam a falta de inovação substancial, a monetização agressiva e a prioridade dada a aspectos comerciais em detrimento da jogabilidade e experiência do usuário. A insatisfação reflete uma demanda por mudanças mais significativas e respeito à comunidade de jogadores. Esse sentimento aponta para um ponto de virada na indústria de jogos esportivos digitais.","link":"https://news.google.com/rss/articles/CBMinwJBVV95cUxNQ0VTTmZLNGxtYW5kT0Y4NnZnRldKTlNYVGdma1BTcVlHa09ueDFoNlJXMjVnLUJQdTZWUUpGeDF5QzhteW1raVdWdEZ4RlZ0azRoMUVsa2Ixb0ZyU0V5YW14UU5PRnVTcFpjOFJreVVMYWQ4RnJJVXNlYW1KdlhvM1NwazdKejZUNy1YOU05MEtnZGlBdHNmUzRFV1hfQktocHg4MzJkaUZ3UFZGMkdtV1hRTjk5N1dvNXBkVUNJamJqZ2cwMXdMdHdzTEdKbTdzWDNYWVNNcjNFZzdRb0E1U2RUdUtyZWNDWlg0c1UtX2Z6OWI1N1NQVmNNaV9Ka2F1U2k0LUlLMGJiSEJ4QTdUZlVJTmJ3VDB6MzBDZ0I2NA?oc=5","fonte":"Ouest-France","categoria":"TECNOLOGIA GAMING","lang":"pt"},{"pais":"França","titulo":"Diante da Política de Trump, Pesquisadores Americanos Deixam os EUA para se Instalar na França","resumo":"Uma onda de cientistas americanos tem se mudado para a França, motivados pela insatisfação com as políticas da administração Trump. Eles buscam um ambiente mais favorável à pesquisa e ao desenvolvimento científico, com maior apoio governamental e liberdade acadêmica. Essa 'fuga de cérebros' dos EUA representa uma oportunidade para a França fortalecer seu setor científico. O movimento sublinha o impacto da política na atração e retenção de talentos globais.","link":"https://news.google.com/rss/articles/CBMi5wFBVV95cUxNMXE0S0lyTS1sVkRMX2ZPUmlqNXZ2UmirVmEtaktUUGUtbzRUYnZqNXZUN0JiZ0dJLWtGOHNvVzdqMXVDeTU2V3BYVk45cF9XMzBHR3hLWjZKdk1xTGVISmhQdG5xWTlrdkd6ZlNsSVJmbmFqTmpUaU9RQ1N6NU9MeU9iakNRaGZpNF9BLTRfSGlSd0dGSlJTTEU1VGFoY1UzRkh3SmlJNlRZYm0xdEZDaTZJUGNkenhuY3MyLU9iVXpvaDk3bWpaTlYtMWVDRlpjUmxYbi1XeGl0RkdwRWRQUWRYM25TQXM?oc=5","fonte":"BFM","categoria":"CIÊNCIA POLÍTICA","lang":"pt"},{"pais":"Inglaterra","titulo":"Tecnologia de 'vida espelho' preocupa cientistas do Relógio do Juízo Final. Entenda o porquê","resumo":"Cientistas associados ao icônico Relógio do Juízo Final expressam profunda preocupação com a ascensão da tecnologia de \"vida espelho\", capaz de simular sistemas complexos e, hipoteticamente, até a consciência. Essa inovação levanta questões éticas e existenciais significativas, adicionando uma nova camada de risco aos desafios globais monitorados pelo relógio, como ameaças nucleares e climáticas. O desenvolvimento dessas capacidades tecnológicas pode impactar drasticamente a sociedade e nossa compreensão da própria vida, exigindo debates urgentes sobre suas implicações.","link":"https://news.google.com/rss/articles/CBMirwFBVV95cUxPOVNVTEJoVklGZ3hrWVp5OTVCT3BzNUpNT20yNVFjN2tTa2ppckR6YTAyMWNIT1VhZE9sUXJsRnpWTXZTWW8ybXZ0ZUdpQVF4SGF2YUhkRnRLT1JBSk1GeERKdmFwcXJhRm9INDdBUFNZX01zZXRTcVBocXlPWnhFdHBXQkNQWjhmTHhuREFaU2s1WHEtNmlpTXZDMVh6dC13OFZjTk52NmxwQTEtVmNv?oc=5","fonte":"Inglaterra","categoria":"CIÊNCIA / TECNOLOGIA","lang":"pt"},{"pais":"Inglaterra","titulo":"Estrelas da capa do EA Sports FC 27 'reveladas' – uma irá surpreender você","resumo":"Rumores intensos indicam que as estrelas que ilustrarão a capa do próximo game da franquia EA Sports FC, o FC 27, foram \"reveladas\" antes do lançamento oficial, com uma escolha em particular prometendo chocar os fãs. A especulação em torno de quem representará o jogo anualmente é um tópico quente na comunidade gamer, criando grande antecipação e discussões sobre tendências do futebol virtual. Essa \"revelação\" precoce sugere uma estratégia de marketing para gerar buzz e engajamento.","link":"https://news.google.com/rss/articles/CBMiX0FVX3lxTFB0b1NpQThNTDlNczZLNzFDeFYxUG51el_zV0RRN2lDRF9xX1pMUzVkbU5NY3RVczJ4anp3X0J2V2FVVU1VMFJSTFVQUGdrSTh0SVlEU1oyUG1WRjVIQ1pJ?oc=5","fonte":"Indy100","categoria":"JOGOS / TENDÊNCIA","lang":"pt"},{"pais":"Espanha","titulo":"A economia dos EUA cada vez mais dependente dos gastos em IA, e economistas divergem sobre o impacto exato","resumo":"A economia dos Estados Unidos está testemunhando uma crescente dependência dos investimentos em Inteligência Artificial, impulsionando debates acalorados entre economistas sobre a magnitude e as implicações futuras desse fenômeno. Enquanto a IA promete otimizar setores e criar novas oportunidades, especialistas divergem sobre como quantificar seu impacto real no crescimento do PIB e na estrutura do mercado de trabalho. Essa transição levanta questões cruciais sobre a sustentabilidade do modelo econômico e a necessidade de políticas adaptativas.","link":"https://news.google.com/rss/articles/CBMi4gFBVV95cUxOUXc2Xzh6eE5obW5rSGhjMjVyYlJ1dmg3bTgycUVZUTFWLXBVMXJtTGpfaVEycHJZWktCeklydFRKdURYQ3l5MmJnb0FkU3g2WlFhaFhTQlhJUjVuU0t0TFhvOTlmQ1Z0TlExTEJkNHNINDN5VzhKWlZyVjRfeF9VcW95S2l2RDQycDl2S0tReU1aeFhTc2M0UUJ2eW16R2duWmxNQW1meHNkbk94MEhheXRCUVlIS2IzY1AxMWpEWWJPWEIxMGlJTVZ2MFZzSk5JMTBvYlBSbE9ReDltV21tQVR3?oc=5","fonte":"CriptoTendencia","categoria":"TECNOLOGIA, ECONOMIA","lang":"pt"},{"pais":"Espanha","titulo":"Drones híbridos aéreo-aquáticos: tecnologia de transição entre ambientes atinge fase operacional","resumo":"Uma inovadora tecnologia de drones híbridos, capazes de operar tanto no ar quanto na água, avançou para sua fase operacional, prometendo revolucionar diversos setores. Esses veículos versáteis podem realizar missões de vigilância, pesquisa ambiental e inspeção de infraestruturas em ambientes complexos. A capacidade de transitar fluidamente entre os meios aéreo e aquático abre novas fronteiras para aplicações civis e militares, otimizando operações e expandindo o alcance tecnológico em áreas de difícil acesso.","link":"https://news.google.com/rss/articles/CBMiT0FVX3lxTE5KNW44WHA1TDVCalZNeTc2RUlzN2M0RU5TOE1JU19YekpPLWtfSS1jZGg0WDFteGhmRkhkSThMMHUwM0k5RFZOZVZ6Ui04WnM?oc=5","fonte":"noticiasneo.com","categoria":"TECNOLOGIA","lang":"pt"},{"pais":"Espanha","titulo":"Ministério da Ciência lança visualizador web para localizar e desfrutar do eclipse solar com segurança","resumo":"O Ministério da Ciência espanhol desenvolveu uma ferramenta online interativa, um visor web, para auxiliar a população a acompanhar o próximo eclipse solar de forma segura e informada. A plataforma oferece informações detalhadas sobre os horários e locais de visibilidade do fenômeno astronômico em diferentes regiões, além de diretrizes para observação segura. Esta iniciativa visa democratizar o acesso ao conhecimento científico e promover a educação sobre eventos celestes, garantindo que o público possa desfrutar do espetáculo natural com proteção adequada.","link":"https://news.google.com/rss/articles/CBMi-AFBVV95cUxPbjhzbG93RlVCeEprMWlwbC1hT1pmaFJ1RzVxNFFqOWJISGtpQWFWdDZKNE12U3dJRnZhYm41Rkt2dDc4Qy0xNThWM0V4cXJsU2hTRU9xLUQ4VGRoeXdMNlpCLXpJYU5aeS1ncXJ2c1hTZTAtcE5DN0J6QjNHS0RYVkpBdXdXSEVZb2R0S3hhZVJUTVFYbjJQR2pXUWpUM2E3ZE12cmFGbGJENHRXcUNHWmQ2TEs0aWVsNVBiWFlTSUVzaWppWDhmYXBKM3RIUmN4cnZEdEFZT0l2TlpjUENnSXZ6V29iaFhacFA5WU82MlNyd2diRkd0cw?oc=5","fonte":"Espanha","categoria":"CIÊNCIA, TECNOLOGIA","lang":"pt"},{"pais":"Espanha","titulo":"Descoberto novo fungo para a ciência em Torre Pacheco","resumo":"Cientistas anunciaram a descoberta de uma nova espécie de fungo na região de Torre Pacheco, Espanha, um achado que enriquece a biodiversidade e o conhecimento micológico global. A identificação dessa nova espécie sublinha a importância da pesquisa contínua e da preservação de ecossistemas locais, que ainda guardam segredos biológicos. Este avanço contribui para a taxonomia e pode abrir caminhos para futuras aplicações em biotecnologia ou medicina, destacando a riqueza de recursos naturais ainda inexplorados.","link":"https://news.google.com/rss/articles/CBMirwFBVV95cUxQUGpSajZnU2p3UFpJNmd4S1pIZ3haUWdsVFZUZUM3TWd0QkRFbnUxQTh1NDgzd2VjLXh1RUwwUmVfdkc3TzE5TVBONjQxUmxLQkpmbHZIVURYekc0czJIYnhPSHByb2xlU2dWN2dvWVU1SVFUYjN1NGZPQnpselBqYVI1V1dyMEdyS3Y1TE1Kc0JtbFpWN0NmLUwyc3g1QU5QOGhfLWMxSWxDeXpZ0gG0AUFVX3lxTE5GdE4zNWJobjVaem1EdzRaS2RuRU5yTXN6em9fdHFBd1BJUjVrLUdCdG5NUEJOX2hOWTlrdWVleUZvX2EwTHloLU1uUjF4MlRIb1hsSUd2OTRSQmQzWWNDcFVTd3V6OW0yeXpKLWxpOWFMUkltWTh0TUhtUmN6a1g2aFpwTzllQVNiLWRtaFV1VkpVUzU1LVl2TmZKSlJnNlAzaEtxalMxN3hMWm9GWGJmQ3dlaQ?oc=5","fonte":"Espanha","categoria":"CIÊNCIA, DESCOBERTA","lang":"pt"},{"pais":"Espanha","titulo":"Mudança na regulamentação afeta milhões de passageiros com baterias portáteis: viajar com elas não será mais tão simples","resumo":"Novas regulamentações internacionais estão sendo implementadas, alterando as regras para o transporte de baterias portáteis em voos, impactando milhões de passageiros. As mudanças visam aumentar a segurança aérea, restringindo o tamanho, a quantidade e a forma de acondicionamento desses dispositivos eletrônicos. Essa medida, embora necessária para prevenir incidentes, exigirá que os viajantes se adaptem às novas diretrizes, planejando com antecedência o transporte de seus equipamentos e evitando transtornos nos aeroportos.","link":"https://news.google.com/rss/articles/CBMizAFBVV95cUxPSUZQNl95RFowak9 e intensas ondas de calor na Espanha estão causando sérios impactos econômicos, especialmente no setor hoteleiro regional, que enfrenta um aumento significativo nos custos operacionais. A elevação das temperaturas exige maior consumo de energia para refrigeração e afeta a demanda turística, alterando padrões de consumo e custos logísticos. Este cenário ressalta a vulnerabilidade da economia local às mudanças climáticas e a urgência de estratégias de adaptação para mitigar os efeitos adversos.","link":"https://news.google.com/rss/articles/CBMihgFBVV95cUxOVWVLSU1DWDh1X3FTRmIzTG5rdFd6MUJoeGJXM2ZRdXFGVHo1NXR3SlY2alJvLTZWRzg1WHBZMnpOWG9OaHlkUmxvbGtTd2F1QVB3T21iUHhfVEowUlAtUzhJTjZrbFdsY05hRTJHa3d3NUdWQnQwRTJUazlfMFhXTlkwYl9fZ9IBiwFBVV95cUxNU0VZX28zZGtZbmtUMnM4ZHF5UTZK0TjKZ2w0ZzZfLTMzMThxNFVlMzIyNTg2OTczNDYzNTc5?oc=5","fonte":"Castilla-La Mancha Media - CMM","categoria":"CLIMA, ECONOMIA","lang":"pt"},{"pais":"Espanha","titulo":"Nancy Cartwright, filósofa: 'As pessoas desconfiam da ciência porque sentem que o sistema as abandonou'","resumo":"A renomada filósofa da ciência Nancy Cartwright aponta que a crescente desconfiança pública em relação à ciência deriva de um sentimento de abandono por parte do sistema. Segundo Cartwright, a polarização e a falta de benefícios tangíveis para a população em geral, aliadas a narrativas que desvalorizam o conhecimento científico, contribuem para esse ceticismo. Ela argumenta que é fundamental reconstruir a ponte entre a ciência e a sociedade, demonstrando como a pesquisa pode ser um pilar para a justiça social e o bem-estar coletivo.","link":"https://news.google.com/rss/articles/CBMi4gFBVV95cUxNd3dfakhMSUV5SGxuaGZRX2VDejB0bmp5MWRoSkh2Z25qaWI0RVlfWXJudjRvclhsTHVQSDZMQjdnRGdVNzM5YkFyRF8xT0pBaDVlc3VSTUI1NWlmWVBKWV9qSVpPVjQwTjZBSENmVVJsZU1keGJ0SUhUT0xTeUhtc2N1MDlYbFMtV0xEb2tNUU5lZXV1bEItMlVvUGxScjZYd200TXFZaTQtUTU3MzRPS3lHOXRzcF9PZDBxRFJwQnVYclA3NWt6NFdzaEF1V2FmS1lHNHotZ1VhTkhMUEJsdWpn0gH2AUFVX3lxTE5HWHlfMjB1ZHRHVVpma3pMU0UzSWJNQ3h0LWd3ci1ue EaW9uNTBtSnpVVXM2TUNR?oc=5","fonte":"Japão","categoria":"INOVAÇÃO","lang":"pt"},{"pais":"Japão","titulo":"Editorial: Observação do Asteroide por Hayabusa2 é Fruto de Desafios Tecnológicos Contínuos","resumo":"Um editorial destaca o sucesso da missão Hayabusa2 na observação de asteroides, celebrando-a como um triunfo da engenharia e persistência japonesas. A sonda espacial, que retornou com amostras do asteroide Ryugu, representa um marco na exploração espacial e no avanço do conhecimento científico sobre a formação do sistema solar. Este feito demonstra a capacidade tecnológica do Japão em missões complexas e contribui imensamente para a ciência planetária, consolidando sua liderança no setor.","link":"https://news.google.com/rss/articles/CBMiaEFVX3lxTE9RaF9Sdlg0Mk5PQnhaQS1KUUNxM0V1T0JCdmhKZVhEanJSZ2F5OHRrbHFQNkhhazNFTnlEWk9qbDdnNlNxbktiU0c3Vk1nbVV0WGFLcy1jSlF3OGJfYVdiaFduSU5LY3Vy?oc=5","fonte":"毎日新聞","categoria":"CIÊNCIA ESPACIAL","lang":"pt"},{"pais":"China","titulo":"Pensador | Gan Chunhui: O Desenvolvimento de Indústrias Futuras Não é Simplesmente Perseguir Tecnologia, Mas a \"Disputa Final\" da Inovação","resumo":"O especialista Gan Chunhui argumenta que a China deve focar em inovação original e na formação de um ecossistema industrial completo para desenvolver indústrias futuras. Ele enfatiza que a competição não é apenas sobre alcançar tecnologias existentes, mas sim sobre liderar com novas ideias e abordagens revolucionárias. Este posicionamento estratégico é crucial para a sustentabilidade e competitividade da China no cenário tecnológico global.","link":"https://news.google.com/rss/articles/CBMiXkFVX3lxTFBCTlg2ZldvRGhhZzl5N1lTV2R4LXhzb3hBXzdQck9Id2hBYVE5dTYtbG1jZ1BBTnViV0ZLUGpyT1p0TUJrY1FvRjBHMG9QTTR0Y2o1RDNzS0xKSU1fYlE?oc=5","fonte":"shobserver.com","categoria":"INOVAÇÃO ESTRATÉGICA","lang":"pt"},{"pais":"China","titulo":"\"Prêmio Nobel da China\" Completa Dez Anos! Mais de 50 Cientistas de Ponta Reúnem-se em Xangai para Debater Inovação Original","resumo":"O \"Prêmio de Ciências do Futuro\", conhecido como o \"Prêmio Nobel da China\", celebra seu décimo aniversário reunindo mais de 50 cientistas proeminentes em Xangai. O evento destaca a importância da inovação original e do investimento em pesquisa fundamental para o avanço científico do país. Esta iniciativa sublinha o compromisso da China em fomentar descobertas que impulsionem o progresso global.","link":"https://news.google.com/rss/articles/CBMiYEFVX3lxTE00TC1jRFZmVVZmRzU4b1EyNEpaZTFqNE1PRXF6WGFSOWZ6X2NhSFlPdVZUUGFxcnRwU3Q3M2VyUGtyYlhDWF8wVThmZGltcEk4VHM5YlhSYnI2cFhGQnFFUA?oc=5","fonte":"东方财富","categoria":"CIÊNCIA E INOVAÇÃO","lang":"pt"},{"pais":"China","titulo":"Galeria: MIT Constrói Grande Longhouse de Madeira, Demonstrando Métodos de Design Sustentável Impulsionados pela Tecnologia","resumo":"O MIT revelou uma inovadora \"longhouse\" de madeira, que serve como um estudo de caso prático para o design sustentável impulsionado pela tecnologia. O projeto visa integrar soluções avançadas para otimizar o uso de recursos e minimizar o impacto ambiental, oferecendo um modelo para a construção do futuro. Esta iniciativa demonstra como a pesquisa e a tecnologia podem se unir para criar edificações mais ecológicas e eficientes.","link":"https://news.google.com/rss/articles/CBMiywJBVV95cUxNaE1kd0lDWFpHdmdEeXozMjRxUHBDOGE3QWliYjJwQy1RdlAwNU12bGY2Nl9GSjUwQ2l3S3RTOS1TZUFaY0ZHNVRZdFpSY3U2RXlKRFBpZElqYWJKWmlWTmZMbW5wRWRJdjFpc3RQekxmNUxGVS1tdG11blZWekVITlVOQi1KTlB2S2daVU9MdF9hQ0E1ZldLdWtKWVJjY0owcFJ6bnlkTXBGV1kzWEJGX0FIU29nZGNhaHhyV2NXTUFzQlBCNHNLZlIxODVfTV92VmFpb21aMldPSmFrcUNTNWVtZWdWb0plZFJ6NWRMODFUV1hhcUZiZDBYWEhoc1RYaTNZM00wajI1TTYzQzFIZWpsUU9TblVXT1pKaXoxWTdRM0hadURDT0NTc3RCNS1QQmhhaTdRR19lZEhrdlJsNFhHZ3Y3OHFWV1hZ?oc=5","fonte":"China","categoria":"DESIGN SUSTENTÁVEL","lang":"pt"},{"pais":"China","titulo":"Modelos Yangwang U7/U8/U8L 2026 Lançados Simultaneamente, Capacitados pela Tecnologia de Carregamento Rápido","resumo":"Os aguardados modelos Yangwang U7, U8 e U8L de 2026 foram lançados no mercado, com destaque para a avançada tecnologia de carregamento rápido. Este lançamento representa um passo significativo para a marca de veículos elétricos de luxo da BYD, elevando os padrões de desempenho e conveniência. A integração da tecnologia de flash charging visa atender à crescente demanda por soluções de recarga mais eficientes e rápidas para automóveis elétricos.","link":"https://news.google.com/rss/articles/CBMickFVX3lxTE9QbFhLeVdZNTJqQUtlczlSUXJXTDJ1M0M3WDY0ZmlhT2R3b0h1YWpfdTF6c0NUU09mMWtfZVgtdGJvUlBFUmJneFFsXzZpZEhCU0tKQW5uR3dVZ2hLUl9TWjktc1NkSnVRRUwyb0dPMExSUQ?oc=5","fonte":"China","categoria":"LANÇAMENTO AUTOMOTIVO","lang":"pt"},{"pais":"China","titulo":"Geely Galaxy TT Revela Informações Tecnológicas, Equipado com Solução de Condução Assistida Qianli Haohan H7","resumo":"A Geely revelou detalhes tecnológicos do seu novo modelo Galaxy TT, que virá equipado com o sofisticado sistema de condução assistida Qianli Haohan H7. Esta tecnologia promete elevar a segurança e a experiência de direção, posicionando o veículo como um competidor forte no mercado de carros inteligentes. A iniciativa demonstra o avanço contínuo da Geely no desenvolvimento de tecnologias autônomas e semi-autônomas.","link":"https://news.google.com/rss/articles/CBMiTEFVX3lxTE9iNVItcWlZMHZQVVIxOFppbU5xWHZ5WWNNRkJmT096NElyRWlEdVMweHE3QmFmMDl5Vzk0ckhDcXByNjdYUlMzQ3NtODI?oc=5","fonte":"凤凰网汽车","categoria":"TECNOLOGIA AUTOMOTIVA","lang":"pt"},{"pais":"China","titulo":"AMD Lança Tecnologia de Codificação de Posição PEPS, Reduzindo Parâmetros de Compressão de Textura Neural em 25%","resumo":"A AMD anunciou o lançamento da sua inovadora tecnologia de codificação de posição PEPS, que otimiza significativamente a compressão de textura neural. Esta inovação permite uma redução de 25% nos parâmetros necessários, resultando em maior eficiência e desempenho para aplicações gráficas e de inteligência artificial. A PEPS é um avanço crucial para o processamento de dados visuais e o desenvolvimento de mundos virtuais mais realistas e imersivos.","link":"https://news.google.com/rss/articles/CBMiY0FVX3lxTE1pOGZWTkpNOFJpVmprMUJhdlpqdWM4TnhlNFpudEloTWVMUzF2TkRXeFVlSWlieVFPYWFXR2MyWGVVRzQ1SGFrZWtTYlFzcEZwOXRkd201bjhwcTBzSEUzZ3JHRQ?oc=5","fonte":"东方财富","categoria":"TECNOLOGIA GRÁFICA","lang":"pt"},{"pais":"China","titulo":"Professores e Alunos da Escola de Ciência e Tecnologia da Informação Ganham Prêmio de Destaque na Principal Conferência de PNL, ACL 2026","resumo":"Docentes e estudantes da Escola de Ciência e Tecnologia da Informação foram agraciados com o Prêmio de Destaque na Conferência ACL 2026, um dos eventos mais prestigiados na área de Processamento de Linguagem Natural. Este reconhecimento internacional valida a excelência da pesquisa e inovação desenvolvida na instituição, reforçando a posição da China como um polo de talento em inteligência artificial. A conquista sublinha a capacidade do país em contribuir com avanços significativos para a compreensão e interação entre humanos e máquinas.","link":"https://news.google.com/rss/articles/CBMiV0FVX3lxTE9UQTNVaXpNcTdUaC16R0R4eUZPekVESXVJdVgzTFhZYUtWWkZWQURmWmdhWHZtTHRIVHBhS2JuanRVbTFZUzYxRTZLMzF4bHhJaUVxNkJ2aw?oc=5","fonte":"中国科大新闻网","categoria":"IA E CIÊNCIA","lang":"pt"},{"pais":"China","titulo":"Relatório do Índice Global de Desenvolvimento de Energia Lançado na ONU: China Lidera em Inovação Tecnológica","resumo":"Um relatório recente do Índice Global de Desenvolvimento de Energia, apresentado nas Nações Unidas, destaca a China como líder global em inovação tecnológica no setor de energia. O país se posiciona na vanguarda do desenvolvimento de soluções para a transição energética e eficiência, com contribuições significativas em energias renováveis e redes inteligentes. Esta liderança reforça o papel crucial da China na busca por um futuro energético mais sustentável e seguro mundialmente.","link":"https://news.google.com/rss/articles/CBMiaEFVX3lxTE8zdkR1eUJNQjZOdWJJaVNMOU52R0FNamFNRUNOdkxnVVJHNkZpblVDWWtpTUZKY1AtZEI4V0dqaHN6Mk9uazhBdV91S3BmUHlrYXl6SXlWYjFPWFBQYzdScldzUmNJekV5?oc=5","fonte":"chinanews.com.cn","categoria":"ENERGIA E INOVAÇÃO","lang":"pt"},{"pais":"Índia","titulo":"Físicos Contrastam Sensores Quânticos para a Ciência dos Materiais","resumo":"Pesquisadores na área de física estão aprofundando o entendimento sobre as capacidades dos sensores quânticos, buscando otimizar seu uso na ciência dos materiais. Este estudo comparativo é crucial para determinar qual tipo de sensor quântico oferece a maior precisão e eficiência. A descoberta tem o potencial de revolucionar o desenvolvimento de novos materiais e tecnologias avançadas. Essa abordagem impulsionará a inovação em campos como a eletrônica e a medicina.","link":"https://news.google.com/rss/articles/CBMie0FVX3lxTE03Wm9MaVRWOW40UVNIN2FYYWZZdU9UZTR6ODRRTzhjeGtBWHBCZzNsbW9sN0I5WXpqSjdzN202eEUyTXRUcnNfMXQxeXYxMExCQm9OVDhrTTc4SDJEYkhxMDRScGtkTEh2UjRYR3pDUHdMVWxFaGxBY3E3OA?oc=5","fonte":"Índia","categoria":"CIÊNCIA","lang":"pt"},{"pais":"Índia","titulo":"Como a Tecnologia Pode Conectar Problema e Solução","resumo":"Este artigo explora o papel fundamental da tecnologia como ponte entre desafios complexos e suas respectivas soluções. Ele discute como ferramentas digitais e inovações podem desmistificar problemas, otimizando processos e oferecendo insights valiosos para a tomada de decisões. A aplicação inteligente da tecnologia é vista como um catalisador para a eficiência e o desenvolvimento em diversos setores. Demonstra o poder transformador da tecnologia para superar obstáculos.","link":"https://news.google.com/rss/articles/CBMirgFBVV95cUxPVno0QjBEYy1hTDg4NjBFMmpJeXZRd3Ntc3J4MVM2bktKMjV2ZFUwLXNjNE5 ODUganVhX2R2VmFPQ2RlYmZGa3dZQUNyaE9DbmhIV0U5azR1bXVxNkt4bV9NT25TZ1RmM1lDMHNJdnRYQm1idU1LR0d5dUNiZHFVTXdnNjR4WnF5bHhUaTNXNjlPUlRKbU9RSE92b2ZnY3lQQmxQc1NIVGRwb2ZlTkcxdWfSAbMBQVVfeXFMTTNwZkx0YnpGUmNPVVV4UTJlUEtVUk5ZeThvVzBPdS0yVjVwZ191VVgxX3JCTElrME54ZzhXR0k2RU9iVDNkTTd0Nzk0eDlHM1VNN1FfajhINzd playful way. This initiative aims to bring the public closer to engineering and design, showing how technology can be applied in urban and educational environments in a creative and engaging manner.","link":"https://news.google.com/rss/articles/CBMiX0FVX3lxTE9yNDcyMXBfaFJodVNsTUdzcmNqYWpYTjRMczJtdWZIeENFY2dieTlOUVBleXdUNHViVFlmN2VTR0p2dWc5Y1gxenZjWVVhQlZEaW9uNTBtSnpVVXM2TUNR?oc=5","fonte":"Japão","categoria":"INNOVATION","lang":"en"},{"pais":"Japan","titulo":"Editorial: Hayabusa2 Asteroid Observation a Result of Continuous Technological Challenges","resumo":"An editorial highlights the success of the Hayabusa2 mission in observing asteroids, celebrating it as a triumph of Japanese engineering and persistence. The space probe, which returned with samples from the asteroid Ryugu, represents a milestone in space exploration and the advancement of scientific knowledge about the formation of the solar system. This achievement demonstrates Japan's technological capability in complex missions and contributes immensely to planetary science, solidifying its leadership in the sector.","link":"https://news.google.com/rss/articles/CBMiaEFVX3lxTE9RaF9Sdlg0Mk5PQnlaQS1KUUNxM0V1T0JCdmhKZVhEanJSZ2F5OHRrbHFQNkhhazNFTnlEWk9qbDdnNlNxbktiU0c3Vk1nbVV0WGFLcy1jSlF3OGJfYVdiaFduSU5LY3Vy?oc=5","fonte":"毎日新聞","categoria":"SPACE SCIENCE","lang":"en"},{"pais":"China","titulo":"Thinker | Gan Chunhui: Developing Future Industries Is Not Simply Pursuing Technology, But the \"Final Showdown\" of Innovation","resumo":"Expert Gan Chunhui argues that China must focus on original innovation and the formation of a complete industrial ecosystem to develop future industries. He emphasizes that competition is not just about catching up to existing technologies, but rather about leading with new ideas and revolutionary approaches. This strategic positioning is crucial for China's sustainability and competitiveness in the global technological landscape.","link":"https://news.google.com/rss/articles/CBMiXkFVX3   const searchInput = document.getElementById('search');
  const langSelect = document.getElementById('lang');
  const countrySelect = document.getElementById('country');
  const categorySelect = document.getElementById('category');
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');
  const clearBtn = document.getElementById('clear-filters');

  // Utility de escape HTML simples para prevenir injections em propriedades sem tratamento
  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function populateSelects() {
    const lang = langSelect.value;
    const currentData = data.filter(d => d.lang === lang);

    const countries = [...new Set(currentData.map(d => d.pais))].filter(Boolean).sort();
    const categories = [...new Set(currentData.map(d => d.categoria))].filter(Boolean).sort();

    const currentCountry = countrySelect.value;
    const currentCategory = categorySelect.value;

    countrySelect.innerHTML = '<option value="all">Todos / All</option>';
    categorySelect.innerHTML = '<option value="all">Todas / All</option>';

    countries.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      countrySelect.appendChild(opt);
    });

    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      categorySelect.appendChild(opt);
    });

    if (currentCountry !== 'all' && countries.includes(currentCountry)) {
      countrySelect.value = currentCountry;
    }
    if (currentCategory !== 'all' && categories.includes(currentCategory)) {
      categorySelect.value = currentCategory;
    }
  }

  function render(items) {
    countEl.textContent = `${items.length} notícia${items.length !== 1 ? 's' : ''}`;
    
    grid.innerHTML = items.map(item => {
      const readMoreTxt = item.lang === 'pt' ? 'Ler mais' : 'Read more';
      
      const bulletList = (item.resumo || '').split('\n')
        .filter(Boolean)
        .map(line => `<li>${esc(line.replace(/^- /, ''))}</li>`)
        .join('');

      return `
        <div class="news-card">
          <div class="card-meta">
            <span class="category">${esc(item.categoria) || 'Geral'}</span>
            <span class="country">${esc(item.pais) || 'Global'}</span>
          </div>
          <h3 class="card-title">${esc(item.titulo)}</h3>
          <div class="card-summary">
            <ul>${bulletList}</ul>
          </div>
          <div class="card-footer">
            <a href="${esc(item.link)}" target="_blank" class="read-more">
              ${readMoreTxt} &rarr;
            </a>
            <span class="source">${esc(item.fonte)}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterData() {
    const query = searchInput.value.toLowerCase();
    const lang = langSelect.value;
    const country = countrySelect.value;
    const category = categorySelect.value;

    const filtered = data.filter(item => {
      const matchLang = item.lang === lang;
      const matchCountry = country === 'all' || item.pais === country;
      const matchCategory = category === 'all' || item.categoria === category;
      const matchSearch = query === '' 
        || (item.titulo || '').toLowerCase().includes(query)
        || (item.resumo || '').toLowerCase().includes(query)
        || (item.fonte || '').toLowerCase().includes(query);

      return matchLang && matchCountry && matchCategory && matchSearch;
    });

    render(filtered);
  }

  // Binds
  searchInput.addEventListener('input', filterData);
  langSelect.addEventListener('change', () => {
    populateSelects();
    filterData();
  });
  countrySelect.addEventListener('change', filterData);
  categorySelect.addEventListener('change', filterData);
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    countrySelect.value = 'all';
    categorySelect.value = 'all';
    filterData();
  });

  // Initialization
  populateSelects();
  filterData(); // trigger first render
</script>
</body>
</html>
