<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Monitoramento Mídia Internacional | Global Media Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0B0F19;
      --bg-panel: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #E2E8F0;
      --text-muted: #94A3B8;
      --accent: #D4AF37;
      --accent-hover: #FDE047;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.15), transparent 400px),
                        radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.05), transparent 400px);
    }
    header {
      padding: 1.5rem 5%;
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo-img {
      height: 48px; /* Altura ajustável do logo */
      width: auto;
      object-fit: contain;
      border-radius: 8px; /* Caso não seja transparente */
    }
    .logo-text {
      font-weight: 700;
      font-size: clamp(1rem, 2vw, 1.5rem);
      letter-spacing: -0.5px;
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .logo-text .title-light,
    .logo-text .title-separator {
      color: #fff;
    }
    .logo-text .title-accent {
      color: var(--accent);
    }
    .date-badge {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      color: var(--accent);
      font-weight: 600;
    }
    .container {
      padding: 2rem 5%;
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }
    .filters {
      flex: 0 0 300px;
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 6rem;
    }
    .filter-group {
      margin-bottom: 1.5rem;
    }
    .filter-group label {
      display: block;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
    }
    select option {
      background: var(--bg-main);
      color: var(--text-main);
    }
    .results {
      flex: 1;
    }
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .results-count {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .news-card {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .news-card:hover {
      transform: translateY(-4px);
      border-color: rgba(212, 175, 55, 0.5);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }
    .category {
      color: var(--accent);
    }
    .country {
      color: var(--text-muted);
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.4;
      margin: 0 0 1rem 0;
      color: #fff;
    }
    .card-summary {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-muted);
      flex: 1;
    }
    .card-summary ul {
      margin: 0;
      padding-left: 1.2rem;
    }
    .card-summary li {
      margin-bottom: 0.25rem;
    }
    .card-footer {
      margin-top: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--glass-border);
      padding-top: 1rem;
    }
    .read-more {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .read-more:hover {
      color: var(--accent-hover);
    }
    .source {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .btn-clear {
      width: 100%;
      padding: 0.75rem 1rem;
      margin-top: 0.5rem;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-clear:hover {
      background: var(--accent);
      color: var(--bg-main);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }
    /* Simple CSS reset/scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: var(--bg-panel); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .filters {
        flex: none;
        width: 100%;
        position: static;
        box-sizing: border-box;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-container">
    <img src="logo.jpg" alt="TAP Logo" class="logo-img" onerror="this.style.display='none'">
    <div class="logo-text" aria-label="Monitoramento Mídia Internacional | Global Media Monitoring"><span class="title-light">Monitoramento Mídia</span><span class="title-accent">Internacional</span><span class="title-separator">|</span><span class="title-light">Global Media</span><span class="title-accent">Monitoring</span></div>
  </div>
  <div class="date-badge">21/07/2026</div>
</header>

<div class="container">
  <aside class="filters">
    <div class="filter-group">
      <label for="search">Busca / Search</label>
      <input type="text" id="search" placeholder="Palavra-chave...">
    </div>
    
    <div class="filter-group">
      <label for="lang">Idioma / Language</label>
      <select id="lang">
        <option value="pt">Português (PT-BR)</option>
        <option value="en">English (US)</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="country">País / Country</label>
      <select id="country">
        <option value="all">Todos / All</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="category">Categoria / Category</label>
      <select id="category">
        <option value="all">Todas / All</option>
      </select>
    </div>
    
    <button id="clear-filters" class="btn-clear">Limpar / Clear</button>
  </aside>

  <main class="results">
    <div class="results-header">
      <h2 style="margin: 0; font-size: 1.5rem; color: #fff;">Resultados</h2>
      <span class="results-count" id="count">0 notícias</span>
    </div>
    <div class="news-grid" id="grid">
      <!-- Injected by JS -->
    </div>
  </main>
</div>

<script>
  // Injeta os dados originais no frontend
  const data = [{"fonte":"O GLOBO","pais":"Brasil","titulo":"Entenda como imagens editadas por IA ameaçam pesquisas sobre aves e preocupam cientistas","resumo":"O avanço das imagens manipuladas por inteligência artificial levanta um alerta importante na comunidade científica ornitológica mundial. Especialistas temem que a disseminação de fotografias falsas comprometa a integridade de bancos de dados biológicos. A situação exige o desenvolvimento de novas técnicas de verificação para garantir a precisão das pesquisas e a preservação das espécies.","link":"https://oglobo.globo.com/economia/tecnologia/noticia/2026/07/21/entenda-como-imagens-editadas-por-ia-ameacam-pesquisas-sobre-aves-e-preocupam-cientistas.ghtml","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"O GLOBO","pais":"Brasil","titulo":"Prejuízos com fraudes cibernéticas na Ásia e na Oceania chegaram a US$ 114 bilhões em 2025","resumo":"Um relatório recente revelou que as fraudes cibernéticas causaram prejuízos bilionários em diversas economias asiáticas e na Oceania durante o ano de 2025. O montante alarmante sublinha a crescente vulnerabilidade das instituições financeiras e dos consumidores frente às táticas sofisticadas dos criminosos digitais. Especialistas reforçam a necessidade urgente de investimentos globais em cibersegurança.","link":"https://oglobo.globo.com/google/amp/economia/tecnologia/noticia/2026/07/21/prejuizos-com-fraudes-ciberneticas-na-asia-e-na-oceania-chegaram-a-us-114-bilhoes-em-2025.ghtml","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Valor Econômico","pais":"Brasil","titulo":"Dívida oculta de gigantes de tecnologia dos EUA chega a US$ 1,65 trilhão","resumo":"Analistas financeiros apontam que o endividamento não contabilizado das grandes empresas de tecnologia americanas atingiu um patamar crítico de 1,65 trilhão de dólares. Esse cenário gera incertezas sobre a estabilidade do setor e a capacidade de manutenção dos investimentos em inovação a longo prazo. O mercado monitora de perto como esses passivos impactarão as próximas decisões estratégicas das big techs.","link":"https://valor.globo.com/empresas/noticia/2026/07/21/dvida-oculta-de-gigantes-de-tecnologia-dos-eua-chega-a-us-165-trilho.ghtml","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Portal GDia","pais":"Brasil","titulo":"Nobel de Economia afirma que impacto da IA no emprego é superestimado","resumo":"Um laureado com o prêmio Nobel de Economia apresentou uma perspectiva controversa ao afirmar que os temores sobre a automação causada pela IA podem estar exagerados. Segundo o especialista, o histórico econômico demonstra que tecnologias disruptivas tendem a criar novas categorias de postos de trabalho em vez de eliminá-los permanentemente. A análise busca trazer serenidade ao debate público sobre o futuro do mercado laboral.","link":"https://gdia.com.br/noticia/4864/nobel-de-economia-afirma-que-impacto-da-ia-no-emprego-e-superestimado","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Folha de S.Paulo","pais":"Brasil","titulo":"Brasil avança na corrida global para produção de combustível sustentável de aviação","resumo":"O Brasil está consolidando sua posição estratégica no mercado global de combustíveis sustentáveis para aviação, aproveitando sua vasta infraestrutura agrícola. Investimentos em tecnologia de processamento têm permitido ao país liderar a transição energética no setor de transportes aéreos. Essa iniciativa promete reduzir a pegada de carbono global enquanto atrai bilhões em novos negócios sustentáveis.","link":"https://www1.folha.uol.com.br/mercado/2026/07/brasil-avanca-na-corrida-global-para-producao-de-combustivel-sustentavel-de-aviacao.shtml","categoria":"INOVAÇÃO","lang":"pt"},{"fonte":"Gazeta Rural","pais":"Brasil","titulo":"Agricultura brasileira avança em tecnologia, mas uso de dados ainda é desafio","resumo":"Embora o agronegócio brasileiro tenha integrado tecnologias de ponta em suas operações, a gestão eficiente de dados ainda representa um gargalo significativo. O setor busca agora soluções que transformem a coleta de informações brutas em insights acionáveis para o aumento da produtividade no campo. A capacitação técnica dos produtores e a conectividade rural são apontadas como chaves para superar essas barreiras.","link":"https://gazetarural.com/agricultura-brasileira-avanca-em-tecnologia-mas-uso-de-dados-ainda-e-desafio/","categoria":"AGROTECNOLOGIA","lang":"pt"},{"fonte":"Canal Solar","pais":"Brasil","titulo":"A energia do futuro: o Brasil pode liderar a nova economia da energia","resumo":"O Brasil possui vantagens competitivas únicas para se tornar o epicentro da nova economia energética mundial através de fontes renováveis. Com foco em hidrogênio verde, energia solar e eólica, o país atrai investidores interessados em descarbonização industrial. Esta transição posiciona o país como um dos principais fornecedores de energia limpa e barata no cenário geopolítico internacional.","link":"https://canalsolar.com.br/brasil-pode-liderar-nova-economia-energia/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Valor Econômico","pais":"Brasil","titulo":"Empresas de tecnologia encontram no futebol uma nova estratégia para fortalecer marcas","resumo":"O setor de tecnologia tem estreitado laços com o futebol brasileiro para ampliar o alcance de suas marcas junto ao grande público. Através de patrocínios e parcerias inovadoras, empresas buscam democratizar o acesso a ferramentas digitais em um ambiente de alto engajamento. A estratégia demonstra a eficácia do esporte como plataforma de lançamento para novos produtos e serviços tecnológicos.","link":"https://valor.globo.com/patrocinado/pressworks/noticia/2026/07/20/empresas-de-tecnologia-encontram-no-futebol-uma-nova-estrategia-para-fortalecer-marcas-1.ghtml","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"G1","pais":"Estados Unidos","titulo":"Anthropic fecha acordo histórico de US$ 1,5 bilhão em processo por uso de livros para treinar IA","resumo":"A empresa de inteligência artificial Anthropic encerrou um litígio bilionário envolvendo direitos autorais no treinamento de seus modelos de linguagem. O acordo estabelece um precedente importante para a indústria tech, equilibrando o avanço da inovação em IA com a necessidade de proteção da propriedade intelectual de autores e editoras.","link":"https://g1.globo.com/tecnologia/noticia/2026/07/20/anthropic-fecha-acordo-historico-de-us-15-bilhao-em-processo-por-uso-de-livros-para-treinar-ia.ghtml","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"SiliconANGLE","pais":"Estados Unidos","titulo":"Startup de ciência de materiais com IA, CuspAI, levanta US$ 450 milhões em financiamento","resumo":"A CuspAI garantiu um aporte massivo de 450 milhões de dólares para escalar sua plataforma focada no desenvolvimento de novos materiais através de inteligência artificial. A rodada destaca o crescente interesse dos investidores na aplicação de modelos generativos para resolver problemas complexos na engenharia de materiais e química.","link":"https://siliconangle.com/2026/07/20/ai-materials-science-startup-cuspai-raises-450m-funding/","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Rutgers University","pais":"Estados Unidos","titulo":"Tecnologia inovadora desenvolvida na Rutgers pode tornar baterias de íons de lítio mais seguras","resumo":"Pesquisadores da Universidade Rutgers criaram uma nova tecnologia capaz de mitigar riscos de incêndio em baterias de íons de lítio. Esta inovação é crucial para o futuro da eletrificação de veículos e armazenamento de energia, prometendo dispositivos mais robustos, seguros e eficientes para o consumo em massa.","link":"https://www.rutgers.edu/news/innovative-technology-developed-rutgers-could-make-lithium-ion-batteries-safer","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"The Quantum Insider","pais":"Estados Unidos","titulo":"Interlune desenvolve tecnologia criogênica para expandir suprimento de Hélio-3 para computação quântica","resumo":"A startup Interlune está investindo em tecnologia criogênica avançada visando a extração e gestão de Hélio-3, um recurso fundamental para o desenvolvimento da computação quântica. O projeto busca superar gargalos de fornecimento que atualmente impedem o progresso em grande escala de processadores quânticos.","link":"https://thequantuminsider.com/2026/07/20/interlune-produces-pure-helium-3-from-domestic-helium-using-novel-cryogenic-technology/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"NASA Jet Propulsion Laboratory (JPL) (.gov)","pais":"Estados Unidos","titulo":"Novas missões da NASA na Terra se preparam para iniciar voos científicos","resumo":"A NASA iniciou os preparativos para uma nova série de missões focadas na observação do planeta, utilizando sensores de última geração para monitorar mudanças climáticas. Estes voos científicos fornecerão dados críticos para a compreensão global do clima, sendo um pilar central na estratégia de pesquisa ambiental da agência.","link":"https://www.jpl.nasa.gov/news/new-nasa-earth-missions-gear-up-to-start-science-flights/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Ground Truths | Eric Topol","pais":"Estados Unidos","titulo":"Como a IA está catalisando as ciências biológicas?","resumo":"A inteligência artificial está transformando as ciências biológicas ao acelerar a descoberta de medicamentos e a análise genética de larga escala. O impacto dessa tecnologia reduz drasticamente o tempo de pesquisa laboratorial, permitindo diagnósticos mais precisos e tratamentos personalizados baseados em conjuntos de dados complexos.","link":"https://erictopol.substack.com/p/how-is-ai-catalyzing-life-science","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Anthropic","pais":"Estados Unidos","titulo":"Candidate-se às bolsas de pesquisa da Anthropic sobre IA para a Ciência e doenças raras","resumo":"A Anthropic anunciou um programa de subsídios voltado a pesquisadores que utilizam inteligência artificial para investigar curas e tratamentos para doenças raras. A iniciativa visa fomentar o ecossistema científico e incentivar o uso ético e eficiente de grandes modelos de linguagem na resolução de problemas médicos críticos.","link":"https://www.anthropic.com/news/rare-disease-research-grants","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Trefis","pais":"Estados Unidos","titulo":"Após uma subida íngreme e uma queda acentuada, a ação da Marvell Technology é uma aposta na expansão da IA?","resumo":"A Marvell Technology enfrenta volatilidade no mercado, gerando debates entre analistas sobre sua viabilidade a longo prazo no setor de infraestrutura para IA. A empresa continua sendo observada de perto por investidores devido ao seu papel vital na fabricação de chips de processamento de dados e conectividade.","link":"https://www.trefis.com/stock/mrvl/articles/607947/after-a-steep-run-and-a-sharp-drop-is-marvell-technology-stock-a-bet-on-the-ai-buildout/2026-07-20","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Science et vie","pais":"França","titulo":"Podemos reciclar melhor os metais preciosos contidos em nossos computadores?","resumo":"Este artigo investiga métodos avançados e desafios logísticos para a recuperação de metais preciosos em resíduos eletrônicos. O foco está na melhoria da eficiência da mineração urbana para reduzir o impacto ambiental do descarte de computadores. A iniciativa busca soluções sustentáveis para a economia circular tecnológica na França.","link":"https://www.science-et-vie.com/nature-et-environnement/peute28091on-mieux-recycler-les-metaux-precieux-contenus-dans-nos-ordinateurs-250258.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"La Gazette France","pais":"França","titulo":"REC: uma tecnologia única no mundo para reciclar poliamida","resumo":"A nova tecnologia REC apresenta um método inovador e exclusivo para a reciclagem de poliamidas, um tipo comum de plástico de engenharia. O avanço promete revolucionar a gestão de resíduos industriais ao permitir a reutilização eficiente de materiais plásticos complexos. A solução destaca o pioneirismo francês no setor de tecnologias de sustentabilidade.","link":"https://www.lagazettefrance.fr/article/rec-une-technologie-unique-au-monde-pour-recycler-le-polyamide","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"cast.org.cn","pais":"França","titulo":"Especialistas globais reunidos em Paris contribuem com soluções de tecnologia digital para o desenvolvimento sustentável pós-2030","resumo":"Paris tornou-se o centro de um debate global focado em como a transformação digital pode impulsionar as metas de desenvolvimento sustentável. Especialistas discutiram a integração de tecnologias emergentes para solucionar desafios ambientais e sociais até o ano 2030. O evento reafirma o compromisso da França com a cooperação internacional tecnológica.","link":"https://www.cast.org.cn/xw/MTBD/art/2026/art_0b5e260fe94c45b0b3734e7091def284.html","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"iPhoneSoft","pais":"França","titulo":"Apple Sports adiciona 7 campeonatos de futebol e escalações de times","resumo":"O aplicativo Apple Sports expandiu suas funcionalidades ao incluir sete novas ligas de futebol e detalhes táticos sobre escalações. A atualização visa melhorar a experiência dos usuários que acompanham competições esportivas em tempo real através dos dispositivos da marca. A novidade reforça a estratégia da Apple em consolidar seu ecossistema de entretenimento esportivo.","link":"https://iphonesoft.fr/2026/07/21/apple-sports-ajoute-7-championnats-football-compositions-equipe","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"RFI","pais":"França","titulo":"Economia africana - Gabão: um primeiro centro de dados para hospedar dados sensíveis","resumo":"O Gabão inaugurou seu primeiro centro de dados especializado, com suporte técnico francês, visando a soberania digital e a proteção de informações sensíveis. Esta infraestrutura é um marco estratégico para a digitalização do país, permitindo maior segurança no armazenamento e processamento de dados governamentais. O projeto representa um fortalecimento na infraestrutura tecnológica da região com cooperação externa.","link":"https://www.rfi.fr/fr/podcasts/afrique-%C3%A9conomie/20260720-gabon-un-premier-centre-de-donn%C3%A9es-pour-h%C3%A9berger-les-donn%C3%A9es-sensibles?GJlXzGgqHj","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Naval Technology","pais":"Inglaterra","titulo":"FIA 2026: QinetiQ aberta para fornecer armas a laser estrangeiras","resumo":"A empresa britânica QinetiQ demonstrou abertura para expandir sua tecnologia de defesa a laser para mercados internacionais durante a FIA 2026. Esta estratégia visa fortalecer a indústria de defesa do Reino Unido enquanto atende à crescente demanda global por sistemas de armas de energia direcionada, aumentando a relevância do país no cenário tecnológico militar.","link":"https://www.naval-technology.com/news/fia-2026-qinetiq-open-to-power-foreign-laser-weapons/","categoria":"DEFESA TECNOLÓGICA","lang":"pt"},{"fonte":"New Electronics","pais":"Inglaterra","titulo":"Reino Unido anuncia pacote de financiamento de £62 milhões para apoiar tecnologia espacial doméstica","resumo":"O governo britânico oficializou um investimento estratégico de 62 milhões de libras voltado ao fortalecimento do setor espacial nacional. A medida visa impulsionar a inovação tecnológica, apoiar startups locais e consolidar o Reino Unido como um player competitivo na economia espacial global, focando no desenvolvimento de infraestrutura crítica e exploração de satélites.","link":"https://www.newelectronics.co.uk/content/news/uk-announces-62m-funding-package-to-support-domestic-space-technology","categoria":"TECNOLOGIA ESPACIAL","lang":"pt"},{"fonte":"The Times","pais":"Inglaterra","titulo":"A tecnologia de células-tronco pode ajudar a melhorar a aparência de olhos envelhecidos?","resumo":"Pesquisadores britânicos estão explorando o uso de células-tronco para tratamentos estéticos e rejuvenescedores na área ocular. O avanço científico promete mitigar sinais de envelhecimento através da regeneração celular, posicionando o Reino Unido na vanguarda da medicina regenerativa e estética de alta tecnologia.","link":"https://www.thetimes.com/static/calecim-eye-cream/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"The Guardian","pais":"Inglaterra","titulo":"Jeff Bezos e o governo do Reino Unido investem £2 bilhões na startup britânica CuspAI","resumo":"A startup britânica CuspAI garantiu um aporte massivo de 2 bilhões de libras, contando com o apoio de Jeff Bezos e financiamento governamental do Reino Unido. O investimento acelerará o desenvolvimento de inteligência artificial de ponta, evidenciando a confiança internacional no ecossistema tecnológico britânico e seu potencial em liderar inovações transformadoras de mercado.","link":"https://www.theguardian.com/technology/2026/jul/20/jeff-bezos-uk-government-invest-in-2bn-british-startup-cuspai","categoria":"INVESTIMENTOS","lang":"pt"},{"fonte":"Sky News","pais":"Inglaterra","titulo":"Fábricas de táxis aéreos podem ser construídas em breve no Reino Unido","resumo":"O setor de aviação urbana está prestes a ganhar força no Reino Unido com projetos para a instalação de fábricas dedicadas à produção de táxis aéreos. Esta iniciativa promete revolucionar a mobilidade urbana, criar empregos altamente qualificados e integrar o país na infraestrutura global de transporte sustentável do futuro.","link":"https://news.sky.com/story/flying-taxi-factories-could-be-built-soon-in-uk-13565445","categoria":"INNOVAÇÃO","lang":"pt"},{"fonte":"Thinkbroadband","pais":"Inglaterra","titulo":"Adeus DSIT, olá Departamento de Negócios, Inovação, Ciência e Comércio","resumo":"A reestruturação governamental britânica fundiu departamentos para criar uma entidade centralizada focada em Negócios, Inovação, Ciência e Comércio. A mudança visa otimizar a governança sobre políticas tecnológicas, facilitando a colaboração entre a pesquisa acadêmica e o setor corporativo para impulsionar o crescimento econômico do país.","link":"https://www.thinkbroadband.com/news/goodbye-dsit-hello-department-for-business-innovation-science-and-trade","categoria":"POLÍTICA PÚBLICA","lang":"pt"},{"fonte":"Times Higher Education","pais":"Inglaterra","titulo":"Lucy Powell nomeada secretária de educação após extinção do departamento de ciência","resumo":"Com a reformulação do gabinete britânico e a extinção de um departamento específico para a ciência, Lucy Powell assume a pasta da educação. A movimentação reflete uma nova abordagem administrativa para integrar o desenvolvimento científico às estratégias de ensino, impactando o futuro da qualificação tecnológica e da força de trabalho nacional.","link":"https://www.timeshighereducation.com/news/lucy-powell-named-education-secretary-science-department-axed","categoria":"POLÍTICA","lang":"pt"},{"fonte":"PCMag UK","pais":"Inglaterra","titulo":"Os melhores headsets de realidade virtual para 2026","resumo":"Com o avanço contínuo do metaverso e da computação espacial, o mercado britânico de dispositivos de realidade virtual apresenta novos padrões de desempenho. A análise dos melhores equipamentos para 2026 destaca como a integração entre software imersivo e hardware de alta resolução está moldando a experiência de consumo e entretenimento digital no Reino Unido.","link":"https://uk.pcmag.com/vr-1/75926/the-best-vr-headsets","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Deia","pais":"Espanha","titulo":"Parece ficção científica, mas é real: um elétrico com propulsores de avião","resumo":"Uma inovação tecnológica impressionante funde a mobilidade elétrica com a engenharia aeroespacial ao integrar propulsores de avião em um veículo terrestre. O projeto desafia as fronteiras da mobilidade convencional, prometendo uma experiência de condução disruptiva. A solução demonstra como a convergência de setores distintos pode impulsionar o futuro dos transportes com alta performance.","link":"https://www.deia.eus/motor/2026/07/21/parece-ciencia-ficcion-real-electrico-11354935.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Infobae","pais":"Espanha","titulo":"Cientistas desenvolvem tecnologia fundamental para buscar mundos habitáveis fora do sistema solar","resumo":"Pesquisadores deram um salto significativo na exploração espacial ao criar uma tecnologia capaz de detectar exoplanetas com condições favoráveis à vida. O novo sistema aprimora a precisão das observações astronômicas, permitindo identificar mundos distantes fora do nosso sistema solar. Este avanço é essencial para a compreensão da habitabilidade no universo e para futuras missões científicas.","link":"https://www.infobae.com/america/ciencia-america/2026/07/21/cientificos-desarrollan-una-tecnologia-clave-para-buscar-mundos-habitables-fuera-del-sistema-solar/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Diario de Sevilla","pais":"Espanha","titulo":"Audi reforça o A3 com mais tecnologia, assistentes avançados e novas funções de estacionamento","resumo":"A Audi atualizou a linha A3 focando na integração de sistemas de assistência à condução de última geração. O modelo agora oferece funcionalidades de estacionamento mais intuitivas e uma experiência tecnológica interna aprimorada. Essas melhorias reforçam o compromisso da marca com a digitalização e a segurança automotiva no mercado europeu.","link":"https://www.diariodesevilla.es/motor/audi-refuerza-a3-tecnologia-asistentes_0_2007544743.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Vozpopuli","pais":"Espanha","titulo":"A ciência celebra este marco: a NASA capta novos sóis na Constelação de Touro a 460 anos-luz da Terra","resumo":"A NASA alcançou um marco histórico na astronomia ao capturar imagens detalhadas de novos sóis em formação na Constelação de Touro. Localizados a 460 anos-luz de distância, esses registros oferecem pistas valiosas sobre o nascimento estelar e a evolução do cosmos. A descoberta impulsiona o entendimento sobre a origem dos sistemas planetários.","link":"https://www.vozpopuli.com/ciencia/la-ciencia-celebra-este-hito-la-nasa-capta-nuevos-soles-en-la-constelacion-de-tauro-a-460-anos-luz-de-la-tierra.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"El Debate","pais":"Espanha","titulo":"O surpreendente sistema de limpeza do olho que a ciência acaba de descobrir","resumo":"Cientistas desvendaram um mecanismo biológico fascinante que explica como os olhos realizam a autolimpeza de forma contínua. A descoberta revela processos celulares complexos responsáveis pela manutenção da saúde ocular e proteção contra agentes externos. Esse achado abre caminhos para novas terapias oftalmológicas baseadas no funcionamento natural do corpo humano.","link":"https://www.eldebate.com/salud-y-bienestar/bienestar/20260721/sorprendente-sistema-limpieza-ojo-ciencia-acaba-descubrir_441485.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"simplywall.st","pais":"Espanha","titulo":"A tecnologia blockchain e a IA mudarão a perspectiva sobre a Keysight Technologies?","resumo":"O mercado analisa o impacto de novos acordos da ESA envolvendo satélites 5G, blockchain e IA sobre as ações da Keysight Technologies. A convergência destas tecnologias emergentes promete transformar a infraestrutura de comunicação global e a competitividade da empresa no setor. Investidores observam atentamente como essas inovações podem redefinir o futuro da companhia.","link":"https://simplywall.st/es/stocks/us/tech/nyse-keys/keysight-technologies/news/cambiaran-el-acuerdo-de-la-esa-sobre-satelites-5g-con-tecnol/amp","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Interempresas Media","pais":"Espanha","titulo":"Fast-Hole EDM: a tecnologia que torna possível a refrigeração de turbinas aeronáuticas","resumo":"A tecnologia de eletroerosão conhecida como Fast-Hole EDM tornou-se fundamental para a fabricação de componentes aeroespaciais de alta precisão. O método permite criar microfuros essenciais para a refrigeração eficaz de turbinas, aumentando drasticamente a vida útil e a eficiência dos motores. Este avanço é um pilar da engenharia moderna na indústria da aviação.","link":"https://www.interempresas.net/MetalMecanica/659035-Fast-Hole-EDM-tecnologia-que-hace-posible-refrigeracion-de-turbinas-aeronauticas.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Plan de Recuperación, Transformación y Resiliencia","pais":"Espanha","titulo":"Ciência financia o primeiro estudo espanhol para prever risco personalizado de câncer de mama com dados de 10.000 mulheres","resumo":"A Espanha inicia um estudo científico pioneiro focado na previsão personalizada do risco de câncer de mama, utilizando uma base de dados robusta. Com a participação de 10.000 mulheres, o projeto visa transformar diagnósticos através de análises preditivas precisas. A iniciativa marca um avanço significativo na medicina preventiva e na utilização de dados clínicos em larga escala.","link":"https://planderecuperacion.gob.es/noticias/ciencia-financia-primer-estudio-espanol-predecir-riesgo-cncer-mama-datos-10000-mujeres-perte-salud-prtr","categoria":"SAÚDE","lang":"pt"},{"fonte":"boerse.de","pais":"Alemanha","titulo":"HD Advanced Technologies e PHENOGY iniciam parceria para plataforma de tecnologia e indústria de baterias de íon-sódio","resumo":"A parceria entre HD Advanced Technologies e PHENOGY visa desenvolver uma plataforma industrial robusta para o armazenamento de energia via baterias de íon-sódio. Essa colaboração busca impulsionar soluções sustentáveis de energia, reduzindo a dependência de tecnologias tradicionais de íon-lítio. O projeto promete acelerar a inovação tecnológica no setor de armazenamento energético na Alemanha.","link":"https://www.boerse.de/nachrichten/EQS-News-HD-Advanced-Technologies-und-PHENOGY-starten-Zusammenarbeit-fuer-Technologie-und-Industrieplattform-fuer-Natrium-Ionen-Batteriespeicher/38467441","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"erneuerbareenergien.de","pais":"Alemanha","titulo":"Menos espaço, menos custos: Munique testa nova tecnologia para bombas de calor de águas subterrâneas","resumo":"A cidade de Munique está testando uma tecnologia inovadora para bombas de calor que utilizam águas subterrâneas, focando em otimização de espaço e redução de custos. A solução visa tornar o aquecimento urbano mais eficiente e ecologicamente correto. O projeto representa um avanço significativo para a transição energética e sustentabilidade das infraestruturas nas grandes cidades alemãs.","link":"https://www.erneuerbareenergien.de/waerme/weniger-platz-weniger-kosten-muenchen-erprobt-neue-technologie-fuer-grundwasserwaermepumpen","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Table.Briefings","pais":"Alemanha","titulo":"Tecnologia do Futuro","resumo":"Este artigo explora as tendências emergentes que definirão o panorama tecnológico nos próximos anos, abrangendo avanços em automação e digitalização. A análise foca em como essas inovações podem transformar o mercado de trabalho e o cotidiano da sociedade. O conteúdo serve como um guia essencial para compreender o impacto das tecnologias disruptivas na economia moderna.","link":"https://table.media/en/tag/technology-of-the-future","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"SZ.de","pais":"Alemanha","titulo":"Alimentos: Startup de robótica de Hamburgo fornece base militar nos EUA","resumo":"Uma startup de robótica sediada em Hamburgo firmou um contrato para fornecer sistemas de logística alimentar para uma base militar nos Estados Unidos. O sucesso da empresa destaca a força do ecossistema de tecnologia alemã no mercado internacional. Este avanço demonstra a crescente aplicação de robótica autônoma em cadeias de suprimentos complexas e críticas.","link":"https://www.sueddeutsche.de/wirtschaft/lebensmittel-hamburger-robotik-startup-beliefert-militaerbasis-in-den-usa-dpa.urn-newsml-dpa-com-20090101-260721-930-414400","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"BILD","pais":"Alemanha","titulo":"Após derrota de Messi: Vídeo cômico gerado por IA circula na rede","resumo":"Um vídeo gerado por inteligência artificial retratando a derrota de Lionel Messi tornou-se viral na internet, demonstrando as capacidades crescentes das ferramentas de criação de conteúdo sintético. O fenômeno destaca como a IA está sendo utilizada para fins de entretenimento e cultura pop global. A repercussão do caso ilustra a rápida disseminação de mídias geradas por computador nas redes sociais.","link":"https://www.bild.de/sport/fussball/nach-messi-niederlage-lustiges-ki-video-kursiert-im-netz-6a5e1fce61b8a80211aaf3ef","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"毎日新聞","pais":"Japão","titulo":"Lámen à base de plantas retorna em evento de tecnologia em Tóquio","resumo":"O famoso lámen vegetal, que esgotou em eventos tecnológicos anteriores, retorna ao menu durante o 'TOKYO GX ACTION MUSEUM'. A iniciativa, promovida pelo governo de Tóquio, foca na sustentabilidade e na transformação verde. O prato destaca como a inovação alimentar pode se integrar a exposições de alta tecnologia.","link":"https://mainichi.jp/articles/20260721/pr2/00m/020/733000c","categoria":"SUSTENTABILIDADE","lang":"pt"},{"fonte":"ps.nikkei.com","pais":"Japão","titulo":"Modernização de sistemas legados para vencer a competição digital","resumo":"Especialistas analisam como a atualização de tecnologias obsoletas é vital para empresas japonesas que buscam competitividade. O foco recai na transição para infraestruturas digitais ágeis que suportem novas demandas de mercado. O artigo detalha estratégias essenciais para evitar a estagnação tecnológica corporativa.","link":"https://ps.nikkei.com/dell_storage/2.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"日本経済新聞","pais":"Japão","titulo":"Ações da Ibiden sobem após análise otimista do SMBC Nikko","resumo":"As ações da Ibiden registraram alta significativa após o SMBC Nikko elevar sua classificação para a empresa. A análise aponta que a vantagem competitiva tecnológica da companhia está se fortalecendo no mercado de semicondutores. Investidores reagem positivamente à solidez técnica e às perspectivas de crescimento futuro da fabricante.","link":"https://www.nikkei.com/article/DGXZQOFL2119Q0R20C26A7000000/","categoria":"MERCADO","lang":"pt"},{"fonte":"MONOist","pais":"Japão","titulo":"Anunciada tecnologia de chips semicondutores abaixo de 1nm","resumo":"Uma nova tecnologia de semicondutores com arquitetura abaixo de 1nm foi revelada, prometendo um aumento de até 50% no desempenho. Este avanço representa um marco significativo para a indústria de hardware e processamento de dados. A inovação promete revolucionar o design de chips e a capacidade de processamento de futuros dispositivos.","link":"https://monoist.itmedia.co.jp/mn/articles/2607/21/news069.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"大分県ホームページ","pais":"Japão","titulo":"Lançamento do projeto Digital & AI Innovation Bridge (DAIB)","resumo":"O projeto DAIB foi oficialmente inaugurado com foco em impulsionar a inovação digital e o desenvolvimento de Inteligência Artificial. A iniciativa visa criar pontes de colaboração entre startups, corporações e especialistas para acelerar a transformação tecnológica. O projeto se posiciona como um hub estratégico para a evolução da IA no Japão.","link":"https://www.pref.oita.jp/soshiki/14270/daib.html","categoria":"INOVAÇÃO","lang":"pt"},{"fonte":"PR TIMES","pais":"Japão","titulo":"Polyuse é selecionada pelo programa SBIR de construção do Ministério das Infraestruturas","resumo":"A startup Polyuse recebeu apoio governamental através do programa SBIR voltado para pesquisa e desenvolvimento em construção. A empresa foca em tecnologias inovadoras para modernizar canteiros de obras e aumentar a eficiência operacional. Esta seleção reafirma a importância da automação e novas tecnologias no setor de infraestrutura nacional.","link":"https://prtimes.jp/main/html/rd/p/000000034.000049711.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"東奥日報社","pais":"Japão","titulo":"Comprovação científica sobre o sabor do café maturado na neve de Nishimeya","resumo":"Pesquisadores utilizaram métodos científicos para analisar as propriedades sensoriais do café processado em 'câmaras de neve' naturais em Nishimeya. O estudo confirmou que o processo de maturação resulta em um sabor mais suave e aprimorado. A pesquisa combina tradição local com análise técnica para validar a qualidade do produto regional.","link":"https://www.toonippo.co.jp/articles/-/2321231","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"BigGo ファイナンス","pais":"China","titulo":"China considera endurecer restrições à exportação de IA e semicondutores","resumo":"O governo chinês estuda implementar controles mais rígidos sobre a exportação de tecnologias de Inteligência Artificial e semicondutores. A medida visa conter a aquisição estratégica por empresas estrangeiras em meio à crescente disputa tecnológica global, protegendo a infraestrutura de inovação doméstica.","link":"https://finance.biggo.jp/news/ebbd7214-d572-4daa-b14a-675fa214afe5","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Yahoo!ニュース","pais":"China","titulo":"Economia chinesa: IA surge como novo motor de crescimento","resumo":"Em um cenário de desaceleração econômica, a Inteligência Artificial emerge como um pilar fundamental de expansão na China. O setor tem ganhado destaque e relevância ao impulsionar a produtividade industrial e substituir modelos de negócios tradicionais por soluções automatizadas avançadas.","link":"https://news.yahoo.co.jp/articles/ace3f83a38b5e0d8039ca8b21eec7070c6298350","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"科学网—新闻","pais":"China","titulo":"Análise de movimentos faciais atinge 95% de precisão na detecção de deepfakes","resumo":"Pesquisadores chineses desenvolveram uma nova tecnologia de reconhecimento baseada na análise de micro-expressões faciais para identificar conteúdos manipulados. Com uma taxa de precisão superior a 95%, a ferramenta representa um avanço significativo no combate à desinformação digital.","link":"https://news.sciencenet.cn/htmlnews/2026/7/568555.shtm","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"新京报","pais":"China","titulo":"Observações na WAIC: IA começa a priorizar a viabilidade econômica","resumo":"A Conferência Mundial de Inteligência Artificial (WAIC) destacou uma mudança de foco na indústria chinesa, indo além das demonstrações técnicas. O setor agora prioriza a rentabilidade e a eficiência prática, buscando transformar algoritmos complexos em soluções financeiramente viáveis para o mercado.","link":"https://www.bjnews.com.cn/detail/1784601924129370.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Breaking News, Latest News and Videos","pais":"China","titulo":"Fórum científico em Xangai revela avanços da China em IA e robótica","resumo":"Um recente fórum científico em Xangai exibiu os progressos notáveis da China em robótica e IA, evidenciando sua crescente competitividade global frente aos Estados Unidos. As inovações apresentadas demonstram o comprometimento do país em liderar setores tecnológicos críticos para o futuro.","link":"https://abcnews.com/International/wireStory/shanghai-science-forum-photos-show-chinas-ai-robotics-134935594","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"新华网客户端","pais":"China","titulo":"Ministério da Indústria da China acelera testes da segunda fase da tecnologia 6G","resumo":"O Ministério da Indústria e Tecnologia da Informação chinês anunciou o início da aceleração dos testes para a próxima geração de conectividade sem fio. A iniciativa visa consolidar a liderança do país na infraestrutura 6G, garantindo maior velocidade e menor latência para a economia digital.","link":"https://app.xinhuanet.com/news/article.html?articleId=20260720541b6edc11b44e5e983f47ed387357eb","categoria":"TELECOMUNICAÇÕES","lang":"pt"},{"fonte":"同济大学新闻网","pais":"China","titulo":"Equipe de pesquisa alcança avanço em nanotecnologia publicado na Advanced Functional Materials","resumo":"Uma equipe de engenharia ambiental da China desenvolveu uma tecnologia de nano-confinamento para otimizar o armazenamento de íons de cloro. O estudo, publicado na prestigiada revista Advanced Functional Materials, resolve um compromisso técnico fundamental, permitindo maior eficiência em capacitores de energia.","link":"https://news.tongji.edu.cn/info/1003/95217.htm","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"观点网","pais":"China","titulo":"Ministério da Indústria define política de mercado tecnológico com mais de 425 mil empresas","resumo":"O governo chinês estabeleceu novas diretrizes para integrar o mercado nacional de tecnologia, visando fortalecer o ecossistema de inovação. A política abrange mais de 425 mil empresas em incubadoras, promovendo um ambiente mais coeso para o desenvolvimento tecnológico em larga escala.","link":"https://www.guandian.cn/m/show/574971","categoria":"POLÍTICA","lang":"pt"},{"fonte":"PIB","pais":"Índia","titulo":"Divisão BHASHINI da Índia Digital leva 'BHASHINI Rajyam' a Goa para avançar a governança via IA em concani e idiomas indianos","resumo":"A iniciativa visa implementar soluções de IA para tradução e processamento de idiomas locais em Goa. O projeto busca democratizar o acesso aos serviços governamentais, facilitando a comunicação entre o Estado e os cidadãos. Essa tecnologia é um marco na inclusão digital linguística em toda a região.","link":"https://www.pib.gov.in/PressReleasePage.aspx?PRID=2286903","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"ThePrint","pais":"Índia","titulo":"Delegação russa de alto nível visita a AVPL Drone City, em Haryana","resumo":"Uma delegação tecnológica da Rússia visitou as instalações da AVPL Drone City para explorar parcerias estratégicas. O foco do encontro é o intercâmbio de conhecimentos sobre o desenvolvimento e fabricação de drones. A cooperação pode acelerar inovações no setor aéreo indiano.","link":"https://theprint.in/ani-press-releases/high-level-russian-technology-delegation-visits-avpl-drone-city-haryana/2991931/","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Adgully.com","pais":"Índia","titulo":"Pinkustar Borah promovida a Chefe Digital e de Tecnologia na Unilever International","resumo":"Pinkustar Borah assume um cargo de liderança global focado na transformação digital da Unilever International. A nomeação reflete a importância estratégica de integrar tecnologias avançadas nas operações da multinacional. Sua gestão será crucial para otimizar processos e impulsionar a inovação tecnológica da empresa.","link":"https://www.adgully.com/post/18257/pinkustar-borah-elevated-as-chief-digital-technology-officer-at-unilever-international","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"HR Katha","pais":"Índia","titulo":"A estratégia de IA da Newgen começa pelas pessoas, não pela tecnologia","resumo":"A Newgen destaca que a implementação eficaz de Inteligência Artificial deve priorizar a capacitação e o foco humano. Em vez de apenas focar em ferramentas, a empresa valoriza a adaptação cultural e o treinamento das equipes. Essa abordagem visa garantir que a tecnologia seja um suporte real para o talento humano.","link":"https://www.hrkatha.com/features/newgens-ai-strategy-starts-with-people-not-technology/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"The Times of India","pais":"Índia","titulo":"NSRTC 2026: Startups impulsionadas pela ciência são fundamentais para o Viksit Bharat 2047, dizem Man Mohan Sharma e R. A. Mashelkar","resumo":"Especialistas afirmam que o futuro da Índia até 2047 depende do crescimento de startups com base científica. O incentivo à pesquisa e ao desenvolvimento tecnológico é visto como o pilar para o crescimento econômico sustentável. O evento reforça a necessidade de transformar ciência em soluções práticas de mercado.","link":"https://timesofindia.indiatimes.com/education/news/nsrtc-2026-science-powered-startups-key-to-viksit-bharat-2047-say-man-mohan-sharma-and-r-a-mashelkar/articleshow/132527588.cms","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Equitypandit","pais":"Índia","titulo":"Ações sob proibição F&O: Kaynes Technology","resumo":"A empresa Kaynes Technology entrou em restrição nas negociações de Futuros e Opções na bolsa indiana. Essa medida ocorre quando o volume de contratos abertos ultrapassa os limites permitidos pelo regulador do mercado. Investidores devem monitorar a volatilidade das ações durante este período de restrição.","link":"https://www.equitypandit.com/stocks-under-fo-ban-kaynes-technology-15/","categoria":"MERCADO","lang":"pt"},{"fonte":"The Hindu","pais":"Índia","titulo":"Honeywell Aerospace oferece tecnologia de prevenção de colisões em pistas para companhia aérea nacional mexicana","resumo":"A Honeywell Aerospace expande o alcance de sua tecnologia de segurança aérea ao firmar contrato com uma companhia mexicana. O sistema utiliza sensores avançados para prevenir colisões em pistas de decolagem e pouso. Essa implementação reforça a excelência da engenharia aeroespacial indiana em padrões globais.","link":"https://www.thehindu.com/business/honeywell-aerospace-offers-runway-collision-prevention-technology-to-mexican-national-airline/article71246483.ece","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"The Hindu","pais":"Índia","titulo":"UAS-B introduz tecnologia de baixo custo para agricultores produzirem biocarvão e melhora a saúde do solo","resumo":"A Universidade de Ciências Agrícolas de Bangalore (UAS-B) está capacitando agricultores com técnicas acessíveis para a produção de biocarvão. A iniciativa visa aumentar a fertilidade do solo e promover práticas agrícolas sustentáveis na Índia. O projeto combina inovação tecnológica com impacto socioambiental direto para comunidades rurais.","link":"https://www.thehindu.com/news/national/karnataka/uas-b-introduces-low-cost-technology-to-farmers-to-produce-biochar-trains-them-to-improve-soil-health/article71185537.ece","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"4gnews","pais":"Portugal","titulo":"Conduzi o Volvo ES90: luxo no conforto, segurança, tecnologia e preço","resumo":"O novo Volvo ES90 combina elevados padrões de conforto e segurança com inovações tecnológicas de ponta. A análise destaca como o veículo se posiciona competitivamente no mercado de luxo atual. O modelo reflete a aposta da marca na experiência de condução premium e eficiência.","link":"https://4gnews.pt/volvo-es90-ensaio/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"welectric.pt","pais":"Portugal","titulo":"PRIO testa tecnologia da Future Voltaics para produzir mais energia solar quando ela é mais necessária","resumo":"A PRIO iniciou testes com a tecnologia da Future Voltaics para otimizar a captação de energia solar em períodos estratégicos. Esta inovação visa aumentar a eficiência energética e a resiliência das fontes renováveis no sistema elétrico. O projeto reforça o compromisso com a sustentabilidade e a inovação tecnológica.","link":"https://welectric.pt/2026/07/21/prio-testa-tecnologia-da-future-voltaics-para-produzir-mais-energia-solar-quando-ela-e-mais-necessaria/","categoria":"SUSTENTABILIDADE","lang":"pt"},{"fonte":"Observador","pais":"Portugal","titulo":"Do medo à precisão: a tecnologia mudou a cirurgia ao cérebro","resumo":"A evolução tecnológica transformou radicalmente a neurocirurgia, permitindo procedimentos muito mais precisos e seguros do que no passado. Ferramentas digitais e de imagem avançadas reduzem riscos significativos para os pacientes e melhoram drasticamente o prognóstico pós-operatório. A integração destas tecnologias redefine o padrão atual de cuidados médicos.","link":"https://observador.pt/opiniao/do-medo-a-precisao-como-a-tecnologia-esta-a-mudar-a-cirurgia-ao-cerebro/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"ZAP Notícias","pais":"Portugal","titulo":"Há 150 anos que a Terra dispara canhões fantasma. A ciência ainda não sabe porquê","resumo":"Um fenómeno sónico misterioso, apelidado de canhões fantasma, continua a desafiar a compreensão científica após mais de um século de registos. Cientistas investigam as possíveis causas atmosféricas ou geológicas por trás destes sons inexplicáveis que ocorrem em diversas partes do mundo. O mistério permanece como um dos grandes enigmas da ciência natural moderna.","link":"https://zap.aeiou.pt/ha-150-anos-que-a-terra-dispara-canhoes-fantasma-a-ciencia-ainda-nao-sabe-porque-755862","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"SAPO","pais":"Portugal","titulo":"BIKiNNOV coloca Águeda na linha da frente da inovação para uma mobilidade sustentável e economia descarbonizada","resumo":"O projeto BIKiNNOV posiciona Águeda como um polo central de inovação na indústria de bicicletas e mobilidade sustentável. Focado na economia descarbonizada, o programa incentiva o desenvolvimento tecnológico local e a transição ecológica. A iniciativa é um exemplo de como a tecnologia impulsiona o desenvolvimento económico regional.","link":"https://sapo.pt/artigo/bikinnov-coloca-agueda-na-linha-da-frente-da-inovacao-para-uma-mobilidade-sustentavel-e-economia-descarbonizada-6a5e9fad39564b23dac4974b","categoria":"INOVAÇÃO","lang":"pt"},{"fonte":"SAPO","pais":"Portugal","titulo":"O verdadeiro desafio da IA reside nas pessoas, não na tecnologia","resumo":"O impacto da Inteligência Artificial na sociedade moderna depende mais da adaptação humana e ética do que das capacidades técnicas das máquinas. Especialistas argumentam que o foco deve mudar para a gestão de talentos, requalificação profissional e a supervisão consciente do uso desta ferramenta. A tecnologia é apenas o meio, enquanto o fator humano define o sucesso da implementação.","link":"https://sapo.pt/artigo/o-verdadeiro-desafio-da-ia-reside-nas-pessoas-nao-na-tecnologia-6a5e560539564b23dabada61","categoria":"INTELIGÊNCIA ARTIFICIAL","lang":"pt"},{"fonte":"RFI","pais":"Portugal","titulo":"Ciência - Matéria escura: Portugal trabalha sobre projeto internacional","resumo":"Portugal participa ativamente num prestigiado projeto internacional focado no estudo da matéria escura, um dos maiores segredos do universo. A colaboração científica coloca o país na vanguarda da investigação fundamental sobre a composição e evolução do cosmos. Este envolvimento reforça o papel estratégico dos investigadores portugueses na ciência global.","link":"https://www.rfi.fr/pt/programas/ci%C3%AAncia/20260720-mat%C3%A9ria-escura-portugal-trabalha-sobre-projecto-internacional","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"SAPO","pais":"Portugal","titulo":"Tecnologia portuguesa de dados de saúde expande-se para a América do Sul","resumo":"Uma solução tecnológica de gestão de dados de saúde desenvolvida em Portugal está a expandir as suas operações para mercados na América do Sul. A tecnologia permite uma integração mais eficiente de informações clínicas, melhorando a gestão hospitalar e o atendimento ao paciente. Este movimento demonstra a competitividade e o valor da engenharia de software portuguesa no mercado internacional.","link":"https://sapo.pt/artigo/tecnologia-portuguesa-de-dados-de-saude-expande-se-para-a-america-do-sul-6a5e45ab9c9f29b5ce7e43e9","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"O GLOBO","pais":"Brazil","titulo":"How AI-edited images threaten bird research and worry scientists","resumo":"The rise of manipulated images created by artificial intelligence has sparked a major alert within the global ornithological scientific community. Experts fear that the spread of fake photographs could compromise the integrity of biological databases. The situation requires the development of new verification techniques to ensure research accuracy and the preservation of species.","link":"https://oglobo.globo.com/economia/tecnologia/noticia/2026/07/21/entenda-como-imagens-editadas-por-ia-ameacam-pesquisas-sobre-aves-e-preocupam-cientistas.ghtml","categoria":"SCIENCE","lang":"en"},{"fonte":"O GLOBO","pais":"Brazil","titulo":"Cyber fraud losses in Asia and Oceania reached $114 billion in 2025","resumo":"A recent report revealed that cyber fraud caused billions in losses across various Asian and Oceanian economies during 2025. This alarming figure underscores the growing vulnerability of financial institutions and consumers to the sophisticated tactics of digital criminals. Experts are calling for urgent global investments in cybersecurity.","link":"https://oglobo.globo.com/google/amp/economia/tecnologia/noticia/2026/07/21/prejuizos-com-fraudes-ciberneticas-na-asia-e-na-oceania-chegaram-a-us-114-bilhoes-em-2025.ghtml","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Valor Econômico","pais":"Brazil","titulo":"Hidden debt of US tech giants reaches $1.65 trillion","resumo":"Financial analysts point out that the unrecorded debt of major US tech companies has hit a critical level of $1.65 trillion. This scenario creates uncertainty regarding the sector's stability and its ability to maintain long-term innovation investment. The market is closely monitoring how these liabilities will impact future strategic decisions by Big Tech firms.","link":"https://valor.globo.com/empresas/noticia/2026/07/21/dvida-oculta-de-gigantes-de-tecnologia-dos-eua-chega-a-us-165-trilho.ghtml","categoria":"BUSINESS","lang":"en"},{"fonte":"Portal GDia","pais":"Brazil","titulo":"Nobel laureate in Economics says AI's impact on employment is overestimated","resumo":"A Nobel Prize-winning economist has presented a controversial perspective, arguing that fears regarding automation caused by AI may be exaggerated. According to the expert, economic history shows that disruptive technologies tend to create new categories of jobs rather than permanently eliminating them. The analysis aims to bring calm to the public debate regarding the future of the labor market.","link":"https://gdia.com.br/noticia/4864/nobel-de-economia-afirma-que-impacto-da-ia-no-emprego-e-superestimado","categoria":"SCIENCE","lang":"en"},{"fonte":"Folha de S.Paulo","pais":"Brazil","titulo":"Brazil advances in the global race for sustainable aviation fuel production","resumo":"Brazil is solidifying its strategic position in the global sustainable aviation fuel market, leveraging its vast agricultural infrastructure. Investments in processing technology have allowed the country to lead the energy transition in the air transport sector. This initiative promises to reduce the global carbon footprint while attracting billions in new sustainable business.","link":"https://www1.folha.uol.com.br/mercado/2026/07/brasil-avanca-na-corrida-global-para-producao-de-combustivel-sustentavel-de-aviacao.shtml","categoria":"INNOVATION","lang":"en"},{"fonte":"Gazeta Rural","pais":"Brazil","titulo":"Brazilian agriculture advances in technology, but data usage remains a challenge","resumo":"Although Brazilian agribusiness has integrated cutting-edge technologies into its operations, efficient data management still represents a significant bottleneck. The sector is now seeking solutions to transform raw data collection into actionable insights to increase productivity in the field. Technical training for producers and rural connectivity are identified as keys to overcoming these barriers.","link":"https://gazetarural.com/agricultura-brasileira-avanca-em-tecnologia-mas-uso-de-dados-ainda-e-desafio/","categoria":"AGROTECHNOLOGY","lang":"en"},{"fonte":"Canal Solar","pais":"Brazil","titulo":"The energy of the future: Brazil could lead the new energy economy","resumo":"Brazil possesses unique competitive advantages to become the epicenter of the new global energy economy through renewable sources. With a focus on green hydrogen, solar, and wind energy, the country is attracting investors interested in industrial decarbonization. This transition positions the nation as one of the main suppliers of clean, low-cost energy on the international geopolitical stage.","link":"https://canalsolar.com.br/brasil-pode-liderar-nova-economia-energia/","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Valor Econômico","pais":"Brazil","titulo":"Tech companies find a new strategy to strengthen brands in soccer","resumo":"The tech sector has been strengthening ties with Brazilian soccer to expand its brand reach among the general public. Through sponsorships and innovative partnerships, companies are seeking to democratize access to digital tools in a high-engagement environment. The strategy demonstrates the effectiveness of sports as a launch platform for new technological products and services.","link":"https://valor.globo.com/patrocinado/pressworks/noticia/2026/07/20/empresas-de-tecnologia-encontram-no-futebol-uma-nova-estrategia-para-fortalecer-marcas-1.ghtml","categoria":"BUSINESS","lang":"en"},{"fonte":"G1","pais":"United States","titulo":"Anthropic settles for a historic $1.5 billion in lawsuit over using books to train AI","resumo":"The artificial intelligence company Anthropic has settled a multi-billion dollar copyright lawsuit involving the training of its language models. The agreement sets an important precedent for the tech industry, balancing the advancement of AI innovation with the need to protect the intellectual property of authors and publishers.","link":"https://g1.globo.com/tecnologia/noticia/2026/07/20/anthropic-fecha-acordo-historico-de-us-15-bilhao-em-processo-por-uso-de-livros-para-treinar-ia.ghtml","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"SiliconANGLE","pais":"United States","titulo":"AI materials science startup CuspAI raises $450 million in funding","resumo":"CuspAI has secured a massive $450 million investment to scale its platform focused on developing new materials through artificial intelligence. The funding round highlights growing investor interest in applying generative models to solve complex problems in materials engineering and chemistry.","link":"https://siliconangle.com/2026/07/20/ai-materials-science-startup-cuspai-raises-450m-funding/","categoria":"BUSINESS","lang":"en"},{"fonte":"Rutgers University","pais":"United States","titulo":"Innovative technology developed at Rutgers could make lithium-ion batteries safer","resumo":"Researchers at Rutgers University have created a new technology capable of mitigating fire risks in lithium-ion batteries. This innovation is crucial for the future of vehicle electrification and energy storage, promising more robust, safe, and efficient devices for mass consumption.","link":"https://www.rutgers.edu/news/innovative-technology-developed-rutgers-could-make-lithium-ion-batteries-safer","categoria":"SCIENCE","lang":"en"},{"fonte":"The Quantum Insider","pais":"United States","titulo":"Interlune develops cryogenic technology to expand Helium-3 supply for quantum computing","resumo":"Startup Interlune is investing in advanced cryogenic technology aimed at the extraction and management of Helium-3, a fundamental resource for the development of quantum computing. The project seeks to overcome supply bottlenecks that currently hinder the large-scale progress of quantum processors.","link":"https://thequantuminsider.com/2026/07/20/interlune-produces-pure-helium-3-from-domestic-helium-using-novel-cryogenic-technology/","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"NASA Jet Propulsion Laboratory (JPL) (.gov)","pais":"United States","titulo":"New NASA Earth missions prepare to start science flights","resumo":"NASA has begun preparations for a new series of missions focused on observing the planet, using next-generation sensors to monitor climate change. These science flights will provide critical data for a global understanding of the climate, serving as a central pillar in the agency's environmental research strategy.","link":"https://www.jpl.nasa.gov/news/new-nasa-earth-missions-gear-up-to-start-science-flights/","categoria":"SCIENCE","lang":"en"},{"fonte":"Ground Truths | Eric Topol","pais":"United States","titulo":"How is AI catalyzing the life sciences?","resumo":"Artificial intelligence is transforming the life sciences by accelerating drug discovery and large-scale genetic analysis. The impact of this technology drastically reduces laboratory research time, enabling more precise diagnostics and personalized treatm uth American markets. The technology allows for more efficient integration of clinical information, improving hospital management and patient care. This move demonstrates the competitiveness and value of Portuguese software engineering in the international market.","link":"https://sapo.pt/artigo/tecnologia-portuguesa-de-dados-de-saude-expande-se-para-a-america-do-sul-6a5e45ab9c9f29b5ce7e43e9","categoria":"TECHNOLOGY","lang":"en"}];

  const searchInput = document.getElementById('search');
  const langSelect = document.getElementById('lang');
  const countrySelect = document.getElementById('country');
  const categorySelect = document.getElementById('category');
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');
  const clearBtn = document.getElementById('clear-filters');

  // Utility de escape HTML simples para prevenir injections em propriedades sem tratamento
  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function populateSelects() {
    const lang = langSelect.value;
    const currentData = data.filter(d => d.lang === lang);

    const countries = [...new Set(currentData.map(d => d.pais))].filter(Boolean).sort();
    const categories = [...new Set(currentData.map(d => d.categoria))].filter(Boolean).sort();

    const currentCountry = countrySelect.value;
    const currentCategory = categorySelect.value;

    countrySelect.innerHTML = '<option value="all">Todos / All</option>';
    categorySelect.innerHTML = '<option value="all">Todas / All</option>';

    countries.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      countrySelect.appendChild(opt);
    });

    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      categorySelect.appendChild(opt);
    });

    if (currentCountry !== 'all' && countries.includes(currentCountry)) {
      countrySelect.value = currentCountry;
    }
    if (currentCategory !== 'all' && categories.includes(currentCategory)) {
      categorySelect.value = currentCategory;
    }
  }

  function render(items) {
    countEl.textContent = `${items.length} notícia${items.length !== 1 ? 's' : ''}`;
    
    grid.innerHTML = items.map(item => {
      const readMoreTxt = item.lang === 'pt' ? 'Ler mais' : 'Read more';
      
      const bulletList = (item.resumo || '').split('\n')
        .filter(Boolean)
        .map(line => `<li>${esc(line.replace(/^- /, ''))}</li>`)
        .join('');

      return `
        <div class="news-card">
          <div class="card-meta">
            <span class="category">${esc(item.categoria) || 'Geral'}</span>
            <span class="country">${esc(item.pais) || 'Global'}</span>
          </div>
          <h3 class="card-title">${esc(item.titulo)}</h3>
          <div class="card-summary">
            <ul>${bulletList}</ul>
          </div>
          <div class="card-footer">
            <a href="${esc(item.link)}" target="_blank" class="read-more">
              ${readMoreTxt} &rarr;
            </a>
            <span class="source">${esc(item.fonte)}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterData() {
    const query = searchInput.value.toLowerCase();
    const lang = langSelect.value;
    const country = countrySelect.value;
    const category = categorySelect.value;

    const filtered = data.filter(item => {
      const matchLang = item.lang === lang;
      const matchCountry = country === 'all' || item.pais === country;
      const matchCategory = category === 'all' || item.categoria === category;
      const matchSearch = query === '' 
        || (item.titulo || '').toLowerCase().includes(query)
        || (item.resumo || '').toLowerCase().includes(query)
        || (item.fonte || '').toLowerCase().includes(query);

      return matchLang && matchCountry && matchCategory && matchSearch;
    });

    render(filtered);
  }

  // Binds
  searchInput.addEventListener('input', filterData);
  langSelect.addEventListener('change', () => {
    populateSelects();
    filterData();
  });
  countrySelect.addEventListener('change', filterData);
  categorySelect.addEventListener('change', filterData);
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    countrySelect.value = 'all';
    categorySelect.value = 'all';
    filterData();
  });

  // Initialization
  populateSelects();
  filterData(); // trigger first render
</script>
