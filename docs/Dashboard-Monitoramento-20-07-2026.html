<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Monitoramento Mídia Internacional | Global Media Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0B0F19;
      --bg-panel: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #E2E8F0;
      --text-muted: #94A3B8;
      --accent: #D4AF37;
      --accent-hover: #FDE047;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.15), transparent 400px),
                        radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.05), transparent 400px);
    }
    header {
      padding: 1.5rem 5%;
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo-img {
      height: 48px; /* Altura ajustável do logo */
      width: auto;
      object-fit: contain;
      border-radius: 8px; /* Caso não seja transparente */
    }
    .logo-text {
      font-weight: 700;
      font-size: clamp(1rem, 2vw, 1.5rem);
      letter-spacing: -0.5px;
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .logo-text .title-light,
    .logo-text .title-separator {
      color: #fff;
    }
    .logo-text .title-accent {
      color: var(--accent);
    }
    .date-badge {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      color: var(--accent);
      font-weight: 600;
    }
    .container {
      padding: 2rem 5%;
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }
    .filters {
      flex: 0 0 300px;
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 6rem;
    }
    .filter-group {
      margin-bottom: 1.5rem;
    }
    .filter-group label {
      display: block;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
    }
    select option {
      background: var(--bg-main);
      color: var(--text-main);
    }
    .results {
      flex: 1;
    }
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .results-count {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .news-card {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .news-card:hover {
      transform: translateY(-4px);
      border-color: rgba(212, 175, 55, 0.5);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }
    .category {
      color: var(--accent);
    }
    .country {
      color: var(--text-muted);
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.4;
      margin: 0 0 1rem 0;
      color: #fff;
    }
    .card-summary {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-muted);
      flex: 1;
    }
    .card-summary ul {
      margin: 0;
      padding-left: 1.2rem;
    }
    .card-summary li {
      margin-bottom: 0.25rem;
    }
    .card-footer {
      margin-top: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--glass-border);
      padding-top: 1rem;
    }
    .read-more {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .read-more:hover {
      color: var(--accent-hover);
    }
    .source {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .btn-clear {
      width: 100%;
      padding: 0.75rem 1rem;
      margin-top: 0.5rem;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-clear:hover {
      background: var(--accent);
      color: var(--bg-main);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }
    /* Simple CSS reset/scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: var(--bg-panel); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .filters {
        flex: none;
        width: 100%;
        position: static;
        box-sizing: border-box;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-container">
    <img src="logo.jpg" alt="TAP Logo" class="logo-img" onerror="this.style.display='none'">
    <div class="logo-text" aria-label="Monitoramento Mídia Internacional | Global Media Monitoring"><span class="title-light">Monitoramento Mídia</span><span class="title-accent">Internacional</span><span class="title-separator">|</span><span class="title-light">Global Media</span><span class="title-accent">Monitoring</span></div>
  </div>
  <div class="date-badge">20/07/2026</div>
</header>

<div class="container">
  <aside class="filters">
    <div class="filter-group">
      <label for="search">Busca / Search</label>
      <input type="text" id="search" placeholder="Palavra-chave...">
    </div>
    
    <div class="filter-group">
      <label for="lang">Idioma / Language</label>
      <select id="lang">
        <option value="pt">Português (PT-BR)</option>
        <option value="en">English (US)</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="country">País / Country</label>
      <select id="country">
        <option value="all">Todos / All</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="category">Categoria / Category</label>
      <select id="category">
        <option value="all">Todas / All</option>
      </select>
    </div>
    
    <button id="clear-filters" class="btn-clear">Limpar / Clear</button>
  </aside>

  <main class="results">
    <div class="results-header">
      <h2 style="margin: 0; font-size: 1.5rem; color: #fff;">Resultados</h2>
      <span class="results-count" id="count">0 notícias</span>
    </div>
    <div class="news-grid" id="grid">
      <!-- Injected by JS -->
    </div>
  </main>
</div>

<script>
  // Injeta os dados originais no frontend
  const data = [{"fonte":"DW.com","pais":"Brasil","titulo":"Cães-robôs ganham espaço em tarefas de risco","resumo":"A utilização de robôs quadrúpedes tem se expandido significativamente para a execução de atividades perigosas em ambientes industriais e hostis. Essa tecnologia visa reduzir a exposição humana a situações de risco, aumentando a eficiência e a segurança operacional. O avanço desses dispositivos marca uma nova etapa na robótica aplicada ao cotidiano.","link":"https://www.dw.com/pt-br/c%C3%A3es-rob%C3%B4s-ganham-espa%C3%A7o-em-tarefas-de-risco/video-77983877","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"RETEMA","pais":"Brasil","titulo":"Tecnologia HVO da Alfa Laval apoiará a produção de combustível sustentável para aviação no Brasil","resumo":"A Alfa Laval está implementando sua tecnologia de tratamento de HVO para fortalecer a infraestrutura de produção de combustíveis renováveis no país. A iniciativa visa descarbonizar o setor aéreo, atendendo a demandas globais por fontes de energia mais limpas. O projeto representa um passo importante para a transição energética do setor de transportes brasileiro.","link":"https://www.retema.es/actualidad/la-tecnologia-hvo-de-alfa-laval-respaldara-la-produccion-de-combustible-sostenible-para","categoria":"CIÊNCIA SUSTENTÁVEL","lang":"pt"},{"fonte":"G1","pais":"Brasil","titulo":"Namoro com a IA e a economia da intimidade","resumo":"O crescimento de relacionamentos mediados por inteligência artificial levanta debates sobre as mudanças na psique humana e nas interações sociais. Esse fenômeno, chamado de economia da intimidade, explora como ferramentas digitais preenchem carências afetivas. O impacto dessa tendência levanta questões éticas profundas sobre o futuro dos vínculos interpessoais.","link":"https://g1.globo.com/podcast/o-assunto/noticia/2026/07/20/namoro-com-a-ia-e-a-economia-da-intimidade-o-assunto-1764.ghtml","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"G1","pais":"Brasil","titulo":"Como terroristas estão usando IA para planejar ataques e burlar restrições dos chatbots","resumo":"O uso indevido de inteligência artificial por grupos extremistas tem preocupado especialistas em segurança cibernética e inteligência global. Ataques estão sendo facilitados por meio de táticas para contornar filtros de segurança em modelos de linguagem avançados. O cenário exige o desenvolvimento urgente de barreiras éticas mais rigorosas e políticas de governança digital.","link":"https://g1.globo.com/tecnologia/noticia/2026/07/20/como-terroristas-estao-usando-ia-para-planejar-ataques-e-burlar-restricoes-dos-chatbots.ghtml","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"TNH1","pais":"Brasil","titulo":"Tecnologia 3D revela besouro mais antigo que dinossauros no Ceará","resumo":"Pesquisadores utilizaram tecnologia de digitalização 3D para identificar fósseis de um besouro que antecede o período dos dinossauros no território cearense. A descoberta oferece novas perspectivas sobre a biodiversidade e a evolução dos insetos no passado remoto da Terra. Esse avanço tecnológico demonstra a precisão na análise de registros geológicos complexos.","link":"https://www.tnh1.com.br/noticia/nid/tecnologia-3d-revela-besouro-mais-antigo-que-dinossauros-no-ceara/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Vietnam.vn","pais":"Brasil","titulo":"A nova tecnologia iCGM da Abbott proporciona tranquilidade no cuidado de pessoas com diabetes","resumo":"A nova geração de sensores iCGM da Abbott promete revolucionar o monitoramento contínuo da glicose com maior precisão e conectividade. A tecnologia oferece aos pacientes um controle mais eficaz de sua condição de saúde, diminuindo riscos e melhorando a qualidade de vida. Este lançamento é um marco relevante para a tecnologia aplicada à saúde humana.","link":"https://www.vietnam.vn/pt/cong-nghe-icgm-moi-cua-abbott-giup-an-tam-cham-soc-nguoi-mac-dai-thao-duong","categoria":"SAÚDE TECNOLÓGICA","lang":"pt"},{"fonte":"A Hora do Sul","pais":"Brasil","titulo":"Tecnologia Wi-Fi 7 é grande novidade da Osirnet durante a Fenadoce","resumo":"A implementação do padrão Wi-Fi 7 promete revolucionar a experiência de conectividade com velocidades superiores e menor latência. Durante a Fenadoce, a demonstração da tecnologia destacou a capacidade de suportar um tráfego de dados mais denso e eficiente. Essa inovação prepara o terreno para a próxima era da infraestrutura de redes residenciais e comerciais.","link":"https://ahoradosul.com.br/conteudos/2026/07/19/tecnologia-wi-fi-7-e-grande-novidade-da-osirnet-durante-a-fenadoce/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"NeoFeed","pais":"Brasil","titulo":"ARTIGO: A parte mais difícil da IA não é a tecnologia","resumo":"O debate sobre inteligência artificial muitas vezes negligencia os desafios estruturais, culturais e éticos que superam a complexidade técnica. A integração efetiva da IA na sociedade exige uma reavaliação de processos humanos, organizacionais e de gestão de dados. A verdadeira transformação depende mais da adaptação estratégica do que do avanço algorítmico puro.","link":"https://neofeed.com.br/finde/artigo-a-parte-mais-dificil-da-ia-nao-e-a-tecnologia/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Consumer Goods Technology","pais":"Estados Unidos","titulo":"IA no Varejo: Da Adoção à Vantagem Competitiva","resumo":"A integração da inteligência artificial no setor varejista está evoluindo de uma simples tendência para um diferencial estratégico essencial. As empresas utilizam a tecnologia para otimizar operações, personalizar a experiência do cliente e prever demandas de mercado. Esse movimento redefine a eficiência operacional e o engajamento dos consumidores no competitivo mercado global.","link":"https://consumergoods.com/ai-retail-adoption-advantage","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Technology Networks","pais":"Estados Unidos","titulo":"Filtro infravermelho para câmeras térmicas pode detectar poluição e doenças","resumo":"Cientistas desenvolveram um novo filtro infravermelho que amplia significativamente a capacidade das câmeras térmicas tradicionais. Esta inovação permite a identificação precisa de poluentes atmosféricos e sinais biológicos precoces de doenças. A tecnologia promete revolucionar o monitoramento ambiental e o diagnóstico médico preventivo com maior precisão e rapidez.","link":"https://www.technologynetworks.com/tn/news/infrared-filter-for-thermal-cameras-could-detect-pollution-and-disease-414779","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Yahoo Finance","pais":"Estados Unidos","titulo":"Tecnologia de segurança em pistas da Honeywell é selecionada pela Aeromexico","resumo":"A Aeromexico implementará a avançada tecnologia de segurança de pistas da Honeywell em mais de 100 de suas aeronaves. O sistema visa prevenir acidentes durante pousos e decolagens, aumentando a consciência situacional dos pilotos. A iniciativa reforça o compromisso da companhia aérea com os padrões globais de segurança operacional e inovação tecnológica.","link":"https://finance.yahoo.com/technology/articles/honeywell-aerospace-runway-safety-technology-070000767.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"SNS Insider","pais":"Estados Unidos","titulo":"Empresas líderes que definem a tecnologia de endoscopia descartável","resumo":"O mercado de endoscopia está passando por uma transformação significativa com a ascensão dos dispositivos descartáveis. Diversas empresas líderes investem em inovações que eliminam riscos de contaminação cruzada e reduzem os custos de processamento hospitalar. Esse avanço tecnológico promete elevar os padrões de segurança do paciente em procedimentos endoscópicos globais.","link":"https://www.snsinsider.com/blogs/disposable-endoscopes-industry","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Q-CTRL","pais":"Estados Unidos","titulo":"Resolva problemas complexos de ciência dos materiais com o novo simulador de dinâmica quântica Fire Opal","resumo":"O novo simulador Fire Opal surge como uma ferramenta revolucionária para pesquisadores enfrentarem desafios complexos em ciência dos materiais. Utilizando computação quântica, o software permite modelagens precisas que seriam inalcançáveis com métodos computacionais clássicos. Essa tecnologia acelera o desenvolvimento de novos materiais com aplicações em diversos setores industriais e científicos.","link":"https://q-ctrl.com/blog/solve-complex-materials-science-problems-with-the-new-fire-opal-quantum-dynamics-simulator","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"fundsforNGOs","pais":"Estados Unidos","titulo":"Apoio financeiro para projetos de tecnologia com emissão zero","resumo":"Novas iniciativas de financiamento estão sendo destinadas ao desenvolvimento de tecnologias voltadas para a neutralidade de carbono. O suporte visa acelerar a transição energética e a viabilidade de soluções sustentáveis em larga escala. Esse investimento é fundamental para que empresas alcancem metas climáticas ambiciosas e promovam um futuro mais sustentável.","link":"https://www2.fundsforngos.org/innovation/funding-support-for-net-zero-technology-projects/","categoria":"SUSTENTABILIDADE","lang":"pt"},{"fonte":"Business Wire","pais":"Estados Unidos","titulo":"Eurofins concorda em adquirir o negócio de serviços de testes de ciências da vida da Element Materials Technology na América do Norte","resumo":"A Eurofins anunciou a aquisição estratégica das operações de testes em ciências da vida da Element Materials Technology. A transação fortalece a presença da Eurofins na América do Norte, expandindo sua capacidade analítica e de conformidade regulatória. O movimento consolida o setor de testes laboratoriais, oferecendo serviços mais robustos para a indústria farmacêutica e biotecnológica.","link":"https://www.businesswire.com/news/home/20260719989224/en/Eurofins-Agrees-to-Acquire-Element-Materials-Technologys-Life-Sciences-Testing-Services-Business-in-North-America","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"CNBC","pais":"Estados Unidos","titulo":"O investimento da TSMC nos EUA é sobre política, não sobre negócios: Analista","resumo":"Analistas sugerem que a expansão da TSMC nos Estados Unidos é impulsionada mais por motivações geopolíticas do que por lógica comercial. A necessidade de segurança na cadeia de suprimentos de semicondutores coloca pressão sobre a produção local. O debate levanta questões sobre a sustentabilidade e a viabilidade econômica de longo prazo para a fabricante taiwanesa.","link":"https://www.cnbc.com/video/2026/07/20/tsmcs-us-investment-is-about-politics-not-business.html","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"TradingView","pais":"França","titulo":"Honeywell Aerospace conquista contrato de aviônica com a IndiGo; Aeromexico implementará tecnologia de segurança em pistas","resumo":"A Honeywell Aerospace firmou um novo contrato para fornecer sistemas de aviônica à companhia aérea IndiGo. Paralelamente, a Aeromexico anunciou a implementação de tecnologias avançadas para aumentar a segurança operacional em suas pistas de pouso e decolagem.","link":"https://fr.tradingview.com/news/reuters.com,2026:newsml_L8N43M0AZ:0/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"01net.com","pais":"França","titulo":"TikTok revela sua tecnologia anti-deepfake; o timing não é coincidência","resumo":"O TikTok lançou uma nova ferramenta projetada para detectar e rotular conteúdos gerados por inteligência artificial, visando combater a desinformação. O lançamento ocorre em um momento estratégico, marcado por crescentes preocupações globais sobre a manipulação digital e integridade de conteúdo.","link":"https://www.01net.com/actualites/tiktok-devoile-sa-technologie-anti-deepfake-le-timing-nest-pas-anodin.html","categoria":"REDES SOCIAIS","lang":"pt"},{"fonte":"Harmonie Santé","pais":"França","titulo":"Gêmeos digitais na saúde: uma tecnologia promissora","resumo":"O uso de gêmeos digitais está revolucionando o setor da saúde ao permitir simulações precisas de órgãos e sistemas biológicos humanos. Essa tecnologia oferece um potencial significativo para personalizar tratamentos, prever resultados cirúrgicos e acelerar o desenvolvimento de novos fármacos com maior segurança.","link":"https://www.harmonie-sante.fr/sante-soins/innovations/jumeaux-numeriques-sante-technologie-prometteuse","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Sud Ouest","pais":"França","titulo":"Tecnologia quântica: uma questão de soberania, o Tribunal de Contas exorta a França a acelerar","resumo":"O Tribunal de Contas francês emitiu um alerta sobre a necessidade urgente de acelerar investimentos em tecnologia quântica. O órgão ressalta que o avanço nesta área é fundamental para garantir a soberania tecnológica e econômica do país frente à competição global acirrada.","link":"https://www.sudouest.fr/sciences-et-technologie/technologie-quantique-un-enjeu-majeur-de-souverainete-la-cour-des-comptes-exhorte-la-france-a-accelerer-30000711.php","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Yahoo Finance France","pais":"França","titulo":"Lançamento do ANTHBOT M9 Pro, equipado com tecnologia de navegação HoloSense™ Quad-Fusion para manutenção de gramados","resumo":"O ANTHBOT M9 Pro chega ao mercado como uma solução avançada para o cuidado de áreas verdes, utilizando a tecnologia de navegação HoloSense™ Quad-Fusion. O dispositivo permite uma operação eficiente, totalmente sem fios e simplificada, elevando o padrão de automação residencial e jardinagem.","link":"https://fr.finance.yahoo.com/actualites/lancement-lanthbot-m9-pro-%C3%A9quip%C3%A9-060000015.html","categoria":"LANÇAMENTO","lang":"pt"},{"fonte":"H2 Mobile","pais":"França","titulo":"Safran e ZeroAvia querem impulsionar tecnologia chave para o avião a hidrogênio","resumo":"A parceria entre a gigante Safran e a startup ZeroAvia visa desenvolver componentes críticos para a propulsão de aeronaves movidas a hidrogênio. O projeto busca viabilizar a aviação sustentável, superando desafios técnicos essenciais para a transição energética do setor aéreo mundial.","link":"https://www.h2-mobile.fr/actus/safran-zeroavia-pile-combustible-haute-temperature-avion-hydrogene/","categoria":"AVIAÇÃO","lang":"pt"},{"fonte":"Home | Digital Health","pais":"Inglaterra","titulo":"Midlands adota tecnologia de voz ambiente para 70.000 médicos","resumo":"O sistema de saúde de Midlands implementou tecnologia de reconhecimento de voz ambiente para otimizar a rotina de 70 mil médicos. A inovação visa reduzir a carga administrativa e o tempo gasto com documentação manual. Espera-se que a ferramenta melhore a precisão dos registros e aumente a qualidade do atendimento prestado aos pacientes na região.","link":"https://www.digitalhealth.net/2026/07/midlands-procures-ambient-voice-technology-for-70000-clinicians/","categoria":"SAÚDE TECNOLÓGICA","lang":"pt"},{"fonte":"Glasgow Live","pais":"Inglaterra","titulo":"Menino com tumor cerebral é operado com nova tecnologia em hospital de Glasgow","resumo":"Um procedimento cirúrgico avançado foi realizado em um hospital de Glasgow, utilizando tecnologia de ponta para remover um tumor cerebral em um paciente jovem. O sucesso da intervenção destaca o papel crucial da inovação robótica e de imagem na neurocirurgia moderna. O caso representa um marco na precisão hospitalar e na recuperação de pacientes pediátricos.","link":"https://www.glasgowlive.co.uk/news/glasgow-news/boy-brain-tumour-operated-new-34316207","categoria":"CIÊNCIA MÉDICA","lang":"pt"},{"fonte":"BBC","pais":"Inglaterra","titulo":"Primeiras cirurgias robóticas realizadas em hospital da cidade","resumo":"Um hospital local iniciou com sucesso a realização de cirurgias utilizando sistemas robóticos de última geração. Esta tecnologia permite maior precisão, menores incisões e uma recuperação mais rápida para os pacientes submetidos a intervenções complexas. A adoção marca um avanço significativo na infraestrutura tecnológica da instituição.","link":"https://www.bbc.com/news/articles/cr7k55073k3o","categoria":"SAÚDE TECNOLÓGICA","lang":"pt"},{"fonte":"Insider Media Ltd","pais":"Inglaterra","titulo":"IA pode impulsionar a economia de Staffordshire em £2 bilhões, aponta relatório","resumo":"Um novo relatório sugere que a integração estratégica da Inteligência Artificial pode gerar um incremento de £2 bilhões na economia de Staffordshire. O estudo destaca que o investimento em competências digitais e automação será o motor principal para este crescimento regional. A iniciativa reforça a importância da tecnologia como pilar de desenvolvimento econômico sustentável.","link":"https://www.insidermedia.com/news/midlands/ai-could-unlock-2bn-boost-to-staffordshires-economy-report","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Shropshire Live","pais":"Inglaterra","titulo":"Tecnologia mais ecológica transforma o atendimento ortopédico no RJAH","resumo":"O hospital RJAH implementou soluções tecnológicas sustentáveis para otimizar os cuidados ortopédicos oferecidos aos pacientes. Além de reduzir o impacto ambiental, a nova abordagem aumenta a eficiência no tratamento de condições musculoesqueléticas. A iniciativa serve como modelo de como a sustentabilidade e a tecnologia podem coexistir na saúde pública.","link":"https://www.shropshirelive.com/news/2026/07/20/greener-technology-transforms-orthotics-care-for-patients-at-rjah/","categoria":"INOVAÇÃO SAÚDE","lang":"pt"},{"fonte":"Retail Technology Innovation Hub","pais":"Inglaterra","titulo":"IA, tecnologia e investimento em experiência do cliente são fundamentais diante da alta de alertas de lucro no varejo","resumo":"Com o aumento das advertências de lucro no setor varejista, especialistas apontam a IA e a tecnologia como essenciais para a sobrevivência das empresas. O investimento estratégico na experiência do cliente é visto como o diferencial competitivo para mitigar riscos econômicos. As empresas que priorizam a transformação digital estão se mostrando mais resilientes frente à instabilidade de mercado.","link":"https://retailtechinnovationhub.com/home/2026/7/19/ai-technology-and-customer-experience-investment-key-as-retail-profit-warnings-rise-in-q2","categoria":"NEGÓCIOS TECNOLOGIA","lang":"pt"},{"fonte":"Retail Technology Innovation Hub","pais":"Inglaterra","titulo":"Tecnologia RFID está transformando a gestão de carne para varejistas","resumo":"A implementação da tecnologia RFID está revolucionando a forma como os varejistas gerenciam estoques de produtos perecíveis, como a carne. O sistema permite um rastreamento preciso em tempo real, reduzindo desperdícios e garantindo maior segurança alimentar. Esta inovação é um passo fundamental para aumentar a eficiência operacional e a sustentabilidade na cadeia de suprimentos.","link":"https://retailtechinnovationhub.com/home/2026/7/16/rfid-technology-is-transforming-meat-management-for-retailers","categoria":"VAREJO TECNOLOGIA","lang":"pt"},{"fonte":"The Guardian","pais":"Inglaterra","titulo":"A IA pode ser consciente?","resumo":"O debate sobre a consciência em sistemas de Inteligência Artificial ganha força à medida que os modelos se tornam cada vez mais sofisticados. Cientistas e filósofos discutem se a capacidade de processamento de dados complexos pode, eventualmente, evoluir para uma forma real de sensibilidade. Esta questão desafia as fronteiras da ética tecnológica e da definição de inteligência no futuro.","link":"https://www.theguardian.com/technology/2026/jul/19/could-ai-be-conscious","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Elplural.com","pais":"Espanha","titulo":"Audi Q4 e-tron 2026: testamos o elétrico que combina tecnologia avançada, estilo e até 592 km de autonomia","resumo":"O novo Audi Q4 e-tron 2026 chega ao mercado com foco em eficiência e inovação digital. O veículo oferece uma autonomia impressionante de até 592 km, posicionando-se como uma das opções mais competitivas no segmento de luxo elétrico, unindo sofisticação e conectividade.","link":"https://www.elplural.com/motor/coches/audi-q4-e-tron-2026-probamos-electrico-combina-tecnologia-avanzada-estilo-hasta-592-km-autonomia_395883102","categoria":"AUTOMOTIVO","lang":"pt"},{"fonte":"Diario de Mallorca","pais":"Espanha","titulo":"A tecnologia MALDI-TOF, uma \"mudança revolucionária\" na velocidade de identificação de fungos e bactérias","resumo":"A tecnologia MALDI-TOF está transformando a microbiologia ao permitir a identificação rápida e precisa de agentes patogênicos. Este avanço clínico reduz drasticamente o tempo de diagnóstico em hospitais, otimizando tratamentos e melhorando significativamente o prognóstico de pacientes infectados.","link":"https://www.diariodemallorca.es/mallorca/2026/07/20/tecnologia-tratamientos-infecciones-hospitales-mallorca-bc-132455226.amp.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"El Conciso","pais":"Espanha","titulo":"Palantir: de combater o terrorismo a liderar a economia da IA","resumo":"A Palantir consolidou sua posição como gigante no setor de inteligência artificial após anos focada em segurança nacional. Atualmente, a empresa lidera a implementação de soluções de dados complexos que estão moldando o futuro da economia global baseada em IA.","link":"https://www.elconciso.es/opinion/palantir-combatir-terrorismo-liderar-economia_0_2007481157.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"El Español","pais":"Espanha","titulo":"Uma tecnologia fotográfica de mais de um século promete armazenamento com 9.000 estados possíveis em cada pixel","resumo":"Pesquisadores adaptaram técnicas fotográficas centenárias para criar um sistema de armazenamento de dados altamente denso. Ao permitir 9.000 estados por pixel, essa inovação promete revolucionar a capacidade de retenção de informações digitais em dispositivos do futuro.","link":"https://www.elespanol.com/invertia/disruptores/americas/20260720/tecnologia-fotografica-hace-siglo-promete-almacenamientos-posibles-pixel/1003744324630_0.html","categoria":"INOVAÇÃO","lang":"pt"},{"fonte":"Interempresas.net","pais":"Espanha","titulo":"Dyson Airwrap Co-anda 2x: tecnologia inteligente a serviço do penteado profissional","resumo":"A Dyson atualizou seu icônico modelador de cabelo com o sistema Co-anda 2x, elevando o padrão de tecnologia capilar. O dispositivo utiliza sensores inteligentes para ajustar o calor e o fluxo de ar, garantindo resultados de salão com menor dano térmico.","link":"https://www.interempresas.net/Peluqueria/651906-Dyson-Airwrap-Co-anda-2x-tecnologia-inteligente-al-servicio-del-peinado-profesional.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"EY","pais":"Espanha","titulo":"EY anuncia aliança com Appian para combinar pessoas, tecnologia e dados visando gerar máximo valor ao cliente","resumo":"A parceria estratégica entre EY e Appian foca na integração de automação e análise de dados para impulsionar a transformação digital das empresas. O projeto visa maximizar a eficiência operacional ao unir talentos humanos e ferramentas avançadas de tecnologia.","link":"https://www.ey.com/es_py/newsroom/2023/01/ey-announces-alliance-with-appian-to-bring-people-technology-and-data-together-to-unlock-maximum-customer-value","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Highmotor","pais":"Espanha","titulo":"Como escolher um SUV premium com a tecnologia mais recente sem pagar por opcionais desnecessários em 2026","resumo":"Este guia prático auxilia consumidores a navegar no complexo mercado de SUVs de luxo em 2026. A análise destaca quais tecnologias de conectividade e segurança são realmente essenciais, ajudando a evitar custos supérfluos na configuração do veículo ideal.","link":"https://www.highmotor.com/pt/Como-escolher-um-SUV-premium-com-a-tecnologia-mais-recente-sem-pagar-por-opcionais-desnecess%C3%A1rios-%282026%29.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Xataka","pais":"Espanha","titulo":"Adeus ao mito do \"sangue doce\": a ciência descobre por que os mosquitos picam você e não a pessoa ao lado","resumo":"Estudos científicos recentes desmistificaram a crença popular sobre o \"sangue doce\", revelando os fatores químicos reais que atraem mosquitos. A pesquisa identifica compostos específicos na pele humana, abrindo portas para o desenvolvimento de repelentes muito mais eficazes e personalizados.","link":"https://www.xataka.com/medicina-y-salud/adios-al-mito-sangre-dulce-ciencia-sabe-que-mosquitos-te-acribillan-a-ti-no-al-al-lado","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"TradingView","pais":"Alemanha","titulo":"Honeywell Aerospace recebe contrato de aviônica da IndiGo; Aeromexico implementa tecnologia de segurança em pistas","resumo":"A Honeywell Aerospace firmou um contrato estratégico para fornecer sistemas de aviônica para a companhia aérea IndiGo. Simultaneamente, a Aeromexico adotou novas tecnologias da empresa voltadas à segurança operacional em pousos e decolagens, elevando os padrões globais de tecnologia na aviação comercial.","link":"https://de.tradingview.com/news/reuters.com,2026:newsml_L8N43M0AW:0/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"IMTEST","pais":"Alemanha","titulo":"Teste do Garmin Enduro 3: Poderoso na bateria, inteligente nos detalhes","resumo":"O novo Garmin Enduro 3 destaca-se no mercado de vestíveis pela sua autonomia de bateria excepcional e recursos de monitoramento aprimorados. O dispositivo combina durabilidade com refinamentos de software, posicionando-se como uma escolha premium para atletas de alta performance que buscam precisão e confiabilidade.","link":"https://www.imtest.de/sport-freizeit/garmin-enduro-3-smartwatch-im-test-akkuausdauer-mit-sportfunktionen-stark/532675","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"MarketsandMarkets","pais":"Alemanha","titulo":"Inovação em tecnologia Smart Home na Europa: IA, IoT e vida sustentável remodelando casas conectadas","resumo":"A integração de Inteligência Artificial e Internet das Coisas está transformando as residências europeias em ecossistemas mais inteligentes e sustentáveis. Essas inovações prometem otimizar o consumo de energia e melhorar a conveniência dos usuários, marcando uma nova era na automação residencial conectada.","link":"https://www.marketsandmarkets.com/blog/SE/europe-smart-home-technology-innovation-ai-iot-connected-homes","categoria":"CIÊNCIA TECNOLOGIA","lang":"pt"},{"fonte":"Advanced Science News","pais":"Alemanha","titulo":"Leaftronics: eletrônicos mais verdes inspirados em folhas","resumo":"Pesquisadores estão desenvolvendo a 'Leaftronics', uma abordagem inovadora que utiliza princípios biológicos inspirados na estrutura das folhas para criar componentes eletrônicos. Esta tecnologia visa reduzir o impacto ambiental dos resíduos eletrônicos, promovendo uma fabricação de hardware muito mais sustentável e ecologicamente consciente.","link":"https://www.advancedsciencenews.com/leaftronics-greener-electronics-learnt-from-leaves/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"BornCity","pais":"Alemanha","titulo":"ASUS ROG Strix: monitor de 540 Hertz para profissionais de e-sports anunciado","resumo":"A ASUS apresentou um novo monitor de alta performance da linha ROG Strix, atingindo a marca impressionante de 540 Hertz. O dispositivo é projetado especificamente para atender às exigências de profissionais de e-sports, garantindo fluidez extrema e tempo de resposta mínimo em jogos competitivos de alta velocidade.","link":"https://borncity.com/news/asus-rog-strix-540-hertz-monitor-fuer-e-sport-profis-vorgestellt/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Yahoo!ニュース","pais":"Japão","titulo":"A experiência definitiva de áudio: Fones de ouvido de orelha aberta com tecnologia NTT","resumo":"Os novos fones nwm GO A PROP Edição utilizam a avançada tecnologia da NTT para oferecer áudio de alta qualidade sem vazamento de som. Com um design de orelha aberta, são ideais para atividades físicas, permitindo que o usuário mantenha a consciência do ambiente enquanto desfruta de músicas durante o verão.","link":"https://news.yahoo.co.jp/articles/702bb4fff2b8f60e401238c2a8a2846ace3ac8cc","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"アットプレス","pais":"Japão","titulo":"Relatório sobre o mercado global de máquinas de crimpagem de fios para TIC (2026-2032)","resumo":"Este relatório analisa o crescimento do mercado de máquinas de crimpagem de fios para tecnologias de informação e comunicação até 2032. O estudo detalha as demandas por equipamentos automáticos e semiautomáticos, oferecendo uma perspectiva estratégica para o desenvolvimento de infraestruturas de rede global.","link":"https://www.atpress.ne.jp/news/1025515","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"PR TIMES","pais":"Japão","titulo":"Equipe profissional de eSports VARREL assina contrato de patrocínio com a Bic Camera","resumo":"A renomada equipe de eSports VARREL formalizou uma parceria estratégica com a varejista japonesa Bic Camera. Este movimento destaca o crescimento exponencial do cenário competitivo de jogos eletrônicos no Japão e a crescente integração entre marcas de varejo e atletas de alta performance.","link":"https://prtimes.jp/main/html/rd/p/000000049.000113895.html","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Gazeta do Povo","pais":"Japão","titulo":"Espionagem russa no Japão: tecnologia voltada para a guerra","resumo":"Relatórios recentes alertam para atividades de espionagem russa com foco na aquisição de tecnologias sensíveis no Japão para fins bélicos. O caso evidencia os riscos de segurança cibernética e industrial, forçando o país a fortalecer seus protocolos de defesa tecnológica e vigilância de ativos estratégicos.","link":"https://www.gazetadopovo.com.br/mundo/como-o-japao-se-tornou-um-centro-de-operacoes-para-espioes-da-russia-2/","categoria":"SEGURANÇA","lang":"pt"},{"fonte":"kansaigaidai.ac.jp","pais":"Japão","titulo":"Estudantes de Arte e Ciência realizam exposição híbrida em laboratório de realidade virtual","resumo":"Alunos do curso de Arte e Ciência apresentaram os resultados de suas pesquisas do semestre de primavera em uma exposição inovadora. Utilizando técnicas digitais e ambientes de realidade virtual, a mostra explorou novas formas de expressão artística e a convergência entre o mundo físico e o virtual.","link":"https://www.kansaigaidai.ac.jp/news/topics/id-15299/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Yahoo!ニュース","pais":"Japão","titulo":"Ranking dos melhores efeitos especiais da série昭和 Ultraman","resumo":"Uma pesquisa popular no Japão elegeu as produções da série昭和 Ultraman com os efeitos visuais mais impressionantes de sua época. O ranking celebra a história da tecnologia de 'Tokusatsu', destacando como a criatividade técnica moldou a cultura pop e o cinema de ficção científica japonês.","link":"https://news.yahoo.co.jp/articles/91844cf2e85221da11934097a77b336e3a1c310c","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"Bloomberg.com","pais":"China","titulo":"IA é o 'novo motor' que impede uma desaceleração brusca da economia chinesa","resumo":"O desenvolvimento de tecnologias de inteligência artificial tem servido como um suporte crítico para manter a estabilidade econômica da China. A integração dessas inovações em diversos setores industriais tem mitigado riscos de uma recessão severa. Especialistas apontam que a digitalização acelerada é agora um pilar fundamental para o crescimento sustentado do país.","link":"https://www.bloomberg.com/news/articles/2026-07-20/ai-is-new-engine-keeping-chinese-economy-from-harder-landing","categoria":"ECONOMIA TECNOLÓGICA","lang":"pt"},{"fonte":"新华网","pais":"China","titulo":"Ministério da Indústria e Tecnologia da Informação: acelerando a segunda fase dos testes de tecnologia 6G","resumo":"A China intensificou seus esforços na infraestrutura de telecomunicações de próxima geração ao avançar para a segunda fase de testes da tecnologia 6G. O projeto visa consolidar a liderança do país na conectividade global, preparando o terreno para velocidades ultrarrápidas e aplicações em IA. Esta iniciativa reflete o compromisso estratégico chinês com a inovação em redes móveis de ponta.","link":"http://www.news.cn/20260720/3915a070b9404b409ad02f88c603227f/c.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"观点网","pais":"China","titulo":"MIIT: China construirá mercado nacional de tecnologia e lançará plano de ação 'IA + Software'","resumo":"O Ministério da Indústria anunciou planos para criar um mercado nacional unificado de tecnologia, visando impulsionar a inovação e a eficiência. A estratégia inclui a implementação do plano de ação 'IA + Software' para fortalecer a soberania tecnológica. Com uma capacidade computacional inteligente já atingindo 2185 EFLOPS, o país reforça seu poderio computacional global.","link":"https://www.guandian.cn/article/20260720/574537.html","categoria":"GOVERNO TECNOLOGIA","lang":"pt"},{"fonte":"新华网","pais":"China","titulo":"Tecnologia AI-DPU da Yihua revela nova rota para resolver problemas de custo de memória em modelos de IA","resumo":"A Yihua Technology apresentou sua nova arquitetura AI-DPU, focada em otimizar o gerenciamento de memória durante o processamento de grandes modelos de linguagem. A solução promete reduzir significativamente os custos operacionais, superando gargalos técnicos que limitam a escalabilidade da IA. Este avanço é um marco importante para tornar a computação de alto desempenho mais acessível e eficiente.","link":"http://www.news.cn/finance/20260720/9ec7d90791474362b35980813b036292/c.html","categoria":"INOVAÇÃO","lang":"pt"},{"fonte":"新华网","pais":"China","titulo":"Relatório sobre a Economia Inteligente na China 2026 é publicado na WAIC","resumo":"A edição de 2026 da Conferência Mundial de Inteligência Artificial trouxe o lançamento de um relatório detalhado sobre a economia inteligente no país. O documento mapeia os dez principais diferenciais do setor, oferecendo uma visão panorâmica sobre como a IA está transformando indústrias tradicionais. O estudo serve como guia essencial para entender as variáveis estratégicas do mercado chinês.","link":"http://www.news.cn/digital/20260720/fde2ca2a33964398aba256497555d2b1/c.html","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"东方财富","pais":"China","titulo":"Constante Natural: construindo uma infraestrutura de plataforma para decisões em P&D de medicamentos inovadores com IA","resumo":"A plataforma 'Constante Natural' utiliza tecnologias avançadas de inteligência artificial para otimizar a tomada de decisões no desenvolvimento de novos fármacos. Ao automatizar processos complexos de P&D, a ferramenta promete acelerar a chegada de medicamentos ao mercado. O projeto destaca a crescente sinergia entre biotecnologia e análise de dados para a saúde humana.","link":"http://finance.eastmoney.com/a/202607203813222984.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"同济大学新闻网","pais":"China","titulo":"Equipe da Faculdade de Ciências da Vida descobre SMD2, um leitor de modificação de pseudouridina em mRNA","resumo":"Pesquisadores da faculdade identificaram o SMD2 como um componente chave na leitura de modificações de mRNA, detalhando seu papel crucial no splicing alternativo. O estudo, publicado na prestigiada revista *Molecular Cell*, oferece novos insights sobre a regulação genética em nível molecular. Esta descoberta científica abre portas para futuras terapias baseadas no controle da expressão de RNA.","link":"https://news.tongji.edu.cn/info/1003/95204.htm","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"观点网","pais":"China","titulo":"MIIT: Manufatura de alta tecnologia cresce 13,3% no primeiro semestre","resumo":"A manufatura de alta tecnologia na China demonstrou um desempenho vigoroso no primeiro semestre, com um crescimento notável de 13,3%. O setor industrial contribuiu com mais de 35% para a expansão econômica total do país no período. Estes números refletem o sucesso da transição industrial para atividades de maior valor agregado e eficiência tecnológica.","link":"https://www.guandian.cn/article/20260720/574576.html","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"orissadiary.com","pais":"Índia","titulo":"O reconhecimento da TDB-DST à excelência tecnológica da Skyroot pelo Prêmio Nacional de Start-ups de Tecnologia de 2022 é validado","resumo":"A Skyroot Aerospace reafirma sua posição de destaque no setor espacial indiano após o reconhecimento oficial da TDB-DST. O prêmio valida o investimento em inovações de foguetes, consolidando a empresa como uma força pioneira na exploração espacial privada. Este marco reforça o potencial tecnológico da Índia no mercado global de lançadores de satélites.","link":"https://orissadiary.com/tdb-dsts-early-recognition-of-skyroots-technological-excellence-through-the-national-technology-start-up-award-2022-stands-vindicated/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"TradingView","pais":"Índia","titulo":"Smartworks expande parceria com a L&T Technology Services com mais de 1.100 novas estações de trabalho","resumo":"A Smartworks ampliou sua colaboração estratégica com a L&T Technology Services, adicionando mais de 1.100 assentos em seus espaços de coworking na Índia. Essa expansão reflete a crescente demanda por infraestrutura flexível para empresas de engenharia e tecnologia. O movimento fortalece a presença operacional da L&T ao adotar modelos de trabalho híbridos em larga escala.","link":"https://www.tradingview.com/news/reuters.com,2026:newsml_FWN43J0U9:0-smartworks-coworking-spaces-ltd-expands-l-t-technology-services-engagement-with-1100-seats/","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"The Times of India","pais":"Índia","titulo":"Analistas da indústria automotiva estão preocupados com a Tesla e outras fabricantes usando tecnologia do Google e Apple","resumo":"Especialistas do setor automotivo manifestam preocupação com a dependência crescente das montadoras em sistemas operacionais do Google e Apple. O receio é que a integração dessas tecnologias controle excessivamente a experiência do usuário e os dados dos veículos. Esse cenário impulsiona debates globais sobre autonomia de software e segurança nas futuras plataformas de transporte conectadas.","link":"https://timesofindia.indiatimes.com/technology/tech-news/auto-industry-analysts-are-worried-about-tesla-and-other-car-makers-using-the-technology-that-google-apple-samsung-and-other-smartphone-companies-have-been-using-since-over-ten-years-to-update-their-devices/articleshow/132508058.cms","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"The Times of India","pais":"Índia","titulo":"Lockheed construirá interceptador Patriot de baixo custo usando tecnologia Hit-to-Kill: veja como funciona","resumo":"A Lockheed Martin está desenvolvendo uma nova versão mais econômica dos interceptadores Patriot, utilizando a avançada tecnologia Hit-to-Kill. Este sistema foca na destruição cinética direta do alvo, aumentando a eficiência em defesas antimísseis. A inovação visa otimizar custos de produção sem comprometer a precisão crítica exigida em teatros de operações de segurança global.","link":"https://timesofindia.indiatimes.com/defence/international/lockheed-to-build-low-cost-patriot-interceptor-using-hit-to-kill-technology-how-it-works/articleshow/132507859.cms","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Adgully.com","pais":"Índia","titulo":"Operadoras de DTH e cabo exigem regras tecnologicamente neutras para acabar com a arbitragem regulatória de streaming","resumo":"Operadoras tradicionais de TV por assinatura na Índia reivindicam uma regulação unificada que trate serviços de streaming e redes de cabo de forma equitativa. O setor argumenta que a disparidade regulatória atual cria uma concorrência desleal no mercado de mídia. A demanda destaca a urgência de uma atualização nas leis de radiodifusão diante da rápida digitalização do país.","link":"https://www.adgully.com/post/18210/dth-and-cable-operators-demand-technology-neutral-rules-to-end-streaming-regulatory-arbitrage","categoria":"REGULAÇÃO","lang":"pt"},{"fonte":"The New Indian Express","pais":"Índia","titulo":"A tecnologia melhora a eficiência, mas não a compaixão: Presidente do Tribunal Superior de Orissa sobre IA","resumo":"O juiz-chefe do Tribunal Superior de Orissa destacou as limitações éticas da Inteligência Artificial ao pontuar que a tecnologia não substitui o julgamento humano. Embora a IA aumente a eficiência processual na justiça, ele alertou que a compaixão e a sensibilidade moral são inerentes aos magistrados. O debate reflete as preocupações indianas sobre a implementação responsável da automação no judiciário.","link":"https://www.newindianexpress.com/states/odisha/2026/Jul/20/technology-improves-efficiency-not-compassion-orissa-hc-chief-justice-on-ai","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"India Today","pais":"Índia","titulo":"O maior mistério energético da água foi resolvido? Renomado físico nascido na Índia alega descoberta que desafia a ciência","resumo":"Um físico de ascendência indiana causou alvoroço acadêmico ao alegar ter resolvido um mistério fundamental sobre o comportamento energético da água. A descoberta sugere propriedades físicas até então desconhecidas que poderiam desafiar conceitos científicos estabelecidos. Caso comprovada, essa inovação tem potencial para revolucionar tecnologias de geração de energia e sustentabilidade a nível mundial.","link":"https://www.indiatoday.in/science/story/water-explosion-energy-mystery-indian-physicist-yogendra-srivastava-green-energy-science-news-2951522-2026-07-20","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Daily Pioneer","pais":"Índia","titulo":"A economia oculta da IA: Por que cada prompt de IA tem um custo invisível","resumo":"Este artigo explora os custos ambientais e econômicos ocultos por trás das interações com ferramentas de Inteligência Artificial Generativa. Cada solicitação exige um consumo significativo de eletricidade e recursos computacionais em data centers espalhados pelo mundo. A análise alerta para a necessidade de transparência e sustentabilidade à medida que a adoção de IA se torna onipresente.","link":"https://dailypioneer.com/news/slug-lite/the-hidden-economy-behind-every-ai-prompt?year=2026","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Público","pais":"Portugal","titulo":"Comissão Europeia coloca a investigação e a inovação no centro da economia","resumo":"A Comissão Europeia reforça o seu compromisso estratégico em priorizar o investimento em pesquisa e desenvolvimento. Esta iniciativa visa impulsionar a competitividade económica do continente através de avanços científicos e tecnológicos sustentáveis.","link":"https://www.publico.pt/2026/07/20/ciencia/entrevista/comissao-europeia-colocar-investigacao-inovacao-centro-economia-2182148","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Rádio Castelo Branco","pais":"Portugal","titulo":"IPCB marca presença no Encontro Ciência e Inovação 2026","resumo":"O Instituto Politécnico de Castelo Branco participa no prestigiado Encontro Ciência e Inovação 2026. O evento destaca o papel das instituições de ensino superior no desenvolvimento de soluções inovadoras para os desafios tecnológicos atuais.","link":"https://radiocastelobranco.sapo.pt/ipcb-presente-no-encontro-ciencia-e-inovacao-2026/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"ECO","pais":"Portugal","titulo":"Na segurança automóvel, o vidro é a fronteira final entre a tecnologia e as pessoas","resumo":"Especialistas analisam como a tecnologia aplicada ao vidro automotivo se tornou um componente crítico de segurança. Este avanço integra proteção avançada e design funcional, garantindo maior integridade aos passageiros em cenários de risco.","link":"https://eco.sapo.pt/2026/07/19/na-seguranca-automovel-o-vidro-e-a-fronteira-final-entre-a-tecnologia-e-as-pessoas/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Antena Livre","pais":"Portugal","titulo":"Economia: TAGUSVALLEY abre candidaturas para a 8.ª edição do Prémio FOOD FAB LAB","resumo":"O TAGUSVALLEY lançou a oitava edição do seu prestigiado prémio voltado para a inovação no setor alimentar. A iniciativa busca startups e projetos tecnológicos que apresentem soluções disruptivas para a produção e sustentabilidade alimentar.","link":"https://www.antenalivre.pt/economia/tagusvalley-abre-candidaturas-para-a-8a-edicao-do-premio-food-fab-lab","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"SAPO","pais":"Portugal","titulo":"Albuquerque aponta tecnologia e valorização da produção como futuro da agricultura","resumo":"O governante destaca a tecnologia como o principal motor para a transformação e modernização do setor agrícola. A valorização da produção local aliada a ferramentas digitais promete aumentar a eficiência e a sustentabilidade no campo.","link":"https://sapo.pt/artigo/albuquerque-aponta-tecnologia-e-valorizacao-da-producao-como-futuro-da-agricultura-6a5cc1e6d1e0d1e7a94b83dc","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"SIC Notícias","pais":"Portugal","titulo":"Tecnologia 3D permite estudar tesouros históricos sem lhes tocar","resumo":"Uma nova tecnologia de digitalização 3D permite que arqueólogos e historiadores examinem objetos antigos com alta precisão sem qualquer contato físico. O avanço preserva o património histórico mundial, minimizando riscos de deterioração durante a análise detalhada.","link":"https://sicnoticias.pt/olhares-pelo-mundo/2026-07-19-video-tecnologia-3d-permite-estudar-tesouros-historicos-sem-lhes-tocar-980f3be3","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"SIC Notícias","pais":"Portugal","titulo":"Nova tecnologia prevê risco de incêndios florestais na Península Ibérica através da humidade","resumo":"Pesquisadores desenvolveram uma solução tecnológica inovadora que utiliza dados de humidade para antecipar riscos de incêndios. A ferramenta é essencial para a gestão preventiva de florestas e a segurança da Península Ibérica contra catástrofes.","link":"https://sicnoticias.pt/mundo/2026-07-19-nova-tecnologia-preve-risco-incendios-florestais-na-peninsula-iberica-atraves-da-humidade-e1e6b6f4","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"CNN Portugal","pais":"Portugal","titulo":"ASAE critica falta de provas mais sólidas para combater a economia paralela no comércio digital","resumo":"A ASAE aponta dificuldades na fiscalização do comércio digital devido à carência de provas robustas e infraestrutura regulatória. O órgão defende o aprimoramento de métodos de monitorização para garantir a legalidade e transparência nas transações eletrónicas.","link":"https://cnnportugal.iol.pt/asae/operacao-asae/asae-critica-falta-de-prova-mais-consolidada-para-combater-economia-paralela-no-comercio-digital/20260719/6a5c7e4dd34ef04b4f3f78d2","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"DW.com","pais":"Brazil","titulo":"Robot dogs gain traction in high-risk tasks","resumo":"The use of quadrupedal robots has expanded significantly for performing dangerous activities in industrial and hostile environments. This technology aims to reduce human exposure to risky situations while increasing operational safety and efficiency. The advancement of these devices marks a new stage in robotics applied to daily operations.","link":"https://www.dw.com/pt-br/c%C3%A3es-rob%C3%B4s-ganham-espa%C3%A7o-em-tarefas-de-risco/video-77983877","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"RETEMA","pais":"Brazil","titulo":"Alfa Laval's HVO technology to support sustainable aviation fuel production in Brazil","resumo":"Alfa Laval is implementing its HVO treatment technology to bolster the country's renewable fuel production infrastructure. The initiative aims to decarbonize the aviation sector by meeting global demand for cleaner energy sources. This project represents an important step in the energy transition for Brazil's transport sector.","link":"https://www.retema.es/actualidad/la-tecnologia-hvo-de-alfa-laval-respaldara-la-produccion-de-combustible-sostenible-para","categoria":"SUSTAINABLE SCIENCE","lang":"en"},{"fonte":"G1","pais":"Brazil","titulo":"Dating AI and the intimacy economy","resumo":"The growth of relationships mediated by artificial intelligence raises debates about changes in the human psyche and social interactions. This phenomenon, dubbed the 'intimacy economy,' explores how digital tools fill emotional voids. The impact of this trend raises deep ethical questions regarding the future of interpersonal bonds.","link":"https://g1.globo.com/podcast/o-assunto/noticia/2026/07/20/namoro-com-a-ia-e-a-economia-da-intimidade-o-assunto-1764.ghtml","categoria":"TRENDING TOPICS","lang":"en"},{"fonte":"G1","pais":"Brazil","titulo":"How terrorists are using AI to plan attacks and bypass chatbot restrictions","resumo":"The misuse of artificial intelligence by extremist groups has alarmed cybersecurity and global intelligence experts. Attacks are being facilitated through tactics designed to bypass safety filters in advanced language models. The situation demands the urgent development of more rigorous ethical barriers and digital governance policies.","link":"https://g1.globo.com/tecnologia/noticia/2026/07/20/como-terroristas-estao-usando-ia-para-planejar-ataques-e-burlar-restricoes-dos-chatbots.ghtml","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"TNH1","pais":"Brazil","titulo":"3D technology reveals beetle older than dinosaurs in Ceará","resumo":"Researchers used 3D scanning technology to identify fossils of a beetle that predates the dinosaur era in the state of Ceará. The discovery offers new perspectives on biodiversity and insect evolution in Earth's remote past. This technological advancement demonstrates the precision involved in analyzing complex geological records.","link":"https://www.tnh1.com.br/noticia/nid/tecnologia-3d-revela-besouro-mais-antigo-que-dinossauros-no-ceara/","categoria":"SCIENCE","lang":"en"},{"fonte":"Vietnam.vn","pais":"Brazil","titulo":"Abbott's new iCGM technology provides peace of mind in diabetes care","resumo":"Abbott's new generation of iCGM sensors promises to revolutionize continuous glucose monitoring with greater accuracy and connectivity. The technology offers patients more effective control over their health condition, reducing risks and improving quality of life. This launch is a significant milestone for technology applied to human health.","link":"https://www.vietnam.vn/pt/cong-nghe-icgm-moi-cua-abbott-giup-an-tam-cham-soc-nguoi-mac-dai-thao-duong","categoria":"HEALTH TECH","lang":"en"},{"fonte":"A Hora do Sul","pais":"Brazil","titulo":"Wi-Fi 7 technology is the big news from Osirnet during Fenadoce","resumo":"The implementation of the Wi-Fi 7 standard promises to revolutionize the connectivity experience with higher speeds and lower latency. During the Fenadoce event, the technology demonstration highlighted its capacity to support denser and more efficient data traffic. This innovation sets the stage for the next era of residential and commercial network infrastructure.","link":"https://ahoradosul.com.br/conteudos/2026/07/19/tecnologia-wi-fi-7-e-grande-novidade-da-osirnet-durante-a-fenadoce/","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"NeoFeed","pais":"Brazil","titulo":"ARTICLE: The hardest part of AI is not the technology","resumo":"The debate surrounding artificial intelligence often neglects the structural, cultural, and ethical challenges that outweigh technical complexity. Effectively integrating AI into society requires a re-evaluation of human, organizational, and data management processes. True transformation depends more on strategic adaptation than on pure algorithmic advancement.","link":"https://neofeed.com.br/finde/artigo-a-parte-mais-dificil-da-ia-nao-e-a-tecnologia/","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Consumer Goods Technology","pais":"United States","titulo":"AI in Retail: From Adoption to Competitive Advantage","resumo":"The integration of artificial intelligence into the retail sector is evolving from a mere trend into an essential strategic differentiator. Companies are using the technology to optimize operations, personalize the customer experience, and forecast market demand. This shift is redefining operational efficiency and consumer engagement in the competitive global market.","link":"https://consumergoods.com/ai-retail-adoption-advantage","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Technology Networks","pais":"United States","titulo":"Infrared filter for thermal cameras could detect pollution and disease","resumo":"Scientists have developed a new infrared filter that significantly expands the capabilities of traditional thermal cameras. This innovation allows for the precise identification of atmospheric pollutants and early biological markers of disease. The technology promises to revolutionize environmental monitoring and preventive medical diagnostics with greater precision and speed.","link":"https://www.technologynetworks.com/tn/news/infrared-filter-for-thermal-cameras-could-detect-pollution-and-disease-414779","categoria":"SCIENCE","lang":"en"},{"fonte":"Yahoo Finance","pais":"United States","titulo":"Honeywell runway safety technology selected by Aeromexico","resumo":"Aeromexico will implement Honeywell's advanced runway safety technology across more than 100 of its aircraft. The system is designed to prevent accidents during takeoffs and landings, increasing pilot situational awareness. The initiative reinforces the airline's commitment to global operational safety standards and technological innovation.","link":"https://finance.yahoo.com/technology/articles/honeywell-aerospace-runway-safety-technology-070000767.html","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"SNS Insider","pais":"United States","titulo":"Leading companies defining disposable endoscopy technology","resumo":"The endoscopy market is undergoing a significant transformation with the rise of disposable devices. Several leading companies are investing in innovations that eliminate cross-contamination risks and reduce hospital reprocessing costs. This technological advancement promises to raise patient safety standards in global endoscopic procedures.","link":"https://www.snsinsider.com/blogs/disposable-endoscopes-industry","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Q-CTRL","pais":"United States","titulo":"Solve complex materials science problems with the new Fire Opal quantum dynamics simulator","resumo":"The new Fire Opal simulator has emerged as a revolutionary tool for researchers tackling complex challenges in materials science. Using quantum computing, the software enables precise modeling that would be unattainable with classical computational methods. This technology accelerates the development of new materials with applications across various industrial and scientific sectors.","link":"https://q-ctrl.com/blog/solve-complex-materials-science-problems-with-the-new-fire-opal-quantum-dynamics-simulator","categoria":"SCIENCE","lang":"en"},{"fonte":"fundsforNGOs","pais":"United States","titulo":"Financial support for net-zero technology projects","resumo":"New funding initiatives are being directed toward the development of technologies focused on carbon neutrality. The support aims to accelerate the energy transition and the viability of large-scale sustainable solutions. This investment is fundamental for companies to reach ambitious climate goals and promote a more sustainable future.","link":"https://www2.fundsforngos.org/innovation/funding-support-for-net-zero-technology-projects/","categoria":"SUSTAINABILITY","lang":"en"},{"fonte":"Business Wire","pais":"United States","titulo":"Eurofins agrees to acquire Element Materials Technology's life sciences testing services business in North America","resumo":"Eurofins has announced the strategic acquisition of Element Materials Technology's life sciences testing operations. The transaction strengthens Eurofins' presence in North America, expanding its analytical and regulatory compliance capabilities. The move consolidates the laboratory testing sector, offering more robust services to the pharmaceutical and biotechnology industries.","link":"https://www.businesswire.com/news/home/20260719989224/en/Eurofins-Agrees-to-Acqui   const searchInput = document.getElementById('search');
  const langSelect = document.getElementById('lang');
  const countrySelect = document.getElementById('country');
  const categorySelect = document.getElementById('category');
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');
  const clearBtn = document.getElementById('clear-filters');

  // Utility de escape HTML simples para prevenir injections em propriedades sem tratamento
  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function populateSelects() {
    const lang = langSelect.value;
    const currentData = data.filter(d => d.lang === lang);

    const countries = [...new Set(currentData.map(d => d.pais))].filter(Boolean).sort();
    const categories = [...new Set(currentData.map(d => d.categoria))].filter(Boolean).sort();

    const currentCountry = countrySelect.value;
    const currentCategory = categorySelect.value;

    countrySelect.innerHTML = '<option value="all">Todos / All</option>';
    categorySelect.innerHTML = '<option value="all">Todas / All</option>';

    countries.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      countrySelect.appendChild(opt);
    });

    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      categorySelect.appendChild(opt);
    });

    if (currentCountry !== 'all' && countries.includes(currentCountry)) {
      countrySelect.value = currentCountry;
    }
    if (currentCategory !== 'all' && categories.includes(currentCategory)) {
      categorySelect.value = currentCategory;
    }
  }

  function render(items) {
    countEl.textContent = `${items.length} notícia${items.length !== 1 ? 's' : ''}`;
    
    grid.innerHTML = items.map(item => {
      const readMoreTxt = item.lang === 'pt' ? 'Ler mais' : 'Read more';
      
      const bulletList = (item.resumo || '').split('\n')
        .filter(Boolean)
        .map(line => `<li>${esc(line.replace(/^- /, ''))}</li>`)
        .join('');

      return `
        <div class="news-card">
          <div class="card-meta">
            <span class="category">${esc(item.categoria) || 'Geral'}</span>
            <span class="country">${esc(item.pais) || 'Global'}</span>
          </div>
          <h3 class="card-title">${esc(item.titulo)}</h3>
          <div class="card-summary">
            <ul>${bulletList}</ul>
          </div>
          <div class="card-footer">
            <a href="${esc(item.link)}" target="_blank" class="read-more">
              ${readMoreTxt} &rarr;
            </a>
            <span class="source">${esc(item.fonte)}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterData() {
    const query = searchInput.value.toLowerCase();
    const lang = langSelect.value;
    const country = countrySelect.value;
    const category = categorySelect.value;

    const filtered = data.filter(item => {
      const matchLang = item.lang === lang;
      const matchCountry = country === 'all' || item.pais === country;
      const matchCategory = category === 'all' || item.categoria === category;
      const matchSearch = query === '' 
        || (item.titulo || '').toLowerCase().includes(query)
        || (item.resumo || '').toLowerCase().includes(query)
        || (item.fonte || '').toLowerCase().includes(query);

      return matchLang && matchCountry && matchCategory && matchSearch;
    });

    render(filtered);
  }

  // Binds
  searchInput.addEventListener('input', filterData);
  langSelect.addEventListener('change', () => {
    populateSelects();
    filterData();
  });
  countrySelect.addEventListener('change', filterData);
  categorySelect.addEventListener('change', filterData);
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    countrySelect.value = 'all';
    categorySelect.value = 'all';
    filterData();
  });

  // Initialization
  populateSelects();
  filterData(); // trigger first render
</script>
