<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - International Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0B0F19;
      --bg-panel: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #E2E8F0;
      --text-muted: #94A3B8;
      --accent: #D4AF37;
      --accent-hover: #FDE047;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.15), transparent 400px),
                        radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.05), transparent 400px);
    }
    header {
      padding: 1.5rem 5%;
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo-img {
      height: 48px; /* Altura ajustável do logo */
      width: auto;
      object-fit: contain;
      border-radius: 8px; /* Caso não seja transparente */
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .logo-text span {
      color: var(--accent);
    }
    .date-badge {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      color: var(--accent);
      font-weight: 600;
    }
    .container {
      padding: 2rem 5%;
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }
    .filters {
      flex: 0 0 300px;
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 6rem;
    }
    .filter-group {
      margin-bottom: 1.5rem;
    }
    .filter-group label {
      display: block;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
    }
    select option {
      background: var(--bg-main);
      color: var(--text-main);
    }
    .results {
      flex: 1;
    }
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .results-count {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .news-card {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .news-card:hover {
      transform: translateY(-4px);
      border-color: rgba(212, 175, 55, 0.5);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }
    .category {
      color: var(--accent);
    }
    .country {
      color: var(--text-muted);
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.4;
      margin: 0 0 1rem 0;
      color: #fff;
    }
    .card-summary {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-muted);
      flex: 1;
    }
    .card-summary ul {
      margin: 0;
      padding-left: 1.2rem;
    }
    .card-summary li {
      margin-bottom: 0.25rem;
    }
    .card-footer {
      margin-top: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--glass-border);
      padding-top: 1rem;
    }
    .read-more {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .read-more:hover {
      color: var(--accent-hover);
    }
    .source {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .btn-clear {
      width: 100%;
      padding: 0.75rem 1rem;
      margin-top: 0.5rem;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-clear:hover {
      background: var(--accent);
      color: var(--bg-main);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }
    /* Simple CSS reset/scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: var(--bg-panel); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .filters {
        flex: none;
        width: 100%;
        position: static;
        box-sizing: border-box;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-container">
    <img src="logo.jpg" alt="TAP Logo" class="logo-img" onerror="this.style.display='none'">
    <div class="logo-text">Monitoramento<span>Internacional</span></div>
  </div>
  <div class="date-badge">15/07/2026</div>
</header>

<div class="container">
  <aside class="filters">
    <div class="filter-group">
      <label for="search">Busca / Search</label>
      <input type="text" id="search" placeholder="Palavra-chave...">
    </div>
    
    <div class="filter-group">
      <label for="lang">Idioma / Language</label>
      <select id="lang">
        <option value="pt">Português (PT-BR)</option>
        <option value="en">English (US)</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="country">País / Country</label>
      <select id="country">
        <option value="all">Todos / All</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="category">Categoria / Category</label>
      <select id="category">
        <option value="all">Todas / All</option>
      </select>
    </div>
    
    <button id="clear-filters" class="btn-clear">Limpar / Clear</button>
  </aside>

  <main class="results">
    <div class="results-header">
      <h2 style="margin: 0; font-size: 1.5rem; color: #fff;">Resultados</h2>
      <span class="results-count" id="count">0 notícias</span>
    </div>
    <div class="news-grid" id="grid">
      <!-- Injected by JS -->
    </div>
  </main>
</div>

<script>
  // Injeta os dados originais no frontend
  const data = [{"fonte":"O GLOBO","pais":"Brasil","titulo":"Apple libera iOS 18.2 para testes: veja como baixar o sistema operacional e conhecer a nova Siri com IA","resumo":"A Apple iniciou os testes da nova versão do iOS, trazendo como principal destaque a integração avançada da inteligência artificial na Siri. A atualização promete transformar a interação do usuário com o ecossistema da marca, oferecendo capacidades de processamento mais inteligentes e personalizadas. Usuários registrados já podem explorar essas inovações e conferir as melhorias de desempenho do sistema.","link":"https://oglobo.globo.com/economia/tecnologia/noticia/2026/07/15/apple-libera-ios-27-para-testes-veja-como-baixar-o-sistema-operacional-e-conhecer-a-nova-siri-ai.ghtml","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Partido Social Democrático","pais":"Brasil","titulo":"Curitiba (PR) testa nova tecnologia contra a dengue","resumo":"A cidade de Curitiba implementou uma estratégia inovadora baseada em tecnologia avançada para combater a proliferação do mosquito Aedes aegypti. O projeto utiliza monitoramento de dados e métodos de controle biológico e digital para reduzir os focos de transmissão da doença. A iniciativa serve como modelo para outros municípios brasileiros que buscam soluções tecnológicas eficientes na saúde pública.","link":"https://psd.org.br/noticias/curitiba-pr-testa-nova-tecnologia-contra-a-dengue/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"ANSA Latina","pais":"Brasil","titulo":"Gol de 'O Rei' reconstruído com IA","resumo":"O uso de inteligência artificial permitiu a recriação detalhada de um gol histórico de Pelé, oferecendo uma experiência imersiva e inédita para os torcedores. A tecnologia de processamento de imagem e vídeo restaurou registros antigos, elevando a qualidade visual a padrões modernos. O projeto demonstra o potencial da IA na preservação e valorização da memória esportiva brasileira.","link":"https://www.ansalatina.com/americalatina/noticia/deportes/2026/07/15/gol-de-o-rei-reconstruido-con-ia_ce7d0f4a-1e33-45bf-93ab-aa94d4698a15.html","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"WWF Brasil","pais":"Brasil","titulo":"Tradição e tecnologia: povos originários de Rondônia fortalecem o monitoramento da biodiversidade","resumo":"Povos originários em Rondônia estão integrando saberes ancestrais a ferramentas tecnológicas de ponta para proteger a floresta e monitorar a biodiversidade local. O uso de drones e softwares de mapeamento auxilia na vigilância de territórios contra o desmatamento ilegal. Este projeto exemplifica como a ciência e a tecnologia podem atuar como aliadas indispensáveis na preservação ambiental.","link":"https://www.wwf.org.br/nossosconteudos/notas_e_releases/?94921/Tradicao-e-tecnologia-povos-originarios-de-Rondonia-fortalecem-o-monitoramento-da-biodiversidade-com-apoio-do-WWF-Brasil-e-SOS-Amazonia","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Portal Diário do RN","pais":"Brasil","titulo":"Exclusão digital: tecnologia avança, mas traz novas barreiras para idosos","resumo":"O rápido avanço da digitalização no cotidiano tem criado desafios significativos para a parcela da população idosa que enfrenta dificuldades de acesso ou adaptação. Enquanto serviços essenciais se tornam puramente digitais, o debate sobre inclusão e acessibilidade tecnológica ganha urgência. É fundamental repensar o design de interfaces e políticas públicas para garantir que ninguém seja deixado para trás.","link":"https://diariodorn.com.br/exclusao-digital-tecnologia-avanca-mas-traz-novas-barreiras-para-idosos/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Estadão","pais":"Brasil","titulo":"Do impedimento semiautomático à análise de tomografias","resumo":"A aplicação de tecnologias de precisão no esporte, como sistemas semiautomáticos para arbitragem, tem transformado profundamente a dinâmica das competições profissionais. Além da aplicação em campo, a tecnologia estende-se para a medicina esportiva com análises avançadas de saúde dos atletas através de tomografias. Estas ferramentas garantem maior justiça nas decisões e um monitoramento físico muito mais rigoroso.","link":"https://www.estadao.com.br/economia/do-impedimento-semiautomatico-a-analise-de-tomografias/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"www.gov.br","pais":"Brasil","titulo":"Pesquisadora é nova diretora do Laboratório Nacional de Astronomia","resumo":"O Ministério da Ciência, Tecnologia e Inovação nomeou uma nova diretora para o Laboratório Nacional de Astronomia, reforçando o compromisso com a excelência na pesquisa espacial brasileira. A liderança feminina no setor promete impulsionar parcerias estratégicas e novos projetos de observação astronômica. A mudança marca uma etapa de renovação científica com foco no desenvolvimento de tecnologias para exploração do universo.","link":"https://www.gov.br/mcti/pt-br/acompanhe-o-mcti/noticias/noticias-julho-outubro-2026/pesquisadora-e-nova-diretora-do-laboratorio-nacional-de-astronomia","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Finanças, Câmbio e Investimentos","pais":"Brasil","titulo":"As melhores ações de tecnologia dos EUA para acompanhar, segundo a Mizuho","resumo":"Analistas da Mizuho destacaram as principais empresas de tecnologia do mercado norte-americano que apresentam maior potencial de crescimento para o próximo período. O relatório orienta investidores brasileiros sobre o cenário global e a influência das gigantes de software e hardware na economia. A análise foca em empresas com inovações disruptivas que ditam as tendências atuais do setor.","link":"https://br.investing.com/news/stock-market-news/as-melhores-acoes-de-tecnologia-dos-eua-para-acompanhar-segundo-a-mizuho-93CH-2001948","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Open Access Government","pais":"Estados Unidos","titulo":"Tecnologia vestível: novo adesivo de microagulhas rastreia níveis de medicamentos em tempo real","resumo":"Pesquisadores desenvolveram um adesivo inovador de microagulhas que monitora a concentração de medicamentos no sangue em tempo real. Esta tecnologia vestível promete revolucionar o acompanhamento de pacientes, permitindo ajustes precisos de dosagem de forma não invasiva. O avanço representa um marco importante para a medicina personalizada e o monitoramento contínuo de saúde.","link":"https://www.openaccessgovernment.org/wearable-technology-new-microneedle-patch-tracks-medicine-levels-in-real-time/211933/","categoria":"CIÊNCIA SAÚDE SAÚDE","lang":"pt"},{"fonte":"Technology Networks","pais":"Estados Unidos","titulo":"Semaglutida pode desacelerar o ritmo do envelhecimento epigenético","resumo":"Estudos recentes sugerem que o medicamento semaglutida pode influenciar positivamente os marcadores biológicos associados ao envelhecimento. Além de seus usos conhecidos para o controle metabólico, a substância demonstra potencial para reduzir o desgaste celular. Esta descoberta abre novos horizontes na pesquisa sobre longevidade e prevenção de doenças crônicas relacionadas à idade.","link":"https://www.technologynetworks.com/tn/news/semaglutide-may-slow-the-pace-of-epigenetic-aging-414671","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"the-scientist.com","pais":"Estados Unidos","titulo":"Primeiros vereditos sobre o Claude Science: fluxos de trabalho mais rápidos, mas lacunas persistem","resumo":"A nova ferramenta Claude Science está sendo testada por pesquisadores para acelerar a análise de dados complexos e a escrita científica. Embora demonstre ganhos significativos de produtividade em tarefas repetitivas, usuários ainda apontam limitações na precisão em contextos altamente especializados. O impacto da ferramenta depende de refinamentos contínuos para garantir confiabilidade total.","link":"https://www.the-scientist.com/early-verdicts-on-claude-science-faster-workflows-but-gaps-remain-74745","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"StartSe","pais":"Estados Unidos","titulo":"Quase metade dos grandes negócios de tecnologia hoje é sobre uma coisa: IA","resumo":"O mercado tecnológico atual está fortemente concentrado na corrida pela inteligência artificial, que domina metade dos grandes investimentos e fusões. Empresas buscam integrar modelos avançados em seus produtos para manter a competitividade global e atender à demanda por automação. Essa tendência redefine as prioridades estratégicas e a alocação de capital em todo o setor.","link":"https://www.startse.com/artigos/quase-metade-dos-grandes-negocios-de-tecnologia-hoje-e-sobre-uma-coisa-ia","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"UConn Today","pais":"Estados Unidos","titulo":"National Science Foundation dos EUA anuncia prêmio transformador para o setor de tecnologia quântica de Connecticut","resumo":"A NSF concedeu um investimento estratégico para impulsionar a infraestrutura e a pesquisa quântica no estado de Connecticut. O objetivo é fortalecer a posição dos EUA na vanguarda da computação quântica e criar um ecossistema robusto de inovação. Este movimento visa acelerar descobertas científicas que transformarão a segurança e o processamento de dados.","link":"https://today.uconn.edu/2026/07/u-s-national-science-foundation-announces-transformational-award-to-connecticuts-quantum-tech-sector/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"WVU Today","pais":"Estados Unidos","titulo":"Impulsionando economias: WVU, Pitt e Carnegie Mellon receberão US$ 320 milhões para tecnologia, IA e infraestrutura","resumo":"Um consórcio de universidades recebeu um aporte massivo de US$ 320 milhões para fomentar a segurança energética e a resiliência por meio da tecnologia. O projeto foca no desenvolvimento de IA aplicada, infraestrutura moderna e na criação de novos postos de trabalho qualificados. A iniciativa visa revitalizar a economia regional com base em inovação científica.","link":"https://wvutoday.wvu.edu/stories/2026/07/14/powering-up-economies-wvu-with-pitt-and-carnegie-mellon-will-recharge-energy-security-and-resilience-with-320m-for-new-technology-ai-infrastructure-and-jobs","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"U.S. National Science Foundation (.gov)","pais":"Estados Unidos","titulo":"NSF concede 12 novos motores regionais de inovação para impulsionar a pesquisa, empregos e o crescimento econômico","resumo":"A National Science Foundation anunciou a criação de 12 novos polos regionais de inovação distribuídos por todo o país. Esses motores têm como propósito conectar pesquisa acadêmica de ponta ao desenvolvimento econômico e à criação de empregos locais. A iniciativa reflete uma estratégia nacional para descentralizar o avanço tecnológico nos Estados Unidos.","link":"https://www.nsf.gov/news/nsf-awards-12-new-regional-innovation-engines-fuel-research","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Business Wire","pais":"Estados Unidos","titulo":"Neuraptive Therapeutics licencia inovadora tecnologia de estimulação nervosa biorreabsorvível","resumo":"A empresa licenciou uma tecnologia de ponta da Universidade de Washington em St. Louis para estimulação nervosa que se degrada naturalmente no corpo. Esse avanço permite tratamentos mais eficazes e menos invasivos para reparação neurológica e controle de dor crônica. A tecnologia promete eliminar a necessidade de cirurgias adicionais para remoção de dispositivos implantáveis.","link":"https://www.businesswire.com/news/home/20260714158724/pt","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"ZDNET","pais":"França","titulo":"Samsung revela \"Flex Titanium\", sua nova tecnologia de tela dobrável","resumo":"A Samsung apresentou sua inovadora tecnologia de tela Flex Titanium, prometendo maior durabilidade e flexibilidade para dispositivos móveis dobráveis. Este avanço marca um passo importante na engenharia de displays, visando mitigar problemas de desgaste comuns em aparelhos com telas flexíveis.","link":"https://www.zdnet.fr/actualites/samsung-devoile-flex-titanium-sa-nouvelle-technologie-decran-pliable-498614.htm","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Retail Technology Innovation Hub","pais":"França","titulo":"Varejista de artigos esportivos Decathlon se torna o maior cliente global da empresa de tecnologia Vusion","resumo":"A Decathlon consolidou uma parceria estratégica com a VusionGroup, implementando tecnologias de etiquetagem eletrônica em escala global. A integração visa otimizar a gestão de estoques e a experiência digital do consumidor nas lojas físicas da rede francesa.","link":"https://retailtechinnovationhub.com/home/2026/7/15/sporting-goods-retailer-decathlon-becomes-retail-technology-firm-vusions-most-globally-deployed-customer","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Nice Premium","pais":"França","titulo":"IA e mobilidade verde: como a tecnologia já transforma a Côte d'Azur","resumo":"A região da Côte d'Azur está se tornando um laboratório vivo para inovações em inteligência artificial e transporte sustentável. Projetos locais utilizam dados e algoritmos para reduzir emissões de carbono e melhorar a eficiência do fluxo de mobilidade urbana na área.","link":"https://www.nicepremium.fr/technologie/ia-et-mobilite-verte-comment-la-technologie-transforme-deja-la-cote-dazur/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Boursorama","pais":"França","titulo":"Defiance lança o primeiro ETF europeu dedicado à fotônica","resumo":"O fundo Defiance introduziu no mercado europeu o primeiro ETF focado especificamente na indústria de fotônica. A iniciativa busca captar o crescimento de tecnologias baseadas em luz, essenciais para o futuro das comunicações, computação quântica e sensores de precisão.","link":"https://www.boursorama.com/bourse/actualites-amp/defiance-lance-le-premier-etf-europeen-dedie-a-la-photonique-f393bbaa3b8c7dd3108824ecc353cbc1","categoria":"FINANÇAS","lang":"pt"},{"fonte":"Zonebourse Suisse","pais":"França","titulo":"Tecnologia High NA EUV da ASML Holding usada para produção dos processadores Intel","resumo":"A ASML atingiu um marco crucial com a implementação de sua tecnologia de litografia High NA EUV na fabricação de chips da Intel. Este equipamento de ponta permite a produção de processadores com transistores menores e mais densos, impulsionando a próxima geração de semicondutores.","link":"https://ch.zonebourse.com/actualite-bourse/la-technologie-high-na-euv-d-asml-holding-utilisee-pour-la-production-des-processeurs-intel-ce7f5edddf8ef426","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"ミシュランタイヤ","pais":"França","titulo":"MICHELIN CROSSCLIMATE 3 SPORT: Novo pneu all-season ganha 31 novos tamanhos","resumo":"A Michelin expandiu a linha CrossClimate 3 Sport, adicionando 31 novas medidas para atender a uma gama maior de veículos esportivos. O modelo combina performance de alto nível em diversas condições climáticas, mantendo a tradição tecnológica da fabricante francesa em segurança.","link":"https://news.michelin.co.jp/articles/20260715-michelin-b2c-cc3sp-added-sized-2026-release","categoria":"LANÇAMENTO","lang":"pt"},{"fonte":"TF1 Info","pais":"França","titulo":"Quando a tecnologia protege nossas plantações","resumo":"Soluções tecnológicas avançadas estão sendo aplicadas na agricultura para proteger culturas contra pragas e variações climáticas extremas. O uso de sensores e monitoramento inteligente garante maior produtividade e sustentabilidade para o setor agrícola frente aos desafios ambientais atuais.","link":"https://www.tf1info.fr/high-tech/videos/video-quand-la-technologie-protege-nos-cultures-12892-2453158.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"The Guardian","pais":"Inglaterra","titulo":"Naufrágios de Shackleton e Scott recriados em formato digital 3D após expedição em mar profundo","resumo":"Uma expedição submarina utilizou tecnologia avançada de mapeamento para recriar em 3D os históricos naufrágios das embarcações de Shackleton e Scott. O projeto preserva digitalmente esses monumentos submersos, permitindo que pesquisadores e o público explorem detalhes arqueológicos críticos sem a necessidade de intervenções físicas que poderiam comprometer as estruturas.","link":"https://www.theguardian.com/science/2026/jul/15/deep-sea-expedition-builds-digital-twins-shipwrecks-scott-shackleton","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Vodafone","pais":"Inglaterra","titulo":"Quem controla a tecnologia da Europa e por que isso importa?","resumo":"Este artigo analisa a complexa rede de poder sobre o desenvolvimento tecnológico no continente europeu, destacando a influência de empresas globais e a soberania digital. A discussão aborda como o controle das infraestruturas críticas impacta a economia local, a privacidade dos cidadãos e a autonomia política da Europa diante da crescente concorrência entre gigantes internacionais.","link":"https://www.vodafone.com/news/newsroom/public-policy/who-controls-europes-technology-and-why-it-matters","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"EDP24","pais":"Inglaterra","titulo":"Empresa de Norfolk que transforma emissões em materiais de construção nomeia novo diretor","resumo":"Uma startup inovadora localizada em Norfolk, especializada na conversão de emissões de carbono em materiais sustentáveis para a construção civil, anunciou mudanças estratégicas em sua liderança. A nomeação visa impulsionar a escalabilidade do negócio e fortalecer o impacto ambiental positivo da empresa no setor de engenharia verde no Reino Unido.","link":"https://www.edp24.co.uk/news/26268529.o-c-o-technology-uk-appoints-new-aggregates-director/","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Retail Technology Innovation Hub","pais":"Inglaterra","titulo":"Saque certeiro! Boxbar Tech impulsiona a primeira tecnologia de bar self-service em Wimbledon 2026","resumo":"O torneio de Wimbledon 2026 introduz uma inovação tecnológica significativa com a implementação de bares self-service desenvolvidos pela Boxbar Tech. A solução promete reduzir drasticamente o tempo de espera dos espectadores, integrando automação avançada para oferecer uma experiência de consumo mais ágil e eficiente durante os jogos.","link":"https://retailtechinnovationhub.com/home/2026/7/14/nice-serve-boxbar-tech-powers-self-serve-bar-technology-first-at-2026-wimbledon-championships","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"La Razón","pais":"Espanha","titulo":"Titânio na tela? A tecnologia inovadora da Samsung para tornar seus novos dobráveis mais resistentes","resumo":"A Samsung está implementando novas técnicas de engenharia e materiais avançados para aumentar a durabilidade de seus smartphones dobráveis. O uso de ligas de titânio promete oferecer maior proteção contra impactos e desgaste diário. Essa evolução tecnológica visa reduzir o estigma de fragilidade associado a telas flexíveis e atrair consumidores mais exigentes.","link":"https://www.larazon.es/tecnologia-consumo/samsung-galaxy-z/titanio-pantallala-innovadora-tecnologia-samsung-sus-nuevos-plegables-sean-resistentes_202607156a573ea70500ab412c95f700.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"telefonica.com","pais":"Espanha","titulo":"A IA está redefinindo como construímos produtos: o novo limite não é mais a tecnologia, somos nós","resumo":"O rápido avanço da Inteligência Artificial está transformando os processos de criação e desenvolvimento de produtos no mercado global. O artigo argumenta que a tecnologia deixou de ser o principal entrave para a inovação, transferindo o desafio para a capacidade humana de adaptação. A mentalidade das equipes tornou-se o fator determinante para o sucesso nesta nova era digital.","link":"https://www.telefonica.com/en/communication-room/blog/ia-new-product-development-limit-people/","categoria":"INOVAÇÃO","lang":"pt"},{"fonte":"Interempresas Media","pais":"Espanha","titulo":"Sopra Steria e B5TEC levarão supercapacitores espanhóis para defesa e centros de dados","resumo":"Uma parceria estratégica entre as empresas Sopra Steria e B5TEC visa implementar supercapacitores de fabricação espanhola em setores críticos. A tecnologia será aplicada em sistemas de defesa e infraestruturas de centros de dados para melhorar a eficiência energética. Este avanço destaca o potencial da indústria espanhola em fornecer soluções de armazenamento de alta performance.","link":"https://www.interempresas.net/A658617","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"novaciencia.es","pais":"Espanha","titulo":"O que acontece quando uma molécula recebe luz: o processo é descrito átomo a átomo","resumo":"Pesquisadores conseguiram mapear com precisão absoluta as reações químicas que ocorrem em uma molécula após a exposição à luz. O estudo descreve o comportamento atômico durante esse processo, revelando detalhes fundamentais para a física molecular. A descoberta abre portas para inovações em fotossíntese artificial e novas fontes de energia sustentável.","link":"https://novaciencia.es/que-ocurre-cuando-una-molecula-recibe-luz-describen-el-proceso-atomo-a-atomo/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Expansión","pais":"Espanha","titulo":"Iberent: a tecnologia já não é comprada, é gerenciada para competir na era da IA","resumo":"O modelo de consumo de TI está mudando drasticamente, com empresas optando pela gestão de serviços em vez da aquisição de ativos fixos. A Iberent destaca como essa abordagem é vital para manter a competitividade diante da rápida adoção da Inteligência Artificial. O foco passa a ser a flexibilidade operacional e a atualização tecnológica constante.","link":"https://www.expansion.com/uestudio/2026/07/15/6a57218ce5fdeac1588b45a6.html","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"ECO","pais":"Espanha","titulo":"Design, tecnologia e construção industrializada: a estratégia da Roca para reinventar o banheiro","resumo":"A gigante Roca está integrando tecnologias avançadas e processos de construção industrializada para transformar o setor de banheiros. O objetivo é unir estética e funcionalidade inteligente, adaptando-se às demandas modernas de sustentabilidade. Essa mudança estratégica visa criar soluções habitacionais que priorizam a eficiência e o design de alto impacto.","link":"https://eco.sapo.pt/2026/07/15/design-tecnologia-e-construcao-industrializada-a-estrategia-da-roca-para-reinventar-a-casa-de-banho/","categoria":"INOVAÇÃO","lang":"pt"},{"fonte":"La Voz de Galicia","pais":"Espanha","titulo":"A empresa Celtarys apresenta uma tecnologia para acelerar o desenvolvimento de fármacos","resumo":"A startup Celtarys revelou uma nova plataforma tecnológica capaz de agilizar significativamente as fases iniciais de descoberta de novos medicamentos. A solução utiliza métodos inovadores para testar compostos com maior precisão e rapidez do que os modelos tradicionais. O avanço promete reduzir custos e tempo no lançamento de terapias essenciais ao mercado.","link":"https://www.lavozdegalicia.es/amp/noticia/santiago/santiago/2026/07/15/empresa-celtarys-presenta-tecnologia-acelerar-desarrollo-farmacos/0003_202607S15C2994.htm?utm_campaign=amp","categoria":"BIOTECNOLOGIA","lang":"pt"},{"fonte":"ciencia.gob.es","pais":"Espanha","titulo":"O Ministério da Ciência, Inovação e Universidades concede os Prêmios Nacionais de Inovação e Design 2026","resumo":"O governo espanhol anunciou os vencedores dos prestigiados Prêmios Nacionais de Inovação e Design de 2026. A iniciativa reconhece empresas e profissionais que se destacaram pelo impacto social, econômico e criativo de suas contribuições tecnológicas. Este reconhecimento reforça o compromisso do país em fomentar um ecossistema de pesquisa e desenvolvimento de classe mundial.","link":"https://www.ciencia.gob.es/Noticias/2026/julio/Morant-llamada-premios-nacionales-innovacion-diseno-2026.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Wiley Analytical Science","pais":"Alemanha","titulo":"Pesquisadores de Marburg decodificam uma das maiores enzimas da natureza","resumo":"Cientistas da Universidade de Marburg conseguiram decifrar a estrutura complexa de uma das maiores enzimas naturais existentes. Esta descoberta é um avanço significativo para a biotecnologia e a síntese química. A compreensão detalhada dessa molécula abre novas portas para o desenvolvimento de catalisadores biológicos mais eficientes e sustentáveis.","link":"https://analyticalscience.wiley.com/content/news-do/marburg-researchers-decode-one-nature-s-largest-enzymes","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Logistik Heute","pais":"Alemanha","titulo":"Jungheinrich investe no fortalecimento de Inteligência Artificial Física","resumo":"A empresa alemã Jungheinrich está expandindo suas capacidades em IA Física para otimizar a automação em intralogística. A integração dessa tecnologia promete aumentar a precisão e a segurança no manuseio de materiais em armazéns automatizados. Este movimento destaca a competitividade da Alemanha na aplicação industrial de tecnologias emergentes.","link":"https://logistik-heute.de/fachmagazin/fachartikel/markt-news-beteiligung-jungheinrich-verstaerkt-sich-bei-physical-ai-273856.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Bild der Wissenschaft","pais":"Alemanha","titulo":"Microplásticos podem promover ataques cardíacos","resumo":"Pesquisas recentes indicam uma correlação preocupante entre a presença de microplásticos no organismo e o aumento do risco de infartos do miocárdio. O estudo alerta para os perigos da poluição invisível e seus impactos diretos na saúde cardiovascular humana. O tema exige medidas urgentes de regulação ambiental e controle de contaminantes em escala global.","link":"https://wissenschaft.de/artikel/mikroplastik-koennte-herzinfarkte-foerdern","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"kpmg.com","pais":"Alemanha","titulo":"IA generativa na economia alemã 2026 - Relatório do setor de construção","resumo":"Um novo relatório analisa como a IA generativa está transformando o setor de construção civil na Alemanha até 2026. A tecnologia está sendo aplicada para otimizar o planejamento, reduzir desperdícios e acelerar processos de engenharia complexos. O estudo reflete a digitalização acelerada que o setor enfrenta para manter a eficiência operacional.","link":"https://kpmg.com/de/de/themen/digital-transformation/kuenstliche-intelligenz/studie-generative-ki-in-der-deutschen-wirtschaft-2026/branchenreport-bauwirtschaft.html","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"PR TIMES","pais":"Japão","titulo":"LegalTech lança fluxo de trabalho para compartilhamento de documentos em disputas técnicas para empresas de semicondutores","resumo":"A LegalTech introduziu uma solução especializada em VDR focada no setor de semicondutores, visando otimizar a gestão e segurança de documentos durante disputas de propriedade intelectual. A tecnologia promete agilizar processos críticos, garantindo conformidade e proteção de dados sensíveis em um mercado global altamente competitivo.","link":"https://prtimes.jp/main/html/rd/p/000000501.000042056.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Forbes JAPAN","pais":"Japão","titulo":"Empresas entram na 'Economia de IA de duas camadas'","resumo":"O mercado corporativo está se dividindo entre dois níveis de adoção de inteligência artificial, exigindo novas estratégias de investimento e infraestrutura. A análise aponta que o sucesso a longo prazo dependerá de como as companhias integram modelos avançados de IA com seus processos operacionais fundamentais.","link":"https://forbesjapan.com/articles/detail/100981","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"日本経済新聞","pais":"Japão","titulo":"Salesforce Japão anuncia o Agentforce Coworker","resumo":"A Salesforce expandiu seu ecossistema no Japão com o lançamento do Agentforce Coworker, uma solução baseada em agentes inteligentes para colaboração corporativa. A ferramenta visa automatizar tarefas complexas e elevar a produtividade das equipes através da integração profunda com a plataforma da empresa.","link":"https://www.nikkei.com/article/DGXZRSP709950_15072026000000","categoria":"LANÇAMENTO","lang":"pt"},{"fonte":"PR TIMES","pais":"Japão","titulo":"Seminário JPI discute reciclagem de baterias de íon-lítio para VEs e tecnologias de baterias de estado sólido","resumo":"O seminário JPI abordará avanços cruciais na reciclagem de baterias para veículos elétricos, preparando o terreno para a próxima geração de baterias de estado sólido. O evento visa conectar especialistas para discutir soluções sustentáveis e o futuro energético que impactará toda a indústria automotiva global.","link":"https://prtimes.jp/main/html/rd/p/000001869.000042328.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"ビジネスネットワーク","pais":"Japão","titulo":"ROBOTS, desenvolvedora de tecnologia de controle integrado de robôs, desvincula-se da NTT Docomo","resumo":"A startup ROBOTS foi formalmente estabelecida através de um spin-out da NTT Docomo, focando no desenvolvimento de sistemas de controle robótico integrado. Com esta independência, a empresa busca acelerar a implementação comercial de suas tecnologias de automação e robótica avançada no mercado japonês.","link":"https://businessnetwork.jp/article/35906/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"esports-world.jp","pais":"Japão","titulo":"E-sports na assistência social: 'Puyo Puyo Trainer' para treinamento cerebral será lançado em 1º de outubro","resumo":"Combinando e-sports com cuidados geriátricos, o software Puyo Puyo Trainer chega ao mercado para estimular a atividade cerebral em instalações de assistência social. A iniciativa demonstra o uso inovador de jogos eletrônicos como ferramenta terapêutica para idosos, promovendo saúde e entretenimento.","link":"https://esports-world.jp/news/63301","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"PR TIMES","pais":"Japão","titulo":"Limpador de alta pressão com tecnologia Mirable arrecada 150 milhões de ienes em 10 dias no crowdfunding","resumo":"A nova lavadora portátil de alta pressão que integra a tecnologia Mirable superou rapidamente as metas de arrecadação em crowdfunding. O sucesso reflete a alta demanda por soluções de limpeza doméstica que utilizam tecnologias avançadas de microbolhas, oferecendo eficiência superior sem o uso excessivo de produtos químicos.","link":"https://prtimes.jp/main/html/rd/p/000000007.000154047.html","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Samsung Global Newsroom","pais":"Japão","titulo":"Samsung apresenta nova tecnologia 'Flex Titanium' para aprimorar telas dobráveis","resumo":"A Samsung revelou a tecnologia Flex Titanium, desenvolvida para aumentar a durabilidade e a resistência de telas dobráveis de nova geração. Esta inovação promete reduzir significativamente o desgaste causado por dobras repetitivas, elevando o padrão de qualidade dos dispositivos portáteis premium no mercado global.","link":"https://news.samsung.com/jp/galaxy-unpacked-2026-flex-titanium","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"北航新闻网","pais":"China","titulo":"Beihang lidera reunião de progresso do projeto '101' em tecnologia de baixa altitude","resumo":"A Universidade de Aeronáutica e Astronáutica de Pequim conduziu uma reunião estratégica para avaliar o progresso do plano '101' no setor de baixa altitude. O foco central é o avanço das capacidades de engenharia e tecnologia para fortalecer a infraestrutura aeroespacial nacional chinesa. A iniciativa visa integrar inovações acadêmicas para acelerar o desenvolvimento econômico deste segmento emergente.","link":"https://news.buaa.edu.cn/info/1005/69487.htm","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"新京报","pais":"China","titulo":"Produção diária de circuitos integrados na China supera 1,5 bilhão de unidades","resumo":"Dados recentes indicam um marco expressivo na fabricação de semicondutores na China, alcançando uma média diária superior a 1,5 bilhão de circuitos integrados. Com o volume de processamento de tokens atingindo patamares de trilhões, o setor demonstra uma escalabilidade robusta em resposta à demanda global. Este crescimento reforça a autossuficiência e a força tecnológica do país no campo da eletrônica.","link":"https://www.bjnews.com.cn/detail/1784098930129753.html","categoria":"INDÚSTRIA","lang":"pt"},{"fonte":"荆楚网","pais":"China","titulo":"Nove empresas de Optics Valley recebem Prêmio Nacional de Ciência e Tecnologia","resumo":"O centro tecnológico Optics Valley, em Wuhan, celebrou o reconhecimento de nove de suas empresas com o prestigioso Prêmio Nacional de Ciência e Tecnologia. Este feito ressalta o sucesso do ecossistema de inovação local no desenvolvimento de tecnologias de ponta. A premiação valida o compromisso da região em promover descobertas científicas que impactam o cenário industrial e econômico do país.","link":"http://news.cnhubei.com/content/2026-07/15/content_20086722.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"ncsti.gov.cn","pais":"China","titulo":"Ecossistema de interfaces cérebro-computador de Changping expande com 11 novas empresas","resumo":"O distrito de Changping, em Pequim, expandiu significativamente seu polo industrial focado em neurociência e interfaces cérebro-computador com a chegada de 11 novas empresas. O movimento visa consolidar o desenvolvimento de tecnologias de interação neural e saúde cerebral de última geração. Esta expansão reforça a posição de Pequim como um hub estratégico para a biotecnologia e inovação humana.","link":"https://www.ncsti.gov.cn/kjdt/scyq/wlkxc/wldt/202607/t20260715_251317.html","categoria":"BIOTECNOLOGIA","lang":"pt"},{"fonte":"科学网—新闻","pais":"China","titulo":"Artigo de capa: mLife apresenta tecnologia de detecção rápida de sensibilidade a fagos baseada em Raman","resumo":"Uma nova técnica de detecção rápida para a sensibilidade de bacteriófagos, baseada em tecnologia Raman, foi destacada na revista mLife. O avanço oferece uma ferramenta promissora para o tratamento de infecções bacterianas e o monitoramento microbiológico preciso. A inovação representa um marco importante para a medicina diagnóstica e a aplicação de tecnologias de imagem molecular.","link":"https://news.sciencenet.cn/htmlnews/2026/7/568191.shtm","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Portuguese Cri","pais":"China","titulo":"Bordado étnico de Rongjiang ganha escala com tecnologia digital","resumo":"A tradicional arte do bordado étnico de Rongjiang está sendo revitalizada através da aplicação de tecnologias digitais de manufatura. Ao digitalizar padrões ancestrais, artesãos conseguem aumentar a escala de produção e o alcance de mercado de seus produtos artesanais. Essa integração entre tradição e tecnologia digital preserva o patrimônio cultural enquanto gera novas oportunidades econômicas locais.","link":"https://portuguese.cri.cn/2026/07/15/PHOA1784084803916641","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Canal Solar","pais":"China","titulo":"Módulo solar que não pega fogo? Entenda a tecnologia da LONGi","resumo":"A empresa LONGi apresentou uma tecnologia inovadora para módulos solares focada em segurança, garantindo propriedades de resistência ao fogo. A solução visa elevar os padrões de segurança em parques fotovoltaicos, mitigando riscos operacionais em instalações de larga escala. Este desenvolvimento técnico demonstra o compromisso contínuo do setor de energia renovável com a confiabilidade e proteção de ativos.","link":"https://canalsolar.com.br/modulo-anti-fogo-longi/","categoria":"ENERGIA","lang":"pt"},{"fonte":"天津大学新闻网","pais":"China","titulo":"Realizada reunião de treinamento para projetos do fundo 'Medicina +' da Universidade de Tianjin","resumo":"A Universidade de Tianjin promoveu um treinamento focado em seus projetos de 2026, integrando a medicina com tecnologias avançadas sob o fundo 'Medicina +'. O programa busca estimular a colaboração multidisciplinar para enfrentar desafios críticos de saúde através da inovação tecnológica. A iniciativa prepara pesquisadores e acadêmicos para liderar avanços na convergência entre ciências biológicas e engenharia.","link":"https://news.tju.edu.cn/info/1012/605489.htm","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"India Today","pais":"Índia","titulo":"BTech em Cibersegurança ou Ciência de Dados? O que os aspirantes a engenharia devem escolher","resumo":"O artigo analisa as carreiras em alta para estudantes de engenharia na Índia, focando na demanda crescente por especialistas em cibersegurança e ciência de dados. A análise orienta os candidatos sobre como alinhar suas escolhas acadêmicas com as necessidades futuras do mercado de trabalho tecnológico global.","link":"https://www.indiatoday.in/education-today/featurephilia/story/btech-in-cybersecurity-or-data-science-engineering-aspirants-this-or-that-placement-curriculum-careers-2948259-2026-07-15","categoria":"EDUCAÇÃO","lang":"pt"},{"fonte":"Kashmir Life","pais":"Índia","titulo":"SKUAST-K lança programa de treinamento em tecnologia de drones para gestão de recursos naturais","resumo":"A universidade SKUAST-K iniciou um programa de capacitação focado na utilização de drones para otimizar o gerenciamento de recursos naturais. A iniciativa visa modernizar práticas agrícolas e ambientais, utilizando tecnologia avançada para monitoramento preciso de terras e ecossistemas na região.","link":"https://kashmirlife.net/skuast-k-launches-training-programme-on-drone-technology-for-natural-resource-management-443196/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"orissadiary.com","pais":"Índia","titulo":"Nordeste da Índia testemunha expansão sem precedentes da infraestrutura de Ciência e Tecnologia sob o governo Modi","resumo":"O Dr. Jitendra Singh destacou o crescimento significativo na infraestrutura científica e tecnológica no nordeste da Índia. O investimento governamental busca integrar a região à economia digital, promovendo o desenvolvimento científico e a inovação tecnológica para impulsionar a competitividade local e nacional.","link":"https://orissadiary.com/north-east-witnesses-unprecedented-expansion-of-science-technology-infrastructure-under-prime-minister-narendra-modi-dr-jitendra-singh/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Shiksha","pais":"Índia","titulo":"NIT Trichy convida para inscrições em Diploma de Pós-Graduação em Tecnologia de Saúde","resumo":"O instituto NIT Trichy abriu candidaturas para o seu curso de pós-graduação voltado à tecnologia aplicada na saúde. Este programa visa formar profissionais capacitados para enfrentar desafios do setor hospitalar através da digitalização e do uso estratégico de ferramentas tecnológicas modernas.","link":"https://www.shiksha.com/news/engineering-nit-trichy-invites-application-for-pg-diploma-in-healthcare-technology-check-dates-here-blogId-235941","categoria":"EDUCAÇÃO","lang":"pt"},{"fonte":"ANI News","pais":"Índia","titulo":"L&T Technology Services relata crescimento de 11,5% em relação ao ano anterior no primeiro trimestre do ano fiscal","resumo":"A L&T Technology Services registrou um desempenho financeiro sólido com um crescimento de dois dígitos, refletindo a forte demanda por serviços de engenharia tecnológica. O resultado sinaliza a robustez da empresa no mercado de tecnologia, consolidando sua posição estratégica frente aos investidores globais.","link":"https://www.aninews.in/news/business/lampt-technology-services-reports-115-yoy-growth-in-q1fy2720260715120001","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Bar and Bench","pais":"Índia","titulo":"Ex-conselheiro sênior do Google, Deepak Singh, junta-se à Chandhiok & Mahajan para liderar a prática de Tecnologia, Digital e IA","resumo":"A contratação de Deepak Singh, ex-executivo do Google, marca um reforço estratégico na liderança da Chandhiok & Mahajan. Ele será responsável por orientar a expansão da firma em áreas críticas como inteligência artificial, transformação digital e governança tecnológica no mercado indiano.","link":"https://www.barandbench.com/news/corporate/ex-google-senior-counsel-deepak-singh-joins-chandhiok-mahajan-to-lead-technology-digital-ai-practice","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Moneycontrol.com","pais":"Índia","titulo":"Target afirma que seu Centro de Capacidade Global em Bengaluru impulsiona 40% da força de trabalho tecnológica global","resumo":"A gigante Target destacou a relevância de sua unidade em Bengaluru como um centro nevrálgico para sua operação tecnológica mundial. O centro é responsável por uma parte substancial dos projetos digitais e de TI, reafirmando a importância da Índia como hub global de inovação.","link":"https://www.moneycontrol.com/technology/target-says-bengaluru-gcc-powers-40-of-global-technology-workforce-article-13974342.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"The Hindu","pais":"Índia","titulo":"Relações entre Índia e EUA em tecnologia de defesa: grandes ambições, pouca entrega","resumo":"O artigo explora as dificuldades na implementação de parcerias estratégicas de defesa entre Índia e Estados Unidos. Apesar das metas ambiciosas estabelecidas diplomaticamente, o progresso real enfrenta obstáculos burocráticos e desafios técnicos que retardam a colaboração esperada entre as duas potências.","link":"https://www.thehindu.com/opinion/op-ed/india-us-defence-technology-ties-big-ambitions-little-delivery/article71222458.ece","categoria":"GEOPOLÍTICA","lang":"pt"},{"fonte":"Vida Rural","pais":"Portugal","titulo":"A economia circular pode ser a chave para democratizar a digitalização?","resumo":"Este artigo explora a intersecção entre a sustentabilidade e a transformação digital. Analisa como práticas de economia circular podem tornar o acesso a tecnologias mais inclusivo, reduzindo desperdícios e promovendo uma digitalização mais responsável e acessível em diversos setores da sociedade.","link":"https://www.vidarural.pt/id/economia-circular-digitalizacao/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Correio da Manhã","pais":"Portugal","titulo":"Nova tecnologia permite medir humidade florestal na Península Ibérica para prevenir incêndios","resumo":"Uma inovação tecnológica pioneira promete monitorar com precisão os níveis de humidade nas florestas da Península Ibérica. O sistema é uma ferramenta crucial para a gestão ambiental, permitindo intervenções rápidas que visam reduzir drasticamente o risco e a propagação de incêndios na região.","link":"https://www.cmjornal.pt/tecnologia/detalhe/nova-tecnologia-permite-medir-humidade-florestal-na-peninsula-iberica-para-prevenir-incendios","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Jornal Económico","pais":"Portugal","titulo":"Tecnológica portuguesa KWAN recruta para 200 vagas em tecnologia","resumo":"A empresa tecnológica KWAN abriu um processo de recrutamento em larga escala, oferecendo 200 novas posições no mercado português. Esta iniciativa reforça a vitalidade do ecossistema tecnológico nacional e destaca a contínua procura por talentos qualificados para sustentar o crescimento do setor.","link":"https://jornaleconomico.sapo.pt/noticias/tecnologica-portuguesa-kwan-recruta-para-200-vagas-em-tecnologia/","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Jornal SOL","pais":"Portugal","titulo":"Mais tecnologia, mais humanidade: Porque continuaremos a precisar de Professores na era da IA","resumo":"O artigo discute o papel insubstituível dos educadores frente ao avanço da inteligência artificial nas salas de aula. Argumenta que a tecnologia serve como um complemento pedagógico, mas que a empatia, a orientação ética e a conexão humana dos professores permanecem essenciais no processo de aprendizagem.","link":"https://sol.iol.pt/opiniao/noticias/fernando-pereira-mais-tecnologia-mais-humanidade-porque-continuaremos-a-precisar-de-professores-na-era-da-ia/20260714/6a5655e60cf2f6a1a1e70aa4","categoria":"EDUCAÇÃO","lang":"pt"},{"fonte":"Coimbra Coolectiva","pais":"Portugal","titulo":"Coimbra Coolectiva no Tech & Arts Festival do TUMO: arte, tecnologia e jornalismo colaborativo","resumo":"O projeto Coimbra Coolectiva marcou presença no festival TUMO, evidenciando a convergência entre o jornalismo colaborativo e novas formas de expressão digital. O evento demonstrou como a união entre arte e tecnologia pode criar narrativas mais ricas, participativas e impactantes para o público local.","link":"https://coimbracoolectiva.pt/historias/comunidade/coimbra-coolectiva-no-tech-arts-festival-do-tumo-arte-tecnologia-e-jornalismo-colaborativo/","categoria":"CULTURA","lang":"pt"},{"fonte":"SIC","pais":"Portugal","titulo":"\"Sou um ciborgue\" — Nuno Markl testa tecnologia inovadora e celebra uma das maiores 'vitórias' após o AVC","resumo":"Nuno Markl partilhou uma experiência inspiradora ao utilizar tecnologia assistiva avançada após o seu problema de saúde. O caso destaca o impacto transformador da tecnologia na reabilitação e qualidade de vida, simbolizando uma vitória significativa no uso de inovações para superar limitações físicas.","link":"https://sic.pt/sic-caras/famosos/2026-07-14-video-sou-um-ciborgue--nuno-markl-testa-tecnologia-inovadora-e-celebra-uma-das-maiores-vitorias-apos-o-avc-0bf710f4","categoria":"SAÚDE","lang":"pt"},{"fonte":"Correio da Manhã","pais":"Portugal","titulo":"Saiba como a tecnologia consegue ajudar a evitar incêndios em Portugal","resumo":"O artigo detalha as diversas soluções tecnológicas já implementadas em Portugal para o combate e prevenção de incêndios rurais. Desde o uso de satélites e drones até sistemas de alerta antecipado, a tecnologia torna-se o principal aliado das autoridades na proteção do território e das florestas.","link":"https://www.cmjornal.pt/cmtv/programas/informacao/falar-global/detalhe/saiba-como-a-tecnologia-consegue-ajudar-a-evitar-incendios-em-portugal","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"O GLOBO","pais":"Brazil","titulo":"Apple releases iOS 18.2 for testing: see how to download the OS and try the new AI-powered Siri","resumo":"Apple has begun testing the new version of iOS, highlighting the advanced integration of artificial intelligence into Siri. The update promises to transform how users interact with the brand's ecosystem by offering smarter, more personalized processing capabilities. Registered users can now explore these innovations and check the system's performance improvements.","link":"https://oglobo.globo.com/economia/tecnologia/noticia/2026/07/15/apple-libera-ios-27-para-teses-veja-como-baixar-o-sistema-operacional-e-conhecer-a-nova-siri-ai.ghtml","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Partido Social Democrático","pais":"Brazil","titulo":"Curitiba (PR) tests new technology against dengue fever","resumo":"The city of Curitiba has implemented an innovative strategy based on advanced technology to combat the spread of the Aedes aegypti mosquito. The project uses data monitoring and digital and biological control methods to reduce hotspots for disease transmission. This initiative serves as a model for other Brazilian municipalities seeking efficient technological solutions in public health.","link":"https://psd.org.br/noticias/curitiba-pr-testa-nova-tecnologia-contra-a-dengue/","categoria":"SCIENCE","lang":"en"},{"fonte":"ANSA Latina","pais":"Brazil","titulo":"Pelé's goal reconstructed with AI","resumo":"The use of artificial intelligence allowed for the detailed recreation of a historic goal by Pelé, offering an unprecedented, immersive experience for fans. Image and video processing technology restored old records, bringing visual quality up to modern standards. The project demonstrates the potential of AI in preserving and celebrating Brazil's sports history.","link":"https://www.ansalatina.com/americalatina/noticia/deportes/2026/07/15/gol-de-o-rei-reconstruido-con-ia_ce7d0f4a-1e33-45bf-93ab-aa94d4698a15.html","categoria":"TRENDING TOPICS","lang":"en"},{"fonte":"WWF Brasil","pais":"Brazil","titulo":"Tradition and technology: indigenous peoples of Rondônia strengthen biodiversity monitoring","resumo":"Indigenous peoples in Rondônia are integrating ancestral knowledge with cutting-edge technological tools to protect the forest and monitor local biodiversity. The use of drones and mapping software aids in monitoring territories against illegal deforestation. This project exemplifies how science and technology can act as indispensable allies in environmental preservation.","link":"https://www.wwf.org.br/nossosconteudos/notas_e_releases/?94921/Tradicao-e-tecnologia-povos-originarios-de-Rondonia-fortalecem-o-monitoramento-da-biodiversidade-com-apoio-do-WWF-Brasil-e-SOS-Amazonia","categoria":"SCIENCE","lang":"en"},{"fonte":"Portal Diário do RN","pais":"Brazil","titulo":"Digital exclusion: technology advances, but brings new barriers for the elderly","resumo":"The rapid advance of daily digitalization has created significant challenges for the elderly population, who face difficulties with access or adaptation. As essential services become exclusively digital, the debate over technological inclusion and accessibility is becoming urgent. It is essential to rethink interface design and public policy to ensure no one is left behind.","link":"https://diariodorn.com.br/exclusao-digital-tecnologia-avanca-mas-traz-novas-barreiras-para-idosos/","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Estadão","pais":"Brazil","titulo":"From semi-automated offsides to CT scan analysis","resumo":"The application of precision technologies in sports, such as semi-automated refereeing systems, has profoundly transformed the dynamics of professional competitions. Beyond on-field applications, technology extends to sports medicine with advanced analysis of athlete health via CT scans. These tools ensure fairer decisions and more rigorous physical monitoring.","link":"https://www.estadao.com.br/economia/do-impedimento-semiautomatico-a-analise-de-tomografias/","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"www.gov.br","pais":"Brazil","titulo":"Researcher appointed as new director of the National Laboratory of Astrophysics","resumo":"The Ministry of Science, Technology and Innovation has appointed a new director for the National Laboratory of Astrophysics, reinforcing its commitment to excellence in Brazilian space research. Female leadership in the sector promises to drive strategic partnerships and new astronomical observation projects. The change marks a stage of scientific renewal with a focus on developing technologies for space exploration.","link":"https://www.gov.br/mcti/pt-br/acompanhe-o-mcti/noticias/noticias-julho-outubro-2026/pesquisadora-e-nova-diretora-do-laboratorio-nacional-de-astronomia","categoria":"SCIENCE","lang":"en"},{"fonte":"Finanças, Câmbio e Investimentos","pais":"Brazil","titulo":"The best US tech stocks to watch, according to Mizuho","resumo":"Mizuho analysts have highlighted the top tech companies in the US market with the highest growth potential for the coming period. The report guides Brazilian investors on the global landscape and the influence of software and hardware giants on the economy. The analysis focuses on companies with disruptive innovations that are driving current industry trends.","link":"https://br.investing.com/news/stock-market-news/as-melhores-acoes-de-tecnologia-dos-eua-para-acompanhar-segundo-a-mizuho-93CH-2001948","categoria":"BUSINESS","lang":"en"},{"fonte":"Open Access Government","pais":"United States","titulo":"Wearable technology: new microneedle patch tracks medicine levels in real time","resumo":"Researchers have developed an innovative microneedle patch that monitors medicine concentration in the blood in real time. This wearable technology promises to revolutionize patient follow-up, allowing for precise, non-invasive dosage adjustments. The breakthrough represents an important milestone for personalized medicine and continuous health monitoring.","link":"https://www.openaccessgovernment.org/wearable-technology-new-microneedle-patch-tracks-medicine-levels-in-real-time/211933/","categoria":"SCIENCE HEALTH","lang":"en"},{"fonte":"Technology Networks","pais":"United States","titulo":"Semaglutide may slow the pace of epigenetic aging","resumo":"Recent studies suggest that the medication semaglutide may positively influence biological markers associated with aging. In addition to its known uses for metabolic control, the substance shows potential to reduce cellular wear and tear. This discovery opens new horizons in research on longevity and the prevention of chronic age-related diseases.","link":"https://www.technologynetworks.com/tn/news/semaglutide-may-slow-the-pace-of-epigenetic-aging-414671","categoria":"SCIENCE","lang":"en"},{"fonte":"the-scientist.com","pais":"United States","titulo":"Early verdicts on Claude Science: faster workflows, but gaps remain","resumo":"The new Claude Science tool is being tested by researchers to accelerate complex data analysis and scientific writing. Although it demonstrates significant productivity gains in repetitive tasks, users still point out limitations in accuracy for highly specialized contexts. The tool's impact depends on continuous refinements to ensure full reliability.","link":"https://www.the-scientist.com/early-verdicts-on-claude-science-faster-workflows-but-gaps-remain-74745","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"StartSe","pais":"United States","titulo":"Almost half of the big tech deals today are about one thing: AI","resumo":"The current technology market is heavily focused on the artificial intelligence race, which dominates half of all major investments and mergers. Companies are seeking to integrate advanced models into their products to maintain global competitiveness and meet the demand for automation. This trend is redefining strategic priorities and capital allocation across the sector.","link":"https://www.startse.com/artigos/quase-metade-dos-grandes-negocios-de-tecnologia-hoje-e-sobre-uma-coisa-ia","categoria":"BUSINESS","lang":"en"},{"fonte":"UConn Today","pais":"United States","titulo":"US National Science Foundation announces transformational award to Connecticut's quantum tech sector","resumo":"The NSF has awarded a strategic investment to boost quantum research and infrastructure in the state of Connecticut. The goal is to strengthen the US position at the forefront of quantum computing and create a robust innovation ecosystem. This move aims to accelerate scientific discoveries that will transform security and data processing.","link":"https://today.uconn.edu/2026/07/u-s-national-science-foundation-announces-transformational-award-to-connecticuts-quantum-tech-sector/","categoria":"SCIENCE","lang":"en"},{"fonte":"WVU Today","pais":"United States","titulo":"Powering up economies: WVU, Pitt and Carnegie Mellon to receive $320M for technology, AI and infrastructure","resumo":"A consortium of universities has received a massive $320 million investment to boost energy security and resilience through technology. The project focuses on applied AI development, modern infrastructure, and the creation of new skilled jobs. The initiative aims to revitalize the regional economy through scientific innovation.","link":"https://wvutoday.wvu.edu/stories/2026/07/14/powering-up-economies-wvu-with-pitt-and-carnegie-mellon-will-recharge-energy-security-and-resilience-with-320m-for-new-technology-ai-infrastructure-and-jobs","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"U.S. National Science Foundation (.gov)","pais":"United States","titulo":"NSF awards 12 new regional innovation engines to fuel research, jobs and economic growth","resumo":"The National Science Foundation has announced the creation of 12 new regional innovation hubs distributed across the country. These engines are designed to connect cutting-edge academic research with economic development and local job creation. The initiative reflects a national strategy to decentralize technological advancement in the United States.","link":"https://www.nsf.gov/news/nsf-awards-12-new-regional-innovation-engines-fuel-research","categoria":"BUSINESS","lang":"en"},{"fonte":"Business Wire","pais":"United States","titulo":"Neuraptive Therapeutics Licenses Innovative Bioresorbable Nerve Stimulation Technology","resumo":"The company has licensed cutting-edge nerve stimulation technology from Washington Uni   const searchInput = document.getElementById('search');
  const langSelect = document.getElementById('lang');
  const countrySelect = document.getElementById('country');
  const categorySelect = document.getElementById('category');
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');
  const clearBtn = document.getElementById('clear-filters');

  // Utility de escape HTML simples para prevenir injections em propriedades sem tratamento
  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function populateSelects() {
    const lang = langSelect.value;
    const currentData = data.filter(d => d.lang === lang);

    const countries = [...new Set(currentData.map(d => d.pais))].filter(Boolean).sort();
    const categories = [...new Set(currentData.map(d => d.categoria))].filter(Boolean).sort();

    const currentCountry = countrySelect.value;
    const currentCategory = categorySelect.value;

    countrySelect.innerHTML = '<option value="all">Todos / All</option>';
    categorySelect.innerHTML = '<option value="all">Todas / All</option>';

    countries.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      countrySelect.appendChild(opt);
    });

    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      categorySelect.appendChild(opt);
    });

    if (currentCountry !== 'all' && countries.includes(currentCountry)) {
      countrySelect.value = currentCountry;
    }
    if (currentCategory !== 'all' && categories.includes(currentCategory)) {
      categorySelect.value = currentCategory;
    }
  }

  function render(items) {
    countEl.textContent = `${items.length} notícia${items.length !== 1 ? 's' : ''}`;
    
    grid.innerHTML = items.map(item => {
      const readMoreTxt = item.lang === 'pt' ? 'Ler mais' : 'Read more';
      
      const bulletList = (item.resumo || '').split('\n')
        .filter(Boolean)
        .map(line => `<li>${esc(line.replace(/^- /, ''))}</li>`)
        .join('');

      return `
        <div class="news-card">
          <div class="card-meta">
            <span class="category">${esc(item.categoria) || 'Geral'}</span>
            <span class="country">${esc(item.pais) || 'Global'}</span>
          </div>
          <h3 class="card-title">${esc(item.titulo)}</h3>
          <div class="card-summary">
            <ul>${bulletList}</ul>
          </div>
          <div class="card-footer">
            <a href="${esc(item.link)}" target="_blank" class="read-more">
              ${readMoreTxt} &rarr;
            </a>
            <span class="source">${esc(item.fonte)}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterData() {
    const query = searchInput.value.toLowerCase();
    const lang = langSelect.value;
    const country = countrySelect.value;
    const category = categorySelect.value;

    const filtered = data.filter(item => {
      const matchLang = item.lang === lang;
      const matchCountry = country === 'all' || item.pais === country;
      const matchCategory = category === 'all' || item.categoria === category;
      const matchSearch = query === '' 
        || (item.titulo || '').toLowerCase().includes(query)
        || (item.resumo || '').toLowerCase().includes(query)
        || (item.fonte || '').toLowerCase().includes(query);

      return matchLang && matchCountry && matchCategory && matchSearch;
    });

    render(filtered);
  }

  // Binds
  searchInput.addEventListener('input', filterData);
  langSelect.addEventListener('change', () => {
    populateSelects();
    filterData();
  });
  countrySelect.addEventListener('change', filterData);
  categorySelect.addEventListener('change', filterData);
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    countrySelect.value = 'all';
    categorySelect.value = 'all';
    filterData();
  });

  // Initialization
  populateSelects();
  filterData(); // trigger first render
</script>
</body>
</html>
