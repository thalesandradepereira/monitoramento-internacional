<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - International Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0B0F19;
      --bg-panel: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #E2E8F0;
      --text-muted: #94A3B8;
      --accent: #D4AF37;
      --accent-hover: #FDE047;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.15), transparent 400px),
                        radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.05), transparent 400px);
    }
    header {
      padding: 1.5rem 5%;
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo-img {
      height: 48px; /* Altura ajustável do logo */
      width: auto;
      object-fit: contain;
      border-radius: 8px; /* Caso não seja transparente */
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .logo-text span {
      color: var(--accent);
    }
    .date-badge {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      color: var(--accent);
      font-weight: 600;
    }
    .container {
      padding: 2rem 5%;
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }
    .filters {
      flex: 0 0 300px;
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 6rem;
    }
    .filter-group {
      margin-bottom: 1.5rem;
    }
    .filter-group label {
      display: block;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
    }
    select option {
      background: var(--bg-main);
      color: var(--text-main);
    }
    .results {
      flex: 1;
    }
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .results-count {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .news-card {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .news-card:hover {
      transform: translateY(-4px);
      border-color: rgba(212, 175, 55, 0.5);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }
    .category {
      color: var(--accent);
    }
    .country {
      color: var(--text-muted);
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.4;
      margin: 0 0 1rem 0;
      color: #fff;
    }
    .card-summary {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-muted);
      flex: 1;
    }
    .card-summary ul {
      margin: 0;
      padding-left: 1.2rem;
    }
    .card-summary li {
      margin-bottom: 0.25rem;
    }
    .card-footer {
      margin-top: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--glass-border);
      padding-top: 1rem;
    }
    .read-more {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .read-more:hover {
      color: var(--accent-hover);
    }
    .source {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .btn-clear {
      width: 100%;
      padding: 0.75rem 1rem;
      margin-top: 0.5rem;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-clear:hover {
      background: var(--accent);
      color: var(--bg-main);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }
    /* Simple CSS reset/scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: var(--bg-panel); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .filters {
        flex: none;
        width: 100%;
        position: static;
        box-sizing: border-box;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-container">
    <img src="logo.jpg" alt="TAP Logo" class="logo-img" onerror="this.style.display='none'">
    <div class="logo-text">Monitoramento<span>Internacional</span></div>
  </div>
  <div class="date-badge">15/07/2026</div>
</header>

<div class="container">
  <aside class="filters">
    <div class="filter-group">
      <label for="search">Busca / Search</label>
      <input type="text" id="search" placeholder="Palavra-chave...">
    </div>
    
    <div class="filter-group">
      <label for="lang">Idioma / Language</label>
      <select id="lang">
        <option value="pt">Português (PT-BR)</option>
        <option value="en">English (US)</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="country">País / Country</label>
      <select id="country">
        <option value="all">Todos / All</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="category">Categoria / Category</label>
      <select id="category">
        <option value="all">Todas / All</option>
      </select>
    </div>
    
    <button id="clear-filters" class="btn-clear">Limpar / Clear</button>
  </aside>

  <main class="results">
    <div class="results-header">
      <h2 style="margin: 0; font-size: 1.5rem; color: #fff;">Resultados</h2>
      <span class="results-count" id="count">0 notícias</span>
    </div>
    <div class="news-grid" id="grid">
      <!-- Injected by JS -->
    </div>
  </main>
</div>

<script>
  // Injeta os dados originais no frontend
  const data = [{"fonte":"Cyber Security Brazil","pais":"Brasil","titulo":"Tecnologia brasileira pode levar tradução de Libras a hospitais, lojas e restaurantes","resumo":"Uma nova solução tecnológica desenvolvida no Brasil promete democratizar o acesso à comunicação para surdos em espaços públicos. Ao integrar tradução automática para Libras, a ferramenta facilita a inclusão em ambientes essenciais como hospitais e estabelecimentos comerciais. A iniciativa representa um avanço significativo na acessibilidade digital e no suporte à comunidade surda no país.","link":"https://www.cybersecbrazil.com.br/post/tecnologia-brasileira-pode-levar-tradu%C3%A7%C3%A3o-de-libras-a-hospitais-lojas-e-restaurantes","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Economia SC","pais":"Brasil","titulo":"Quando a IA vira operação no varejo","resumo":"A inteligência artificial deixou de ser apenas um conceito futurista para se tornar o motor principal das operações no setor de varejo. Empresas utilizam algoritmos para otimizar estoques, personalizar a experiência de compra e prever demandas de consumo em tempo real. Essa transformação digital redefine a eficiência operacional e a competitividade das marcas no mercado atual.","link":"https://economiasc.com/2026/07/15/quando-a-ia-vira-operacao-no-varejo/","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Valor Econômico","pais":"Brasil","titulo":"Aposta alta nas empresas de IA traz risco para a economia mundial","resumo":"O investimento massivo e acelerado em startups e gigantes da inteligência artificial gera preocupações sobre uma possível bolha financeira. Economistas alertam que a alta concentração de capital pode desestabilizar setores tradicionais se as expectativas de retorno não se concretizarem. O cenário exige cautela e uma análise crítica sobre a sustentabilidade desse crescimento tecnológico global.","link":"https://valor.globo.com/opiniao/coluna/aposta-alta-nas-empresas-de-ia-traz-risco-para-economia-mundial.ghtml","categoria":"ECONOMIA","lang":"pt"},{"fonte":"O Estado CE","pais":"Brasil","titulo":"Ceará aprova nova legislação e reforça protagonismo na economia digital","resumo":"O estado do Ceará consolidou seu papel estratégico no cenário tecnológico nacional ao aprovar um novo marco regulatório para a economia digital. A legislação visa atrair investimentos, fomentar startups e capacitar talentos locais para os desafios da inovação. Com essa medida, a região busca se tornar um hub de referência para o desenvolvimento de soluções tecnológicas no Brasil.","link":"https://oestadoce.com.br/economia/ceara-aprova-nova-legislacao-e-reforca-protagonismo-na-economia-digital-2/","categoria":"POLÍTICA","lang":"pt"},{"fonte":"O GLOBO","pais":"Brasil","titulo":"Apple libera iOS 27 para testes: veja como baixar o sistema operacional e conhecer a nova Siri AI","resumo":"A Apple iniciou o período de testes do iOS 27, trazendo como grande destaque uma Siri profundamente integrada à inteligência artificial generativa. A atualização promete revolucionar a interação do usuário com o dispositivo, tornando-a mais natural e proativa em diversas tarefas. Desenvolvedores e entusiastas já podem explorar as novas funcionalidades deste sistema operacional inovador.","link":"https://oglobo.globo.com/economia/tecnologia/noticia/2026/07/15/apple-libera-ios-27-para-testes-veja-como-baixar-o-sistema-operacional-e-conhecer-a-nova-siri-ai.ghtml","categoria":"LANÇAMENTO","lang":"pt"},{"fonte":"WWF Brasil","pais":"Brasil","titulo":"Tradição e tecnologia: povos originários de Rondônia fortalecem o monitoramento da biodiversidade","resumo":"Povos indígenas de Rondônia estão utilizando ferramentas digitais avançadas para proteger seus territórios e monitorar a fauna e flora local. O projeto alia o conhecimento ancestral de preservação ambiental com o uso de sensores e geolocalização de ponta. Essa fusão entre tradição e tecnologia amplia a eficácia no combate ao desmatamento e na proteção dos recursos naturais.","link":"https://www.wwf.org.br/nossosconteudos/notas_e_releases/?94921/Tradicao-e-tecnologia-povos-originarios-de-Rondonia-fortalecem-o-monitoramento-da-biodiversidade-com-apoio-do-WWF-Brasil-e-SOS-Amazonia","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"www.gov.br","pais":"Brasil","titulo":"Pesquisadora é nova diretora do Laboratório Nacional de Astronomia — Ministério da Ciência, Tecnologia e Inovação","resumo":"O Ministério da Ciência, Tecnologia e Inovação anunciou uma nova diretora para o Laboratório Nacional de Astronomia, reforçando a representatividade feminina na liderança científica. A nomeação destaca o compromisso do Brasil com a pesquisa espacial e o desenvolvimento astronômico de alto nível. Espera-se que a gestão impulsione novos projetos e parcerias internacionais em observação do universo.","link":"https://www.gov.br/mcti/pt-br/acompanhe-o-mcti/noticias/noticias-julho-outubro-2026/pesquisadora-e-nova-diretora-do-laboratorio-nacional-de-astronomia","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Comunica UFU","pais":"Brasil","titulo":"Saiba como será a participação de pesquisadores da UFU no maior evento científico da América Latina","resumo":"Pesquisadores da Universidade Federal de Uberlândia (UFU) preparam uma participação expressiva no maior evento de ciência da América Latina. O grupo apresentará avanços em estudos que abrangem diversas áreas, desde sustentabilidade até novas tecnologias computacionais. O encontro é um marco importante para a divulgação de descobertas que impactam a sociedade brasileira e a ciência global.","link":"https://comunica.ufu.br/noticias/2026/07/saiba-como-sera-participacao-de-pesquisadores-da-ufu-no-maior-evento-cientifico-da","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Bloomberg.com","pais":"Estados Unidos","titulo":"A IA turbinou o efeito riqueza, basta perguntar aos milionários da Micron","resumo":"O avanço vertiginoso da inteligência artificial gerou um impacto financeiro direto no mercado de ações, transformando funcionários e investidores da Micron em novos milionários. Esse fenômeno demonstra como empresas de semicondutores estão sendo catapultadas pelo setor de IA. O impacto reflete uma mudança significativa na distribuição de riqueza impulsionada por inovações tecnológicas emergentes.","link":"https://www.bloomberg.com/news/articles/2026-07-15/the-ai-boom-is-changing-the-economy-and-minting-new-millionaires-overnight?srnd=phx-businessweek","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Technology Networks","pais":"Estados Unidos","titulo":"Semaglutida pode reduzir o ritmo do envelhecimento epigenético","resumo":"Estudos recentes sugerem que o medicamento semaglutida, popular para controle de peso e diabetes, pode oferecer benefícios adicionais na desaceleração do envelhecimento biológico. A descoberta impacta o campo da longevidade ao mostrar que intervenções farmacológicas influenciam marcadores epigenéticos humanos. Essa nova aplicação científica abre caminhos promissores para tratamentos preventivos contra o declínio celular.","link":"https://www.technologynetworks.com/tn/news/semaglutide-may-slow-the-pace-of-epigenetic-aging-414671","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"ScienceDaily","pais":"Estados Unidos","titulo":"NASA seleciona 41 tecnologias espaciais para futuras explorações da Lua e Marte","resumo":"A NASA anunciou o investimento em 41 tecnologias inovadoras voltadas para a viabilização de missões de longo prazo no espaço profundo. Esses projetos visam superar desafios logísticos e operacionais necessários para a colonização e exploração científica da Lua e do planeta Marte. A iniciativa fortalece a indústria aeroespacial ao promover pesquisas de ponta para desafios interplanetários.","link":"https://www.sciencedaily.com/releases/2026/07/260713084855.htm","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"the-scientist.com","pais":"Estados Unidos","titulo":"Vereditos iniciais sobre o Claude Science: fluxos de trabalho mais rápidos, mas lacunas persistem","resumo":"A ferramenta Claude Science tem demonstrado capacidade para acelerar drasticamente fluxos de trabalho acadêmicos e de pesquisa através de automação inteligente. Apesar do ganho de eficiência, usuários apontam limitações técnicas que ainda exigem supervisão humana para garantir precisão. O impacto reflete o equilíbrio entre a utilidade da IA generativa e a necessidade de rigor científico rigoroso.","link":"https://www.the-scientist.com/early-verdicts-on-claude-science-faster-workflows-but-gaps-remain-74745","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Business Wire","pais":"Estados Unidos","titulo":"Neuraptive Therapeutics licencia tecnologia inovadora de estimulação nervosa biorreabsorvível","resumo":"A parceria entre a Neuraptive Therapeutics e a Universidade de Washington introduz uma tecnologia de estimulação nervosa que se dissolve naturalmente no corpo. Esta inovação promete revolucionar tratamentos de reparo neural, eliminando a necessidade de cirurgias adicionais para remover dispositivos. O avanço representa um marco significativo na bioengenharia médica voltada para a recuperação de pacientes.","link":"https://www.businesswire.com/news/home/20260714158724/pt","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"UConn Today","pais":"Estados Unidos","titulo":"National Science Foundation anuncia prêmio transformador para o setor de tecnologia quântica de Connecticut","resumo":"O investimento da NSF em Connecticut visa consolidar o estado como um hub global para o desenvolvimento e aplicação de tecnologias quânticas. Este aporte financeiro busca acelerar a pesquisa de base e facilitar a transição de protótipos complexos para aplicações industriais práticas. A medida deve impulsionar significativamente a competitividade tecnológica dos Estados Unidos no cenário quântico mundial.","link":"https://today.uconn.edu/2026/07/u-s-national-science-foundation-announces-transformational-award-to-connecticuts-quantum-tech-sector/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"U.S. National Science Foundation (.gov)","pais":"Estados Unidos","titulo":"NSF concede 12 novos Motores de Inovação Regionais para fomentar pesquisa, empregos e crescimento econômico","resumo":"A National Science Foundation selecionou doze novas regiões nos Estados Unidos para receber investimentos estratégicos voltados ao ecossistema de inovação local. O objetivo central é integrar pesquisa acadêmica, parcerias público-privadas e a criação de postos de trabalho em setores emergentes de alta tecnologia. Esse movimento visa descentralizar a força econômica científica do país para um desenvolvimento mais uniforme.","link":"https://www.nsf.gov/news/nsf-awards-12-new-regional-innovation-engines-fuel-research","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Aeon","pais":"Estados Unidos","titulo":"O Vale do Silício tem um problema com a ficção científica","resumo":"Uma análise crítica sugere que o Vale do Silício está permitindo que tropos de ficção científica moldem perigosamente as visões de longo prazo para o desenvolvimento tecnológico. Essa tendência pode criar expectativas irreais e desviar investimentos de problemas práticos e urgentes da sociedade contemporânea. O debate aponta para a necessidade de um foco maior em resultados tangíveis versus projeções futuristas especulativas.","link":"https://aeon.co/essays/silicon-valley-has-a-science-fiction-problem","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"Zonebourse","pais":"França","titulo":"Intel escolhe a tecnologia EUV de alta abertura numérica da ASML para a produção de seus processadores","resumo":"A Intel implementou a avançada tecnologia de litografia EUV de alta abertura numérica fornecida pela ASML. Essa integração visa otimizar a fabricação de seus processadores de última geração. O movimento marca um avanço significativo na precisão e eficiência do processo de produção de semicondutores em escala global.","link":"https://www.zonebourse.com/actualite-bourse/intel-choisit-la-technologie-euv-a-haute-ouverture-numerique-d-asml-pour-la-production-de-ses-proces-ce7f5eddd18cf522","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Finyear","pais":"França","titulo":"NeoCem arrecada 17 milhões de euros para sua tecnologia de baixo carbono","resumo":"A startup NeoCem levantou um aporte financeiro expressivo de 17 milhões de euros para impulsionar suas inovações voltadas ao desenvolvimento de materiais com baixa emissão de carbono. O investimento reforça o compromisso do setor industrial francês com práticas de sustentabilidade e soluções tecnológicas verdes. A empresa busca escalar a produção para mitigar o impacto ambiental da construção civil.","link":"https://finyear.com/neocem-leve-17-me-pour-sa-technologie-bas-carbone/","categoria":"SUSTENTABILIDADE","lang":"pt"},{"fonte":"journaldunet.com","pais":"França","titulo":"O paradoxo da IA: a tecnologia mais inteligente que navega sem rumo","resumo":"O artigo explora o dilema atual da inteligência artificial, que, apesar de demonstrar capacidades cognitivas surpreendentes, enfrenta dificuldades em processos de decisão fundamentados. A análise aponta para a falta de diretrizes claras e metas estratégicas sólidas que acompanhem a rápida evolução do setor. Esse fenômeno coloca em xeque a autonomia e a previsibilidade da tecnologia em ambientes críticos.","link":"https://www.journaldunet.com/intelligence-artificielle/1552673-le-paradoxe-de-l-ia-la-technologie-la-plus-intelligente-navigue-a-vue/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"ZDNET","pais":"França","titulo":"Samsung revela \"Flex Titanium\", sua nova tecnologia de tela dobrável","resumo":"A Samsung apresentou oficialmente o 'Flex Titanium', sua mais recente inovação em displays flexíveis voltada para o mercado de dispositivos móveis. A tecnologia promete maior durabilidade e resistência, superando limitações encontradas em gerações anteriores de telas dobráveis. Este lançamento reforça a liderança da empresa no segmento de hardware inovador para smartphones.","link":"https://www.zdnet.fr/actualites/samsung-devoile-flex-titanium-sa-nouvelle-technologie-decran-pliable-498614.htm","categoria":"LANÇAMENTO","lang":"pt"},{"fonte":"Les Echos","pais":"França","titulo":"Belén Garijo, CEO da Sanofi: \"A inteligência artificial não é mais uma tecnologia do futuro. Ela já está aqui, e é isso que muda tudo\"","resumo":"A CEO da Sanofi, Belén Garijo, destaca a integração profunda da inteligência artificial na rotina da gigante farmacêutica. Segundo a executiva, a IA já atua como um pilar fundamental na pesquisa e desenvolvimento de medicamentos modernos. A declaração marca uma mudança na percepção do setor de saúde sobre a adoção de tecnologias disruptivas.","link":"https://investir.lesechos.fr/marches-indices/opinions/belen-garijo-directrice-generale-de-sanofi-lintelligence-artificielle-nest-plus-une-technologie-davenir-elle-est-deja-la-et-cest-ce-qui-change-tout-2242316","categoria":"SAÚDE","lang":"pt"},{"fonte":"Retail Technology Innovation Hub","pais":"França","titulo":"A varejista de artigos esportivos Decathlon torna-se a cliente com maior implantação global da empresa de tecnologia de varejo Vusion","resumo":"A Decathlon consolidou uma parceria estratégica com a Vusion, tornando-se sua maior cliente em escala mundial para soluções tecnológicas no varejo. A implementação envolve a digitalização avançada de etiquetas e sistemas integrados nas lojas da rede. Essa colaboração visa transformar a experiência do consumidor e otimizar a gestão operacional em todos os pontos de venda.","link":"https://retailtechinnovationhub.com/home/2026/7/15/sporting-goods-retailer-decathlon-becomes-retail-technology-firm-vusions-most-globally-deployed-customer","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Nice Premium","pais":"França","titulo":"IA e mobilidade verde: como a tecnologia já está transformando a Côte d’Azur","resumo":"A região da Côte d’Azur, na França, tem sido palco de inovações que unem inteligência artificial e soluções de mobilidade sustentável. Projetos locais utilizam dados e algoritmos para otimizar o transporte público e reduzir a pegada de carbono urbana. Esse movimento transforma a área em um polo de referência para o desenvolvimento de cidades inteligentes no continente europeu.","link":"https://www.nicepremium.fr/technologie/ia-et-mobilite-verte-comment-la-technologie-transforme-deja-la-cote-dazur/","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"Boursorama","pais":"França","titulo":"Defiance lança o primeiro ETF europeu dedicado à fotônica","resumo":"A Defiance introduziu no mercado europeu o primeiro fundo negociado em bolsa (ETF) focado exclusivamente no setor de fotônica. A iniciativa reflete o crescente interesse dos investidores em tecnologias baseadas na manipulação da luz, essenciais para avanços em computação quântica e telecomunicações. O produto financeiro democratiza o acesso a empresas líderes em inovações ópticas.","link":"https://www.boursorama.com/bourse/actualites-amp/defiance-lance-le-premier-etf-europeen-dedie-a-la-photonique-f393bbaa3b8c7dd3108824ecc353cbc1","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Fleet News","pais":"Inglaterra","titulo":"Como frotas líderes estão usando a tecnologia para melhorar a eficiência e a segurança","resumo":"Empresas de transporte estão implementando soluções tecnológicas avançadas para otimizar operações logísticas. A adoção dessas ferramentas visa reduzir custos operacionais e elevar os padrões de segurança rodoviária. O foco principal é a análise de dados em tempo real para tomada de decisões estratégicas.","link":"https://www.fleetnews.co.uk/features/how-leading-fleets-are-using-technology-to-improve-efficiency-and-safety","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Research Information","pais":"Inglaterra","titulo":"Por que a Annual Reviews comprou a Underline Science","resumo":"A aquisição da Underline Science pela Annual Reviews representa um movimento estratégico no setor de comunicação científica. O objetivo é integrar plataformas de conferências digitais ao acervo acadêmico existente, ampliando a acessibilidade ao conhecimento. Esta fusão promete transformar como pesquisadores interagem com apresentações e dados técnicos.","link":"https://www.researchinformation.info/analysis-opinion/why-annual-reviews-bought-underline-science/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Open Access Government","pais":"Inglaterra","titulo":"Tecnologia vestível: novo adesivo de microagulhas rastreia níveis de medicamentos em tempo real","resumo":"Cientistas desenvolveram um adesivo inovador com microagulhas capaz de monitorar dosagens de fármacos diretamente no organismo. A tecnologia vestível oferece um método menos invasivo para pacientes que necessitam de controle rigoroso de tratamentos. O avanço promete revolucionar a medicina personalizada e a gestão de doenças crônicas.","link":"https://www.openaccessgovernment.org/wearable-technology-new-microneedle-patch-tracks-medicine-levels-in-real-time/211933/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Vodafone","pais":"Inglaterra","titulo":"Quem controla a tecnologia da Europa e por que isso importa?","resumo":"O debate sobre a soberania tecnológica europeia ganha força frente à influência de gigantes globais. O controle de infraestruturas críticas e dados digitais tornou-se uma questão central de segurança e independência econômica. A discussão aponta para a necessidade de políticas robustas que protejam o ecossistema tecnológico do continente.","link":"https://www.vodafone.com/news/newsroom/public-policy/who-controls-europes-technology-and-why-it-matters","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"EDP24","pais":"Inglaterra","titulo":"Empresa de Norfolk que transforma emissões em materiais de construção nomeia novo diretor","resumo":"Uma startup sediada em Norfolk, focada em capturar emissões para criar insumos construtivos, busca escalar sua operação com uma nova liderança. A inovação ambiental visa descarbonizar o setor de construção civil, transformando poluição em ativos físicos. O movimento sinaliza o crescimento das tecnologias de economia circular no Reino Unido.","link":"https://www.edp24.co.uk/news/26268529.o-c-o-technology-uk-appoints-new-aggregates-director/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Retail Technology Innovation Hub","pais":"Inglaterra","titulo":"Saque certeiro! A tecnologia da Boxbar Tech estreia no autosserviço de bares no torneio de Wimbledon 2026","resumo":"O tradicional torneio de Wimbledon está adotando a tecnologia de autoatendimento da Boxbar para modernizar o serviço de bebidas. A solução visa reduzir tempos de espera dos espectadores, integrando automação de ponta ao evento esportivo de elite. Esta implementação marca um passo importante na digitalização da experiência do fã nos estádios ingleses.","link":"https://retailtechinnovationhub.com/home/2026/7/14/nice-serve-boxbar-tech-powers-self-serve-bar-technology-first-at-2026-wimbledon-championships","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"TU Lankide","pais":"Espanha","titulo":"Quside e Ikerlan aplicam tecnologia quântica para blindar a cibersegurança de setores críticos","resumo":"As empresas Quside e Ikerlan estabeleceram uma parceria estratégica para integrar tecnologias quânticas em infraestruturas críticas. A iniciativa visa aumentar significativamente a proteção contra ciberameaças avançadas. Este avanço representa um marco importante para a segurança digital na Espanha ao adotar soluções de última geração.","link":"https://www.tulankide.com/es/quside-e-ikerlan-aplican-tecnologia-cuantica-para-blindar-la-ciberseguridad-de-sectores-criticos","categoria":"CIBERSEGURANÇA","lang":"pt"},{"fonte":"La Razón","pais":"Espanha","titulo":"Titânio na tela? A tecnologia inovadora da Samsung para tornar seus novos dobráveis mais resistentes","resumo":"A Samsung está implementando uma nova tecnologia de materiais em seus dispositivos dobráveis com foco na durabilidade. O uso de titânio promete reforçar a estrutura e a resistência da tela contra impactos cotidianos. A inovação busca solucionar os principais desafios técnicos enfrentados por aparelhos com design dobrável atualmente.","link":"https://www.larazon.es/tecnologia-consumo/samsung-galaxy-z/titanio-pantallala-innovadora-tecnologia-samsung-sus-nuevos-plegables-sean-resistentes_202607156a573ea70500ab412c95f700.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Interempresas Media","pais":"Espanha","titulo":"STYLPRO expande o uso de tecnologia LED com um painel corporal para o cuidado integral da pele","resumo":"A marca STYLPRO lançou um inovador painel corporal que utiliza a tecnologia LED para tratamentos dermatológicos. O dispositivo foi projetado para oferecer cuidados profissionais de forma prática e acessível aos usuários. A novidade reflete a tendência crescente de integração de soluções tecnológicas no setor de beleza e bem-estar.","link":"https://www.interempresas.net/Peluqueria/658628-STYLPRO-amplia-uso-de-tecnologia-LED-con-panel-corporal-para-cuidado-integral-de-piel.html","categoria":"INOVAÇÃO","lang":"pt"},{"fonte":"telefonica.com","pais":"Espanha","titulo":"IA está redefinindo como construímos produtos: o novo limite não é mais a tecnologia, somos nós","resumo":"O artigo explora como a Inteligência Artificial está transformando os processos de criação e desenvolvimento de produtos modernos. O autor argumenta que a tecnologia superou as barreiras técnicas, transferindo o desafio para a adaptação humana. O foco atual reside na nossa capacidade de explorar o potencial ilimitado desta ferramenta.","link":"https://www.telefonica.com/en/communication-room/blog/ia-new-product-development-limit-people/","categoria":"INTELIGÊNCIA ARTIFICIAL","lang":"pt"},{"fonte":"Funds Society","pais":"Espanha","titulo":"A oportunidade em IA passou do treinamento para a inferência, e as empresas que se beneficiam são distintas","resumo":"Especialistas analisam a mudança de paradigma no mercado de Inteligência Artificial, saindo da fase de treinamento de modelos para a etapa de inferência. Essa transição altera a dinâmica financeira e as oportunidades de mercado para diferentes companhias tecnológicas. O cenário atual exige uma nova estratégia para capturar o valor gerado por esta fase.","link":"https://www.fundssociety.com/es/noticias/mercados/jsaf25-la-oportunidad-en-ia-ha-pasado-del-entrenamiento-a-la-inferencia-y-las-companias-que-se-benefician-son-distintas/","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Radio Faro del Noroeste","pais":"Espanha","titulo":"A ciência das Canárias desenvolve soluções para descarbonizar o transporte marítimo interinsular","resumo":"Pesquisadores das Ilhas Canárias estão liderando o desenvolvimento de tecnologias voltadas à sustentabilidade no transporte marítimo. O projeto foca em reduzir drasticamente as emissões de carbono entre as ilhas da região. Esta iniciativa científica destaca o compromisso local com a transição energética e o combate às mudanças climáticas.","link":"https://www.radiofarodelnoroeste.es/secciones/sociedad/item/39248-la-ciencia-canaria-desarrolla-soluciones-para-descarbonizar-el-transporte-maritimo-interinsular","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"La Voz de Galicia","pais":"Espanha","titulo":"A empresa Celtarys apresenta uma tecnologia para acelerar o desenvolvimento de fármacos","resumo":"A farmacêutica Celtarys revelou uma nova plataforma tecnológica capaz de agilizar significativamente a criação de novos medicamentos. A ferramenta promete reduzir o tempo e os custos envolvidos em fases críticas da pesquisa científica. O avanço tem potencial para impactar positivamente o mercado de saúde e a eficácia clínica.","link":"https://www.lavozdegalicia.es/amp/noticia/santiago/santiago/2026/07/15/empresa-celtarys-presenta-tecnologia-acelerar-desarrollo-farmacos/0003_202607S15C2994.htm?utm_campaign=amp","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"ciencia.gob.es","pais":"Espanha","titulo":"O Ministério da Ciência, Inovação e Universidades concede os Prêmios Nacionais de Inovação e Design 2026","resumo":"O governo espanhol anunciou os vencedores dos Prêmios Nacionais de Inovação e Design, reconhecendo o talento em setores estratégicos. Esta premiação visa estimular a excelência acadêmica e a implementação de projetos inovadores na indústria nacional. O reconhecimento serve como um impulsionador para o ecossistema de ciência e tecnologia do país.","link":"https://www.ciencia.gob.es/Noticias/2026/julio/Morant-llamada-premios-nacionales-innovacion-diseno-2026.html","categoria":"INOVAÇÃO","lang":"pt"},{"fonte":"PresseBox","pais":"Alemanha","titulo":"Subsídio de pesquisa: O que o departamento de avaliação e a auditoria fiscal realmente verificam","resumo":"Este artigo detalha os critérios de auditoria e verificação aplicados pelo fisco alemão em pedidos de subsídios para pesquisa e desenvolvimento. A análise é fundamental para empresas que buscam garantir conformidade legal e evitar problemas em revisões fiscais durante o uso de incentivos governamentais.","link":"https://www.pressebox.de/pressemitteilung/steinbeis-technologie-innovationsberatung-gmbh/forschungszulage-was-veranlagungsstelle-und-betriebsprfung-wirklich-prfen/boxid/1305221","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Caschys Blog","pais":"Alemanha","titulo":"Samsung apresenta nova tecnologia Flex Titanium para telas dobráveis","resumo":"A Samsung introduziu uma inovação em materiais com a tecnologia Flex Titanium, focada em aumentar a durabilidade e a resistência de telas dobráveis. Esse avanço técnico promete revolucionar o mercado de dispositivos móveis premium ao reduzir o desgaste causado por dobras repetitivas.","link":"https://stadt-bremerhaven.de/samsung-zeigt-neue-flex-titanium-technologie-fuer-faltbare-displays/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Logistik Heute","pais":"Alemanha","titulo":"Jungheinrich expande capacidades em IA Física","resumo":"A Jungheinrich está fortalecendo sua posição no setor de logística inteligente ao investir e expandir suas competências em Inteligência Artificial Física. A estratégia visa integrar sistemas autônomos mais eficientes em ambientes industriais, otimizando fluxos de trabalho e a interação entre humanos e máquinas.","link":"https://logistik-heute.de/fachmagazin/fachartikel/markt-news-beteiligung-jungheinrich-verstaerkt-sich-bei-physical-ai-273856.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"kpmg.com","pais":"Alemanha","titulo":"IA Generativa na economia alemã 2026 - Relatório do setor de construção civil","resumo":"O relatório projeta o impacto transformador da Inteligência Artificial Generativa no setor de construção alemão até 2026. O estudo aborda como a tecnologia otimizará processos de planejamento, redução de custos operacionais e a eficiência produtiva em um dos mercados mais tradicionais da indústria da Alemanha.","link":"https://kpmg.com/de/de/themen/digital-transformation/kuenstliche-intelligenz/studie-generative-ki-in-der-deutschen-wirtschaft-2026/branchenreport-bauwirtschaft.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"日本経済新聞","pais":"Japão","titulo":"Organização de Promoção GX firma acordo com a Universidade de Ciências de Tóquio para apoio a startups e capacitação","resumo":"A Organização de Promoção GX estabeleceu uma parceria estratégica com a Universidade de Ciências de Tóquio para fomentar o ecossistema de startups. A iniciativa foca em acelerar a inovação tecnológica e promover a formação de talentos especializados. Este movimento visa fortalecer a competitividade do Japão no setor de tecnologias verdes e transição energética.","link":"https://www.nikkei.com/article/DGXZQOUA14AFU0U6A710C2000000/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"毎日新聞","pais":"Japão","titulo":"LegalTech lança fluxo de trabalho de compartilhamento de documentos para disputas técnicas no setor de semicondutores","resumo":"A empresa LegalTech introduziu uma solução voltada a empresas de semicondutores para gerenciar disputas técnicas complexas através da sua plataforma VDR. O sistema permite um compartilhamento de dados seguro e eficiente entre partes interessadas em litígios de propriedade intelectual. A tecnologia visa agilizar processos jurídicos em um dos setores mais estratégicos da economia japonesa.","link":"https://mainichi.jp/articles/20260715/pr2/00m/020/913000c","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Yahoo!ニュース","pais":"Japão","titulo":"Terceira sessão técnica da Super Formula reúne recorde de 13 empresas no Fuji Speedway para discutir SDVs","resumo":"A terceira sessão técnica da Super Formula focou em Veículos Definidos por Software (SDV), atraindo um recorde de 13 empresas do setor automotivo e de TI. O encontro no Fuji Speedway destacou o papel da integração de software na evolução dos veículos de alta performance. O evento reforça a tendência de convergência entre automobilismo e tecnologia digital no Japão.","link":"https://news.yahoo.co.jp/articles/a04d18628cf3a189841178c767c9d9972aa22641","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"Forbes JAPAN","pais":"Japão","titulo":"A 'Economia de IA de duas camadas' em que as empresas estão entrando","resumo":"Analistas observam que o mercado empresarial japonês está migrando para um modelo de economia de IA de duas camadas, dividindo-se entre adoção básica e integração profunda. Este cenário impõe desafios estratégicos para empresas que buscam escalar a automação inteligente. A transição reflete a busca por maior eficiência operacional e a necessidade de reestruturar cadeias de valor com IA.","link":"https://forbesjapan.com/articles/detail/100981","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"日本経済新聞","pais":"Japão","titulo":"Salesforce Japão anuncia o lançamento do Agentforce Coworker","resumo":"A Salesforce Japão lançou oficialmente o Agentforce Coworker, uma nova solução baseada em inteligência artificial para otimizar a colaboração corporativa. A ferramenta atua como um assistente digital integrado que automatiza fluxos de trabalho e melhora a produtividade dos funcionários. O anúncio marca um passo importante na oferta de IA generativa da empresa para o mercado local.","link":"https://www.nikkei.com/article/DGXZRSP709950_15072026000000","categoria":"LANÇAMENTO","lang":"pt"},{"fonte":"ビジネスネットワーク","pais":"Japão","titulo":"ROBOTS, desenvolvedora de tecnologia de controle robótico, torna-se spin-out da NTT Docomo","resumo":"A startup ROBOTS, especializada em tecnologias de controle robótico integrado, anunciou sua independência da NTT Docomo. A nova empresa pretende focar na comercialização e implementação em larga escala de suas soluções robóticas inovadoras. A manobra demonstra o movimento de grandes empresas japonesas em transformar inovações internas em negócios autônomos ágeis.","link":"https://businessnetwork.jp/article/35906/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"esports-world.jp","pais":"Japão","titulo":"eSports na assistência social: 'Puyopuyo Trainer' para idosos será lançado em 1º de outubro","resumo":"O sistema de eSports voltado para o treinamento cerebral em instalações de cuidados a idosos, 'Puyopuyo Trainer', tem lançamento confirmado para outubro. A iniciativa combina o entretenimento dos jogos digitais com terapias cognitivas para promover a saúde dos idosos. Este é um exemplo inovador do uso de tecnologia de jogos para enfrentar desafios sociais no Japão.","link":"https://esports-world.jp/news/63301","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Samsung Global Newsroom","pais":"Japão","titulo":"Samsung apresenta a nova tecnologia 'Flex Titanium' para aprimorar displays dobráveis","resumo":"A Samsung anunciou o 'Flex Titanium', uma nova tecnologia de display dobrável projetada para aumentar a durabilidade e a flexibilidade dos dispositivos. A inovação promete revolucionar o mercado de eletrônicos móveis ao oferecer uma tela mais resistente a danos físicos. A novidade reafirma a liderança da empresa no desenvolvimento de componentes críticos para o setor tecnológico global.","link":"https://news.samsung.com/jp/galaxy-unpacked-2026-flex-titanium","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"新京报","pais":"China","titulo":"Solo lunar da missão Chang'e-6 revela efeito de 'regulador de velocidade' da magnetosfera terrestre","resumo":"Análises do solo lunar coletado pela missão Chang'e-6 forneceram novas percepções sobre a interação solar e a magnetosfera da Terra. Esta descoberta científica é fundamental para entender o papel da proteção magnética na habitabilidade do planeta. Os dados expandem o conhecimento geológico e a astrofísica espacial chinesa.","link":"https://www.bjnews.com.cn/detail/1784106049129879.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"cnenergynews.cn","pais":"China","titulo":"Atualização tecnológica: módulos Tiger Neo da Jinko Solar superam padrões da indústria em sombreamento","resumo":"A Jinko Solar anunciou avanços significativos na eficiência de seus módulos fotovoltaicos Tiger Neo, focando em desempenho sob condições de sombreamento. Essa inovação tecnológica melhora a viabilidade energética em instalações complexas. O desenvolvimento reforça a liderança da China no setor global de energias renováveis.","link":"https://www.cnenergynews.cn/article/4SOI56X8J0o","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"cnenergynews.cn","pais":"China","titulo":"Longi apresenta 'Floresta Tecnológica' com 8 inovações lideradas pelo ACM","resumo":"A Longi expôs seu robusto portfólio de inovações tecnológicas, destacando o novo sistema ACM para maximizar a captura de energia solar. A apresentação reflete um esforço estratégico para elevar a eficiência de conversão e a durabilidade dos painéis. A iniciativa marca um avanço importante na transição energética chinesa.","link":"https://www.cnenergynews.cn/article/4SOHyH5dYv3","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"中国网","pais":"China","titulo":"Projeto de engenharia em áreas de subsidência de mineração ganha prêmio nacional de ciência e tecnologia","resumo":"Pesquisadores da Universidade de Ciência e Tecnologia de Shandong desenvolveram técnicas cruciais para a requalificação urbana em áreas afetadas pela mineração. O projeto foi reconhecido nacionalmente por transformar terrenos degradados em infraestruturas produtivas. Essa solução tecnológica promove o desenvolvimento sustentável em regiões industriais.","link":"http://ccpd.china.com.cn/2026-07/15/content_43462211.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Autopista","pais":"China","titulo":"GWM relança clone elétrico do Beetle: design retrô e tecnologia chinesa","resumo":"A Great Wall Motor (GWM) apresentou uma releitura elétrica do clássico Fusca, combinando estética nostálgica com tecnologia automotiva de ponta. O veículo exemplifica a estratégia chinesa de capturar mercados globais através de design icônico e eletrificação eficiente. A novidade destaca a crescente sofisticação da indústria automobilística do país.","link":"https://www.autopista.es/novedades-coches/gwm-relanza-clon-electrico-beetle-diseno-retro-tecnologia-escarabajo-chino_329775_102.html","categoria":"LANÇAMENTO","lang":"pt"},{"fonte":"北航新闻网","pais":"China","titulo":"Beihang lidera reunião de progresso do 'Plano 101' para tecnologia de baixa altitude","resumo":"A Universidade Beihang coordenou a reunião de meio de período do 'Plano 101', focado no avanço de tecnologias para a economia de baixa altitude. O esforço visa integrar drones e sistemas aéreos não tripulados em novas cadeias logísticas e urbanas. O projeto é essencial para o futuro da infraestrutura tecnológica chinesa.","link":"https://news.buaa.edu.cn/info/1005/69487.htm","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"ncsti.gov.cn","pais":"China","titulo":"Ecossistema de interfaces cérebro-computador de Changping expande com a chegada de 11 empresas","resumo":"O distrito de Changping consolidou seu hub de inovação com a instalação de 11 novas empresas focadas em neurociência e interfaces cérebro-computador (BCI). Este movimento fortalece a infraestrutura tecnológica para pesquisas em saúde e inteligência artificial avançada. A expansão reforça o papel do setor público na aceleração de indústrias de fronteira.","link":"https://www.ncsti.gov.cn/kjdt/scyq/wlkxc/wldt/202607/t20260715_251317.html","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Portuguese Cri","pais":"China","titulo":"Bordado étnico de Rongjiang ganha escala com tecnologia digital","resumo":"O tradicional bordado do povo de Rongjiang está sendo modernizado através da aplicação de design digital e automação. Essa fusão preserva o patrimônio cultural enquanto aumenta a produtividade e a competitividade comercial dos artesãos locais. A iniciativa demonstra como tecnologias digitais podem revitalizar artes tradicionais em escala global.","link":"https://portuguese.cri.cn/2026/07/15/PHOA1784084803916641","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Telegraph India","pais":"Índia","titulo":"DPS Barasat inaugura laboratório de tecnologia espacial e STEAM para fortalecer o aprendizado prático","resumo":"A escola DPS Barasat introduziu um laboratório de ponta voltado para as áreas de Ciência, Tecnologia, Engenharia, Artes e Matemática. A iniciativa visa modernizar a educação básica na Índia, oferecendo aos estudantes ferramentas imersivas para o desenvolvimento de habilidades críticas e experimentais em tecnologias espaciais.","link":"https://www.telegraphindia.com/edugraph/campus/delhi-public-school-barasat-inaugurates-advanced-state-of-the-art-space-and-steam-lab-photogallery/cid/2170191","categoria":"EDUCAÇÃO TECNOLÓGICA","lang":"pt"},{"fonte":"India Today","pais":"Índia","titulo":"BTech em Cibersegurança ou Ciência de Dados? O que os aspirantes a engenharia devem escolher","resumo":"Este artigo analisa a crescente demanda por profissionais qualificados nos setores de cibersegurança e ciência de dados. Com a digitalização acelerada da economia indiana, o guia orienta estudantes sobre as perspectivas de carreira e competências necessárias para escolher entre estas duas áreas promissoras da engenharia.","link":"https://www.indiatoday.in/education-today/featurephilia/story/btech-in-cybersecurity-or-data-science-engineering-aspirants-this-or-that-placement-curriculum-careers-2948259-2026-07-15","categoria":"EDUCAÇÃO CARREIRA","lang":"pt"},{"fonte":"Kashmir Life","pais":"Índia","titulo":"SKUAST-K lança programa de treinamento em tecnologia de drones para manejo de recursos naturais","resumo":"A universidade SKUAST-K iniciou um projeto focado no uso de drones para otimizar a gestão de recursos naturais na Índia. O programa prepara técnicos para aplicar tecnologias aéreas avançadas na agricultura e monitoramento ambiental, marcando um passo importante na digitalização e sustentabilidade do campo indiano.","link":"https://kashmirlife.net/skuast-k-launches-training-programme-on-drone-technology-for-natural-resource-management-443196/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"ANI News","pais":"Índia","titulo":"L&T Technology Services reporta crescimento anual de 11,5% no primeiro trimestre fiscal de 2027","resumo":"A L&T Technology Services apresentou resultados financeiros sólidos, superando as expectativas de mercado com um crescimento expressivo de receita. O desempenho robusto reflete a forte demanda por serviços de engenharia e P&D na Índia, consolidando a empresa como uma das líderes no setor de serviços tecnológicos globais.","link":"https://www.aninews.in/news/business/lampt-technology-services-reports-115-yoy-growth-in-q1fy2720260715120001","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Bar and Bench","pais":"Índia","titulo":"Ex-consultor jurídico sênior do Google, Deepak Singh, assume liderança em Tecnologia, Digital e IA na Chandhiok & Mahajan","resumo":"A contratação de Deepak Singh pela firma Chandhiok & Mahajan reforça a movimentação estratégica de talentos no setor jurídico tecnológico da Índia. Sua expertise em áreas críticas como Inteligência Artificial e direito digital visa fortalecer a prática da empresa diante das novas regulamentações globais e demandas locais.","link":"https://www.barandbench.com/news/corporate/ex-google-senior-counsel-deepak-singh-joins-chandhiok-mahajan-to-lead-technology-digital-ai-practice","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Moneycontrol.com","pais":"Índia","titulo":"Target afirma que seu Centro de Capacidade Global em Bengaluru impulsiona 40% da força de trabalho tecnológica global","resumo":"A gigante varejista Target destacou a importância estratégica do seu hub em Bengaluru para suas operações globais de tecnologia. O centro é um pilar fundamental para a inovação da empresa, demonstrando a relevância crescente dos centros de serviços indianos na gestão de talentos de alta complexidade em TI.","link":"https://www.moneycontrol.com/technology/target-says-bengaluru-gcc-powers-40-of-global-technology-workforce-article-13974342.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Retail Technology Innovation Hub","pais":"Índia","titulo":"Domino's contrata Moneka Krouse da PepsiCo para Vice-Presidência de Ciência de Dados e Inteligência do Cliente","resumo":"A Domino's Índia reforçou sua liderança executiva com a contratação de Moneka Krouse para a divisão de Ciência de Dados. A movimentação reflete a estratégia das grandes marcas em utilizar análise preditiva e inteligência de mercado para personalizar a experiência do cliente em um mercado digital cada vez mais competitivo.","link":"https://retailtechinnovationhub.com/home/2026/7/14/dominos-raids-pepsico-to-bring-in-moneka-krouse-as-vice-president-decision-science-customer-intelligence","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"The Hindu","pais":"Índia","titulo":"Laços de tecnologia de defesa entre Índia e EUA — grandes ambições, pouca entrega","resumo":"O artigo explora a complexa relação geopolítica e tecnológica entre Índia e EUA no setor de defesa. Embora existam acordos ambiciosos de transferência tecnológica e cooperação estratégica, as dificuldades burocráticas e logísticas têm limitado a execução eficiente dos projetos conjuntos de defesa entre as duas nações.","link":"https://www.thehindu.com/opinion/op-ed/india-us-defence-technology-ties-big-ambitions-little-delivery/article71222458.ece","categoria":"GEOPOLÍTICA","lang":"pt"},{"fonte":"Correio da Manhã","pais":"Portugal","titulo":"Nova tecnologia permite medir umidade florestal na Península Ibérica para prevenir incêndios","resumo":"Uma nova solução tecnológica foi desenvolvida para monitorar a umidade nas florestas da Península Ibérica em tempo real. A ferramenta visa otimizar a prevenção de incêndios rurais, fornecendo dados precisos para o gerenciamento de riscos ambientais. Esta inovação é um passo fundamental para proteger o ecossistema da região contra desastres climáticos.","link":"https://www.cmjornal.pt/tecnologia/detalhe/nova-tecnologia-permite-medir-humidade-florestal-na-peninsula-iberica-para-prevenir-incendios","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"ECO","pais":"Portugal","titulo":"Design, tecnologia e construção industrializada: a estratégia da Roca para reinventar o banheiro","resumo":"A Roca está implementando uma abordagem inovadora que combina design avançado, tecnologia de ponta e métodos de construção industrializada. O objetivo central é transformar o conceito tradicional de banheiro, tornando-o mais eficiente e funcional. Essa estratégia reflete a adaptação da empresa às novas demandas de mercado e sustentabilidade.","link":"https://eco.sapo.pt/2026/07/15/design-tecnologia-e-construcao-industrializada-a-estrategia-da-roca-para-reinventar-a-casa-de-banho/","categoria":"INOVAÇÃO","lang":"pt"},{"fonte":"Jornal Económico","pais":"Portugal","titulo":"Empresa tecnológica portuguesa KWAN recruta para 200 vagas em tecnologia","resumo":"A KWAN, empresa de destaque no setor tecnológico português, anunciou a abertura de 200 novas vagas de emprego. O recrutamento foca em perfis técnicos qualificados para impulsionar a inovação digital na organização. Essa movimentação fortalece o mercado de trabalho local e consolida o crescimento do ecossistema tech em Portugal.","link":"https://jornaleconomico.sapo.pt/noticias/tecnologica-portuguesa-kwan-recruta-para-200-vagas-em-tecnologia/","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"ECO","pais":"Portugal","titulo":"FNS2026: Frank defende uso de tecnologia para libertar mediadores de burocracia","resumo":"No FNS2026, foi debatido o papel da tecnologia na otimização de processos administrativos para profissionais de mediação. O foco reside na automação de tarefas burocráticas repetitivas, permitindo que os mediadores dediquem mais tempo ao valor estratégico de suas funções. A iniciativa busca maior eficiência operacional através da digitalização.","link":"https://eco.sapo.pt/2026/07/14/fns2026-frank-defende-tecnologia-para-libertar-mediadores-de-burocracia/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Jornal SOL","pais":"Portugal","titulo":"Mais tecnologia, mais humanidade: por que continuaremos a precisar de professores na era da IA","resumo":"O artigo discute a convivência essencial entre a inteligência artificial e a figura humana na educação moderna. Embora a tecnologia ofereça ferramentas de ensino potentes, a mediação, a empatia e o pensamento crítico do professor permanecem insubstituíveis. O texto defende uma abordagem híbrida onde a IA serve como suporte ao desenvolvimento intelectual humano.","link":"https://sol.iol.pt/opiniao/noticias/fernando-pereira-mais-tecnologia-mais-humanidade-porque-continuaremos-a-precisar-de-professores-na-era-da-ia/20260714/6a5655e60cf2f6a1a1e70aa4","categoria":"EDUCAÇÃO","lang":"pt"},{"fonte":"Coimbra Coolectiva","pais":"Portugal","titulo":"Coimbra Coolectiva no Tech & Arts Festival do TUMO: arte, tecnologia e jornalismo colaborativo","resumo":"O projeto Coimbra Coolectiva participou do Tech & Arts Festival, explorando a convergência entre arte, tecnologia e jornalismo comunitário. O evento destacou o poder das ferramentas digitais na criação de narrativas colaborativas e inclusivas. A iniciativa promove um diálogo essencial sobre como a tecnologia pode servir como plataforma para a cidadania ativa.","link":"https://coimbracoolectiva.pt/historias/comunidade/coimbra-coolectiva-no-tech-arts-festival-do-tumo-arte-tecnologia-e-jornalismo-colaborativo/","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"SIC","pais":"Portugal","titulo":"\"Sou um ciborgue\": Nuno Markl testa tecnologia inovadora e celebra uma das maiores vitórias após o AVC","resumo":"Nuno Markl compartilhou sua experiência ao testar uma tecnologia de ponta voltada para a reabilitação pós-AVC. O apresentador descreveu o dispositivo como uma extensão ciborgue que auxilia em sua recuperação física. O relato destaca o papel transformador da biotecnologia no suporte à saúde e na superação de limitações motoras.","link":"https://sic.pt/sic-caras/famosos/2026-07-14-video-sou-um-ciborgue--nuno-markl-testa-tecnologia-inovadora-e-celebra-uma-das-maiores-vitorias-apos-o-avc-0bf710f4","categoria":"SAÚDE","lang":"pt"},{"fonte":"Cyber Security Brazil","pais":"Brazil","titulo":"Brazilian technology could bring Sign Language translation to hospitals, stores, and restaurants","resumo":"A new technological solution developed in Brazil promises to democratize access to communication for the deaf in public spaces. By integrating automatic Sign Language translation, the tool facilitates inclusion in essential environments such as hospitals and commercial establishments. The initiative represents a significant advancement in digital accessibility and support for the deaf community in the country.","link":"https://www.cybersecbrazil.com.br/post/tecnologia-brasileira-pode-levar-tradu%C3%A7%C3%A3o-de-libras-a-hospitais-lojas-e-restaurantes","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Economia SC","pais":"Brazil","titulo":"When AI becomes a retail operation","resumo":"Artificial intelligence has moved beyond being just a futuristic concept to become the main engine of operations in the retail sector. Companies use algorithms to optimize inventory, personalize the shopping experience, and forecast consumer demand in real time. This digital transformation is redefining operational efficiency and brand competitiveness in the current market.","link":"https://economiasc.com/2026/07/15/quando-a-ia-vira-operacao-no-varejo/","categoria":"BUSINESS","lang":"en"},{"fonte":"Valor Econômico","pais":"Brazil","titulo":"Heavy betting on AI companies poses a risk to the global economy","resumo":"Massive and accelerated investment in artificial intelligence startups and giants is raising concerns about a potential financial bubble. Economists warn that high capital concentration could destabilize traditional sectors if return expectations do not materialize. The scenario calls for caution and a critical analysis of the sustainability of this global technological growth.","link":"https://valor.globo.com/opiniao/coluna/aposta-alta-nas-empresas-de-ia-traz-risco-para-economia-mundial.ghtml","categoria":"ECONOMY","lang":"en"},{"fonte":"O Estado CE","pais":"Brazil","titulo":"Ceará approves new legislation, reinforcing its role in the digital economy","resumo":"The state of Ceará has consolidated its strategic role in the national technological landscape by approving a new regulatory framework for the digital economy. The legislation aims to attract investment, foster startups, and train local talent for the challenges of innovation. With this measure, the region seeks to become a reference hub for the development of technological solutions in Brazil.","link":"https://oestadoce.com.br/economia/ceara-aprova-nova-legislacao-e-reforca-protagonismo-na-economia-digital-2/","categoria":"POLITICS","lang":"en"},{"fonte":"O GLOBO","pais":"Brazil","titulo":"Apple releases iOS 27 for testing: see how to download the OS and experience the new Siri AI","resumo":"Apple has launched the testing period for iOS 27, featuring a version of Siri deeply integrated with generative artificial intelligence as its highlight. The update promises to revolutionize user interaction with the device, making it more natural and proactive across various tasks. Developers and enthusiasts can now explore the new features of this innovative operating system.","link":"https://oglobo.globo.com/economia/tecnologia/noticia/2026/07/15/apple-libera-ios-27-para-testes-veja-como-baixar-o-sistema-operacional-e-conhecer-a-nova-siri-ai.ghtml","categoria":"LAUNCH","lang":"en"},{"fonte":"WWF Brasil","pais":"Brazil","titulo":"Tradition and technology: indigenous peoples of Rondônia strengthen biodiversity monitoring","resumo":"Indigenous peoples in Rondônia are using advanced digital tools to protect their territories and monitor local flora and fauna. The project combines ancestral environmental preservation knowledge with cutting-edge sensors and geolocation. This fusion of tradition and technology enhances the effectiveness of fighting deforestation and protecting natural resources.","link":"https://www.wwf.org.br/nossosconteudos/notas_e_releases/?94921/Tradicao-e-tecnologia-povos-originarios-de-Rondonia-fortalecem-o-monitoramento-da-biodiversidade-com-apoio-do-WWF-Brasil-e-SOS-Amazonia","categoria":"SCIENCE","lang":"en"},{"fonte":"www.gov.br","pais":"Brazil","titulo":"Researcher named new director of the National Laboratory of Astrophysics — Ministry of Science, Technology and Innovation","resumo":"The Ministry of Science, Technology and Innovation has announced a new director for the National Laboratory of Astrophysics, reinforcing female representation in scientific leadership. The appointment highlights Brazil's commitment to space research and high-level astronomical development. The administration is expected to drive new projects and international partnerships in observation of the universe.","link":"https://www.gov.br/mcti/pt-br/acompanhe-o-mcti/noticias/noticias-julho-outubro-2026/pesquisadora-e-nova-diretora-do-laboratorio-nacional-de-astronomia","categoria":"SCIENCE","lang":"en"},{"fonte":"Comunica UFU","pais":"Brazil","titulo":"Learn how UFU researchers will participate in the largest scientific event in Latin America","resumo":"Researchers from the Federal University of Uberlândia (UFU) are preparing for a significant presence at the largest science event in Latin America. The group will present advances in studies covering various areas, from sustainability to new computational technologies. The meeting is an important milestone for sharing discoveries that impact Brazilian society and global science.","link":"https://comunica.ufu.br/noticias/2026/07/saiba-como-sera-participacao-de-pesquisadores-da-ufu-no-maior-evento-cientifico-da","categoria":"SCIENCE","lang":"en"},{"fonte":"Bloomberg.com","pais":"United States","titulo":"AI has supercharged the wealth effect; just ask the Micron millionaires","resumo":"The rapid advancement of artificial intelligence has had a direct financial impact on the stock market, turning Micron employees and investors into new millionaires. This phenomenon demonstrates how semiconductor companies are being catapulted by the AI sector. The impact reflects a significant shift in wealth distribution driven by emerging technological innovations.","link":"https://www.bloomberg.com/news/articles/2026-07-15/the-ai-boom-is-changing-the-economy-and-minting-new-millionaires-overnight?srnd=phx-businessweek","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Technology Networks","pais":"United States","titulo":"Semaglutide may slow the pace of epigenetic aging","resumo":"Recent studies suggest that the drug semaglutide, popular for weight control and diabetes, may offer additional benefits in slowing biological aging. The discovery impacts the field of longevity by showing that pharmacological interventions influence human epigenetic markers. This new scientific application opens promising pathways for preventive treatments against cellular decline.","link":"https://www.technologynetworks.com/tn/news/semaglutide-may-slow-the-pace-of-epigenetic-aging-414671","categoria":"SCIENCE","lang":"en"},{"fonte":"ScienceDaily","pais":"United States","titulo":"NASA selects 41 space technologies for future exploration of the Moon and Mars","resumo":"NASA has announced an investment in 41 innovative technologies aimed at enabling long-term deep space missions. These projects seek to overcome logistical and operational challenges necessary for the colonization and scientific exploration of the Moon and the planet Mars. The initiative strengthens the aerospace industry by promoting cutting-edge research for interplanetary challenges.","link":"https://www.sciencedaily.com/releases/2026/07/260713084855.htm","categoria":"SCIENCE","lang":"en"},{"fonte":"the-scientist.com","pais":"United States","titulo":"Early verdicts on Claude Science: faster workflows, but gaps persist","resumo":"The Claude Science tool has demonstrated the ability to drastically accelerate academic and research workflows through intelligent automation. Despite the efficiency gains, users point out technical limitations that still require human oversight to ensure accuracy. The impact reflects the balance between the utility of generative AI and the need for rigorous scientific standards.","link":"https://www.the-scientist.com/early-verdicts-on-claude-science-faster-workflows-but-gaps-remain-74745","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Business Wire","pais":"United States","titulo":"Neuraptive Therapeutics licenses innovative bioresorbable nerve stimulation technology","resumo":"The partnership between Neuraptive Therapeutics and the University of Washington introduces a nerve stimulation technology that naturally dissolves in the body. This innovation promises to revolutionize neural repair treatments by eliminating the need for additional surgeries to remove devices. The breakthrough represents a significant milestone in medical bioengineering aimed at patient recovery.","link":"https://www.businesswire.com/news/home/20260714158724/pt","categoria":"SCIENCE","lang":"en"},{"fonte":"UConn Today","pais":"United States","titulo":"National Science Foundation announces transformational award for Connecticut's quantum tech sector","resumo":"The NSF's investment in Connecticut aims to consolidate the state as a global hub for the development and application of quantum technologies. This financial support seeks to accelerate basic research and facilitate the transition from complex prototypes to practical industrial applications. The measure is expected to significantly boost the United States' technological competitiveness in the global quantum landscape.","link":"https://today.uconn.edu/2026/07/u-s-national-science-foundation-announces-transformational-award-to-connecticuts-quantum-tech-sector/","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"U.S. National Science Foundation (.gov)","pais":"United States","titulo":"NSF awards 12 new Regional Innovation Engines to fuel research, jobs, and economic growth","resumo":"The National Science Foundation has selected twelve new regions in the United States to receive strategic investments aimed at the local innovation ecosystem. The central goal is to integrate academic research, public-private partnerships, and job creation in emerging high-tech sectors. This move seeks to decentralize the country's scientific economic strength for more uniform development.","link":"https://www.nsf.gov/news/nsf-awards-12-new-regional-innovation-engines-fuel-research","categoria":"BUSINESS","lang":"en"},{"fonte":"Aeon","pais":"United States","titulo":"Silicon Valley has a science fiction problem","resumo":"A critical analysis suggests that Silicon Valley is allowing science fiction tropes to dangerously shape long-term visions for technological development. This trend risks creating unrealistic expectations and diverting investment away from the practical, urgent problems of contemporary society. The debate highlights the need for a greater focus on tangible results versus speculative, futuristic projections.","link":"https://aeon.co/essays/silicon-valley-has-a-science-fiction-problem","categoria":"TRENDING TOPICS","lang":"en"},{"fonte":"Zonebourse","pais":"France","titulo":"Intel chooses ASML's High-NA EUV technology for processor production","resumo":"Intel has implemented advanced High-Numerical Aperture (High-NA) EUV lithography technology supplied by ASML. This integration aims to optimize the manufacturing of its next-generation processors. The move marks a significant advancement in the precision and efficiency of semiconductor production processes on a global scale.","link":"https://www.zonebourse.com/actualite-bourse/intel-choisit-la-technologie-euv-a-haute-ouverture-numerique-d-asml-pour-la-production-de-ses-proces-ce7f5eddd18cf522","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Finyear","pais":"France","titulo":"NeoCem raises 17 million euros for its low-carbon technology","resumo":"The startup NeoCem has secured a significant funding round of 17 million euros to drive its innovations in low-carbon material development. The investment reinforces the French industrial sector's commitment to sustainability practices and green technological solutions. The company aims to scale production to mitigate the environmental impact of the construction industry.","link":"https://finyear.com/neocem-leve-17-me-pour-sa-technologie-bas-carbone/","categoria":"SUSTAINABILITY","lang":"en"},{"fonte":"journaldunet.com","pais":"France","titulo":"The AI paradox: the smartest technology navigating without a course","resumo":"The article explores the current dilemma of artificial intelligence, which, despite demonstrating surprising cognitive capabilities, faces difficulties with fundamental decision-making processes. The analysis points to a lack of clear guidelines and solid strategic goals to match the sector's rapid evolution. This phenomenon calls into question the autonomy and predictability of the technology in critical environments.","link":"https://www.journaldunet.com/intelligence-artificielle/1552673-le-paradoxe-de-l-ia-la-technologie-la-plus-intelligente-navigue-a-vue/","categoria":"SCIENCE","lang":"en"},{"fonte":"ZDNET","pais":"France","titulo":"Samsung unveils \"Flex Titanium,\" its new foldable screen technology","resumo":"Samsung has officially introduced 'Flex Titanium,' its latest innovation in flexible displays targeted at the mobile device market. The technology promises greater durability and resistance, overcoming limitations found in previous generations of foldable screens. This launch reinforces the company's leadership in the innovative smartphone hardware segment.","link":"https://www.zdnet.fr/actualites/samsung-devoile-flex-titanium-sa-nouvelle-technologie-decran-pliable-498614.htm","categoria":"LAUNCHES","lang":"en"},{"fonte":"Les Echos","pais":"France","titulo":"Belén Garijo, CEO of Sanofi: \"Artificial intelligence is no longer a technology of the future. It is already here, and that changes everything.\"","resumo":"Sanofi CEO Belén Garijo highlights the deep integration of artificial intelligence into the pharmaceutical giant's daily operations. According to the executive, AI now serves as a fundamental pillar in the research and development of modern medicines. The statement marks a shift in the healthcare sector's perception regarding the adoption of disruptive technologies.","link":"https://investir.lesechos.fr/marches-indices/opinions/belen-garijo-directrice-generale-de-sanofi-lintelligence-artificielle-nest-plus-une-technologie-davenir-elle-est-deja-la-et-cest-ce-qui-change-tout-2242316","categoria":"HEALTH","lang":"en"},{"fonte":"Retail Technology Innovation Hub","pais":"France","titulo":"Sports retailer Decathlon becomes the largest global deployment customer for retail tech firm Vusion","resumo":"Decathlon has consolidated a strategic partnership with Vusion, becoming its largest client worldwide for retail technology solutions. The implementation involves advanced digitization of labels and integrated systems across the chain's stores. This collaboration aims to transform the consumer experience and optimize operational management at all points of sale.","link":"https://retailtechinnovationhub.com/home/2026/7/15/sporting-goods-retailer-decathlon-becomes-retail-technology-firm-vusions-most-globally-deployed-customer","categoria":"BUSINESS","lang":"en"},{"fonte":"Nice Premium","pais":"France","titulo":"AI and green mobility: how technology is already transforming the Côte d’Azur","resumo":"The Côte d’Azur region in France has been a hub for innovations that combine artificial intelligence with sustainable mobility solutions. Local projects use data and algorithms to optimize public transport and reduce the urban carbon footprint. This movement is transforming the area into a benchmark for the development of smart cities in Europe.","link":"https://www.nicepremium.fr/technologie/ia-et-mobilite-verte-comment-la-technologie-transforme-deja-la-cote-dazur/","categoria":"TRENDING TOPICS","lang":"en"},{"fonte":"Boursorama","pais":"France","titulo":"Defiance launches the first European ETF dedicated to photonics","resumo":"Defiance has introduced the first exchange-traded fund (ETF) to the European market focused exclusively on the photonics sector. The initiative reflects growing investor interest in technologies based on light manipulation, which are essential for advances in quantum computing and telecommunications. This financial product democratizes access to companies leading in optical innovations.","link":"https://www.boursorama.com/bourse/actualites-amp/defiance-lance-le-premier-etf-europeen-dedie-a-la-photonique-f393bbaa3b8c7dd3108824ecc353cbc1","categoria":"BUSINESS","lang":"en"},{"fonte":"Fleet News","pais":"England","titulo":"How leading fleets are using technology to improve efficiency and safety","resumo":"Transport companies are implementing advanced technological solutions to optimize logistics operations. The adoption of these tools aims to reduce operating costs and raise road safety standards. The primary focus is on real-time data analysis for strategic decision-making.","link":"https://www.fleetnews.co.uk/features/how-leading-fleets-are-using-technology-to-improve-efficiency-and-safety","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Research Information","pais":"England","titulo":"Why Annual Reviews bought Underline Science","resumo":"The acquisition of Underline Science by Annual Reviews represents a strategic move in the scientific communication sector. The goal is to integrate digital conference platforms into the existing academic collection, increasing access to knowledge. This merger promises to transform how researchers interact with technical presentations and data.","link":"https://www.researchinformation.info/analysis-opinion/why-annual-reviews-bought-underline-science/","categoria":"SCIENCE","lang":"en"},{"fonte":"Open Access Government","pais":"England","titulo":"Wearable technology: new microneedle patch tracks medication levels in real-time","resumo":"Scientists have developed an innovative microneedle patch capable of monitoring drug dosages directly in the body. This wearable technology offers a less invasive method for patients who require rigorous treatment management. The breakthrough promises to revolutionize personalized medicine and chronic disease management.","link":"https://www.openaccessgovernment.org/wearable-technology-new-microneedle-patch-tracks-medicine-levels-in-real-time/211933/","categoria":"SCIENCE","lang":"en"},{"fonte":"Vodafone","pais":"England","titulo":"Who controls Europe's technology and why does it matter?","resumo":"The debate over European technological sovereignty is gaining momentum in the face of influence from global giants. Control of critical infrastructure and digital data has become a core issue of security and economic independence. The discussion points to the need for robust policies that protect the continent's technology ecosystem.","link":"https://www.vodafone.com/news/newsroom/public-policy/who-controls-europes-technology-and-why-it-matters","categoria":"TRENDING TOPICS","lang":"en"},{"fonte":"EDP24","pais":"England","titulo":"Norfolk company that turns emissions into construction materials appoints new director","resumo":"A Norfolk-based startup focused on capturing emissions to create construction materials is looking to scale its operation with new leadership. The environmental innovation aims to decarbonize the construction sector by turning pollution into physical assets. The move signals the growth of circular economy technologies in the United Kingdom.","link":"https://www.edp24.co.uk/news/26268529.o-c-o-technology-uk-appoints-new-aggregates-director/","categoria":"SCIENCE","lang":"en"},{"fonte":"Retail Technology Innovation Hub","pais":"England","titulo":"Nice serve! Boxbar Tech’s technology debuts in self-service bars at the 2026 Wimbledon tournament","resumo":"The traditional Wimbledon tournament is adopting Boxbar's self-service technology to modernize its beverage service. The solution aims to reduce spectator wait times by integrating cutting-edge automation into the elite sporting event. This implementation marks an important step in the digitization of the fan experience at English stadiums.","link":"https://retailtechinnovationhub.com/home/2026/7/14/nice-serve-boxbar-tech-powers-self-serve-bar-technology-first-at-2026-wimbledon-championships","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"TU Lankide","pais":"Spain","titulo":"Quside and Ikerlan apply quantum technology to fortify cybersecurity in critical sectors","resumo":"Quside and Ikerlan have established a strategic partnership to integrate quantum technologies into critical infrastructure. The initiative aims to significantly enhance protection against advanced cyber threats. This milestone represents a major step for dig
