ital security in Spain through the adoption of cutting-edge solutions.","link":"https://www.tulankide.com/es/quside-e-ikerlan-aplican-tecnologia-cuantica-para-blindar-la-ciberseguridad-de-sectores-criticos","categoria":"CYBERSECURITY","lang":"en"},{"fonte":"La Razón","pais":"Spain","titulo":"Titanium on the screen? Samsung's innovative technology to make its new foldables more resistant","resumo":"Samsung is implementing a new material technology in its foldable devices with a focus on durability. The use of titanium promises to reinforce the structure and screen resistance against everyday impacts. This innovation seeks to solve the primary technical challenges currently faced by foldable-design handsets.","link":"https://www.larazon.es/tecnologia-consumo/samsung-galaxy-z/titanio-pantallala-innovadora-tecnologia-samsung-sus-nuevos-plegables-sean-resistentes_202607156a573ea70500ab412c95f700.html","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Interempresas Media","pais":"Spain","titulo":"STYLPRO expands use of LED technology with a body panel for comprehensive skin care","resumo":"The STYLPRO brand has launched an innovative body panel that uses LED technology for dermatological treatments. The device is designed to offer professional care in a practical and accessible way for users. The novelty reflects the growing trend of integrating technological solutions into the beauty and wellness sector.","link":"https://www.interempresas.net/Peluqueria/658628-STYLPRO-amplia-uso-de-tecnologia-LED-con-panel-corporal-para-cuidado-integral-de-piel.html","categoria":"INNOVATION","lang":"en"},{"fonte":"telefonica.com","pais":"Spain","titulo":"AI is redefining how we build products: the new limit is no longer technology, it is us","resumo":"The article explores how Artificial Intelligence is transforming the processes of creation and development of modern products. The author argues that technology has surpassed technical barriers, shifting the challenge to human adaptation. The h. The breakthrough has the potential to positively impact the healthcare market and clinical efficacy.","link":"https://www.lavozdegalicia.es/amp/noticia/santiago/santiago/2026/07/15/empresa-celtarys-presenta-tecnologia-acelerar-desarrollo-farmacos/0003_202607S15C2994.htm?utm_campaign=amp","categoria":"SCIENCE","lang":"en"},{"fonte":"ciencia.gob.es","pais":"Spain","titulo":"The Ministry of Science, Innovation and Universities grants the 2026 National Innovation and Design Awards","resumo":"The Spanish government has announced the winners of the National Innovation and Design Awards, recognizing talent in strategic sectors. These awards aim to stimulate academic excellence and the implementation of innovative projects in the national industry. The recognition serves as a catalyst for the country's science and technology ecosystem.","link":"https://www.ciencia.gob.es/Noticias/2026/julio/Morant-llamada-premios-nacionales-innovacion-diseno-2026.html","categoria":"INNOVATION","lang":"en"},{"fonte":"PresseBox","pais":"Germany","titulo":"Research subsidy: What the assessment office and tax audit really check","resumo":"This article details the audit and verification criteria applied by German tax authorities to research and development grant applications. The analysis is essential for companies seeking to ensure legal compliance and avoid problems during tax reviews while utilizing government incentives.","link":"https://www.pressebox.de/pressemitteilung/steinbeis-technologie-innovationsberatung-gmbh/forschungszulage-was-veranlagungsstelle-und-betriebsprfung-wirklich-prfen/boxid/1305221","categoria":"BUSINESS","lang":"en"},{"fonte":"Caschys Blog","pais":"Germany","titulo":"Samsung unveils new Flex Titanium technology for foldable screens","resumo":"Samsung has introduced a material innovation with its Flex Titanium technology, focused on increasing the durability and resistance of foldable screens. This technical breakthrough promises to revolutionize the premium mobile d -no-tech-arts-festival-do-tumo-arte-tecnologia-e-jornalismo-colaborativo/","categoria":"TRENDING TOPICS","lang":"en"},{"fonte":"SIC","pais":"Portugal","titulo":"\"I'm a Cyborg\": Nuno Markl Tests Innovative Technology and Celebrates One of His Biggest Victories After a Stroke","resumo":"Nuno Markl shared his experience testing cutting-edge technology for post-stroke rehabilitation. The presenter described the device as a cyborg extension that assists in his physical recovery. The account highlights the transformative role of biotechnology in supporting health and overcoming motor limitations.","link":"https://sic.pt/sic-caras/famosos/2026-07-14-video-sou-um-ciborgue--nuno-markl-testa-tecnologia-inovadora-e-celebra-uma-das-maiores-vitorias-apos-o-avc-0bf710f4","categoria":"HEALTH","lang":"en"}];

  const searchInput = document.getElementById('search');
  const langSelect = document.getElementById('lang');
  const countrySelect = document.getElementById('country');
  const categorySelect = document.getElementById('category');
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');
  const clearBtn = document.getElementById('clear-filters');

  // Utility de escape HTML simples para prevenir injections em propriedades sem tratamento
  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function populateSelects() {
    const lang = langSelect.value;
    const currentData = data.filter(d => d.lang === lang);

    const countries = [...new Set(currentData.map(d => d.pais))].filter(Boolean).sort();
    const categories = [...new Set(currentData.map(d => d.categoria))].filter(Boolean).sort();

    const currentCountry = countrySelect.value;
    const currentCategory = categorySelect.value;

    countrySelect.innerHTML = '<option value="all">Todos / All</option>';
    categorySelect.innerHTML = '<option value="all">Todas / All</option>';

    countries.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      countrySelect.appendChild(opt);
    });

    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      categorySelect.appendChild(opt);
    });

    if (currentCountry !== 'all' && countries.includes(currentCountry)) {
      countrySelect.value = currentCountry;
    }
    if (currentCategory !== 'all' && categories.includes(currentCategory)) {
      categorySelect.value = currentCategory;
    }
  }

  function render(items) {
    countEl.textContent = `${items.length} notícia${items.length !== 1 ? 's' : ''}`;
    
    grid.innerHTML = items.map(item => {
      const readMoreTxt = item.lang === 'pt' ? 'Ler mais' : 'Read more';
      
      const bulletList = (item.resumo || '').split('\n')
        .filter(Boolean)
        .map(line => `<li>${esc(line.replace(/^- /, ''))}</li>`)
        .join('');

      return `
        <div class="news-card">
          <div class="card-meta">
            <span class="category">${esc(item.categoria) || 'Geral'}</span>
            <span class="country">${esc(item.pais) || 'Global'}</span>
          </div>
          <h3 class="card-title">${esc(item.titulo)}</h3>
          <div class="card-summary">
            <ul>${bulletList}</ul>
          </div>
          <div class="card-footer">
            <a href="${esc(item.link)}" target="_blank" class="read-more">
              ${readMoreTxt} &rarr;
            </a>
            <span class="source">${esc(item.fonte)}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterData() {
    const query = searchInput.value.toLowerCase();
    const lang = langSelect.value;
    const country = countrySelect.value;
    const category = categorySelect.value;

    const filtered = data.filter(item => {
      const matchLang = item.lang === lang;
      const matchCountry = country === 'all' || item.pais === country;
      const matchCategory = category === 'all' || item.categoria === category;
      const matchSearch = query === '' 
        || (item.titulo || '').toLowerCase().includes(query)
        || (item.resumo || '').toLowerCase().includes(query)
        || (item.fonte || '').toLowerCase().includes(query);

      return matchLang && matchCountry && matchCategory && matchSearch;
    });

    render(filtered);
  }

  // Binds
  searchInput.addEventListener('input', filterData);
  langSelect.addEventListener('change', () => {
    populateSelects();
    filterData();
  });
  countrySelect.addEventListener('change', filterData);
  categorySelect.addEventListener('change', filterData);
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    countrySelect.value = 'all';
    categorySelect.value = 'all';
    filterData();
  });

  // Initialization
  populateSelects();
  filterData(); // trigger first render
</script>
</body>
</html>
