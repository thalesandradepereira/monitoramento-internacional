<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - International Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0B0F19;
      --bg-panel: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #E2E8F0;
      --text-muted: #94A3B8;
      --accent: #D4AF37;
      --accent-hover: #FDE047;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.15), transparent 400px),
                        radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.05), transparent 400px);
    }
    header {
      padding: 1.5rem 5%;
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo-img {
      height: 48px; /* Altura ajustável do logo */
      width: auto;
      object-fit: contain;
      border-radius: 8px; /* Caso não seja transparente */
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .logo-text span {
      color: var(--accent);
    }
    .date-badge {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      color: var(--accent);
      font-weight: 600;
    }
    .container {
      padding: 2rem 5%;
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }
    .filters {
      flex: 0 0 300px;
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 6rem;
    }
    .filter-group {
      margin-bottom: 1.5rem;
    }
    .filter-group label {
      display: block;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
    }
    select option {
      background: var(--bg-main);
      color: var(--text-main);
    }
    .results {
      flex: 1;
    }
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .results-count {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .news-card {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .news-card:hover {
      transform: translateY(-4px);
      border-color: rgba(212, 175, 55, 0.5);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }
    .category {
      color: var(--accent);
    }
    .country {
      color: var(--text-muted);
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.4;
      margin: 0 0 1rem 0;
      color: #fff;
    }
    .card-summary {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-muted);
      flex: 1;
    }
    .card-summary ul {
      margin: 0;
      padding-left: 1.2rem;
    }
    .card-summary li {
      margin-bottom: 0.25rem;
    }
    .card-footer {
      margin-top: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--glass-border);
      padding-top: 1rem;
    }
    .read-more {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .read-more:hover {
      color: var(--accent-hover);
    }
    .source {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .btn-clear {
      width: 100%;
      padding: 0.75rem 1rem;
      margin-top: 0.5rem;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-clear:hover {
      background: var(--accent);
      color: var(--bg-main);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }
    /* Simple CSS reset/scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: var(--bg-panel); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .filters {
        flex: none;
        width: 100%;
        position: static;
        box-sizing: border-box;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-container">
    <img src="logo.jpg" alt="TAP Logo" class="logo-img" onerror="this.style.display='none'">
    <div class="logo-text">Monitoramento<span>Internacional</span></div>
  </div>
  <div class="date-badge">18/07/2026</div>
</header>

<div class="container">
  <aside class="filters">
    <div class="filter-group">
      <label for="search">Busca / Search</label>
      <input type="text" id="search" placeholder="Palavra-chave...">
    </div>
    
    <div class="filter-group">
      <label for="lang">Idioma / Language</label>
      <select id="lang">
        <option value="pt">Português (PT-BR)</option>
        <option value="en">English (US)</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="country">País / Country</label>
      <select id="country">
        <option value="all">Todos / All</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="category">Categoria / Category</label>
      <select id="category">
        <option value="all">Todas / All</option>
      </select>
    </div>
    
    <button id="clear-filters" class="btn-clear">Limpar / Clear</button>
  </aside>

  <main class="results">
    <div class="results-header">
      <h2 style="margin: 0; font-size: 1.5rem; color: #fff;">Resultados</h2>
      <span class="results-count" id="count">0 notícias</span>
    </div>
    <div class="news-grid" id="grid">
      <!-- Injected by JS -->
    </div>
  </main>
</div>

<script>
  // Injeta os dados originais no frontend
  const data = [{"fonte":"Finanças, Câmbio e Investimentos","pais":"Brasil","titulo":"UBS projeta mercado da economia espacial em US$ 1,3 trilhão até 2040","resumo":"O banco UBS estima um crescimento exponencial para a economia espacial, prevendo que o setor movimentará US$ 1,3 trilhão até 2040. A análise destaca a rápida evolução das tecnologias aeroespaciais e a crescente privatização do segmento como pilares fundamentais. O impacto dessa expansão deve transformar desde a conectividade global até a exploração de novos recursos fora da Terra.","link":"https://br.investing.com/news/stock-market-news/ubs-projeta-mercado-da-economia-espacial-em-us-13-trilhao-ate-2040-2005817","categoria":"ECONOMIA ESPACIAL","lang":"pt"},{"fonte":"Correio do Povo","pais":"Brasil","titulo":"Nobel da economia diz que impacto da IA no emprego é superestimado","resumo":"O ganhador do Nobel de Economia questionou a narrativa de que a Inteligência Artificial provocará um desemprego em massa. Segundo o especialista, os impactos da tecnologia no mercado de trabalho são, na verdade, superestimados pelo público e pela mídia. A análise sugere que a IA servirá mais como uma ferramenta de auxílio do que como uma substituta completa da mão de obra humana.","link":"https://www.correiodopovo.com.br/not%C3%ADcias/economia/nobel-da-economia-diz-que-impacto-da-ia-no-emprego-e-superestimado-1.1732110","categoria":"ECONOMIA TECNOLÓGICA","lang":"pt"},{"fonte":"Observatório do Terceiro Setor","pais":"Brasil","titulo":"Uso excessivo da IA pode gerar 'dívida cognitiva', mas especialista afirma que a tecnologia não substitui o pensamento humano","resumo":"Especialistas alertam que a dependência excessiva de ferramentas de Inteligência Artificial pode resultar em uma 'dívida cognitiva' para os usuários. Embora a tecnologia ofereça eficiência e automação, ressalta-se a importância vital de preservar o pensamento crítico humano. O debate foca em como utilizar a IA de forma complementar, mantendo a autonomia intelectual nas tarefas cotidianas.","link":"https://observatorio3setor.org.br/uso-excessivo-da-ia-pode-gerar-divida-cognitiva-mas-especialista-afirma-que-a-tecnologia-nao-substitui-o-pensamento-humano/","categoria":"INTELIGÊNCIA ARTIFICIAL","lang":"pt"},{"fonte":"E-Commerce Brasil","pais":"Brasil","titulo":"IA democratiza tecnologia, mas liderança deve seguir humana, diz cofundador da Nuvemshop","resumo":"O cofundador da Nuvemshop destaca que a Inteligência Artificial desempenha um papel crucial na democratização do acesso a recursos tecnológicos avançados. No entanto, ele reforça que, mesmo com a automação, a liderança estratégica e empática deve permanecer sob responsabilidade humana. A visão integra tecnologia e gestão para impulsionar negócios no ambiente digital atual.","link":"https://www.ecommercebrasil.com.br/noticias/ia-democratiza-tecnologia-diz-cofundador-da-nuvemshop","categoria":"INOVAÇÃO","lang":"pt"},{"fonte":"Prefeitura de São Paulo","pais":"Brasil","titulo":"São Paulo concentra mais de 221 mil empregos formais em tecnologia e registra crescimento de 61% em ocupações no setor em uma década","resumo":"O setor de tecnologia em São Paulo consolidou-se como um motor econômico robusto ao superar a marca de 221 mil empregos formais. Com um crescimento de 61% na ocupação de vagas em dez anos, o estado reafirma sua posição de liderança no ecossistema de inovação brasileiro. Os dados refletem a alta demanda por talentos qualificados e a contínua transformação digital das empresas locais.","link":"https://prefeitura.sp.gov.br/web/desenvolvimento/w/s%C3%A3o-paulo-concentra-mais-de-221-mil-empregos-formais-em-tecnologia-e-registra-crescimento-de-61-em-ocupa%C3%A7%C3%B5es-no-setor-em-uma-d%C3%A9cada","categoria":"MERCADO TRABALHO","lang":"pt"},{"fonte":"Forbes Brasil","pais":"Brasil","titulo":"IA Não Garante Vendas: Até 77% das Empresas dos Setores Líderes no Uso da Tecnologia Ficam Abaixo da Meta","resumo":"Um estudo revelador aponta que a implementação massiva de Inteligência Artificial não é, por si só, garantia de sucesso comercial. Até 77% das empresas que lideram o investimento tecnológico nos setores de ponta ainda falham em atingir suas metas de desempenho. O levantamento sugere que a estratégia de negócio e a execução operacional permanecem sendo fatores decisivos sobre a tecnologia isolada.","link":"https://forbes.com.br/forbes-money/2026/07/ia-nao-garante-vendas-ate-77-das-empresas-dos-setores-lideres-no-uso-da-tecnologia-ficam-abaixo-da-meta/","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"ES Brasil","pais":"Brasil","titulo":"ES investe em tecnologia para reforçar a segurança pública","resumo":"O governo do Espírito Santo tem implementado novas soluções tecnológicas com o objetivo de fortalecer as operações de segurança pública no estado. Entre as iniciativas, destacam-se o uso de monitoramento inteligente e sistemas integrados de dados para prevenir crimes e agilizar o tempo de resposta das autoridades. O projeto visa aumentar a eficiência estatal através da modernização digital e infraestrutura urbana.","link":"https://esbrasil.com.br/es-investimento-tecnologia-seguranca-2026/","categoria":"SEGURANÇA PÚBLICA","lang":"pt"},{"fonte":"SITEPD","pais":"Brasil","titulo":"Tecnologia leva análise tática baseada em IA para as 48 seleções da Copa","resumo":"A próxima edição da Copa do Mundo contará com um sistema avançado de análise tática impulsionado por Inteligência Artificial para todas as seleções. Essa tecnologia processa grandes volumes de dados em tempo real, fornecendo insights detalhados sobre desempenho físico e padrões de movimentação dos atletas. A iniciativa visa elevar o nível técnico e analítico das competições de alto rendimento global.","link":"https://sitepd.org.br/2026/07/17/tecnologia-analise-tatica-ia-para-selecoes-da-copa/","categoria":"TECNOLOGIA ESPORTIVA","lang":"pt"},{"fonte":"News and Sentinel","pais":"Estados Unidos","titulo":"Consórcio liderado pela WVU recebe US$ 321 milhões para projetos de segurança energética","resumo":"Um consórcio focado em tecnologia e infraestrutura resiliente de energia obteve um investimento massivo de US$ 321 milhões. O objetivo é fortalecer a segurança energética nos Estados Unidos por meio de inovações tecnológicas de ponta. Esta iniciativa promete transformar a resiliência das redes elétricas contra falhas e ameaças externas.","link":"https://www.newsandsentinel.com/news/local-news/2026/07/wvu-leads-resilient-energy-technology-and-infrastructure-consortium-chosen-to-invest-321m-for-energy-security-projects/","categoria":"ENERGIA","lang":"pt"},{"fonte":"ZME Science","pais":"Estados Unidos","titulo":"Cientistas criam computador funcional feito de molas que não consome eletricidade","resumo":"Pesquisadores desenvolveram um dispositivo computacional inovador que opera inteiramente através de mecanismos de molas, eliminando a necessidade de consumo elétrico. O projeto desafia os paradigmas da computação tradicional e abre novas possibilidades para sistemas mecânicos complexos. A tecnologia demonstra um avanço impressionante na eficiência energética aplicada à lógica computacional básica.","link":"https://www.zmescience.com/science/news-science/spring-computer-amazing/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Yahoo Finance","pais":"Estados Unidos","titulo":"Vantage AI anuncia iniciativa de capital de US$ 100 milhões para promover tecnologia algorítmica","resumo":"A Vantage AI oficializou um plano de investimento superior a US$ 100 milhões destinado ao avanço de tecnologias baseadas em algoritmos e inteligência artificial. O capital visa acelerar o desenvolvimento de soluções computacionais complexas para setores estratégicos. Este movimento reforça a tendência de mercado de priorizar inovações que otimizam processos através de aprendizado de máquina.","link":"https://finance.yahoo.com/technology/ai/articles/vantage-ai-announces-100m-capital-013700626.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"NASA Science (.gov)","pais":"Estados Unidos","titulo":"O crescente de Marte em destaque com a aproximação da missão Psyche da NASA","resumo":"A missão Psyche da NASA capturou imagens impressionantes de Marte durante sua trajetória de aproximação planetária. Estes dados visuais fornecem aos cientistas informações valiosas sobre as características atmosféricas e geológicas do planeta vermelho. O sucesso da missão continua a expandir os horizontes da exploração espacial e do entendimento do sistema solar.","link":"https://science.nasa.gov/photojournal/the-growing-crescent-of-mars-as-nasas-psyche-mission-approaches/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Jornal de Negócios","pais":"Estados Unidos","titulo":"Tecnologia volta a derrubar Wall Street: Nvidia e Apple disputam título de empresa mais valiosa","resumo":"O setor de tecnologia volta a ser o epicentro da volatilidade no mercado financeiro americano, impactando diretamente os índices de Wall Street. Gigantes como Nvidia e Apple protagonizam uma disputa acirrada pela liderança em valor de mercado. A oscilação reflete a alta expectativa dos investidores em relação à integração da inteligência artificial nas operações corporativas.","link":"https://www.jornaldenegocios.pt/mercados/bolsa/amp/tecnologia-volta-a-derrubar-wall-street-nvidia-e-apple-taco-a-taco-pelo-titulo-de-mais-valiosa?ref=DET_Recomendadas","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"G1","pais":"Estados Unidos","titulo":"Meta e Anthropic negociam acordo de US$ 10 bilhões para aluguel de data centers","resumo":"A Meta está em negociações avançadas para fornecer capacidade de processamento de dados para a Anthropic em um contrato bilionário. Este movimento estratégico destaca a crescente demanda por infraestrutura robusta necessária para treinar modelos avançados de inteligência artificial. O acordo reforça a colaboração entre os líderes do setor tecnológico na expansão da capacidade computacional global.","link":"https://g1.globo.com/tecnologia/noticia/2026/07/17/meta-e-anthropic-negociam-acordo-de-us-10-bilhoes-por-aluguel-de-data-centers-diz-jornal.ghtml","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"UMass Lowell","pais":"Estados Unidos","titulo":"Professor de Ciência da Computação recebe prêmio NSF CAREER para tornar a IA mais confiável","resumo":"Um pesquisador da área de ciência da computação foi premiado pela NSF por seu trabalho focado em aumentar a confiabilidade dos sistemas de inteligência artificial. O projeto busca criar estruturas mais transparentes e éticas para o desenvolvimento de modelos algorítmicos. O reconhecimento destaca a importância vital da segurança e da ética na rápida evolução tecnológica atual.","link":"https://www.uml.edu/news/stories/2026/amiri-nsf-career-award.aspx","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Expresso","pais":"Estados Unidos","titulo":"Netflix admite uso de IA em 300 produções e diz que tecnologia reduz custos","resumo":"A Netflix revelou a utilização de ferramentas de inteligência artificial em centenas de produções originais para otimizar fluxos de trabalho. A empresa afirma que a adoção da tecnologia tem sido fundamental para reduzir custos operacionais sem comprometer a qualidade visual. Esta estratégia sinaliza uma mudança estrutural na indústria do entretenimento global em direção à automação.","link":"https://expresso.pt/ia-inteligencia-artificial/2026-07-17-netflix-admite-uso-de-ia-em-300-producoes-e-diz-que-tecnologia-poupa-custos-0042f078","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Investing.com France","pais":"França","titulo":"UBS prevê um mercado da economia espacial de US$ 1,3 trilhão até 2040","resumo":"O relatório do banco UBS projeta uma expansão massiva na economia espacial nas próximas décadas. Com o avanço tecnológico e o aumento de investimentos privados, o setor deve atingir uma marca histórica de 1,3 trilhão de dólares. A estimativa reflete o otimismo com novas missões e infraestruturas orbitais globais.","link":"https://fr.investing.com/news/stock-market-news/ubs-prevoit-un-marche-de-leconomie-spatiale-a-1300-mrd-dici-2040-3504561","categoria":"ECONOMIA ESPACIAL","lang":"pt"},{"fonte":"tameteo.com","pais":"França","titulo":"O Wi-Fi em aviões e trens costuma ser muito ruim. Uma nova tecnologia pode finalmente mudar tudo","resumo":"Usuários de transporte público frequentemente enfrentam conectividade instável e lenta durante viagens. Uma nova tecnologia de rede está sendo desenvolvida para oferecer velocidades comparáveis às conexões terrestres. Essa inovação promete transformar a experiência de trabalho e entretenimento dos passageiros em deslocamento.","link":"https://www.tameteo.com/actualites/loisirs/le-wi-fi-a-bord-des-avions-et-des-trains-est-souvent-tres-mauvais-une-nouvelle-technologie-pourrait-enfin-tout-changer.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"lecourrier.vn","pais":"França","titulo":"A revolução digital está em andamento","resumo":"A transformação digital continua a redefinir os modelos de negócios e a interação social na França e no mundo. A adoção acelerada de novas ferramentas digitais está otimizando processos produtivos e alterando a economia tradicional. Essa mudança de paradigma é um motor essencial para o crescimento competitivo moderno.","link":"https://lecourrier.vn/la-revolution-numerique-est-en-marche/1351498.html","categoria":"TRANSFORMAÇÃO DIGITAL","lang":"pt"},{"fonte":"Investing.com France","pais":"França","titulo":"Stifel identifica suas principais ações em tecnologia de cadeia de suprimentos, com Celestica na liderança","resumo":"A empresa de investimentos Stifel destacou as empresas com maior potencial no setor de tecnologia de suprimentos. A Celestica surge como a principal recomendação devido à sua robustez operacional e capacidade de inovação. Essa análise orienta investidores interessados em ativos estratégicos para a logística global.","link":"https://fr.investing.com/news/stock-market-news/stifel-identifie-ses-valeurs-phares-en-technologie-de-la-chaine-dapprovisionnement-avec-celestica-en-tete-93CH-3504451","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"G1","pais":"França","titulo":"França bloqueia Polymarket e diz que plataforma opera de forma ilegal","resumo":"O governo francês determinou o bloqueio da plataforma de apostas baseada em criptoativos Polymarket por irregularidades legais. O regulador nacional aponta que o serviço opera sem as licenças necessárias para jogos de azar no país. A decisão marca um esforço rigoroso de supervisão sobre o mercado de previsões descentralizadas.","link":"https://g1.globo.com/tecnologia/noticia/2026/07/17/franca-bloqueia-polymarket-e-diz-que-plataforma-opera-de-forma-ilegal.ghtml","categoria":"REGULAÇÃO","lang":"pt"},{"fonte":"hantsfire.gov.uk","pais":"Inglaterra","titulo":"Serviço de bombeiros é reconhecido em premiação nacional de Tecnologia, Dados e Digital","resumo":"O serviço de bombeiros do Reino Unido recebeu reconhecimento em um prêmio nacional focado em inovações digitais e de dados. A iniciativa destaca a crescente integração de tecnologias avançadas para otimizar a resposta a emergências. Esse avanço reforça como a transformação digital está sendo essencial para aumentar a eficiência operacional e a segurança pública no país.","link":"https://www.hantsfire.gov.uk/fire-service-recognised-at-national-digital-data-and-technology-awards/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Engineering and Technology Magazine","pais":"Inglaterra","titulo":"Sistema a laser detecta metanol mortal em garrafas de bebidas lacradas","resumo":"Cientistas desenvolveram um sistema a laser capaz de identificar a presença de metanol tóxico em garrafas de bebidas alcoólicas sem a necessidade de abri-las. A tecnologia promete revolucionar a segurança do consumidor, combatendo o comércio de bebidas adulteradas de forma não invasiva. Esse avanço científico tem um grande potencial de impacto global para prevenir intoxicações graves.","link":"https://eandt.theiet.org/2026/07/17/new-laser-technology-helps-detect-methanol-laced-drinks","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"65 y más","pais":"Espanha","titulo":"As novas 'tatuagens inteligentes' que podem ajudar a monitorizar a saúde","resumo":"Pesquisadores estão desenvolvendo tatuagens inteligentes capazes de realizar o monitoramento contínuo de parâmetros vitais do corpo humano. Esta tecnologia inovadora promete transformar o acompanhamento de pacientes, permitindo diagnósticos mais rápidos e precisos diretamente a partir da pele.","link":"https://www.65ymas.com/salud/avances/nuevos-tatuajes-inteligentes-pueden-ayudar-monitorizar-salud_84285_102.html","categoria":"CIÊNCIA SAÚDE","lang":"pt"},{"fonte":"El Debate","pais":"Espanha","titulo":"Recriam em laboratório fenômeno de buracos negros que intrigou Stephen Hawking","resumo":"Cientistas conseguiram replicar em ambiente laboratorial um fenômeno astrofísico que desafiou a compreensão de Stephen Hawking sobre buracos negros. O experimento oferece novos dados cruciais para entender como a radiação interage em condições extremas de gravidade no universo.","link":"https://www.eldebate.com/ciencia/20260718/recrean-laboratorio-fenomeno-agujeros-negros-intrigo-stephen-hawking_438170.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"El Correo Gallego","pais":"Espanha","titulo":"Criada em Santiago a empresa TraffikGene, cuja tecnologia transporta tratamentos de câncer para o interior das células","resumo":"A startup espanhola TraffikGene desenvolveu uma tecnologia pioneira focada em entregar tratamentos avançados contra o câncer diretamente no interior das células. Este avanço representa um passo significativo para aumentar a eficácia das terapias oncológicas atuais.","link":"https://www.elcorreogallego.es/santiago/2026/07/17/nace-santiago-empresa-traffikgene-terapias-cancer-132568666.html","categoria":"BIOTECNOLOGIA","lang":"pt"},{"fonte":"La Ciencia de la Mula Francis","pais":"Espanha","titulo":"Rumo aos transistores ‘subnanométricos’ com tecnologia CFET","resumo":"A indústria de semicondutores avança na arquitetura CFET para possibilitar a criação de transistores abaixo da escala nanométrica. Essa evolução é essencial para a próxima geração de processadores, visando maior densidade de componentes e eficiência energética.","link":"https://francis.naukas.com/2026/07/17/hacia-los-transistores-subnanometricos-con-tecnologia-cfet/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Xataka","pais":"Espanha","titulo":"A ciência acreditava que as tempestades geomagnéticas tinham um limite. Um erro de cálculo escondia a verdade","resumo":"Um estudo recente revelou um erro histórico de cálculo que subestimava a magnitude potencial das tempestades geomagnéticas. A descoberta força a comunidade científica a repensar a resiliência das redes de infraestrutura global contra eventos solares extremos.","link":"https://www.xataka.com/espacio/ciencia-creia-que-tormentas-geomagneticas-tenian-limite-error-calculo-llevaba-decadas-ocultando-verdad","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"National Geographic España","pais":"Espanha","titulo":"Esta câmera 3D é única no mundo da tecnologia: imita os olhos de uma aranha e consome pouquíssima energia","resumo":"Inspirada pela biologia dos olhos de aranhas, uma nova câmera 3D utiliza visão composta para capturar profundidade com eficiência energética extrema. O design inovador promete aplicações revolucionárias em robótica e dispositivos autônomos que exigem alta autonomia.","link":"https://www.nationalgeographic.com.es/tecnologia/esta-camara-3d-es-unica-mundo-tecnologia-imita-ojos-arana-y-consume-menos-que-piensas_28903","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"elperiodic.com","pais":"Espanha","titulo":"Asfalto que resfria a cidade, saúde e tecnologia: as cinco ideias universitárias premiadas pela UV","resumo":"A Universidade de Valência premiou projetos estudantis que unem tecnologia e sustentabilidade para resolver problemas urbanos reais. Entre as inovações, destaca-se um tipo de asfalto inteligente capaz de reduzir a temperatura nas cidades durante o verão.","link":"https://www.elperiodic.com/asfalto-enfria-ciudad-salud-tecnologia-cinco-ideas-universitarias-para-cambiar-sociedad-premiadas_1084618","categoria":"INOVAÇÃO","lang":"pt"},{"fonte":"EL PAÍS","pais":"Espanha","titulo":"Dentro de ‘Fallout’: quando a ficção científica de um videogame se torna uma superprodução de Hollywood","resumo":"A adaptação da franquia de jogos Fallout para a televisão destaca a convergência entre cultura pop e tecnologia de efeitos visuais. A produção demonstra como o universo digital complexo de um videogame pode ser transposto fielmente para a realidade cinematográfica.","link":"https://elpais.com/television/2026-07-18/dentro-de-fallout-cuando-la-ciencia-ficcion-de-un-videojuego-se-convierte-en-una-tangible-superproduccion-hollywoodiense.html?outputType=amp","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"FinanzNachrichten.de","pais":"Alemanha","titulo":"NurExone: Tecnologia de exossomas salta do laboratório para o mercado de bem-estar!","resumo":"A NurExone está revolucionando o mercado de saúde ao aplicar sua tecnologia avançada de exossomas em produtos de bem-estar. Esta transição do ambiente laboratorial para o consumidor final promete tratamentos mais eficazes e personalizados. A inovação destaca o potencial comercial da biotecnologia alemã em escalar soluções científicas complexas para o grande público.","link":"https://www.finanznachrichten.de/nachrichten-2026-07/69061743-nurexone-exosomen-technologie-springt-vom-labor-in-den-wellnessmarkt-176.htm","categoria":"BIOTECNOLOGIA","lang":"pt"},{"fonte":"Volksstimme","pais":"Alemanha","titulo":"Economia no Harz: Sucesso mundial de Halberstadt: Nanostone Water expande e busca funcionários","resumo":"A empresa Nanostone Water, sediada em Halberstadt, alcançou reconhecimento global devido às suas soluções avançadas de tratamento de água. Com a expansão de suas operações, a organização abriu diversas vagas de emprego, fortalecendo a economia local e o setor industrial. O sucesso demonstra a força das tecnologias alemãs de sustentabilidade no mercado internacional.","link":"https://www.volksstimme.de/lokal/halberstadt/weltweiter-erfolg-aus-halberstadt-nanostone-water-expandiert-und-sucht-mitarbeiter-4287388","categoria":"TECNOLOGIA INDUSTRIAL","lang":"pt"},{"fonte":"kpmg.com","pais":"Alemanha","titulo":"IA Generativa na economia alemã 2026 - Relatório do setor de mídia","resumo":"O novo relatório detalha como a inteligência artificial generativa está remodelando o panorama da mídia alemã até 2026. A análise explora novas formas de automação de conteúdo e mudanças estratégicas nos modelos de negócio do setor. O documento serve como um guia fundamental para entender os impactos digitais na comunicação profissional.","link":"https://kpmg.com/de/de/themen/digital-transformation/kuenstliche-intelligenz/studie-generative-ki-in-der-deutschen-wirtschaft-2026/branchenreport-media.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"kpmg.com","pais":"Alemanha","titulo":"IA Generativa na economia alemã 2026 (Manufatura Industrial)","resumo":"Este relatório técnico analisa a implementação estratégica da IA generativa dentro do setor de manufatura na Alemanha. Focado nos avanços previstos para 2026, o estudo destaca como a automação inteligente otimiza a linha de produção. A adoção dessas ferramentas é vista como essencial para manter a competitividade global da indústria alemã.","link":"https://kpmg.com/de/de/themen/digital-transformation/kuenstliche-intelligenz/studie-generative-ki-in-der-deutschen-wirtschaft-2026/branchenreport-industrial-manufacturing.html","categoria":"INDÚSTRIA","lang":"pt"},{"fonte":"BILD","pais":"Alemanha","titulo":"RB Leipzig: Revolução no buffet com cerveja, smoothie de banana e IA","resumo":"O clube RB Leipzig está inovando no setor de catering esportivo ao integrar inteligência artificial para otimizar a experiência do torcedor. Com cardápios adaptados e processos de servir mais ágeis, o clube utiliza dados para prever demandas de consumo. Essa iniciativa exemplifica como a tecnologia melhora a conveniência em grandes eventos esportivos.","link":"https://www.bild.de/sport/fussball/rb-leipzig-caterer-revolution-mit-bier-bananen-smoothie-und-ki-6a58cc298e06d6769140eecb","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"SZ.de","pais":"Alemanha","titulo":"Segurança no transporte público - BVG quer expandir vigilância com novas câmeras","resumo":"A operadora BVG planeja fortalecer a segurança no transporte público de Berlim por meio da implementação de um novo sistema de câmeras. A atualização tecnológica visa monitorar áreas críticas e proporcionar um ambiente mais seguro aos passageiros. O projeto levanta debates sobre a eficácia da vigilância digital aliada à privacidade urbana.","link":"https://www.sueddeutsche.de/wirtschaft/sicherheit-im-oepnv-bvg-will-ueberwachung-mit-neuen-kameras-ausbauen-dpa.urn-newsml-dpa-com-20090101-260718-930-402891","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"kpmg.com","pais":"Alemanha","titulo":"IA Generativa na economia alemã 2026 (Energia)","resumo":"A pesquisa examina o papel transformador da inteligência artificial generativa na gestão e eficiência do setor energético alemão. Com projeções para 2026, o estudo discute o uso da tecnologia para otimizar redes de distribuição e fontes renováveis. Este avanço é vital para os objetivos de transição energética e sustentabilidade do país.","link":"https://kpmg.com/de/de/themen/digital-transformation/kuenstliche-intelligenz/studie-generative-ki-in-der-deutschen-wirtschaft-2026/branchenreport-energy.html","categoria":"ENERGIA","lang":"pt"},{"fonte":"Vatican News","pais":"Alemanha","titulo":"Pioneiro da IA, Lee, pede uma pausa na corrida tecnológica","resumo":"O renomado pioneiro em inteligência artificial, Lee, defendeu publicamente uma pausa estratégica no ritmo acelerado do desenvolvimento tecnológico global. Ele argumenta que a humanidade precisa de tempo para compreender as implicações éticas e de segurança das ferramentas de IA atuais. O apelo ecoa preocupações crescentes sobre o controle e o impacto social das máquinas avançadas.","link":"https://www.vaticannews.va/de/vatikan/news/2026-07/vatikan-ki-pionier-lee-fordert-atempause-im-technologie-wettlauf.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Yahoo!ファイナンス","pais":"Japão","titulo":"Securitize e Cantor anunciam parceria para utilizar tecnologia de tokenização em IPOs corporativos","resumo":"A parceria entre a Securitize e a Cantor Fitzgerald visa integrar a tecnologia de tokenização nos processos de ofertas públicas iniciais. Esta iniciativa busca modernizar o mercado financeiro japonês, aumentando a eficiência na emissão de ativos digitais e atraindo novos investidores para o ambiente corporativo.","link":"https://finance.yahoo.co.jp/news/detail/397ebaf000c46cf839978e373ba6637deb073574","categoria":"FINTECH","lang":"pt"},{"fonte":"Yahoo!ニュース","pais":"Japão","titulo":"Ex-engenheiro da Sony revive sabor da avó: a trajetória da reabertura do 'Tougen Ramen' após 19 anos","resumo":"Após quase duas décadas de hiato, um ex-engenheiro da Sony utilizou suas habilidades técnicas e dedicação pessoal para restaurar a receita clássica de sua avó. O projeto destaca a interseção entre história familiar e inovação, revitalizando um ícone cultural local em Kagoshima.","link":"https://news.yahoo.co.jp/articles/8139434e04270a40beffd51ef1e980093833234d","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"daito.ac.jp","pais":"Japão","titulo":"Estudantes de Ciências da Saúde desenvolvem bebida não alcoólica a partir de resíduos de vinho","resumo":"Estudantes da Universidade Daito Bunka realizaram um projeto de upcycling ao transformar borras de vinho em uma nova bebida saudável e não alcoólica. A iniciativa demonstra o potencial da colaboração acadêmica e industrial para a criação de produtos sustentáveis e inovadores.","link":"https://www.daito.ac.jp/daitoeyes/campuslife/article1601_06573","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"JBpress","pais":"Japão","titulo":"Por que o sucesso da OIST não pode ser replicado? Os pontos cegos da reforma universitária no Japão","resumo":"Este artigo analisa os contrastes entre o alto desempenho da Universidade de Ciência e Tecnologia de Okinawa e outras instituições japonesas. A análise discute as falhas estruturais nas reformas educacionais e os desafios políticos para alcançar a excelência em pesquisa global.","link":"https://jbpress.ismedia.jp/articles/-/95996","categoria":"EDUCAÇÃO CIENTÍFICA","lang":"pt"},{"fonte":"Forbes Portugal","pais":"China","titulo":"China lança organização mundial para a IA e desafia liderança dos EUA na governança tecnológica","resumo":"A China estabeleceu uma nova organização internacional voltada para a inteligência artificial, buscando fortalecer sua influência global no setor. A iniciativa visa propor diretrizes éticas e de desenvolvimento, desafiando diretamente o domínio dos Estados Unidos na governança tecnológica mundial.","link":"https://www.forbespt.com/china-lanca-organizacao-mundial-para-a-ia-e-desafia-lideranca-dos-eua-na-governacao-da-tecnologia/","categoria":"GEOPOLÍTICA TECNOLÓGICA","lang":"pt"},{"fonte":"Al Jazeera","pais":"China","titulo":"Xi Jinping, da China, lança nova aliança de IA: O que é isso?","resumo":"O presidente Xi Jinping oficializou a criação de uma nova coalizão internacional focada em IA, sinalizando a ambição chinesa de liderar padrões globais. Este movimento busca unir parceiros comerciais em torno de uma agenda comum de desenvolvimento, contornando pressões geopolíticas ocidentais.","link":"https://www.aljazeera.com/news/2026/7/17/chinas-xi-jinping-launches-new-ai-alliance-what-is-it","categoria":"POLÍTICA","lang":"pt"},{"fonte":"新浪财经","pais":"China","titulo":"Observações da Conferência Mundial de IA 2026: IA migra da 'perseguição técnica' para a 'aplicação de valor'","resumo":"A Conferência Mundial de Inteligência Artificial de 2026 destacou uma mudança estratégica no setor chinês, focando menos em superar capacidades técnicas e mais na entrega de resultados práticos. O foco agora é integrar a IA em setores econômicos reais para gerar retornos financeiros mensuráveis.","link":"https://finance.sina.com.cn/roll/2026-07-18/doc-iniifane1648755.shtml","categoria":"INTELIGÊNCIA ARTIFICIAL","lang":"pt"},{"fonte":"新浪网","pais":"China","titulo":"Agentes de IA impulsionam a economia de tokens: volume diário de chamadas na China cresce mais de 1000 vezes em 2 anos","resumo":"A popularização de agentes inteligentes inteligentes na China gerou um crescimento exponencial na economia de tokens. O aumento de mil vezes nas chamadas diárias reflete uma rápida adoção da tecnologia por empresas e desenvolvedores, consolidando a infraestrutura de dados no país.","link":"https://k.sina.com.cn/article_1826017320_6cd6d02802001t9cy.html?from=tech","categoria":"ECONOMIA DIGITAL","lang":"pt"},{"fonte":"广州日报新花城","pais":"China","titulo":"Controle remoto de canteiros de obras a quilômetros de distância: tecnologia de operação sem luz é destaque na WAIC 2026","resumo":"A automação de canteiros de obras através de operação remota e máquinas inteligentes sem supervisão humana presencial foi um dos destaques técnicos. Essa inovação visa aumentar a eficiência, reduzir riscos laborais e otimizar a produtividade industrial em ambientes complexos.","link":"https://huacheng.gz-cmc.com/pages/2026/07/18/0d19d438259b4e63b719a12c547da1aa.html","categoria":"TECNOLOGIA INDUSTRIAL","lang":"pt"},{"fonte":"South China Morning Post","pais":"China","titulo":"Lalamove e EY de Hong Kong unem forças para moldar a 'economia de baixa altitude'","resumo":"Lalamove e Ernst & Young firmaram uma parceria estratégica focada no desenvolvimento da economia de baixa altitude em Hong Kong. A iniciativa planeja explorar o uso de drones e aeronaves leves para logística urbana, criando novos padrões para o transporte aéreo autônomo.","link":"https://www.scmp.com/news/hong-kong/hong-kong-economy/article/3361016/hong-kongs-lalamove-ey-team-shape-low-altitude-economy-whats-plan","categoria":"LOGÍSTICA TECNOLÓGICA","lang":"pt"},{"fonte":"United Nations Sustainable Development Group","pais":"China","titulo":"'A tecnologia deve servir às pessoas, não o contrário' - Secretário-Geral da ONU na Conferência Mundial de IA","resumo":"Durante a Conferência Mundial de IA, o Secretário-Geral da ONU enfatizou a necessidade urgente de colocar o bem-estar humano como prioridade no desenvolvimento de algoritmos. O discurso defende uma governança global que impeça que a inovação tecnológica se torne um risco para os direitos fundamentais.","link":"https://unsdg.un.org/latest/announcements/technology-must-serve-people-not-other-way-around-un-secretary-general-world","categoria":"ÉTICA TECNOLÓGICA","lang":"pt"},{"fonte":"Euronews.com","pais":"China","titulo":"China apela por esforço global na IA perante sanções dos EUA","resumo":"Diante das crescentes restrições e sanções impostas pelos EUA sobre chips e semicondutores, a China intensificou o pedido por colaboração internacional em IA. O governo chinês argumenta que a cooperação científica global é essencial para evitar a fragmentação tecnológica e promover o progresso universal.","link":"https://pt.euronews.com/next/2026/07/17/china-xi-apela-a-cooperacao-global-em-ia-enquanto-restricoes-dos-eua-limitam-tecnologia","categoria":"GEOPOLÍTICA","lang":"pt"},{"fonte":"India Today","pais":"Índia","titulo":"Vídeo: O momento do lançamento do primeiro foguete privado da Índia, Vikram-1","resumo":"Este registro audiovisual captura o marco histórico do lançamento do Vikram-1, o primeiro foguete desenvolvido inteiramente por uma empresa privada indiana. O evento simboliza a abertura de uma nova era na exploração espacial do país, demonstrando o avanço tecnológico local e o potencial de competitividade da indústria aeroespacial privada em âmbito global.","link":"https://www.indiatoday.in/amp/science/story/vikram-1-rocket-launch-moment-skyroot-aerospace-sriharikota-india-privately-developed-orbital-class-rocket-2950553-2026-07-18","categoria":"CIÊNCIA ESPACIAL","lang":"pt"},{"fonte":"Devdiscourse","pais":"Índia","titulo":"Lançamento histórico: Skyroot Aerospace impulsiona os esforços espaciais indianos","resumo":"A Skyroot Aerospace consolidou seu papel no setor espacial indiano ao realizar com sucesso o lançamento de seu foguete, marcando um ponto de virada para a iniciativa privada. O feito não apenas valida a capacidade de engenharia da empresa, mas também alinha a Índia aos líderes mundiais em tecnologia de lançadores espaciais acessíveis e eficientes.","link":"https://www.devdiscourse.com/article/technology/3952285-historic-launch-skyroot-aerospace-elevates-indian-space-efforts","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"ThePrint","pais":"Índia","titulo":"A ISRO está perdendo cientistas para o setor espacial privado. Como a NASA resolveu isso há 40 anos","resumo":"O crescimento do setor espacial privado na Índia tem gerado um desafio de retenção de talentos para a agência estatal ISRO. Analistas apontam para estratégias históricas implementadas pela NASA, sugerindo que parcerias e políticas de incentivo podem ser o caminho para equilibrar a competição por especialistas e garantir a continuidade da inovação pública.","link":"https://theprint.in/science/isro-losing-scientists-private-space-nasa-solved-problem-40-years/2989776/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Lapaas Voice","pais":"Índia","titulo":"Tata Electronics iniciará a primeira fábrica de chips da Índia com tecnologia de 90nm","resumo":"A Tata Electronics anunciou o início das operações da primeira fábrica de semicondutores da Índia, utilizando o processo tecnológico de 90nm. Este movimento estratégico é crucial para reduzir a dependência indiana de importações e fortalecer a soberania tecnológica do país em um setor altamente competitivo e essencial para a economia moderna.","link":"https://voice.lapaas.com/tata-electronics-to-begin-indias-first-chip-fab-with-90nm-process-technology/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"The New Indian Express","pais":"Índia","titulo":"Startup de Chennai reivindica avanço em tecnologia de baterias","resumo":"Uma startup emergente de Chennai revelou um progresso técnico significativo no desenvolvimento de baterias, prometendo maior eficiência e durabilidade. Essa inovação tem potencial para acelerar a adoção de veículos elétricos na Índia e transformar a cadeia de suprimentos de armazenamento de energia, colocando a empresa no mapa global de soluções sustentáveis.","link":"https://www.newindianexpress.com/cities/chennai/2026/Jul/18/chennai-startup-claims-breakthrough-in-battery-technology","categoria":"INOVAÇÃO","lang":"pt"},{"fonte":"The Economic Times","pais":"Índia","titulo":"Índia e Estônia buscam maior cooperação em tecnologia digital e manufatura","resumo":"Índia e Estônia estabeleceram um diálogo focado em aprofundar a cooperação nos setores de tecnologia digital e manufatura avançada. O objetivo é fortalecer a parceria estratégica entre os dois países e com a União Europeia, promovendo o intercâmbio de soluções governamentais digitais e o impulsionamento da base industrial indiana.","link":"https://m.economictimes.com/small-biz/trade/exports/insights/india-estonia-eye-deeper-cooperation-in-digital-technology-manufacturing-to-strengthen-india-eu-partnership-piyush-goyal/articleshow/132474064.cms","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"India Shipping News","pais":"Índia","titulo":"Piyush Goyal dialoga com empresas finlandesas de tecnologia e indústria para estreitar parceria com a Índia","resumo":"O ministro Piyush Goyal realizou reuniões estratégicas com líderes da indústria finlandesa visando ampliar a colaboração em setores tecnológicos de ponta. O engajamento busca atrair investimentos, compartilhar conhecimentos técnicos e fortalecer os laços econômicos entre a Índia e a Finlândia em áreas críticas de desenvolvimento industrial e inovação tecnológica.","link":"https://indiashippingnews.com/commerce/piyush-goyal-engages-with-leading-finnish-technology-and-industrial-companies-to-deepen-india-finland-partnership/","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Notícias ao Minuto","pais":"Portugal","titulo":"Não é mágica, é ciência: Como recuperar alface murcha em 20 minutos","resumo":"Este artigo explica o processo científico de reidratação celular que permite revitalizar vegetais folhosos em pouco tempo. Utilizando princípios básicos de botânica, a técnica oferece uma solução prática para reduzir o desperdício alimentar doméstico. É uma dica valiosa para otimizar o consumo consciente de alimentos frescos no dia a dia.","link":"https://www.noticiasaominuto.com/lifestyle/3023433/nao-e-magia-e-ciencia-como-recuperar-a-alface-murcha-em-20-minutos","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Silicon Portugal","pais":"Portugal","titulo":"Samsung apresenta tecnologia Flex Titanium para telas dobráveis","resumo":"A Samsung revelou o avanço da tecnologia Flex Titanium, focada em aumentar a durabilidade e a resistência de dispositivos dobráveis. A nova composição de materiais promete reduzir significativamente os danos causados por dobras repetidas em telas flexíveis. Esta inovação marca um passo importante para a longevidade dos smartphones de última geração no mercado.","link":"https://www.silicon.pt/samsung-apresenta-tecnologia-flex-titanium-para-ecras-dobraveis-100095.html/amp","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Marketeer","pais":"Portugal","titulo":"Papel higiênico mais sustentável? Marca aposta em nova tecnologia híbrida","resumo":"Uma nova abordagem na fabricação de produtos de higiene pessoal utiliza tecnologia híbrida para promover maior sustentabilidade ambiental. O processo visa diminuir a pegada de carbono e o consumo de recursos hídricos durante a produção industrial. A iniciativa reflete a crescente demanda do mercado por alternativas ecológicas em itens essenciais do cotidiano.","link":"https://marketeer.sapo.pt/papel-higienico-mais-sustentavel-marca-aposta-em-nova-tecnologia-hibrida/","categoria":"INOVAÇÃO","lang":"pt"},{"fonte":"Observador","pais":"Portugal","titulo":"O cruzamento entre as artes, tecnologia e investigação","resumo":"O artigo explora a convergência entre criatividade artística, avanços tecnológicos e rigor científico no cenário atual. Esta intersecção promove novas formas de expressão e descoberta, desafiando os limites tradicionais de cada área de conhecimento. O impacto deste movimento é visível em projetos que utilizam ferramentas digitais para expandir horizontes culturais e educacionais.","link":"https://observador.pt/especiais/escola-das-artes-da-universidade-catolica-o-espaco-de-cruzamento-entre-as-artes-tecnologia-investigacao-e-industrias-criativas/","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"Finanças, Câmbio e Investimentos","pais":"Brazil","titulo":"UBS projects space economy market to reach $1.3 trillion by 2040","resumo":"UBS bank projects exponential growth for the space economy, forecasting the sector will reach $1.3 trillion by 2040. The analysis highlights the rapid evolution of aerospace technologies and the growing privatization of the segment as key pillars. This expansion is expected to transform everything from global connectivity to the exploration of new resources beyond Earth.","link":"https://br.investing.com/news/stock-market-news/ubs-projeta-mercado-da-economia-espacial-em-us-13-trilhao-ate-2040-2005817","categoria":"SPACE ECONOMY","lang":"en"},{"fonte":"Correio do Povo","pais":"Brazil","titulo":"Nobel laureate in economics says the impact of AI on employment is overestimated","resumo":"The Nobel Prize winner in Economics has questioned the narrative that Artificial Intelligence will lead to mass unemployment. According to the expert, the technology's impacts on the labor market are, in fact, overestimated by the public and the media. The analysis suggests that AI will serve more as a support tool rather than a complete replacement for human labor.","link":"https://www.correiodopovo.com.br/not%C3%ADcias/economia/nobel-da-economia-diz-que-impacto-da-ia-no-emprego-e-superestimado-1.1732110","categoria":"TECHNOLOGY ECONOMY","lang":"en"},{"fonte":"Observatório do Terceiro Setor","pais":"Brazil","titulo":"Excessive AI use can lead to 'cognitive debt,' but expert says technology does not replace human thought","resumo":"Experts warn that excessive reliance on Artificial Intelligence tools could result in a 'cognitive debt' for users. While the technology offers efficiency and automation, the vital importance of preserving human critical thinking is emphasized. The debate focuses on how to use AI complementarily while maintaining intellectual autonomy in daily tasks.","link":"https://observatorio3setor.org.br/uso-excessivo-da-ia-pode-gerar-divida-cognitiva-mas-especialista-afirma-que-a-tecnologia-nao-substitui-o-pensamento-humano/","categoria":"ARTIFICIAL INTELLIGENCE","lang":"en"},{"fonte":"E-Commerce Brasil","pais":"Brazil","titulo":"AI democratizes technology, but leadership must remain human, says Nuvemshop co-founder","resumo":"The co-founder of Nuvemshop highlights that Artificial Intelligence plays a crucial role in democratizing access to advanced technological resources. However, he reinforces that even with automation, strategic and empathetic leadership must remain the responsibility of humans. The vision integrates technology and management to boost businesses in today's digital environment.","link":"https://www.ecommercebrasil.com.br/noticias/ia-democratiza-tecnologia-diz-cofundador-da-nuvemshop","categoria":"INNOVATION","lang":"en"},{"fonte":"Prefeitura de São Paulo","pais":"Brazil","titulo":"São Paulo concentrates over 221,000 formal tech jobs and records 61% growth in sector occupations over a decade","resumo":"The technology sector in São Paulo has consolidated itself as a robust economic engine, surpassing the 221,000 formal jobs mark. With a 61% growth in filled positions over ten years, the state reaffirms its leadership position in the Brazilian innovation ecosystem. The data reflects the high demand for qualified talent and the continuous digital transformation of local companies.","link":"https://prefeitura.sp.gov.br/web/desenvolvimento/w/s%C3%A3o-paulo-concentra-mais-de-221-mil-empregos-formais-em-tecnologia-e-registra-crescimento-de-61-em-ocupa%C3%A7%C3%B5es-no-setor-em-uma-d%C3%A9cada","categoria":"LABOR MARKET","lang":"en"},{"fonte":"Forbes Brasil","pais":"Brazil","titulo":"AI does not guarantee sales: Up to 77% of companies in sectors leading technology use miss their targets","resumo":"A revealing study points out that the massive implementation of Artificial Intelligence is not, in itself, a guarantee of commercial success. Up to 77% of companies leading technological investment in top-tier sectors still fail to reach their performance goals. The survey suggests that business strategy and operational execution remain decisive factors over technology alone.","link":"https://forbes.com.br/forbes-money/2026/07/ia-nao-garante-vendas-ate-77-das-empresas-dos-setores-lideres-no-uso-da-tecnologia-ficam-abaixo-da-meta/","categoria":"BUSINESS","lang":"en"},{"fonte":"ES Brasil","pais":"Brazil","titulo":"ES invests in technology to strengthen public security","resumo":"The government of Espírito Santo has implemented new technological solutions aimed at strengthening public security operations in the state. Initiatives include the use of intelligent monitoring and integrated data systems to prevent crime and speed up authorities' response times. The project aims to increase state efficiency through digital modernization and urban infrastructure.","link":"https://esbrasil.com.br/es-investimento-tecnologia-seguranca-2026/","categoria":"PUBLIC SECURITY","lang":"en"},{"fonte":"SITEPD","pais":"Brazil","titulo":"Technology brings AI-based tactical analysis to the 48 World Cup teams","resumo":"The next edition of the World Cup will feature an advanced tactical analysis system powered by Artificial Intelligence for all teams. This technology processes large volumes of data in real time, providing detailed insights into physical performance and athlete movement patterns. The initiative aims to raise the technical and analytical level of high-performance global competitions.","link":"https://sitepd.org.br/2026/07/17/tecnologia-analise-tatica-ia-para-selecoes-da-copa/","categoria":"SPORTS TECHNOLOGY","lang":"en"},{"fonte":"News and Sentinel","pais":"United States","titulo":"Consortium led by WVU receives $321 million for energy security projects","resumo":"A consortium focused on technology and resilient energy infrastructure has secured a massive $321 million investment. The goal is to strengthen energy security in the United States through cutting-edge technological innovations. This initiative promises to transform the resilience of electrical grids against failures and external threats.","link":"https://www.newsandsentinel.com/news/local-news/2026/07/wvu-leads-resilient-energy-technology-and-infrastructure-consortium-chosen-to-invest-321m-for-energy-security-projects/","categoria":"ENERGY","lang":"en"},{"fonte":"ZME Science","pais":"United States","titulo":"Scientists create functional computer made of springs that consumes no electricity","resumo":"Researchers have developed an innovative computational device that operates entirely through spring mechanisms, eliminating the need for electrical consumption. The project challenges traditional computing paradigms and opens new possibilities for complex mechanical systems. The technology demonstrates an impressive advancement in energy efficiency applied to basic computational logic.","link":"https://www.zmescience.com/science/news-science/spring-computer-amazing/","categoria":"SCIENCE","lang":"en"},{"fonte":"Yahoo Finance","pais":"United States","titulo":"Vantage AI announces $100 million capital initiative to promote algorithmic technology","resumo":"Vantage AI has formalized an investment plan of over $100 million aimed at the advancement of algorithm-based technologies and artificial intelligence. The capital seeks to accelerate the development of complex computational solutions for strategic sectors. This move reinforces the market trend of prioritizing innovations that optimize processes through machine learning.","link":"https://finance.yahoo.com/technology/ai/articles/vantage-ai-announces-100m-capital-013700626.html","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"NASA Science (.gov)","pais":"United States","titulo":"Mars crescent in focus as NASA's Psyche mission approaches","resumo":"NASA's Psyche mission has captured stunning images of Mars during its planetary approach trajectory. This visual data provides scientists with valuable information about the atmospheric and geological characteristics of the Red Planet. The mission's success continues to expand the horizons of space exploration and understanding of the solar system.","link":"https://science.nasa.gov/photojournal/the-growing-crescent-of-mars-as-nasas-psyche-mission-approaches/","categoria":"SCIENCE","lang":"en"},{"fonte":"Jornal de Negócios","pais":"United States","titulo":"Technology shakes up Wall Street again: Nvidia and Apple fight for the title of most valuable company","resumo":"The technology sector is once again the epicenter of volatility in the American financial market, directly impacting Wall Street indices. Giants like Nvidia and Apple are locked in a tight battle for market cap leadership. The fluctuation reflects investors' high expectations regarding the integration of artificial intelligence into corporate operations.","link":"https://www.jornaldenegocios.pt/mercados/bolsa/amp/tecnologia-volta-a-derrubar-wall-street-nvidia-e-apple-taco-a-taco-pelo-titulo-de-mais-valiosa?ref=DET_Recomendadas","categoria":"BUSINESS","lang":"en"},{"fonte":"G1","pais":"United States","titulo":"Meta and Anthropic negotiate $10 billion deal for data center rental","resumo":"Meta is in advanced negotiations to provide data processing capacity to Anthropic in a multi-billion dollar contract. This strategic move highlights the growing demand for robust infrastructure necessary to train advanced artificial intelligence models. The agreement reinforces collaboration between technology sector leaders in expanding global computational capacity.","link":"https://g1.globo.com/tecnologia/noticia/2026/07/17/meta-e-anthropic-negociam-acordo-de-us-10-bilhoes-por-aluguel-de-data-centers-diz-jornal.ghtml","categoria":"BUSINESS","lang":"en"},{"fonte":"UMass Lowell","pais":"United States","titulo":"Computer Science professor receives NSF CAREER award to make AI more reliable","resumo":"A computer science researcher has been awarded by the NSF for his work focused on increasing the reliability of artificial intelligence systems. The project seeks to create more transparent and ethical frameworks for the development of algorithmic models. The recognition highlights the vital importance of safety and ethics in today's rapid technological evolution.","link":"https://www.uml.edu/news/stories/2026/amiri-nsf-career-award.aspx","categoria":"SCIENCE","lang":"en"},{"fonte":"Expresso","pais":"United States","titulo":"Netflix admits using AI in 300 productions, says technology cuts costs","resumo":"Netflix has revealed it is utilizing artificial intelligence tools across hundreds of original productions to streamline workflows. The company states that adopting this technology has been fundamental in reducing operational costs without compromising visual quality. This strategy signals a structural shift in the global entertainment industry toward automation.","link":"https://expresso.pt/ia-inteligencia-artificial/2026-07-17-netflix-admite-uso-de-ia-em-300-producoes-e-diz-que-tecnologia-poupa-custos-0042f078","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Investing.com France","pais":"France","titulo":"UBS forecasts $1.3 trillion space economy market by 2040","resumo":"A report by UBS bank projects massive expansion in the space economy over the coming decades. Driven by technological advancements and increased private investment, the sector is expected to reach a historic $1.3 trillion valuation. The estimate reflects optimism surrounding new orbital missions and global infrastructure.","link":"https://fr.investing.com/news/stock-market-news/ubs-prevoit-un-marche-de-leconomie-spatiale-a-1300-mrd-dici-2040-3504561","categoria":"SPACE ECONOMY","lang":"en"},{"fonte":"tameteo.com","pais":"France","titulo":"Wi-Fi on planes and trains is usually terrible. A new technology could finally change everything","resumo":"Public transit passengers frequently face unstable and slow connectivity while traveling. A new network technology is being developed to offer speeds comparable to ground-based connections. This innovation promises to transform the work and entertainment experience for passengers on the move.","link":"https://www.tameteo.com/actualites/loisirs/le-wi-fi-a-bord-des-avions-et-des-trains-est-souvent-tres-mauvais-une-nouvelle-technologie-pourrait-enfin-tout-changer.html","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"lecourrier.vn","pais":"France","titulo":"The digital revolution is underway","resumo":"Digital transformation continues to redefine business models and social interaction in France and globally. The accelerated adoption of new digital tools is optimizing production processes and altering the traditional economy. This paradigm shift is a key driver for modern competitive growth.","link":"https://lecourrier.vn/la-revolution-numerique-est-en-marche/1351498.html","categoria":"DIGITAL TRANSFORMATION","lang":"en"},{"fonte":"Investing.com France","pais":"France","titulo":"Stifel identifies top supply chain technology stocks, with Celestica in the lead","resumo":"Investment firm Stifel has highlighted the companies with the highest potential in the supply chain technology sector. Celestica emerges as the top recommendation due to its operational robustness and capacity for innovation. This analysis guides investors interested in strategic assets for global logistics.","link":"https://fr.investing.com/news/stock-market-news/stifel-identifie-ses-valeurs-phares-en-technologie-de-la-chaine-dapprovisionnement-avec-celestica-en-tete-93CH-3504451","categoria":"BUSINESS","lang":"en"},{"fonte":"G1","pais":"France","titulo":"France blocks Polymarket, says platform operates illegally","resumo":"The French government has ordered the blocking of the crypto-based betting platform Polymarket due to legal irregularities. National regulators point out that the service operates without the necessary gambling licenses in the country. The decision marks a rigorous oversight effort regarding the decentralized prediction market.","link":"https://g1.globo.com/tecnologia/noticia/2026/07/17/franca-bloqueia-polymarket-e-diz-que-plataforma-opera-de-forma-ilegal.ghtml","categoria":"REGULATION","lang":"en"},{"fonte":"hantsfire.gov.uk","pais":"England","titulo":"Fire service recognized at national Digital, Data and Technology awards","resumo":"The UK fire service has received recognition at a national awards ceremony focused on digital and data innovation. The initiative highlights the growing integration of advanced technologies to optimize emergency response. This progress reinforces how digital transformation is essential for increasing operational efficiency and public safety in the country.","link":"https://www.hantsfire.gov.uk/fire-service-recognised-at-national-digital-data-and-technology-awards/","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Engineering and Technology Magazine","pais":"England","titulo":"Laser system detects deadly methanol in sealed drink bottles","resumo":"Scientists have developed a laser system capable of identifying toxic methanol in alcoholic beverage bottles without the need to open them. The technology promises to revolutionize consumer safety by combating the trade of adulterated drinks in a non-invasive way. This scientific advancement has significant global potential for preventing severe poisonings.","link":"https://eandt.theiet.org/2026/07/17/new-laser-technology-helps-detect-methanol-laced-drinks","categoria":"SCIENCE","lang":"en"},{"fonte":"65 y más","pais":"Spain","titulo":"The new 'smart tattoos' that could help monitor health","resumo":"Researchers are developing smart tattoos capable of continuous monitoring of human body vital signs. This innovative technology promises to transform patient care, allowing for faster and more accurate diagnostics directly from the skin.","link":"https://www.65ymas.com/salud/avances/nuevos-tatuajes-inteligentes-pueden-ayudar-monitorizar-salud_84285_102.html","categoria":"SCIENCE HEALTH","lang":"en"},{"fonte":"El Debate","pais":"Spain","titulo":"Black hole phenomenon that intrigued Stephen Hawking recreated in a lab","resumo":"Scientists have successfully replicated an astrophysical phenomenon in a laboratory setting that challenged Stephen Hawking's understanding of black holes. The experiment offers crucial new data to understand how radiation interacts under extreme gravity conditions in the universe.","link":"https://www.eldebate.com/ciencia/20260718/recrean-laboratorio-fenomeno-agujeros-negros-intrigo-stephen-hawking_438170.html","categoria":"SCIENCE","lang":"en"},{"fonte":"El Correo Gallego","pais":"Spain","titulo":"TraffikGene created in Santiago; technology transports cancer treatments into cells","resumo":"The Spanish startup TraffikGene has developed a pioneering technology focused on delivering advanced cancer treatments directly inside cells. This breakthrough represents a significant step forward in increasing the efficacy of current oncological therapies.","link":"https://www.elcorreogallego.es/santiago/2026/07/17/nace-santiago-empresa-traffikgene-terapias-ca   const searchInput = document.getElementById('search');
  const langSelect = document.getElementById('lang');
  const countrySelect = document.getElementById('country');
  const categorySelect = document.getElementById('category');
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');
  const clearBtn = document.getElementById('clear-filters');

  // Utility de escape HTML simples para prevenir injections em propriedades sem tratamento
  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function populateSelects() {
    const lang = langSelect.value;
    const currentData = data.filter(d => d.lang === lang);

    const countries = [...new Set(currentData.map(d => d.pais))].filter(Boolean).sort();
    const categories = [...new Set(currentData.map(d => d.categoria))].filter(Boolean).sort();

    const currentCountry = countrySelect.value;
    const currentCategory = categorySelect.value;

    countrySelect.innerHTML = '<option value="all">Todos / All</option>';
    categorySelect.innerHTML = '<option value="all">Todas / All</option>';

    countries.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      countrySelect.appendChild(opt);
    });

    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      categorySelect.appendChild(opt);
    });

    if (currentCountry !== 'all' && countries.includes(currentCountry)) {
      countrySelect.value = currentCountry;
    }
    if (currentCategory !== 'all' && categories.includes(currentCategory)) {
      categorySelect.value = currentCategory;
    }
  }

  function render(items) {
    countEl.textContent = `${items.length} notícia${items.length !== 1 ? 's' : ''}`;
    
    grid.innerHTML = items.map(item => {
      const readMoreTxt = item.lang === 'pt' ? 'Ler mais' : 'Read more';
      
      const bulletList = (item.resumo || '').split('\n')
        .filter(Boolean)
        .map(line => `<li>${esc(line.replace(/^- /, ''))}</li>`)
        .join('');

      return `
        <div class="news-card">
          <div class="card-meta">
            <span class="category">${esc(item.categoria) || 'Geral'}</span>
            <span class="country">${esc(item.pais) || 'Global'}</span>
          </div>
          <h3 class="card-title">${esc(item.titulo)}</h3>
          <div class="card-summary">
            <ul>${bulletList}</ul>
          </div>
          <div class="card-footer">
            <a href="${esc(item.link)}" target="_blank" class="read-more">
              ${readMoreTxt} &rarr;
            </a>
            <span class="source">${esc(item.fonte)}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterData() {
    const query = searchInput.value.toLowerCase();
    const lang = langSelect.value;
    const country = countrySelect.value;
    const category = categorySelect.value;

    const filtered = data.filter(item => {
      const matchLang = item.lang === lang;
      const matchCountry = country === 'all' || item.pais === country;
      const matchCategory = category === 'all' || item.categoria === category;
      const matchSearch = query === '' 
        || (item.titulo || '').toLowerCase().includes(query)
        || (item.resumo || '').toLowerCase().includes(query)
        || (item.fonte || '').toLowerCase().includes(query);

      return matchLang && matchCountry && matchCategory && matchSearch;
    });

    render(filtered);
  }

  // Binds
  searchInput.addEventListener('input', filterData);
  langSelect.addEventListener('change', () => {
    populateSelects();
    filterData();
  });
  countrySelect.addEventListener('change', filterData);
  categorySelect.addEventListener('change', filterData);
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    countrySelect.value = 'all';
    categorySelect.value = 'all';
    filterData();
  });

  // Initialization
  populateSelects();
  filterData(); // trigger first render
</script>
