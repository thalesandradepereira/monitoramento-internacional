<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - International Monitoring</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0B0F19;
      --bg-panel: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #E2E8F0;
      --text-muted: #94A3B8;
      --accent: #D4AF37;
      --accent-hover: #FDE047;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.15), transparent 400px),
                        radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.05), transparent 400px);
    }
    header {
      padding: 1.5rem 5%;
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo-img {
      height: 48px; /* Altura ajustável do logo */
      width: auto;
      object-fit: contain;
      border-radius: 8px; /* Caso não seja transparente */
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .logo-text span {
      color: var(--accent);
    }
    .date-badge {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      color: var(--accent);
      font-weight: 600;
    }
    .container {
      padding: 2rem 5%;
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }
    .filters {
      flex: 0 0 300px;
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 6rem;
    }
    .filter-group {
      margin-bottom: 1.5rem;
    }
    .filter-group label {
      display: block;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
    }
    select option {
      background: var(--bg-main);
      color: var(--text-main);
    }
    .results {
      flex: 1;
    }
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .results-count {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .news-card {
      background: var(--bg-panel);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .news-card:hover {
      transform: translateY(-4px);
      border-color: rgba(212, 175, 55, 0.5);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }
    .category {
      color: var(--accent);
    }
    .country {
      color: var(--text-muted);
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.4;
      margin: 0 0 1rem 0;
      color: #fff;
    }
    .card-summary {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-muted);
      flex: 1;
    }
    .card-summary ul {
      margin: 0;
      padding-left: 1.2rem;
    }
    .card-summary li {
      margin-bottom: 0.25rem;
    }
    .card-footer {
      margin-top: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--glass-border);
      padding-top: 1rem;
    }
    .read-more {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .read-more:hover {
      color: var(--accent-hover);
    }
    .source {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .btn-clear {
      width: 100%;
      padding: 0.75rem 1rem;
      margin-top: 0.5rem;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-clear:hover {
      background: var(--accent);
      color: var(--bg-main);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }
    /* Simple CSS reset/scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: var(--bg-panel); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .filters {
        flex: none;
        width: 100%;
        position: static;
        box-sizing: border-box;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-container">
    <img src="logo.jpg" alt="TAP Logo" class="logo-img" onerror="this.style.display='none'">
    <div class="logo-text">Monitoramento<span>Internacional</span></div>
  </div>
  <div class="date-badge">14/07/2026</div>
</header>

<div class="container">
  <aside class="filters">
    <div class="filter-group">
      <label for="search">Busca / Search</label>
      <input type="text" id="search" placeholder="Palavra-chave...">
    </div>
    
    <div class="filter-group">
      <label for="lang">Idioma / Language</label>
      <select id="lang">
        <option value="pt">Português (PT-BR)</option>
        <option value="en">English (US)</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="country">País / Country</label>
      <select id="country">
        <option value="all">Todos / All</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="category">Categoria / Category</label>
      <select id="category">
        <option value="all">Todas / All</option>
      </select>
    </div>
    
    <button id="clear-filters" class="btn-clear">Limpar / Clear</button>
  </aside>

  <main class="results">
    <div class="results-header">
      <h2 style="margin: 0; font-size: 1.5rem; color: #fff;">Resultados</h2>
      <span class="results-count" id="count">0 notícias</span>
    </div>
    <div class="news-grid" id="grid">
      <!-- Injected by JS -->
    </div>
  </main>
</div>

<script>
  // Injeta os dados originais no frontend
  const data = [{"fonte":"CSB Central dos Sindicatos Brasileiros","pais":"Brasil","titulo":"Especialistas alertam para impacto acelerado da IA no emprego e economia","resumo":"Especialistas discutem como a rápida evolução da inteligência artificial está moldando o futuro do mercado de trabalho. O debate destaca a necessidade de adaptação econômica diante da automação de processos. O impacto profundo exige atenção urgente de governos e empresas para garantir uma transição equilibrada e sustentável.","link":"https://csb.org.br/noticias/impacto-acelerado-ia-emprego-economia","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Tribuna do Sertão","pais":"Brasil","titulo":"Tecnologia embarcada passa a pesar na escolha do próximo carro e redefine o perfil do consumidor","resumo":"A presença de sistemas avançados e conectividade tornou-se o principal diferencial na decisão de compra de veículos. O perfil do consumidor mudou, priorizando recursos digitais sobre a mecânica tradicional. Essa tendência força montadoras a acelerar a integração de tecnologias inteligentes em seus novos lançamentos.","link":"https://www.tribunadosertao.com.br/geral/2026/07/14/939440-tecnologia-embarcada-passa-a-pesar-na-escolha-do-proximo-carro-e-redefine-o-perfil-do-consumidor","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Folha Vitória","pais":"Brasil","titulo":"IA na fertilização in vitro: como a tecnologia já ajuda casais a engravidar","resumo":"A inteligência artificial está revolucionando a medicina reprodutiva ao otimizar processos de fertilização in vitro. Algoritmos avançados analisam dados embrionários com precisão superior à humana, aumentando as taxas de sucesso. Essa inovação oferece esperança e eficiência para casais que buscam superar desafios de fertilidade.","link":"https://www.folhavitoria.com.br/saude/ia-na-fertilizacao-in-vitro-como-a-tecnologia-ja-ajuda-casais-a-engravidar/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Brasil 247","pais":"Brasil","titulo":"Quando a tecnologia salva vidas: o que a China pode ensinar ao Brasil sobre desastres climáticos","resumo":"O uso de sistemas inteligentes e monitoramento preditivo tem sido crucial para a gestão de desastres naturais na China. Especialistas avaliam como o Brasil pode importar tais tecnologias para mitigar os impactos de eventos climáticos extremos. O foco está na prevenção inteligente e na resposta rápida para salvar vidas.","link":"https://www.brasil247.com/blog/quando-a-tecnologia-salva-vidas-o-que-a-china-pode-ensinar-ao-brasil-sobre-desastres-climaticos/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"O GLOBO","pais":"Brasil","titulo":"A nova profissão do Vale do Silício: filósofos ajudam a ensinar ética às IAs","resumo":"Empresas de tecnologia do Vale do Silício estão contratando filósofos para integrar ética no desenvolvimento de sistemas de inteligência artificial. O objetivo é garantir que decisões algorítmicas alinhem-se a valores humanos fundamentais. Esta tendência reflete a necessidade de mitigar vieses e riscos sociais no progresso da IA.","link":"https://oglobo.globo.com/economia/tecnologia/noticia/2026/07/14/a-nova-profissao-do-vale-do-silicio-filosofos-ajudam-a-ensinar-etica-as-ias.ghtml","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"G1","pais":"Brasil","titulo":"'Necromancia digital': como a IA está recriando pessoas mortas e dividindo opiniões","resumo":"A capacidade da IA de replicar vozes e imagens de entes falecidos gera um intenso debate ético sobre a memória e o luto. Embora a tecnologia ofereça consolo para alguns, especialistas alertam para questões profundas de consentimento e direitos de imagem. O tema polariza a sociedade sobre os limites da tecnologia.","link":"https://g1.globo.com/tecnologia/noticia/2026/07/14/necromancia-digital-como-a-ia-esta-recriando-pessoas-mortas-e-dividindo-opinioes.ghtml","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"ArchDaily Brasil","pais":"Brasil","titulo":"Nova tecnologia promete dobrar a altura de arranha-céus","resumo":"Inovações estruturais e novos materiais estão permitindo a construção de edifícios muito mais altos do que os atuais. A tecnologia foca na estabilidade, resistência aos ventos e otimização de recursos de engenharia civil moderna. Este salto tecnológico redefine o conceito de arquitetura urbana e potencializa o adensamento vertical.","link":"https://www.archdaily.com.br/pt/01-124600/nova-tecnologia-promete-dobrar-a-altura-de-arranha-ceus/51b5b31ab3fc4b61590000fa-new-technology-may-double-the-height-of-skyscrapers-image","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Veja Saúde","pais":"Brasil","titulo":"Terapia gênica contra Duchenne: o que a ciência realmente sabe sobre a eficácia do tratamento milionário?","resumo":"A introdução de terapias gênicas de alto custo para a distrofia de Duchenne trouxe um novo paradigma para a medicina. A comunidade científica avalia rigorosamente os dados clínicos para validar sua real eficácia a longo prazo. O debate gira em torno da viabilidade de tratamentos complexos versus resultados concretos.","link":"https://saude.abril.com.br/medicina/terapia-genica-contra-duchenne-o-que-a-ciencia-realmente-sabe-sobre-a-eficacia-do-tratamento-milionario/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Technology Networks","pais":"Estados Unidos","titulo":"LLMs para geração de código em bioinformática: O que o GitHub Copilot e o ChatGPT podem (e não podem) fazer","resumo":"Este artigo explora as capacidades e limitações dos grandes modelos de linguagem na automação de código para bioinformática. A análise destaca como essas ferramentas auxiliam pesquisadores, mas aponta que ainda existem desafios críticos em precisão e contexto científico complexo. O estudo serve como um guia essencial para o uso ético e eficiente da IA na ciência de dados.","link":"https://www.technologynetworks.com/tn/articles/llms-for-bioinformatics-code-generation-what-github-copilot-and-chatgpt-can-and-cant-do-414652","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Financial Times","pais":"Estados Unidos","titulo":"Delta Electronics e X LABS assinam parceria tecnológica para impulsionar data centers de IA de próxima geração","resumo":"A parceria estratégica entre a Delta Electronics e a X LABS visa otimizar a infraestrutura energética necessária para o suporte de data centers focados em inteligência artificial. Com o crescimento da demanda computacional, a colaboração foca em soluções sustentáveis e de alta eficiência. O objetivo é estabelecer novos padrões de desempenho para a infraestrutura digital do futuro.","link":"https://markets.ft.com/data/announce/detail?dockey=600-202607140900PR_NEWS_USPRX____SF03893-1","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Business Wire","pais":"Estados Unidos","titulo":"FIS Risk Technology recebe prêmios da indústria por modelagem atuarial com IA e infraestrutura em nuvem","resumo":"A FIS Risk Technology foi reconhecida pelo impacto de suas soluções de IA em modelagem atuarial e infraestrutura de nuvem. Esse reconhecimento sublinha a importância da integração de tecnologias avançadas para a gestão de riscos em larga escala no setor financeiro. O prêmio valida a estratégia da empresa de apostar em inovação escalável e segura.","link":"https://www.businesswire.com/news/home/20260714378409/en/FIS-Risk-Technology-Takes-Top-Industry-Honors-for-AI-Embedded-Actuarial-Modeling-and-Cloud-Infrastructure","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Spectrum News","pais":"Estados Unidos","titulo":"Nova York impõe a primeira moratória estadual do país para data centers","resumo":"O estado de Nova York implementou uma medida inédita que pausa a expansão de novos data centers, refletindo preocupações crescentes com o consumo de energia. Esta decisão cria um precedente regulatório significativo para o setor de tecnologia, forçando empresas a repensarem a sustentabilidade de suas operações. O impacto dessa política pode influenciar futuras regulações em todo o território americano.","link":"https://spectrumlocalnews.com/nys/central-ny/news/2026/07/14/new-york-to-impose-country-s-first-statewide-moratorium-on-data-centers","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"ecommerce-news.es","pais":"Estados Unidos","titulo":"OpenAI encerra o ChatGPT Atlas e aposta na integração de sua tecnologia no ChatGPT Work","resumo":"A OpenAI decidiu descontinuar o projeto ChatGPT Atlas, redirecionando seus esforços para fortalecer o ChatGPT Work. A mudança estratégica reflete a priorização da empresa em oferecer soluções corporativas integradas e mais robustas para o mercado profissional. Esta movimentação ajusta o portfólio da companhia para competir agressivamente no setor de produtividade empresarial.","link":"https://ecommerce-news.es/openai-pone-fin-a-chatgpt-atlas-y-apuesta-por-integrar-su-tecnologia-en-chatgpt-work/","categoria":"LANÇAMENTO","lang":"pt"},{"fonte":"Frontiers","pais":"Estados Unidos","titulo":"Fronteiras na Ciência: Teste simples pode ajudar a rastrear a saúde metabólica em câncer e doenças crônicas","resumo":"Pesquisadores desenvolveram um teste inovador capaz de monitorar indicadores de saúde metabólica em pacientes com condições crônicas, incluindo câncer. A descoberta promete facilitar diagnósticos rápidos e permitir intervenções personalizadas mais eficazes no manejo clínico. Este avanço representa um passo importante na integração de biotecnologia com a prática médica diária.","link":"https://www.frontiersin.org/news/2026/07/14/frontiers-in-science-simple-test-could-help-track-metabolic-health-in-cancer-and-chronic-disease","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"Bulletin of the Atomic Scientists","pais":"Estados Unidos","titulo":"Os tribunais não resolverão a disputa sobre IA e trabalho criativo: a política resolverá","resumo":"O artigo argumenta que os dilemas jurídicos envolvendo a inteligência artificial e a propriedade intelectual de obras criativas exigem soluções legislativas, não apenas judiciais. Com o impasse nos tribunais, o debate se desloca para a esfera política, onde novas leis devem definir o futuro do trabalho artístico. O cenário sugere uma longa batalha regulatória pela frente.","link":"https://thebulletin.org/2026/07/courts-wont-settle-the-fight-over-ai-and-creative-work-politics-will/","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"The Quantum Insider","pais":"Estados Unidos","titulo":"Logical Qubit Technology lança plataforma de nuvem quântica para computação quântica supercondutora","resumo":"A Logical Qubit Technology anunciou o lançamento de uma plataforma baseada em nuvem voltada para a computação quântica supercondutora, democratizando o acesso a essa tecnologia de ponta. A iniciativa visa acelerar pesquisas em diversos setores que dependem de processamento avançado, desde a química até a criptografia. A plataforma marca um avanço importante na comercialização e acessibilidade da computação quântica.","link":"https://thequantuminsider.com/2026/07/14/logical-qubit-technology-launches-quantum-cloud-platform-at-quantum-day-2026/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Investing.com France","pais":"França","titulo":"Morgan Stanley apoia a Sampo devido à sua tecnologia e escala","resumo":"O banco Morgan Stanley destacou o potencial da empresa Sampo no mercado financeiro europeu. A análise aponta que a combinação de investimentos robustos em infraestrutura tecnológica e o alcance operacional em larga escala da companhia são diferenciais competitivos fundamentais para sustentar seu crescimento a longo prazo.","link":"https://fr.investing.com/news/stock-market-news/morgan-stanley-soutient-sampo-grace-a-sa-technologie-et-son-envergure-3497893","categoria":"TECNOLOGIA FINANCEIRA","lang":"pt"},{"fonte":"Maddyness","pais":"França","titulo":"IA: o problema da Europa não é mais a tecnologia, é o mercado","resumo":"Especialistas discutem a maturidade da inteligência artificial no continente europeu, argumentando que a região já possui o conhecimento técnico necessário para inovar. O entrave atual não reside na falta de inovação, mas sim na fragmentação do mercado e nas barreiras regulatórias que impedem a rápida escala de produtos e serviços baseados em IA.","link":"https://www.maddyness.com/2026/07/14/ia-le-probleme-de-leurope-nest-plus-la-technologie-cest-le-marche/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"European Space Agency","pais":"França","titulo":"ESA publica o Relatório da Economia Espacial de 2026","resumo":"A Agência Espacial Europeia divulgou dados estratégicos sobre o desenvolvimento e as perspectivas da economia espacial para o ano de 2026. O relatório analisa os investimentos privados e estatais, destacando como as inovações em satélites e exploração orbital estão impulsionando novos setores econômicos e a competitividade tecnológica da Europa no espaço.","link":"https://www.esa.int/About_Us/Business_with_ESA/ESA_releases_2026_Space_Economy_Report","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"New Electronics","pais":"Inglaterra","titulo":"Pixel-Flo garante £5,25 milhões em investimento semente para escalar tecnologia de fabricação de MicroLED","resumo":"A startup Pixel-Flo levantou um aporte significativo para impulsionar a produção de telas MicroLED de próxima geração. O investimento será fundamental para escalar a infraestrutura industrial e consolidar a empresa no competitivo mercado de displays de alta precisão.","link":"https://www.newelectronics.co.uk/content/news/pixel-flo-secures-525mn-seed-funding-to-scale-microled-manufacturing-technology","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"GOV.UK","pais":"Inglaterra","titulo":"Novo e inovador: chamada para sistemas autônomos multidomínio","resumo":"Uma iniciativa recente convoca o desenvolvimento de sistemas autônomos capazes de operar de forma integrada em múltiplos ambientes. O foco reside na criação de tecnologias que aumentem a interoperabilidade e a eficiência operacional em cenários complexos de defesa e automação.","link":"https://www.gov.uk/government/news/new-and-novel-call-for-multi-domain-autonomous-systems","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"The TRADE","pais":"Inglaterra","titulo":"Rothera lança plataforma de troca e compensação de nível institucional com tecnologia Adaptive","resumo":"A Rothera apresentou uma nova infraestrutura financeira robusta, utilizando a tecnologia Adaptive para otimizar transações e compensações. A plataforma visa atender clientes institucionais que buscam maior segurança, velocidade e resiliência nas operações de mercado de capitais.","link":"https://www.thetradenews.com/rothera-launches-institutional-grade-exchange-and-clearing-platform-with-adaptive-technology/","categoria":"FINTECH","lang":"pt"},{"fonte":"BAE Systems","pais":"Inglaterra","titulo":"Futuro da tecnologia de capacetes para pilotos de caça será revelado no Farnborough International Airshow","resumo":"O prestigiado Farnborough Airshow será o palco para a apresentação de capacetes de última geração projetados para pilotos de caça. Esta nova tecnologia integra sistemas avançados de realidade aumentada e proteção, prometendo elevar o nível de consciência situacional e segurança no combate aéreo.","link":"https://www.baesystems.com/en-uk/article/future-of-fighter-pilot-helmet-technology-to-be-unveiled-at-farnborough-international-airshow","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"TheWire.in","pais":"Inglaterra","titulo":"MG revela dois carros conceito emocionantes combinando herança esportiva e tecnologia avançada no Goodwood Festival of Speed 2026","resumo":"A MG apresentou dois novos veículos conceito durante o icônico Goodwood Festival of Speed, fundindo seu design histórico com inovações modernas. Os protótipos destacam o compromisso da marca com a eletrificação e o desempenho esportivo em um mercado automotivo em rápida transformação.","link":"https://m.thewire.in/article/ptiprnews/mg-unveils-two-exciting-concept-cars-combining-sporting-heritage-and-advanced-technology-at-the-goodwood-festival-of-speed-2026","categoria":"AUTOMOTIVO","lang":"pt"},{"fonte":"The Architects’ Journal","pais":"Inglaterra","titulo":"Novo escritório Macro Micro: 'Aproveite a nova tecnologia; usamos IA para gerenciar nossos negócios'","resumo":"O estúdio de arquitetura Macro Micro destaca como a adoção estratégica de Inteligência Artificial transformou a gestão de suas operações internas. O modelo demonstra que a integração de ferramentas digitais avançadas é essencial para otimizar fluxos de trabalho e elevar a produtividade no setor de serviços.","link":"https://www.architectsjournal.co.uk/news/new-practice-macro-micro-lean-into-new-technology-we-use-ai-to-manage-our-business","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Business Wales","pais":"Inglaterra","titulo":"Fundo de concessão para tecnologia sem fio avançada","resumo":"O governo britânico estabeleceu um novo fundo destinado a apoiar o desenvolvimento e a implementação de tecnologias sem fio de última geração. O objetivo é fomentar a inovação em infraestrutura de conectividade, posicionando o país na vanguarda da revolução das comunicações digitais.","link":"https://businesswales.gov.wales/news-and-blog/advanced-wireless-technology-grant-fund","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Water Magazine","pais":"Inglaterra","titulo":"Empresa de tecnologia hídrica Eliquo Hydrok Ltd expande para Barnsley para dobrar a produção","resumo":"A Eliquo Hydrok anunciou a expansão de suas instalações em Barnsley como parte de um esforço estratégico para duplicar sua capacidade produtiva. A empresa foca em soluções tecnológicas sustentáveis para o tratamento de água, atendendo à crescente demanda por infraestruturas ambientais mais eficientes.","link":"https://www.watermagazine.co.uk/2026/07/14/water-technology-company-eliquo-hydrok-ltd-expands-into-barnsley-to-double-production/","categoria":"SUSTENTABILIDADE","lang":"pt"},{"fonte":"Xunta de Galicia","pais":"Espanha","titulo":"A empresa Celtarys Research apresenta tecnologia para acelerar a descoberta de fármacos","resumo":"A Celtarys Research, apoiada pelo programa Ignicia da Xunta, introduziu uma tecnologia inovadora desenhada para otimizar e agilizar o processo de descoberta de novos medicamentos. O avanço promete reduzir prazos e aumentar a eficácia em pesquisas laboratoriais críticas. A iniciativa destaca o compromisso da região com soluções científicas de ponta que beneficiam a indústria farmacêutica global.","link":"https://www.xunta.gal/es/notas-de-prensa/-/nova/026737/empresa-celtarys-research-apoyada-por-programa-ignicia-xunta-presenta-tecnologia","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"El Conciso","pais":"Espanha","titulo":"Tecnologia coreana no Porto de Algeciras: CyberLogitec fornecerá gêmeo digital para expansão da TTI","resumo":"O Porto de Algeciras integrará tecnologia coreana da CyberLogitec para modernizar suas operações na TTI. A implementação de um sistema de gêmeo digital permitirá simular e otimizar a logística portuária com alta precisão. Este projeto representa um passo importante na transformação digital da infraestrutura marítima espanhola.","link":"https://www.elconciso.es/empresas/tecnologia-coreana-puerto-algeciras-cyberlogitec-gemelo-digital-tti-ampliacion_0_2007438058.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Cadena SER","pais":"Espanha","titulo":"Fotofarmacologia: a nova técnica com luz infravermelha e ultravioleta para atuar em pontos precisos do corpo","resumo":"Cientistas desenvolveram a fotofarmacologia, uma técnica inovadora que utiliza luz infravermelha e ultravioleta para ativar medicamentos em áreas específicas do organismo. O método permite uma precisão terapêutica sem precedentes, minimizando efeitos colaterais em tratamentos complexos. A descoberta marca um avanço significativo na medicina de precisão moderna.","link":"https://cadenaser.com/nacional/2026/07/14/fotofarmacologia-la-novedosa-tecnica-con-luz-infrarroja-y-ultravioleta-para-actuar-en-un-punto-concreto-del-cuerpo-cadena-ser/?outputType=amp","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"El Periódico","pais":"Espanha","titulo":"Videogame para detectar dislexia com 90% de precisão é validado pela ciência","resumo":"Uma nova ferramenta baseada em videogame demonstrou uma precisão de 90% na detecção precoce da dislexia, recebendo respaldo científico. A tecnologia utiliza dinâmicas de jogo para identificar padrões cognitivos associados ao distúrbio de aprendizagem. Esta solução promete revolucionar o acompanhamento escolar ao oferecer um diagnóstico ágil e menos invasivo para crianças.","link":"https://www.elperiodico.com/es/tecnologia/20260714/videojuego-detectar-dislexia-90-precision-132432790","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"elpublicista.es","pais":"Espanha","titulo":"Fnac impulsiona a economia circular com RESTART, sua nova proposta de tecnologia recondicionada","resumo":"A Fnac lançou o projeto RESTART, focado em fomentar a economia circular através da venda de tecnologia recondicionada. A iniciativa oferece aos consumidores uma alternativa sustentável e mais acessível para adquirir dispositivos eletrônicos de alta qualidade. O movimento reflete uma tendência crescente de consumo responsável no varejo tecnológico espanhol.","link":"https://www.elpublicista.es/anunciantes/fnac-impulsa-economia-circular-restart-nueva-propuesta","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"Hospiten","pais":"Espanha","titulo":"Hospiten agiliza diagnósticos com tecnologia de escâner espectral","resumo":"O grupo hospitalar Hospiten implementou tecnologia de escâner espectral para elevar a precisão e a rapidez nos diagnósticos médicos. O equipamento permite imagens de maior resolução que facilitam a identificação precoce de patologias complexas. A inovação reforça o investimento em digitalização dentro do setor de saúde privado na Espanha.","link":"https://hospiten.com/noticias/hospiten-agiliza-sus-diagn%C3%B3sticos-con-tecnolog%C3%ADa-de-esc%C3%A1ner-espectral-1","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"El Economista","pais":"Espanha","titulo":"Indra obtém certificação máxima de segurança para tecnologia móvel à prova de computadores quânticos","resumo":"A Indra alcançou a certificação de segurança mais rigorosa para sua tecnologia móvel, garantindo proteção contra ameaças de computação quântica. Esta conquista posiciona a empresa na vanguarda da defesa cibernética contra futuras capacidades de descriptografia. É um marco crucial para a segurança de dados estratégicos e governamentais.","link":"https://www.eleconomista.es/industria/amp/13998974/indra-logra-la-maxima-certificacion-de-seguridad-para-su-tecnologia-movil-a-prueba-de-ordenadores-cuanticos","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"IM Médico","pais":"Espanha","titulo":"IFEMA MADRID apresenta EXPOINMED, novo espaço para conectar medicina e tecnologia","resumo":"O IFEMA MADRID anunciou o lançamento do EXPOINMED, um novo hub destinado a integrar as últimas inovações tecnológicas no setor médico. O espaço servirá como ponto de encontro para profissionais e empresas explorarem o futuro da saúde digital e robótica hospitalar. A iniciativa visa acelerar a transferência tecnológica no campo da saúde na Espanha.","link":"https://www.immedicohospitalario.es/amp/57326/ifema-madrid-presenta-expoinmed-un-nuevo-espacio-para-conectar-medici.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"SZ.de","pais":"Alemanha","titulo":"Como a IA está transformando nosso trabalho","resumo":"A integração da inteligência artificial no ambiente corporativo alemão está redefinindo processos operacionais e a produtividade. O artigo analisa as mudanças estruturais nas funções profissionais e como as empresas estão adaptando suas estratégias para incorporar automação e suporte algorítmico, impactando diretamente o futuro do mercado de trabalho local.","link":"https://www.sueddeutsche.de/wirtschaft/ki-arbeit-job-medizin-job-li.3483222","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"SZ.de","pais":"Alemanha","titulo":"Investimentos em transformação: Sarre apoia o centro de pesquisa Cispa","resumo":"O governo do estado de Sarre reafirmou seu compromisso financeiro com o centro de pesquisa Cispa, impulsionando avanços na área de cibersegurança. Este movimento destaca a importância estratégica de fundos de transformação para manter a Alemanha na vanguarda da soberania digital e da inovação científica europeia.","link":"https://www.sueddeutsche.de/politik/geld-aus-transformationsfonds-saarland-steht-hinter-cispa-forschungszentrum-dpa.urn-newsml-dpa-com-20090101-260714-930-382865","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"all-electronics.de","pais":"Alemanha","titulo":"Imec e Diraq escalam qubits de silício com tecnologia CMOS","resumo":"A colaboração entre Imec e Diraq alcançou um marco significativo ao escalar qubits de silício utilizando processos de fabricação CMOS padrão. Este avanço é fundamental para a viabilidade da computação quântica em larga escala, permitindo que a infraestrutura existente na indústria de semicondutores seja aproveitada para desenvolver processadores quânticos mais potentes.","link":"https://www.all-electronics.de/elektronik-entwicklung/imec-und-diraq-skalieren-silizium-qubits-in-cmos-technologie/2697851","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Geo.de","pais":"Alemanha","titulo":"Por que as células solares de perovskita alemãs são promessas da transição energética","resumo":"As células solares de perovskita desenvolvidas na Alemanha representam uma esperança crucial para acelerar a transição energética europeia. Com maior eficiência e custos de produção potencialmente menores que os painéis de silício tradicionais, essa tecnologia inovadora posiciona a indústria alemã como líder em soluções sustentáveis de energia renovável.","link":"https://www.geo.de/wissen/forschung-und-technik/perowskit-solarzellen--alles-wissenswerte-rund-um-die-neue-technologie-37937208.html","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"一般社団法人環境金融研究機構","pais":"Japão","titulo":"Setor global de tecnologia climática atinge recorde de 153 fusões e aquisições no primeiro semestre","resumo":"O primeiro semestre do ano marcou um recorde histórico no setor de tecnologia climática, com 153 transações de fusões e aquisições. O volume de captação de recursos praticamente dobrou em comparação ao período anterior, com foco principal em empresas de energia. O crescimento no número de IPOs reforça o otimismo do mercado e o avanço global na transição energética.","link":"https://rief-jp.org/ct12/167322","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Valor Econômico","pais":"Japão","titulo":"Montadoras japonesas adotam tecnologia chinesa para acelerar a produção de veículos elétricos","resumo":"Em uma mudança estratégica para recuperar espaço no mercado de eletrificação, fabricantes japonesas estão integrando tecnologias chinesas em seus processos produtivos. A colaboração visa reduzir custos e acelerar o desenvolvimento de modelos elétricos. O movimento destaca a necessidade de inovação rápida diante da intensa concorrência global e da demanda por soluções mais eficientes.","link":"https://valor.globo.com/empresas/noticia/2026/07/14/montadoras-japonesas-adotam-tecnologia-chinesa-para-acelerar-produo-de-veculos-eltricos.ghtml","categoria":"AUTOMOTIVO","lang":"pt"},{"fonte":"TBS NEWS DIG","pais":"Japão","titulo":"CEO do SoftBank prevê que economia da IA representará 20% do PIB até 2040","resumo":"Masayoshi Son projeta um futuro onde a inteligência artificial será onipresente, impulsionando a economia mundial de forma exponencial. A visão do executivo inclui a integração de 100 trilhões de agentes de IA e um bilhão de robôs humanoides. Essa previsão reforça o compromisso contínuo do grupo com investimentos massivos em tecnologias disruptivas de longo prazo.","link":"https://newsdig.tbs.co.jp/articles/-/2802468","categoria":"ECONOMIA","lang":"pt"},{"fonte":"TBS NEWS DIG","pais":"Japão","titulo":"Ministério da Economia do Japão investe 160 bilhões de ienes em semicondutores","resumo":"O governo japonês anunciou o maior subsídio sob a Lei de Segurança Econômica para impulsionar a produção nacional de semicondutores de ponta. O projeto contempla centros de pesquisa e unidades de fabricação em Toyama e Niigata para tecnologias de comunicação óptica. A iniciativa visa fortalecer a autonomia tecnológica e a cadeia de suprimentos crítica do país.","link":"https://newsdig.tbs.co.jp/articles/-/2802210","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"日本経済新聞","pais":"Japão","titulo":"NVIDIA e Mitsubishi Heavy Industries firmam parceria para data centers de IA","resumo":"A NVIDIA uniu forças com a Mitsubishi Heavy Industries para desenvolver tecnologias avançadas de resfriamento para data centers de inteligência artificial. A colaboração combina a liderança em chips da NVIDIA com a expertise em engenharia térmica e industrial da Mitsubishi. O objetivo é aumentar a eficiência energética necessária para a infraestrutura de processamento de dados de alta escala.","link":"https://www.nikkei.com/article/DGXZQOUC104V50Q6A710C2000000/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"朝日新聞","pais":"Japão","titulo":"Nara Institute e DOCOMO realizam testes de realidade mista (MR)","resumo":"Uma parceria entre o Instituto de Ciência e Tecnologia de Nara e a DOCOMO está explorando o uso de tecnologias de Realidade Mista em novos contextos. O experimento foca em criar experiências imersivas que desafiam a percepção física do usuário. O projeto busca validar aplicações práticas da tecnologia em espaços públicos e aumentar a interatividade digital no Japão.","link":"https://www.asahi.com/articles/ASV7C4WBNV7CPOMB00FM.html","categoria":"INOVAÇÃO","lang":"pt"},{"fonte":"nttdata-strategy.com","pais":"Japão","titulo":"Análise econômica explora o impacto e as desigualdades sociais geradas pela IA","resumo":"Pesquisadores utilizam a economia de ponta para examinar como a inteligência artificial pode moldar a estrutura da sociedade e o mercado de trabalho. O estudo investiga se a disseminação da tecnologia ampliará ou reduzirá as desigualdades econômicas globais. As conclusões oferecem uma visão técnica sobre os desafios regulatórios e distributivos enfrentados pelas nações modernas.","link":"https://www.nttdata-strategy.com/knowledge/interview/interview-260714/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"nec.com","pais":"Japão","titulo":"NEC desenvolve tecnologia de IA para gerar modelos 3D a partir de filmagens","resumo":"A NEC anunciou um avanço significativo em visão computacional, permitindo a criação automática de modelos 3D detalhados a partir de vídeos simples. A nova IA simplifica processos complexos de modelagem, oferecendo aplicações potenciais em design industrial e segurança. A tecnologia promete transformar a maneira como dados visuais são convertidos em representações digitais precisas.","link":"https://www.nec.com/en/press/202607/global_20260714_01.html","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Mediabrief.com","pais":"Índia","titulo":"ideaForge Technology conclui QIP de ₹500 crore para acelerar o crescimento em sistemas não tripulados","resumo":"A empresa indiana ideaForge Technology finalizou com sucesso uma oferta institucional de ações de ₹500 crore. O capital será direcionado para impulsionar o desenvolvimento de sistemas de drones e fortalecer a infraestrutura tecnológica do setor de defesa. Esta movimentação reforça o compromisso da Índia em expandir sua soberania tecnológica em veículos aéreos não tripulados.","link":"https://mediabrief.com/ideaforge-technology-completes-%E2%82%B9500-crore-qip/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Hub News","pais":"Índia","titulo":"NESAC mapeia a fronteira entre Índia e Mianmar e expande a pegada de tecnologia espacial no Nordeste","resumo":"O Centro de Aplicações Espaciais do Nordeste (NESAC) concluiu o mapeamento estratégico da fronteira entre a Índia e Mianmar. O projeto utiliza tecnologia de satélite de ponta para melhorar a vigilância e a gestão territorial na região. Esta iniciativa marca um avanço significativo na aplicação de tecnologias espaciais para a segurança nacional e desenvolvimento regional.","link":"https://hubnetwork.in/nesac-maps-india-myanmar-border-expands-space-technology-footprint-across-northeast/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"ANI News","pais":"Índia","titulo":"DP World testará tecnologia de geração de água atmosférica após investimento estratégico na Maithri Aquatech","resumo":"A DP World anunciou planos para implementar a tecnologia de geração de água a partir da umidade atmosférica em suas operações globais. O projeto segue um investimento estratégico na startup indiana Maithri Aquatech. A inovação promete oferecer uma solução sustentável para a escassez de água em infraestruturas portuárias e logísticas ao redor do mundo.","link":"https://www.aninews.in/news/business/dp-world-to-pilot-atmospheric-water-generation-technology-across-global-operations-after-strategic-investment-in-maithri-aquatech20260714180830","categoria":"INOVAÇÃO","lang":"pt"},{"fonte":"Hub News","pais":"Índia","titulo":"Nordeste da Índia recebe impulso científico: radares meteorológicos aumentam de 2 para 13 em uma década","resumo":"O ministro Jitendra Singh destacou a expansão significativa da infraestrutura científica no nordeste indiano nos últimos dez anos. O aumento expressivo no número de radares meteorológicos visa melhorar a precisão das previsões e a resposta a desastres naturais. O investimento reflete um esforço do governo para modernizar a observação climática em áreas remotas.","link":"https://hubnetwork.in/north-east-gets-science-boost-weather-radars-jump-from-2-to-13-in-a-decade-says-jitendra-singh/","categoria":"CIÊNCIA","lang":"pt"},{"fonte":"News On AIR","pais":"Índia","titulo":"Ministro do Trabalho da União aconselha jovens a atualizar habilidades usando a tecnologia de IA","resumo":"O Ministro do Trabalho da Índia enfatizou a necessidade urgente de os jovens indianos se adaptarem à era da Inteligência Artificial. A recomendação incentiva a requalificação profissional focada em ferramentas digitais emergentes para manter a competitividade no mercado global. O governo busca alinhar a força de trabalho nacional às demandas da quarta revolução industrial.","link":"https://newsonair.gov.in/union-labour-minister-advises-youth-to-upgrade-skills-by-using-latest-technology-of-ai/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Tata Consultancy Services","pais":"Índia","titulo":"TCS nomeada a marca de serviços de TI mais valiosa da Índia; 7 em cada 10 indianos usam tecnologia da TCS diariamente","resumo":"A Tata Consultancy Services (TCS) consolidou seu domínio no mercado indiano ao ser reconhecida como a marca de TI mais valiosa do país. Com uma presença ubíqua, a infraestrutura desenvolvida pela empresa impacta diretamente a rotina da maioria da população indiana. Este marco reafirma o papel central da empresa no ecossistema digital do país.","link":"https://www.tcs.com/who-we-are/newsroom/press-release/tcs-named-india-most-valuable-it-services-brand-7-out-of-10-indians-use-technology-built-by-tcs-every-day","categoria":"NEGÓCIOS","lang":"pt"},{"fonte":"India Infoline","pais":"Índia","titulo":"TCS é escolhida como parceira estratégica de tecnologia para o novo Terminal Um do Aeroporto JFK","resumo":"A Tata Consultancy Services (TCS) foi selecionada para liderar a transformação digital do novo Terminal Um do Aeroporto Internacional John F. Kennedy, em Nova York. A empresa será responsável por implementar soluções tecnológicas avançadas para otimizar a experiência do passageiro e a eficiência operacional. O contrato destaca a crescente influência global das gigantes de tecnologia indianas.","link":"https://www.indiainfoline.com/news/companies/tcs-news-tata-consultancy-services-chosen-as-strategic-technology-partner-for-new-terminal-one-at-jfk-airport","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Fortune India","pais":"Índia","titulo":"A 'Economia Roxa' da Índia pode contribuir com US$ 150 bilhões ao desbloquear a inclusão de pessoas com deficiência","resumo":"Um novo relatório da Deloitte e EnAble aponta que a inclusão plena de pessoas com deficiência no mercado de trabalho pode gerar US$ 150 bilhões à economia indiana. O estudo sugere que o investimento em tecnologias assistivas e acessibilidade digital é o motor principal desta mudança. A iniciativa propõe um modelo de crescimento mais inclusivo e economicamente robusto para o país.","link":"https://www.fortuneindia.com/economy/indias-purple-economy-can-contribute-150-billion-by-unlocking-disability-inclusion-deloitte-enable-report/148217","categoria":"TRENDING TOPICS","lang":"pt"},{"fonte":"24 Notícias","pais":"Portugal","titulo":"E se os painéis solares estivessem na água?","resumo":"O conceito de energia solar flutuante surge como uma solução inovadora para otimizar o uso de recursos hídricos e aumentar a eficiência energética. A tecnologia permite que reservatórios e lagos sejam utilizados para a geração de eletricidade sem ocupar terras aráveis. Esta abordagem promete revolucionar a sustentabilidade em Portugal ao integrar infraestruturas energéticas em ecossistemas aquáticos existentes.","link":"https://24noticias.sapo.pt/tecnologia/artigos/e-se-os-paineis-solares-estivessem-na-agua","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"SAPO","pais":"Portugal","titulo":"Politécnico de Santarém cria três novas pós-graduações em inteligência artificial, desporto e saúde","resumo":"O Politécnico de Santarém expande a sua oferta académica com novos programas especializados em áreas cruciais para o mercado atual. A inclusão da inteligência artificial demonstra o alinhamento da instituição com a digitalização e a inovação tecnológica. Estas formações visam capacitar profissionais para responder aos desafios emergentes nos setores da tecnologia, saúde e bem-estar.","link":"https://sapo.pt/artigo/politecnico-de-santarem-cria-tres-novas-pos-graduacoes-em-inteligencia-artificial-desporto-e-saude-6a562ad39b8921c1e260e6bb","categoria":"EDUCAÇÃO","lang":"pt"},{"fonte":"Coimbra Coolectiva","pais":"Portugal","titulo":"Coimbra Coolectiva no Tech & Arts Festival do TUMO: arte, tecnologia e jornalismo colaborativo","resumo":"O festival TUMO em Coimbra promove um encontro entre a criatividade artística e a inovação tecnológica através do jornalismo colaborativo. O evento destaca como as novas ferramentas digitais podem transformar a produção de conteúdos e a interação cultural na sociedade contemporânea. É uma iniciativa que reforça o papel da tecnologia na democratização e na modernização do acesso à informação.","link":"https://coimbracoolectiva.pt/historias/comunidade/coimbra-coolectiva-no-tech-arts-festival-do-tumo-arte-tecnologia-e-jornalismo-colaborativo/","categoria":"INOVAÇÃO","lang":"pt"},{"fonte":"Correio da Manhã","pais":"Portugal","titulo":"Saiba como a tecnologia consegue ajudar a evitar incêndios em Portugal","resumo":"O uso de drones, sensores inteligentes e análise de dados está a fortalecer a estratégia de prevenção de incêndios florestais em Portugal. Estas ferramentas permitem uma monitorização mais eficaz e uma resposta rápida a potenciais focos de perigo, protegendo o património natural do país. A implementação destas soluções tecnológicas representa um avanço crítico para a segurança ambiental nacional.","link":"https://www.cmjornal.pt/cmtv/programas/informacao/falar-global/detalhe/saiba-como-a-tecnologia-consegue-ajudar-a-evitar-incendios-em-portugal","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"e24.pt","pais":"Portugal","titulo":"Tecnologia Inteligente: Como a inovação está a transformar o nosso Futuro","resumo":"A evolução acelerada da tecnologia inteligente está a redefinir a forma como vivemos, trabalhamos e interagimos com o mundo ao nosso redor. Desde a automação industrial até à integração na vida doméstica, a inovação assume um papel central no progresso social e económico. Compreender estas tendências é fundamental para acompanhar a transformação digital que molda o futuro próximo.","link":"https://e24.pt/tecnologia-inteligente-como-a-inovacao-esta-a-transformar-o-nosso-futuro/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"SAPO","pais":"Portugal","titulo":"Boost Surfing: uma tecnologia que ajuda a apanhar mais ondas","resumo":"A tecnologia Boost Surfing introduz um sistema de propulsão elétrica adaptável a pranchas de surf para melhorar a performance dos atletas. Este dispositivo facilita a entrada na onda e prolonga a duração das sessões, atraindo tanto surfistas profissionais quanto entusiastas do desporto. A inovação exemplifica como a engenharia moderna pode potencializar experiências desportivas e expandir as capacidades humanas.","link":"https://sapo.pt/artigo/boost-surfing-uma-tecnologia-que-ajuda-a-apanhar-mais-ondas-6a55700b9b8921c1e24c084e","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"Pplware","pais":"Portugal","titulo":"Veteranos da tecnologia estão a ser empurrados para a reforma antecipada","resumo":"O setor tecnológico enfrenta um debate crescente sobre o etarismo e a exclusão de profissionais experientes em favor de talentos mais jovens. Esta tendência levanta questões importantes sobre a gestão de capital humano e a perda de conhecimento especializado em empresas do setor. O fenómeno destaca a necessidade de políticas de inclusão que valorizem a experiência acumulada perante a rápida evolução das ferramentas digitais.","link":"https://pplware.sapo.pt/inteligencia-artificial/veteranos-da-tecnologia-estao-a-ser-empurrados-para-a-reforma-antecipada/","categoria":"MERCADO","lang":"pt"},{"fonte":"Jornal Económico","pais":"Portugal","titulo":"Prémios Nobel da Economia e líderes de empresas tecnológicas alertam para os riscos da IA","resumo":"Especialistas de renome mundial e líderes do setor de tecnologia expressam preocupações crescentes sobre o impacto ético e social da Inteligência Artificial. O debate foca-se nos riscos associados à desinformação, autonomia descontrolada e possíveis perturbações no mercado de trabalho global. Este alerta coletivo ressalta a urgência em estabelecer normas de governança e regulação para o desenvolvimento responsável da tecnologia.","link":"https://jornaleconomico.sapo.pt/noticias/premios-nobel-da-economia-e-lideres-de-empresas-tecnologicas-alertam-para-os-riscos-da-ia/","categoria":"TECNOLOGIA","lang":"pt"},{"fonte":"CSB Central dos Sindicatos Brasileiros","pais":"Brazil","titulo":"Experts warn of AI's accelerating impact on employment and the economy","resumo":"Experts are discussing how the rapid evolution of artificial intelligence is shaping the future of the job market. The debate highlights the need for economic adaptation in the face of process automation. The profound impact requires urgent attention from governments and companies to ensure a balanced and sustainable transition.","link":"https://csb.org.br/noticias/impacto-acelerado-ia-emprego-economia","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Tribuna do Sertão","pais":"Brazil","titulo":"Embedded technology now influences car purchasing decisions and is redefining consumer profiles","resumo":"The presence of advanced systems and connectivity has become the main differentiator in vehicle purchase decisions. Consumer profiles have shifted, prioritizing digital features over traditional mechanics. This trend is forcing automakers to accelerate the integration of smart technologies in their new releases.","link":"https://www.tribunadosertao.com.br/geral/2026/07/14/939440-tecnologia-embarcada-passa-a-pesar-na-escolha-do-proximo-carro-e-redefine-o-perfil-do-consumidor","categoria":"BUSINESS","lang":"en"},{"fonte":"Folha Vitória","pais":"Brazil","titulo":"AI in in vitro fertilization: how technology is already helping couples conceive","resumo":"Artificial intelligence is revolutionizing reproductive medicine by optimizing in vitro fertilization processes. Advanced algorithms analyze embryonic data with precision superior to humans, increasing success rates. This innovation offers hope and efficiency for couples looking to overcome fertility challenges.","link":"https://www.folhavitoria.com.br/saude/ia-na-fertilizacao-in-vitro-como-a-tecnologia-ja-ajuda-casais-a-engravidar/","categoria":"SCIENCE","lang":"en"},{"fonte":"Brasil 247","pais":"Brazil","titulo":"When technology saves lives: what China can teach Brazil about climate disasters","resumo":"The use of smart systems and predictive monitoring has been crucial for managing natural disasters in China. Experts are evaluating how Brazil can import such technologies to mitigate the impacts of extreme weather events. The focus is on intelligent prevention and rapid response to save lives.","link":"https://www.brasil247.com/blog/quando-a-tecnologia-salva-vidas-o-que-a-china-pode-ensinar-ao-brasil-sobre-desastres-climaticos/","categoria":"SCIENCE","lang":"en"},{"fonte":"O GLOBO","pais":"Brazil","titulo":"The new Silicon Valley profession: philosophers help teach ethics to AIs","resumo":"Silicon Valley tech companies are hiring philosophers to integrate ethics into the development of artificial intelligence systems. The goal is to ensure that algorithmic decisions align with fundamental human values. This trend reflects the need to mitigate biases and social risks in the progress of AI.","link":"https://oglobo.globo.com/economia/tecnologia/noticia/2026/07/14/a-nova-profissao-do-vale-do-silicio-filosofos-ajudam-a-ensinar-etica-as-ias.ghtml","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"G1","pais":"Brazil","titulo":"'Digital necromancy': how AI is recreating deceased people and dividing opinions","resumo":"The ability of AI to replicate the voices and images of deceased loved ones has sparked an intense ethical debate about memory and grief. While the technology offers comfort to some, experts warn of deep issues regarding consent and image rights. The topic is polarizing society over the boundaries of technology.","link":"https://g1.globo.com/tecnologia/noticia/2026/07/14/necromancia-digital-como-a-ia-esta-recriando-pessoas-mortas-e-dividindo-opinioes.ghtml","categoria":"TRENDING TOPICS","lang":"en"},{"fonte":"ArchDaily Brasil","pais":"Brazil","titulo":"New technology promises to double the height of skyscrapers","resumo":"Structural innovations and new materials are allowing for the construction of buildings much taller than current ones. The technology focuses on stability, wind resistance, and optimizing modern civil engineering resources. This technological leap redefines the concept of urban architecture and enhances vertical density.","link":"https://www.archdaily.com.br/pt/01-124600/nova-tecnologia-promete-dobrar-a-altura-de-arranha-ceus/51b5b31ab3fc4b61590000fa-new-technology-may-double-the-height-of-skyscrapers-image","categoria":"SCIENCE","lang":"en"},{"fonte":"Veja Saúde","pais":"Brazil","titulo":"Gene therapy for Duchenne: what does science really know about the efficacy of the million-dollar treatment?","resumo":"The introduction of high-cost gene therapies for Duchenne muscular dystrophy has brought a new paradigm to medicine. The scientific community is rigorously evaluating clinical data to validate its actual long-term efficacy. The debate revolves around the viability of complex treatments versus concrete results.","link":"https://saude.abril.com.br/medicina/terapia-genica-contra-duchenne-o-que-a-ciencia-realmente-sabe-sobre-a-eficacia-do-tratamento-milionario/","categoria":"SCIENCE","lang":"en"},{"fonte":"Technology Networks","pais":"United States","titulo":"LLMs for code generation in bioinformatics: What GitHub Copilot and ChatGPT can (and cannot) do","resumo":"This article explores the capabilities and limitations of large language models in code automation for bioinformatics. The analysis highlights how these tools assist researchers, but points out that there are still critical challenges in accuracy and complex scientific context. The study serves as an essential guide for the ethical and efficient use of AI in data science.","link":"https://www.technologynetworks.com/tn/articles/llms-for-bioinformatics-code-generation-what-github-copilot-and-chatgpt-can-and-cant-do-414652","categoria":"SCIENCE","lang":"en"},{"fonte":"Financial Times","pais":"United States","titulo":"Delta Electronics and X LABS sign technology partnership to boost next-generation AI data centers","resumo":"The strategic partnership between Delta Electronics and X LABS aims to optimize the energy infrastructure required to support AI-focused data centers. With growing computational demand, the collaboration focuses on sustainable and high-efficiency solutions. The goal is to set new performance standards for the digital infrastructure of the future.","link":"https://markets.ft.com/data/announce/detail?dockey=600-202607140900PR_NEWS_USPRX____SF03893-1","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Business Wire","pais":"United States","titulo":"FIS Risk Technology receives industry awards for AI-embedded actuarial modeling and cloud infrastructure","resumo":"FIS Risk Technology has been recognized for the impact of its AI solutions in actuarial modeling and cloud infrastructure. This recognition underscores the importance of integrating advanced technologies for large-scale risk management in the financial sector. The award validates the company's strategy of investing in scalable and secure innovation.","link":"https://www.businesswire.com/news/home/20260714378409/en/FIS-Risk-Technology-Takes-Top-Industry-Honors-for-AI-Embedded-Actuarial-Modeling-and-Cloud-Infrastructure","categoria":"BUSINESS","lang":"en"},{"fonte":"Spectrum News","pais":"United States","titulo":"New York imposes the nation's first statewide moratorium on data centers","resumo":"New York state has implemented an unprecedented measure that pauses the expansion of new data centers, reflecting growing concerns over energy consumption. This decision creates a significant regulatory precedent for the tech sector, forcing companies to rethink the sustainability of their operations. The impact of this policy could influence future regulations across the United States.","link":"https://spectrumlocalnews.com/nys/central-ny/news/2026/07/14/new-york-to-impose-country-s-first-statewide-moratorium-on-data-centers","categoria":"TRENDING TOPICS","lang":"en"},{"fonte":"ecommerce-news.es","pais":"United States","titulo":"OpenAI shuts down ChatGPT Atlas and bets on integrating its technology into ChatGPT Work","resumo":"OpenAI has decided to discontinue the ChatGPT Atlas project, redirecting its efforts toward strengthening ChatGPT Work. The strategic shift reflects the company's prioritization of offering integrated and more robust corporate solutions for the professional market. This move adjusts the company's portfolio to compete aggressively in the business productivity sector.","link":"https://ecommerce-news.es/openai-pone-fin-a-chatgpt-atlas-y-apuesta-por-integrar-su-tecnologia-en-chatgpt-work/","categoria":"LAUNCH","lang":"en"},{"fonte":"Frontiers","pais":"United States","titulo":"Frontiers in Science: Simple test could help track metabolic health in cancer and chronic disease","resumo":"Researchers have developed an innovative test capable of monitoring metabolic health indicators in patients with chronic conditions, including cancer. The discovery promises to facilitate rapid diagnostics and allow for more effective personalized interventions in clinical management. This breakthrough represents an important step in integrating biotechnology into daily medical practice.","link":"https://www.frontiersin.org/news/2026/07/14/frontiers-in-science-simple-test-could-help-track-metabolic-health-in-cancer-and-chronic-disease","categoria":"SCIENCE","lang":"en"},{"fonte":"Bulletin of the Atomic Scientists","pais":"United States","titulo":"Courts won't solve the fight over AI and creative work: politics will","resumo":"The article argues that the legal dilemmas involving artificial intelligence and the intellectual property of creative works require legislative, not just judicial, solutions. With the impasse in the courts, the debate is shifting to the political sphere, where new laws must define the future of artistic work. The scenario suggests a long regulatory battle ahead.","link":"https://thebulletin.org/2026/07/courts-wont-settle-the-fight-over-ai-and-creative-work-politics-will/","categoria":"TRENDING TOPICS","lang":"en"},{"fonte":"The Quantum Insider","pais":"United States","titulo":"Logical Qubit Technology launches quantum cloud platform for superconducting quantum computing","resumo":"Logical Qubit Technology has announced the launch of a cloud-based platform focused on superconducting quantum computing, democratizing access to this cutting-edge technology. The initiative aims to accelerate research across diverse sectors that rely on advanced processing, from chemistry to cryptography. The platform marks a major milestone in the commercialization and accessibility of quantum computing.","link":"https://thequantuminsider.com/2026/07/14/logical-qubit-technology-launches-quantum-cloud-platform-at-quantum-day-2026/","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"Investing.com France","pais":"France","titulo":"Morgan Stanley backs Sampo citing its technology and scale","resumo":"Morgan Stanley has highlighted the potential of the company Sampo within the European financial market. The analysis points out that the combination of robust investment in technological infrastructure and the company's large-scale operational reach are key competitive advantages for sustaining its long-term growth.","link":"https://fr.investing.com/news/stock-market-news/morgan-stanley-soutient-sampo-grace-a-sa-technologie-et-son-envergure-3497893","categoria":"FINTECH","lang":"en"},{"fonte":"Maddyness","pais":"France","titulo":"AI: Europe's problem is no longer the technology, it's the market","resumo":"Experts discuss the maturity of artificial intelligence in Europe, arguing that the region already possesses the technical expertise needed to innovate. The current hurdle lies not in a lack of innovation, but rather in market fragmentation and regulatory barriers that prevent the rapid scaling of AI-based products and services.","link":"https://www.maddyness.com/2026/07/14/ia-le-probleme-de-leurope-nest-plus-la-technologie-cest-le-marche/","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"European Space Agency","pais":"France","titulo":"ESA releases the 2026 Space Economy Report","resumo":"The European Space Agency has released strategic data on the development and outlook of the space economy for 2026. The report analyzes private and state investments, highlighting how innovations in satellites and orbital exploration are driving new economic sectors and Europe's technological competitiveness in space.","link":"https://www.esa.int/About_Us/Business_with_ESA/ESA_releases_2026_Space_Economy_Report","categoria":"SCIENCE","lang":"en"},{"fonte":"New Electronics","pais":"England","titulo":"Pixel-Flo secures £5.25 million in seed funding to scale MicroLED manufacturing technology","resumo":"Startup Pixel-Flo has raised significant funding to boost the production of next-generation MicroLED displays. The investment will be fundamental in scaling industrial infrastructure and consolidating the company's position in the competitive high-precision display market.","link":"https://www.newelectronics.co.uk/content/news/pixel-flo-secures-525mn-seed-funding-to-scale-microled-manufacturing-technology","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"GOV.UK","pais":"England","titulo":"New and novel: call for multi-domain autonomous systems","resumo":"A recent initiative is calling for the development of autonomous systems capable of operating in an integrated manner across multiple environments. The focus is on creating technologies that increase interoperability and operational efficiency in complex defense and automation scenarios.","link":"https://www.gov.uk/government/news/new-and-novel-call-for-multi-domain-autonomous-systems","categoria":"SCIENCE","lang":"en"},{"fonte":"The TRADE","pais":"England","titulo":"Rothera launches institutional-grade exchange and clearing platform with Adaptive technology","resumo":"Rothera has unveiled a new, robust financial infrastructure utilizing Adaptive technology to optimize transactions and clearing. The platform aims to serve institutional clients seeking greater security, speed, and resilience in capital market operations.","link":"https://www.thetradenews.com/rothera-launches-institutional-grade-exchange-and-clearing-platform-with-adaptive-technology/","categoria":"FINTECH","lang":"en"},{"fonte":"BAE Systems","pais":"England","titulo":"Future of fighter pilot helmet technology to be unveiled at Farnborough International Airshow","resumo":"The prestigious Farnborough Airshow will serve as the venue for the presentation of next-generation helmets designed for fighter pilots. This new technology integrates advanced augmented reality and protection systems, promising to elevate the level of situational awareness and safety in air combat.","link":"https://www.baesystems.com/en-uk/article/future-of-fighter-pilot-helmet-technology-to-be-unveiled-at-farnborough-international-airshow","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"TheWire.in","pais":"England","titulo":"MG unveils two exciting concept cars combining sporting heritage and advanced technology at the Goodwood Festival of Speed 2026","resumo":"MG unveiled two new concept vehicles during the iconic Goodwood Festival of Speed, merging its historic design with modern innovations. The prototypes highlight the brand's commitment to electrification and sporting performance in a rapidly transforming automotive market.","link":"https://m.thewire.in/article/ptiprnews/mg-unveils-two-exciting-concept-cars-combining-sporting-heritage-and-advanced-technology-at-the-goodwood-festival-of-speed he role of technology in democratizing and modernizing access to information.","link":"https://coimbracoolectiva.pt/historias/comunidade/coimbra-coolectiva-no-tech-arts-festival-do-tumo-arte-tecnologia-e-jornalismo-colaborativo/","categoria":"INNOVATION","lang":"en"},{"fonte":"Correio da Manhã","pais":"Portugal","titulo":"Learn how technology can help prevent fires in Portugal","resumo":"The use of drones, smart sensors, and data analysis is strengthening the strategy for forest fire prevention in Portugal. These tools allow for more effective monitoring and rapid response to potential fire hazards, protecting the country's natural heritage. The implementation of these technological solutions represents a critical advancement for national environmental security.","link":"https://www.cmjornal.pt/cmtv/programas/informacao/falar-global/detalhe/saiba-como-a-tecnologia-consegue-ajudar-a-evitar-incendios-em-portugal","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"e24.pt","pais":"Portugal","titulo":"Smart Technology: How innovation is transforming our future","resumo":"The accelerated evolution of smart technology is redefining how we live, work, and interact with the world around us. From industrial automation to integration into domestic life, innovation plays a central role in social and economic progress. Understanding these trends is fundamental to keeping pace with the digital transformation shaping the near future.","link":"https://e24.pt/tecnologia-inteligente-como-a-inovacao-esta-a-transformar-o-nosso-futuro/","categoria":"TECHNOLOGY","lang":"en"},{"fonte":"SAPO","pais":"Portugal","titulo":"Boost Surfing: Technology that helps you catch more waves","resumo":"Boost Surfing technology introduces an electric propulsion system that attaches to surfboards to boost athlete performance. This device makes it easier to paddle into waves and extends the duration of sessions, appealing to both professional surfers and enthusiasts. This innovation exemplifies how modern engi   const searchInput = document.getElementById('search');
  const langSelect = document.getElementById('lang');
  const countrySelect = document.getElementById('country');
  const categorySelect = document.getElementById('category');
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');
  const clearBtn = document.getElementById('clear-filters');

  // Utility de escape HTML simples para prevenir injections em propriedades sem tratamento
  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function populateSelects() {
    const lang = langSelect.value;
    const currentData = data.filter(d => d.lang === lang);

    const countries = [...new Set(currentData.map(d => d.pais))].filter(Boolean).sort();
    const categories = [...new Set(currentData.map(d => d.categoria))].filter(Boolean).sort();

    const currentCountry = countrySelect.value;
    const currentCategory = categorySelect.value;

    countrySelect.innerHTML = '<option value="all">Todos / All</option>';
    categorySelect.innerHTML = '<option value="all">Todas / All</option>';

    countries.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      countrySelect.appendChild(opt);
    });

    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      categorySelect.appendChild(opt);
    });

    if (currentCountry !== 'all' && countries.includes(currentCountry)) {
      countrySelect.value = currentCountry;
    }
    if (currentCategory !== 'all' && categories.includes(currentCategory)) {
      categorySelect.value = currentCategory;
    }
  }

  function render(items) {
    countEl.textContent = `${items.length} notícia${items.length !== 1 ? 's' : ''}`;
    
    grid.innerHTML = items.map(item => {
      const readMoreTxt = item.lang === 'pt' ? 'Ler mais' : 'Read more';
      
      const bulletList = (item.resumo || '').split('\n')
        .filter(Boolean)
        .map(line => `<li>${esc(line.replace(/^- /, ''))}</li>`)
        .join('');

      return `
        <div class="news-card">
          <div class="card-meta">
            <span class="category">${esc(item.categoria) || 'Geral'}</span>
            <span class="country">${esc(item.pais) || 'Global'}</span>
          </div>
          <h3 class="card-title">${esc(item.titulo)}</h3>
          <div class="card-summary">
            <ul>${bulletList}</ul>
          </div>
          <div class="card-footer">
            <a href="${esc(item.link)}" target="_blank" class="read-more">
              ${readMoreTxt} &rarr;
            </a>
            <span class="source">${esc(item.fonte)}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterData() {
    const query = searchInput.value.toLowerCase();
    const lang = langSelect.value;
    const country = countrySelect.value;
    const category = categorySelect.value;

    const filtered = data.filter(item => {
      const matchLang = item.lang === lang;
      const matchCountry = country === 'all' || item.pais === country;
      const matchCategory = category === 'all' || item.categoria === category;
      const matchSearch = query === '' 
        || (item.titulo || '').toLowerCase().includes(query)
        || (item.resumo || '').toLowerCase().includes(query)
        || (item.fonte || '').toLowerCase().includes(query);

      return matchLang && matchCountry && matchCategory && matchSearch;
    });

    render(filtered);
  }

  // Binds
  searchInput.addEventListener('input', filterData);
  langSelect.addEventListener('change', () => {
    populateSelects();
    filterData();
  });
  countrySelect.addEventListener('change', filterData);
  categorySelect.addEventListener('change', filterData);
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    countrySelect.value = 'all';
    categorySelect.value = 'all';
    filterData();
  });

  // Initialization
  populateSelects();
  filterData(); // trigger first render
</script>
</body>
</html>
